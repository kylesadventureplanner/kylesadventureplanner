name: Wave 0 Smoke

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: wave0-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Static + Playwright Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: kylesadventureplanner/tools-folder/playwright-smoke/package-lock.json

      - name: Install Playwright smoke dependencies
        working-directory: kylesadventureplanner/tools-folder/playwright-smoke
        run: npm install

      - name: Install Chromium for Playwright
        working-directory: kylesadventureplanner/tools-folder/playwright-smoke
        run: npx playwright install --with-deps chromium

      - name: Run combined smoke gates
        working-directory: kylesadventureplanner/tools-folder/playwright-smoke
        run: npm run smoke:all

      - name: Upload smoke reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wave0-smoke-reports-${{ github.run_id }}
          path: docs/js-audit/reports/
          if-no-files-found: warn

