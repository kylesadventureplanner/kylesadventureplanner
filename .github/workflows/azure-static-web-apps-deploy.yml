name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Debug - Check which secret will be used
        run: |
          if [ -n "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ICY_BEACH_02082F710 }}" ]; then
            echo "✓ Using AZURE_STATIC_WEB_APPS_API_TOKEN_ICY_BEACH_02082F710"
            echo "Token length: $(echo -n '${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ICY_BEACH_02082F710 }}' | wc -c)"
          else
            echo "✗ AZURE_STATIC_WEB_APPS_API_TOKEN_ICY_BEACH_02082F710 is empty"
          fi

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ICY_BEACH_02082F710 }}
          action: upload
          app_location: /
          output_location: ""
          skip_app_build: true
