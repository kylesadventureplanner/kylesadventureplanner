name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    env:
      SWA_DEPLOYMENT_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ICY_BEACH_02082F710 || secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_KYLES_ADVENTURE_PLANNER }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Validate deployment token is present
        run: |
          if [ -z "$SWA_DEPLOYMENT_TOKEN" ]; then
            echo "::error::SWA deployment token is missing. Set Actions secret AZURE_STATIC_WEB_APPS_API_TOKEN_ICY_BEACH_02082F710."
            exit 1
          fi

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_DEPLOYMENT_TOKEN }}
          action: upload
          app_location: /
          output_location: ""
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    env:
      SWA_DEPLOYMENT_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ICY_BEACH_02082F710 || secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_KYLES_ADVENTURE_PLANNER }}
    steps:
      - name: Validate deployment token is present
        run: |
          if [ -z "$SWA_DEPLOYMENT_TOKEN" ]; then
            echo "::error::SWA deployment token is missing. Set Actions secret AZURE_STATIC_WEB_APPS_API_TOKEN_ICY_BEACH_02082F710."
            exit 1
          fi

      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_DEPLOYMENT_TOKEN }}
          action: close
          app_location: /
