name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    env:
      SWA_DEPLOYMENT_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ICY_BEACH_02082F710 }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Validate deployment token is present
        run: |
          if [ -z "$SWA_DEPLOYMENT_TOKEN" ]; then
            echo "::error::Missing secret AZURE_STATIC_WEB_APPS_API_TOKEN_ICY_BEACH_02082F710"
            exit 1
          fi

      - name: Print token length (safe diagnostic)
        run: |
          echo "SWA token length: ${#SWA_DEPLOYMENT_TOKEN}"

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /
          output_location: ""
          skip_app_build: true
