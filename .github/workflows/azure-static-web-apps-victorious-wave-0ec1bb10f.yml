name: Azure Static Web Apps CI/CD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
          lfs: false
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install Dependencies
        run: npm ci
      - name: Install Playwright Browser
        run: |
          # Retry once to smooth over transient apt/network failures on runners.
          npx playwright install --with-deps chromium || (
            echo "Playwright install failed on first attempt, retrying..." &&
            sleep 8 &&
            npx playwright install --with-deps chromium
          )
      - name: Start Local Static Server For Smoke Tests
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/swa-local-server.log 2>&1 &
          echo $! > /tmp/swa-local-server.pid
      - name: Wait For Local Server
        run: |
          for i in {1..40}; do
            if curl -fsS http://127.0.0.1:4173/ >/dev/null; then
              echo "Local server is ready"
              exit 0
            fi
            sleep 0.5
          done
          echo "Local server failed to start"
          cat /tmp/swa-local-server.log || true
          exit 1
      - name: Reliability Ownership Check
        run: npm run reliability:ownership
      - name: Reliability Smoke Suite
        env:
          APP_URL: http://127.0.0.1:4173
        run: npm run reliability:smoke
      - name: Upload Playwright diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics-${{ github.run_id }}
          path: |
            test-results/**/trace.zip
            test-results/**/error-context.md
            test-results/**/*.png
            test-results/**/*.jpg
            test-results/**/*.jpeg
            test-results/**/*.webm
            test-results/**/*.mp4
          if-no-files-found: ignore
          retention-days: 7
      - name: Summarize Playwright diagnostics artifact
        if: always()
        run: |
          echo '- **Diagnostics artifact:** `playwright-diagnostics-${{ github.run_id }}` (Actions run page -> **Artifacts**)' >> "$GITHUB_STEP_SUMMARY"
      - name: Reliability Release Gate
        run: npm run reliability:gate
      - name: Stop Local Static Server
        if: always()
        run: |
          if [ -f /tmp/swa-local-server.pid ]; then
            kill "$(cat /tmp/swa-local-server.pid)" || true
          fi
      - name: Build And Deploy
        id: builddeploy
        continue-on-error: true
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_WAVE_0EC1BB10F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "/" # App source code path
          api_location: "api" # Api source code path - optional
          output_location: "." # Built app content directory - optional
          ###### End of Repository/Build Configurations ######

      # Fallback path for transient MCR/Docker pull failures in Azure/static-web-apps-deploy.
      - name: Build And Deploy (SWA CLI fallback)
        id: fallbackdeploy
        if: ${{ steps.builddeploy.outcome == 'failure' }}
        env:
          SWA_DEPLOYMENT_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_WAVE_0EC1BB10F }}
          SWA_EVENT_NAME: ${{ github.event_name }}
          SWA_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -z "${SWA_DEPLOYMENT_TOKEN}" ]; then
            echo "Missing SWA deployment token secret"
            exit 1
          fi

          if [ "${SWA_EVENT_NAME}" = "pull_request" ] && [ -n "${SWA_PR_NUMBER}" ]; then
            SWA_ENVIRONMENT="pr-${SWA_PR_NUMBER}"
          else
            SWA_ENVIRONMENT="production"
          fi

          echo "Primary deploy action failed, falling back to SWA CLI deploy (${SWA_ENVIRONMENT})"
          npx --yes @azure/static-web-apps-cli@2.0.7 deploy . \
            --deployment-token "${SWA_DEPLOYMENT_TOKEN}" \
            --api-location "api" \
            --env "${SWA_ENVIRONMENT}"

      - name: Deploy Path Summary
        if: always()
        run: |
          if [ "${{ steps.builddeploy.outcome }}" = "success" ]; then
            echo "::notice::Deploy source: primary Azure/static-web-apps-deploy action"
            echo "- **Deploy path:** primary (Azure/static-web-apps-deploy)" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.fallbackdeploy.outcome }}" = "success" ]; then
            echo "::notice::Deploy source: SWA CLI fallback"
            echo "- **Deploy path:** fallback (SWA CLI)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::Deploy source: unresolved (primary=${{ steps.builddeploy.outcome }}, fallback=${{ steps.fallbackdeploy.outcome }})"
            echo "- **Deploy path:** unresolved (primary=${{ steps.builddeploy.outcome }}, fallback=${{ steps.fallbackdeploy.outcome }})" >> "$GITHUB_STEP_SUMMARY"
          fi

      # Informational-only: checks live deployment health without blocking release.
      - name: Post-Deploy Smoke Check (non-blocking)
        if: ${{ github.event_name == 'push' }}
        continue-on-error: true
        env:
          APP_URL: https://victorious-wave-0ec1bb10f.1.azurestaticapps.net/
        run: |
          echo "Running non-blocking live smoke check against ${APP_URL}"
          curl -fsS "${APP_URL}" >/dev/null
          npx playwright test tests/reliability-smoke.spec.js --grep "first-click success: nature explore" --reporter=list

