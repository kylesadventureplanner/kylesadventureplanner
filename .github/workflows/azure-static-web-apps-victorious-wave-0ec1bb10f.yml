name: Azure Static Web Apps CI/CD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

concurrency:
  group: swa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
          lfs: false
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install Dependencies
        id: installdeps
        run: npm ci
      - name: Install Playwright Browser
        id: installplaywright
        run: |
          # Retry once to smooth over transient apt/network failures on runners.
          npx playwright install --with-deps chromium || (
            echo "Playwright install failed on first attempt, retrying..." &&
            sleep 8 &&
            npx playwright install --with-deps chromium
          )
      - name: Start Local Static Server For Smoke Tests
        id: startlocalserver
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/swa-local-server.log 2>&1 &
          echo $! > /tmp/swa-local-server.pid
      - name: Wait For Local Server
        id: waitlocalserver
        run: |
          for i in {1..40}; do
            if curl -fsS http://127.0.0.1:4173/ >/dev/null; then
              echo "Local server is ready"
              exit 0
            fi
            sleep 0.5
          done
          echo "Local server failed to start"
          cat /tmp/swa-local-server.log || true
          exit 1
      - name: Reliability Ownership Check
        id: reliabilityownership
        run: npm run reliability:ownership
      - name: Reliability Smoke Suite
        id: reliabilitysmoke
        env:
          APP_URL: http://127.0.0.1:4173
        run: npm run reliability:smoke
      - name: Upload Playwright diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics-${{ github.run_id }}
          path: |
            test-results/**/trace.zip
            test-results/**/error-context.md
            test-results/**/*.png
            test-results/**/*.jpg
            test-results/**/*.jpeg
            test-results/**/*.webm
            test-results/**/*.mp4
          if-no-files-found: ignore
          retention-days: 7
      - name: Summarize Playwright diagnostics artifact
        if: always()
        run: |
          echo '- **Diagnostics artifact:** `playwright-diagnostics-${{ github.run_id }}` (Actions run page -> **Artifacts**)' >> "$GITHUB_STEP_SUMMARY"
      - name: Reliability Release Gate
        id: reliabilitygate
        run: npm run reliability:gate
      - name: Stamp Deployment Metadata
        id: stampdeploymentmetadata
        run: |
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-8)"
          DEPLOYMENT_TAG="ci.${GITHUB_RUN_NUMBER}.${SHORT_SHA}"
          DEPLOYED_AT_ISO="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          echo "DEPLOYMENT_TAG=${DEPLOYMENT_TAG}" >> "$GITHUB_ENV"
          echo "DEPLOYED_AT_ISO=${DEPLOYED_AT_ISO}" >> "$GITHUB_ENV"

          DEPLOYMENT_TAG="${DEPLOYMENT_TAG}" DEPLOYED_AT_ISO="${DEPLOYED_AT_ISO}" node scripts/stamp-deployment-metadata.js

          # Write a unique per-deploy marker file so verification can avoid CDN cache ambiguity.
          mkdir -p deploy-tags
          {
            echo "deployment_tag=${DEPLOYMENT_TAG}"
            echo "deployed_at_utc=${DEPLOYED_AT_ISO}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "sha=${GITHUB_SHA}"
          } > "deploy-tags/${DEPLOYMENT_TAG}.txt"

          grep -n "const DEPLOYMENT_TAG" index.html
          grep -n "const DEPLOYED_AT_ISO" index.html
          ls -la deploy-tags | cat

          {
            echo "- **Deployment tag:** ${DEPLOYMENT_TAG}"
            echo "- **Deployed at (UTC):** ${DEPLOYED_AT_ISO}"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Stop Local Static Server
        if: always()
        run: |
          if [ -f /tmp/swa-local-server.pid ]; then
            kill "$(cat /tmp/swa-local-server.pid)" || true
          fi
      - name: Determine Deploy Eligibility
        id: deployeligibility
        if: always()
        env:
          SWA_DEPLOYMENT_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_WAVE_0EC1BB10F }}
          SWA_EVENT_NAME: ${{ github.event_name }}
          SWA_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ "${SWA_EVENT_NAME}" = "pull_request" ] && [ -n "${SWA_PR_NUMBER}" ]; then
            SWA_ENVIRONMENT="pr-${SWA_PR_NUMBER}"
          else
            SWA_ENVIRONMENT="production"
          fi

          if [ -z "${SWA_DEPLOYMENT_TOKEN}" ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "reason=Missing SWA deployment token secret" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "reason=Deployment token available" >> "$GITHUB_OUTPUT"
          fi

          echo "environment=${SWA_ENVIRONMENT}" >> "$GITHUB_OUTPUT"
      # Primary deploy path: Azure action (proven reliable; MCR 403 on 2026-05-04 was a transient outage).
      - name: Build And Deploy (Azure action primary)
        id: builddeploy
        if: ${{ success() && steps.deployeligibility.outputs.should_deploy == 'true' }}
        continue-on-error: true
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_WAVE_0EC1BB10F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: "api"
          output_location: "."

      # Fallback to SWA CLI if Azure action fails (e.g. transient MCR pull failure).
      - name: Build And Deploy (SWA CLI fallback)
        id: deploycli
        if: ${{ steps.deployeligibility.outputs.should_deploy == 'true' && steps.builddeploy.outcome == 'failure' }}
        continue-on-error: true
        env:
          SWA_DEPLOYMENT_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_WAVE_0EC1BB10F }}
          SWA_ENVIRONMENT: ${{ steps.deployeligibility.outputs.environment }}
        run: |
          set -o pipefail
          echo "Azure action failed; deploying via SWA CLI fallback (${SWA_ENVIRONMENT})"
          if [ "${SWA_ENVIRONMENT}" = "production" ]; then
            SWA_ENV_ARGS=()
            echo "SWA CLI env mode: implicit production"
          else
            SWA_ENV_ARGS=(--env "${SWA_ENVIRONMENT}")
            echo "SWA CLI env mode: explicit ${SWA_ENVIRONMENT}"
          fi

          for attempt in 1 2 3; do
            DEPLOY_LOG="$(mktemp)"
            # Note: pipefail is set so the pipe exit code reflects SWA CLI, not tee.
            if npx --yes @azure/static-web-apps-cli@2.0.7 deploy . \
              --deployment-token "${SWA_DEPLOYMENT_TOKEN}" \
              --api-location "api" \
              --api-language "node" \
              --api-version "20" \
              "${SWA_ENV_ARGS[@]}" 2>&1 | tee "${DEPLOY_LOG}"; then
              DEPLOYED_URL="$(grep -Eo 'https://[A-Za-z0-9.-]+\.azurestaticapps\.net' "${DEPLOY_LOG}" | tail -n 1 || true)"
              echo "SWA CLI reported deployment URL: ${DEPLOYED_URL:-<none in output>}"
              exit 0
            fi
            echo "SWA CLI deploy attempt ${attempt} failed"
            if [ "${attempt}" -lt 3 ]; then sleep $((attempt * 6)); fi
          done
          exit 1



      - name: Deploy Path Summary
        if: always()
        run: |
          FAILED_PREREQ_NAME=""
          FAILED_PREREQ_ID=""
          icon_for_outcome() {
            case "$1" in
              success)
                printf '✅ %s' "$1"
                ;;
              failure)
                printf '⚠️ %s' "$1"
                ;;
              skipped)
                printf '⏭️ %s' "$1"
                ;;
              *)
                printf '• %s' "${1:-unknown}"
                ;;
            esac
          }

          if [ "${{ steps.installdeps.outcome }}" = "failure" ]; then
            FAILED_PREREQ_NAME="Install Dependencies"
            FAILED_PREREQ_ID="installdeps"
          elif [ "${{ steps.installplaywright.outcome }}" = "failure" ]; then
            FAILED_PREREQ_NAME="Install Playwright Browser"
            FAILED_PREREQ_ID="installplaywright"
          elif [ "${{ steps.startlocalserver.outcome }}" = "failure" ]; then
            FAILED_PREREQ_NAME="Start Local Static Server For Smoke Tests"
            FAILED_PREREQ_ID="startlocalserver"
          elif [ "${{ steps.waitlocalserver.outcome }}" = "failure" ]; then
            FAILED_PREREQ_NAME="Wait For Local Server"
            FAILED_PREREQ_ID="waitlocalserver"
          elif [ "${{ steps.reliabilityownership.outcome }}" = "failure" ]; then
            FAILED_PREREQ_NAME="Reliability Ownership Check"
            FAILED_PREREQ_ID="reliabilityownership"
          elif [ "${{ steps.reliabilitysmoke.outcome }}" = "failure" ]; then
            FAILED_PREREQ_NAME="Reliability Smoke Suite"
            FAILED_PREREQ_ID="reliabilitysmoke"
          elif [ "${{ steps.reliabilitygate.outcome }}" = "failure" ]; then
            FAILED_PREREQ_NAME="Reliability Release Gate"
            FAILED_PREREQ_ID="reliabilitygate"
          elif [ "${{ steps.stampdeploymentmetadata.outcome }}" = "failure" ]; then
            FAILED_PREREQ_NAME="Stamp Deployment Metadata"
            FAILED_PREREQ_ID="stampdeploymentmetadata"
          fi

          FINAL_DEPLOY_PATH=""
          BLOCKING_PREREQ_SUMMARY="None"
          if [ -n "${FAILED_PREREQ_NAME}" ]; then
            BLOCKING_PREREQ_SUMMARY="${FAILED_PREREQ_NAME} (${FAILED_PREREQ_ID})"
          fi

          {
            echo "### Pre-deploy step outcomes"
            echo "| Step | Id | Outcome | Notes |"
            echo "| --- | --- | --- | --- |"
            echo "| Install Dependencies | installdeps | $(icon_for_outcome "${{ steps.installdeps.outcome }}") | $([ "${{ steps.installdeps.outcome }}" = "failure" ] && echo "Blocking failure" || echo "") |"
            echo "| Install Playwright Browser | installplaywright | $(icon_for_outcome "${{ steps.installplaywright.outcome }}") | $([ "${{ steps.installplaywright.outcome }}" = "failure" ] && echo "Blocking failure" || echo "") |"
            echo "| Start Local Static Server For Smoke Tests | startlocalserver | $(icon_for_outcome "${{ steps.startlocalserver.outcome }}") | $([ "${{ steps.startlocalserver.outcome }}" = "failure" ] && echo "Blocking failure" || echo "") |"
            echo "| Wait For Local Server | waitlocalserver | $(icon_for_outcome "${{ steps.waitlocalserver.outcome }}") | $([ "${{ steps.waitlocalserver.outcome }}" = "failure" ] && echo "Blocking failure" || echo "") |"
            echo "| Reliability Ownership Check | reliabilityownership | $(icon_for_outcome "${{ steps.reliabilityownership.outcome }}") | $([ "${{ steps.reliabilityownership.outcome }}" = "failure" ] && echo "Blocking failure" || echo "") |"
            echo "| Reliability Smoke Suite | reliabilitysmoke | $(icon_for_outcome "${{ steps.reliabilitysmoke.outcome }}") | $([ "${{ steps.reliabilitysmoke.outcome }}" = "failure" ] && echo "Blocking failure" || echo "") |"
            echo "| Reliability Release Gate | reliabilitygate | $(icon_for_outcome "${{ steps.reliabilitygate.outcome }}") | $([ "${{ steps.reliabilitygate.outcome }}" = "failure" ] && echo "Blocking failure" || echo "") |"
            echo "| Stamp Deployment Metadata | stampdeploymentmetadata | $(icon_for_outcome "${{ steps.stampdeploymentmetadata.outcome }}") | $([ "${{ steps.stampdeploymentmetadata.outcome }}" = "failure" ] && echo "Blocking failure" || echo "") |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ steps.deployeligibility.outputs.should_deploy }}" != "true" ]; then
            echo "::notice::Deploy skipped: ${{ steps.deployeligibility.outputs.reason }}"
            FINAL_DEPLOY_PATH="⏭️ skipped (${{ steps.deployeligibility.outputs.reason }})"
          elif [ "${{ steps.builddeploy.outcome }}" = "success" ]; then
            echo "::notice::Deploy source: primary Azure/static-web-apps-deploy action"
            FINAL_DEPLOY_PATH="✅ primary (Azure/static-web-apps-deploy)"
          elif [ "${{ steps.deploycli.outcome }}" = "success" ]; then
            echo "::notice::Deploy source: fallback SWA CLI"
            FINAL_DEPLOY_PATH="✅ fallback (SWA CLI)"
          elif [ "${{ steps.builddeploy.outcome }}" = "failure" ] || [ "${{ steps.deploycli.outcome }}" = "failure" ]; then
            echo "::warning::Deploy source: attempted but failed (azure_action=${{ steps.builddeploy.outcome }}, cli=${{ steps.deploycli.outcome }})"
            FINAL_DEPLOY_PATH="⚠️ failed (azure_action=${{ steps.builddeploy.outcome }}, cli=${{ steps.deploycli.outcome }})"
            {
              echo "### Deploy status"
              echo "| Field | Value |"
              echo "| --- | --- |"
              echo "| Eligibility | ${{ steps.deployeligibility.outputs.should_deploy }} (${{ steps.deployeligibility.outputs.reason }}) |"
              echo "| Target environment | ${{ steps.deployeligibility.outputs.environment }} |"
              echo "| Blocking prerequisite | ${BLOCKING_PREREQ_SUMMARY} |"
              echo "| Deploy path | ${FINAL_DEPLOY_PATH} |"
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            if [ -n "${FAILED_PREREQ_NAME}" ]; then
              echo "::notice::Deploy not attempted because prerequisite failed: ${FAILED_PREREQ_NAME}"
              FINAL_DEPLOY_PATH="⏭️ not attempted (blocked by ${FAILED_PREREQ_NAME}; azure_action=${{ steps.builddeploy.outcome }}, cli=${{ steps.deploycli.outcome }})"
            else
              echo "::notice::Deploy not attempted because an earlier step failed or the job was interrupted (azure_action=${{ steps.builddeploy.outcome }}, cli=${{ steps.deploycli.outcome }})"
              FINAL_DEPLOY_PATH="⏭️ not attempted (earlier step failure or interruption; azure_action=${{ steps.builddeploy.outcome }}, cli=${{ steps.deploycli.outcome }})"
            fi
          fi

          {
            echo "### Deploy status"
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Eligibility | ${{ steps.deployeligibility.outputs.should_deploy }} (${{ steps.deployeligibility.outputs.reason }}) |"
            echo "| Target environment | ${{ steps.deployeligibility.outputs.environment }} |"
            echo "| Blocking prerequisite | ${BLOCKING_PREREQ_SUMMARY} |"
            echo "| Deploy path | ${FINAL_DEPLOY_PATH} |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post-Deploy Tag Verification (blocking)
        id: postdeploytagverification
        if: ${{ github.event_name == 'push' && (steps.builddeploy.outcome == 'success' || steps.deploycli.outcome == 'success') }}
        env:
          APP_URL: https://victorious-wave-0ec1bb10f.1.azurestaticapps.net/
        run: |
          echo "Running blocking live tag verification against ${APP_URL}"
          MAX_ATTEMPTS=20
          SLEEP_SECONDS=30
          TAG_FOUND=false
          DEPLOY_MARKER_URL="${APP_URL%/}/deploy-tags/${DEPLOYMENT_TAG}.txt"

          echo "Deploy marker URL: ${DEPLOY_MARKER_URL}"

          echo "Waiting 30s for deployment to register before first probe..."
          sleep 30

          for attempt in $(seq 1 "${MAX_ATTEMPTS}"); do
            TS="$(date +%s)"
            LIVE_HTML="$(curl -fsS -H 'Cache-Control: no-cache' -H 'Pragma: no-cache' "${APP_URL}?nocache=${TS}")"

            if curl -fsS -H 'Cache-Control: no-cache' -H 'Pragma: no-cache' "${DEPLOY_MARKER_URL}?nocache=${TS}" | grep -F "deployment_tag=${DEPLOYMENT_TAG}" >/dev/null 2>&1; then
              TAG_FOUND=true
              echo "::notice::Live app contains current deployment marker file for ${DEPLOYMENT_TAG} (attempt ${attempt}/${MAX_ATTEMPTS})"
              echo "- **Live deployment marker check:** found deploy-tags/${DEPLOYMENT_TAG}.txt (attempt ${attempt}/${MAX_ATTEMPTS})" >> "$GITHUB_STEP_SUMMARY"
              break
            fi

            if echo "${LIVE_HTML}" | grep -F "${DEPLOYMENT_TAG}" >/dev/null 2>&1; then
              TAG_FOUND=true
              echo "::notice::Live app contains current deployment tag: ${DEPLOYMENT_TAG} (attempt ${attempt}/${MAX_ATTEMPTS})"
              echo "- **Live deployment tag check:** found ${DEPLOYMENT_TAG} (attempt ${attempt}/${MAX_ATTEMPTS})" >> "$GITHUB_STEP_SUMMARY"
              break
            fi

            LIVE_TAG="$(printf '%s' "${LIVE_HTML}" | sed -n "s/.*const DEPLOYMENT_TAG = '\([^']*\)'.*/\1/p" | head -n 1)"
            echo "Attempt ${attempt}/${MAX_ATTEMPTS}: deployment tag ${DEPLOYMENT_TAG} not visible yet (live_tag=${LIVE_TAG:-unknown})."
            if [ "${attempt}" -lt "${MAX_ATTEMPTS}" ]; then
              sleep "${SLEEP_SECONDS}"
            fi
          done

          if [ "${TAG_FOUND}" != "true" ]; then
            echo "::error::Live app never exposed deployment tag ${DEPLOYMENT_TAG} after ${MAX_ATTEMPTS} x ${SLEEP_SECONDS}s attempts (~$((MAX_ATTEMPTS * SLEEP_SECONDS / 60))min). Failing release to prevent stale green deploys."
            echo "- **Live deployment tag check:** missing ${DEPLOYMENT_TAG} after ${MAX_ATTEMPTS} attempts (~$((MAX_ATTEMPTS * SLEEP_SECONDS / 60))min total)" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Post-Deploy Smoke Diagnostics
        if: ${{ github.event_name == 'push' && (steps.builddeploy.outcome == 'success' || steps.deploycli.outcome == 'success') }}
        run: |
          WHOAMI_VALUE="$(whoami)"
          ID_VALUE="$(id)"
          WORKSPACE_LS_LAD="$(ls -lad "${GITHUB_WORKSPACE}" 2>/dev/null || echo 'unavailable')"
          TEST_RESULTS_LS_LAD="$(ls -lad "${GITHUB_WORKSPACE}/test-results" 2>/dev/null || echo 'missing')"

          echo "Collecting runner identity and ownership context before post-deploy smoke..."
          echo "whoami: ${WHOAMI_VALUE}"
          echo "${ID_VALUE}"
          echo "workspace: ${GITHUB_WORKSPACE}"
          ls -lad "${GITHUB_WORKSPACE}" || true
          ls -la "${GITHUB_WORKSPACE}" | head -n 200 || true
          echo "test-results directory details (if present):"
          ls -lad "${GITHUB_WORKSPACE}/test-results" || true
          ls -la "${GITHUB_WORKSPACE}/test-results" || true

          {
            echo "### Post-deploy smoke diagnostics"
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| whoami | \`${WHOAMI_VALUE}\` |"
            echo "| id | \`${ID_VALUE}\` |"
            echo "| workspace | \`${GITHUB_WORKSPACE}\` |"
            echo "| workspace (ls -lad) | \`${WORKSPACE_LS_LAD}\` |"
            echo "| test-results (ls -lad) | \`${TEST_RESULTS_LS_LAD}\` |"
            echo "| details | See raw logs in **Post-Deploy Smoke Diagnostics** step for full listings. |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post-Deploy Smoke Check (blocking)
        if: ${{ github.event_name == 'push' && (steps.builddeploy.outcome == 'success' || steps.deploycli.outcome == 'success') }}
        env:
          APP_URL: https://victorious-wave-0ec1bb10f.1.azurestaticapps.net/
          POST_DEPLOY_RESULTS_DIR: ${{ runner.temp }}/post-deploy-playwright-${{ github.run_id }}
          RELIABILITY_SMOKE_SUMMARY_PATH: ${{ runner.temp }}/post-deploy-reliability-smoke-summary-${{ github.run_id }}.json
        run: |
          mkdir -p "${POST_DEPLOY_RESULTS_DIR}"
          npx playwright test tests/reliability-smoke.spec.js --config=playwright.config.production.js --grep "first-click success: nature explore" --reporter=list --output="${POST_DEPLOY_RESULTS_DIR}"

      - name: Upload Post-Deploy Playwright diagnostics
        if: ${{ always() && github.event_name == 'push' && (steps.builddeploy.outcome == 'success' || steps.deploycli.outcome == 'success') }}
        uses: actions/upload-artifact@v4
        with:
          name: post-deploy-playwright-diagnostics-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/post-deploy-playwright-${{ github.run_id }}/**/*
          if-no-files-found: ignore
          retention-days: 7

      - name: Post-Deploy Smoke Summary Gate
        id: postdeploysmokesummarygate
        if: ${{ always() && github.event_name == 'push' && (steps.builddeploy.outcome == 'success' || steps.deploycli.outcome == 'success') }}
        env:
          RELIABILITY_SMOKE_SUMMARY_PATH: ${{ runner.temp }}/post-deploy-reliability-smoke-summary-${{ github.run_id }}.json
        run: |
          if [ ! -s "${RELIABILITY_SMOKE_SUMMARY_PATH}" ]; then
            echo "::error::Post-deploy smoke summary file missing: ${RELIABILITY_SMOKE_SUMMARY_PATH}"
            {
              echo "### Post-deploy smoke summary"
              echo "- Missing summary JSON at \`${RELIABILITY_SMOKE_SUMMARY_PATH}\`"
              echo "- Diagnostics artifact: \`post-deploy-playwright-diagnostics-${{ github.run_id }}\`"
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          node <<'NODE'
          const fs = require('fs');

          const summaryPath = process.env.RELIABILITY_SMOKE_SUMMARY_PATH;
          const stepSummaryPath = process.env.GITHUB_STEP_SUMMARY;

          let payload;
          try {
            payload = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
          } catch (err) {
            console.error(`::error::Invalid post-deploy smoke summary JSON: ${err.message}`);
            process.exit(1);
          }

          const pass = Boolean(payload && payload.pass);
          const p95 = Number(payload && payload.startupMsP95);
          const firstClickRate = Number(payload && payload.firstClickSuccessRate);
          const firstClickChecks = Number(payload && payload.firstClickChecks);
          const firstClickSuccesses = Number(payload && payload.firstClickSuccesses);
          const checksTotal = Array.isArray(payload && payload.checks) ? payload.checks.length : 0;
          const checksPassed = Array.isArray(payload && payload.checks)
            ? payload.checks.filter((row) => row && row.passed).length
            : 0;

          const lines = [
            '### Post-deploy smoke summary',
            '| Field | Value |',
            '| --- | --- |',
            `| Status | ${pass ? '✅ pass' : '⚠️ fail'} |`,
            `| Startup p95 (ms) | ${Number.isFinite(p95) ? p95 : 'unknown'} |`,
            `| First-click success rate | ${Number.isFinite(firstClickRate) ? (firstClickRate * 100).toFixed(2) + '%' : 'unknown'} (${Number.isFinite(firstClickSuccesses) ? firstClickSuccesses : 0}/${Number.isFinite(firstClickChecks) ? firstClickChecks : 0}) |`,
            `| Checks passed | ${checksPassed}/${checksTotal} |`,
            `| Summary path | \`${summaryPath}\` |`,
            ''
          ];

          fs.appendFileSync(stepSummaryPath, lines.join('\n'));

          if (!pass) {
            console.error('::error::Post-deploy smoke summary marked the run as failed.');
            process.exit(1);
          }
          NODE

      - name: Final Release Verdict
        if: ${{ always() && github.event_name == 'push' }}
        run: |
          DEPLOY_PATH_STATUS="red"
          DEPLOY_PATH_LABEL="not attempted"

          if [ "${{ steps.deployeligibility.outputs.should_deploy }}" != "true" ]; then
            DEPLOY_PATH_LABEL="skipped (${{ steps.deployeligibility.outputs.reason }})"
          elif [ "${{ steps.builddeploy.outcome }}" = "success" ]; then
            DEPLOY_PATH_STATUS="green"
            DEPLOY_PATH_LABEL="primary"
          elif [ "${{ steps.deploycli.outcome }}" = "success" ]; then
            DEPLOY_PATH_STATUS="green"
            DEPLOY_PATH_LABEL="fallback"
          elif [ "${{ steps.builddeploy.outcome }}" = "failure" ] || [ "${{ steps.deploycli.outcome }}" = "failure" ]; then
            DEPLOY_PATH_LABEL="failed"
          fi

          TAG_STATUS="red"
          if [ "${{ steps.postdeploytagverification.outcome }}" = "success" ]; then
            TAG_STATUS="green"
          fi

          SMOKE_STATUS="red"
          if [ "${{ steps.postdeploysmokesummarygate.outcome }}" = "success" ]; then
            SMOKE_STATUS="green"
          fi

          VERDICT_ICON="🔴"
          VERDICT_LABEL="red"
          if [ "${DEPLOY_PATH_STATUS}" = "green" ] && [ "${TAG_STATUS}" = "green" ] && [ "${SMOKE_STATUS}" = "green" ]; then
            VERDICT_ICON="🟢"
            VERDICT_LABEL="green"
          fi

          if [ "${VERDICT_LABEL}" = "green" ]; then
            echo "::notice::Final release verdict: ${VERDICT_ICON} ${VERDICT_LABEL} (deploy=${DEPLOY_PATH_LABEL}, tag=${{ steps.postdeploytagverification.outcome }}, smoke=${{ steps.postdeploysmokesummarygate.outcome }})"
          else
            echo "::warning::Final release verdict: ${VERDICT_ICON} ${VERDICT_LABEL} (deploy=${DEPLOY_PATH_LABEL}, tag=${{ steps.postdeploytagverification.outcome }}, smoke=${{ steps.postdeploysmokesummarygate.outcome }})"
          fi

          {
            echo "### Final release verdict"
            echo "| Verdict | Deploy path | Tag verification | Smoke gate |"
            echo "| --- | --- | --- | --- |"
            echo "| ${VERDICT_ICON} ${VERDICT_LABEL} | ${DEPLOY_PATH_LABEL} (${{ steps.builddeploy.outcome }}/${{ steps.deploycli.outcome }}) | ${{ steps.postdeploytagverification.outcome }} | ${{ steps.postdeploysmokesummarygate.outcome }} |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request Environment
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_WAVE_0EC1BB10F }}
          app_location: "/"
          action: "close"

