<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>City Explorer - Kyle's Adventure Finder</title>
  <script src="../JS Files/mobile-view-persistence-bootstrap.js"></script>
  <!--
    Google Maps is lazy-loaded only when split map view is enabled.
    This prevents third-party script cost from delaying initial page load.
  -->
  <script>
    window.__cvMapsReady = false;
    window.__cvMapsQueue = [];
    window.__cvMapsScriptRequested = false;
    window.__cvMapsLoadPromise = null;
    window.__cvMapsInit  = function () {
      window.__cvMapsReady = true;
      (window.__cvMapsQueue || []).forEach(function (fn) { try { fn(); } catch (_) {} });
      window.__cvMapsQueue = [];
    };
  </script>
  <link rel="stylesheet" href="../CSS/utilities.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
      color: #1f2937;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 4px;
    }

    .header-subtitle {
      font-size: 14px;
      opacity: 0.9;
    }

    .close-btn {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 24px;
      transition: all 0.2s;
    }

    .close-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    /* Embedded mode already has a parent header in Adventure Challenge. */
    body.embedded-viewer .header {
      display: none;
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .active-sources-row {
      flex-basis: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-top: 2px;
    }

    .city-prefilter-notice {
      display: none;
      flex-basis: 100%;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1e3a8a;
      font-size: 12px;
      font-weight: 600;
    }

    .city-prefilter-notice.visible {
      display: flex;
    }

    .city-prefilter-clear-btn {
      border: 1px solid #93c5fd;
      background: #ffffff;
      color: #1d4ed8;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .city-prefilter-clear-btn:hover {
      border-color: #60a5fa;
      color: #1e40af;
    }

    .active-sources-label {
      font-size: 12px;
      font-weight: 700;
      color: #6b7280;
      margin-right: 2px;
    }

    .active-source-chip {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid #dbeafe;
      background: #eff6ff;
      color: #1e40af;
      font-size: 11px;
      font-weight: 600;
      line-height: 1;
      max-width: 210px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: help;
    }

    .active-sources-row.is-empty .active-source-chip {
      border-color: #e5e7eb;
      background: #f9fafb;
      color: #6b7280;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
    }

    .search-box:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .sort-btn {
      padding: 12px 16px;
      background: white;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }

    .sort-btn:hover {
      border-color: #667eea;
      color: #667eea;
    }

    .sort-btn.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .city-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .city-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
    }

    .city-card:hover {
      border-color: #667eea;
      box-shadow: 0 10px 25px rgba(102,126,234,0.15);
      transform: translateY(-4px);
    }

    .city-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .city-state {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 12px;
    }

    .city-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .stat {
      background: #f3f4f6;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
    }

    .stat-label {
      color: #6b7280;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: #667eea;
    }

    .city-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      margin-top: auto;
    }

    .city-btn:hover {
      background: #5568d3;
      transform: translateY(-2px);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #6b7280;
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .empty-state-text {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      font-size: 16px;
      color: #6b7280;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #e5e7eb;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Locations Page ─────────────────────────────────── */
    #locationsPage {
      display: none;
    }

    .locations-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 24px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }

     .back-btn {
        padding: 7px 14px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        background: white !important;
        color: #374151 !important;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: all 0.15s ease;
        white-space: nowrap;
      }
      .back-btn:hover {
        background: #f3f4f6 !important;
        border-color: #d1d5db !important;
      }

    .locations-title {
      flex: 1;
      min-width: 0;
    }
    .locations-title h2 { font-size: 22px; margin: 0 0 2px 0; }
    .locations-title .subtitle { font-size: 13px; opacity: 0.85; }

    /* Filter/Sort Panel */
    .locations-controls {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 12px;
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.06);
      backdrop-filter: blur(2px);
    }

    .locations-controls-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
      margin-bottom: 10px;
    }

    .loc-filter-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .loc-filter-item label {
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .loc-filter-input,
    .loc-filter-select {
      padding: 8px 10px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 13px;
      color: #374151;
      background: white;
      width: 100%;
    }
    .loc-filter-input:focus,
    .loc-filter-select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.12);
    }

    /* Quick tag filters */
    .loc-quick-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .loc-source-filters {
      display: none;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      margin-top: 8px;
    }

    .loc-source-filters.visible {
      display: flex;
    }

    .loc-source-filter-label {
      font-size: 11px;
      font-weight: 700;
      color: #6b7280;
      margin-right: 2px;
    }

    .loc-mixed-source-diagnostics {
      display: none;
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid #dbeafe;
      background: #f8fbff;
      color: #1e3a8a;
      font-size: 11px;
      font-weight: 700;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .loc-mixed-source-diagnostics.visible {
      display: flex;
    }

    .loc-mixed-source-diagnostics .diag-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.01em;
      text-transform: uppercase;
    }

    .loc-mixed-source-help {
      margin-left: 2px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1px solid #93c5fd;
      background: #dbeafe;
      color: #1e40af;
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      cursor: help;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .loc-mixed-source-help:hover {
      background: #bfdbfe;
      border-color: #60a5fa;
    }

    .loc-active-filters {
      display: none;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed #e5e7eb;
    }
    .loc-active-filters.visible { display: flex; }
    .loc-active-filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 9px;
      border-radius: 999px;
      background: #eef2ff;
      border: 1px solid #c7d2fe;
      color: #3730a3;
      font-size: 11px;
      font-weight: 700;
    }
    .loc-active-filter-chip.is-prefilter {
      background: #fef3c7;
      border-color: #fcd34d;
      color: #92400e;
    }
    .loc-active-filter-chip button {
      border: none;
      background: transparent;
      color: #4338ca;
      font-size: 12px;
      cursor: pointer;
      line-height: 1;
      font-weight: 700;
      padding: 0;
    }
    .loc-active-filter-chip.is-prefilter button {
      color: #92400e;
    }
    .loc-active-filter-clear {
      margin-left: auto;
      font-size: 11px;
      font-weight: 700;
      color: #1d4ed8;
      border: none;
      background: transparent;
      cursor: pointer;
    }

    .wildlife-diagnostics-strip {
      display: none;
      margin-top: 8px;
      padding: 9px 11px;
      border-radius: 10px;
      border: 1px solid #fde68a;
      background: #fffbeb;
      color: #92400e;
      font-size: 12px;
      font-weight: 600;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .wildlife-diagnostics-strip.visible {
      display: flex;
    }

    .wildlife-diagnostics-meta {
      color: #78350f;
      font-size: 11px;
      font-weight: 700;
    }

    .loc-data-freshness-badge {
      margin-top: 8px;
      display: inline-flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid #dbeafe;
      background: #f8fbff;
      color: #1e3a8a;
      font-size: 11px;
      font-weight: 700;
    }

    .loc-data-freshness-badge .freshness-pill {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .loc-data-freshness-badge .freshness-pill.high {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
    }

    .loc-data-freshness-badge .freshness-pill.medium {
      background: #fef3c7;
      color: #92400e;
      border: 1px solid #fcd34d;
    }

    .loc-data-freshness-badge .freshness-pill.low {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }
    .loc-tag-btn {
      padding: 6px 14px;
      border-radius: 999px;
      border: 2px solid #e5e7eb;
      background: white;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: #374151;
    }
    .loc-tag-btn:hover {
      border-color: #667eea;
      color: #667eea;
    }
    .loc-tag-btn.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-color: transparent;
      color: white;
    }
    .loc-tag-btn .loc-tag-count {
      font-size: 11px;
      font-weight: 700;
      opacity: 0.82;
      margin-left: 4px;
    }
    .loc-tag-btn.active .loc-tag-count {
      opacity: 0.94;
    }

    /* Sort + results row */
    .loc-sort-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 8px 0 0 0;
      border-top: 1px solid #f3f4f6;
      margin-top: 10px;
    }
    .loc-sort-label { font-size: 12px; color: #6b7280; font-weight: 600; }
    .loc-sort-select {
      padding: 7px 10px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 13px;
      background: white;
      cursor: pointer;
    }
    .loc-sort-order-btn {
      width: 34px;
      height: 34px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .loc-sort-order-btn:hover { border-color: #667eea; background: #f0f4ff; }
    .loc-results-count {
      margin-left: auto;
      font-size: 13px;
      color: #6b7280;
      font-weight: 600;
    }
    .loc-reset-btn {
      padding: 7px 14px;
      background: white;
      border: 1px solid #fca5a5;
      color: #dc2626;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      transition: all 0.2s;
    }
    .loc-reset-btn:hover { background: #fef2f2; }

    /* Location Cards */
    .locations-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .loc-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 18px 20px;
      transition: all 0.2s;
      cursor: pointer;
      position: relative;
      z-index: 1;
    }
    .loc-card:hover {
      border-color: #667eea;
      box-shadow: 0 6px 20px rgba(102,126,234,0.15);
      transform: translateY(-2px);
      z-index: 8;
    }
    .loc-card:has(.loc-quick-actions[open]) {
      z-index: 30;
    }
    .loc-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .loc-card-name {
      font-size: 16px;
      font-weight: 700;
      color: #1f2937;
      flex: 1;
    }
    .loc-place-id {
      margin-top: 4px;
      font-size: 11px;
      color: #6b7280;
      letter-spacing: 0.01em;
      word-break: break-all;
    }
    .loc-card-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .loc-meta-badge {
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      background: #f3f4f6;
      color: #374151;
    }
    .loc-meta-badge.cost              { background: #ecfdf5; color: #065f46; }
    .loc-meta-badge.rating            { background: #fffbeb; color: #92400e; }
    .loc-meta-badge.source-saved      { background: #eff6ff; color: #1e40af; }
    .loc-meta-badge.source-web        { background: #fdf2f8; color: #9d174d; }
    .loc-rating-inline {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .loc-rating-stars {
      letter-spacing: 0.06em;
      font-size: 11px;
      line-height: 1;
      color: #f59e0b;
    }
    .loc-rating-stars .is-empty {
      color: #cbd5e1;
    }

    .loc-card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 10px;
    }
    .loc-tag-pill {
      background: #dbeafe;
      color: #1e40af;
      padding: 3px 9px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
    }
    .loc-tag-pill.is-user-large {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
      font-size: 12px;
      font-weight: 800;
      padding: 4px 11px;
    }
    .loc-visited-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border-radius: 999px;
      background: #ecfdf5;
      border: 1px solid #86efac;
      color: #166534;
      font-size: 11px;
      font-weight: 800;
    }
    .loc-note-block {
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #fde68a;
      background: #fffbeb;
      color: #78350f;
      font-size: 12px;
      line-height: 1.35;
      white-space: pre-wrap;
    }

    .loc-card-details {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 6px;
      font-size: 13px;
      color: #6b7280;
    }
    .loc-detail-row { display: flex; gap: 6px; align-items: baseline; }
    .loc-detail-icon { width: 16px; flex-shrink: 0; }
    .loc-detail-value { color: #374151; }

    .loc-card-description {
      font-size: 13px;
      color: #6b7280;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #f3f4f6;
      line-height: 1.5;
    }

    .loc-card-insights {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed #e5e7eb;
    }
    .loc-rank-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .loc-rank-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid transparent;
      line-height: 1.2;
    }
    .loc-rank-badge.best-value {
      background: #ecfdf5;
      border-color: #86efac;
      color: #166534;
    }
    .loc-rank-badge.most-unique {
      background: #f5f3ff;
      border-color: #c4b5fd;
      color: #6d28d9;
    }
    .loc-rank-badge.quick-stop {
      background: #eff6ff;
      border-color: #93c5fd;
      color: #1d4ed8;
    }
    .loc-rank-badge.balanced {
      background: #f3f4f6;
      border-color: #d1d5db;
      color: #374151;
    }
    .loc-confidence-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid transparent;
    }
    .loc-confidence-indicator.high {
      background: #dcfce7;
      border-color: #86efac;
      color: #166534;
    }
    .loc-confidence-indicator.medium {
      background: #fef3c7;
      border-color: #fcd34d;
      color: #92400e;
    }
    .loc-confidence-indicator.low {

      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.1);
      color: #f8fafc;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }
    .loc-route-variant-btn:hover {
      border-color: #93c5fd;
      color: #dbeafe;
    }
    .loc-time-window {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.2);
      display: none;
    }
    .loc-time-input {
      width: 100%;
      padding: 6px;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 4px;
      background: rgba(0,0,0,0.2);
      color: white;
      font-size: 12px;
    }
    .loc-route-quality {
      margin-top: 8px;
      font-size: 12px;
      color: #e5e7eb;
      padding: 8px;
      background: rgba(0,0,0,0.3);
      border-radius: 6px;
      display: none;
    }
    .city-drive-time {
      font-size: 13px;
      color: #0891b2;
      font-weight: 600;
      min-height: 30px;
      padding-top: 8px;
      border-top: 1px solid #e5e7eb;
    }
    .city-drive-time.is-empty {
      color: transparent;
      border-top-color: transparent;
      user-select: none;
    }
    .loc-select-btn.active {
      background: #1d4ed8;
      color: white;
      border-color: #1d4ed8;
    }
    .loc-card.active {
      border-color: #ef4444;
      box-shadow: 0 6px 20px rgba(239, 68, 68, 0.18);
    }

    /* ── VISUAL ENHANCEMENT PACK ────────────────────────────────── */

    /* Animated header gradient */
    @keyframes gradient-rotate {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .header {
      background: linear-gradient(135deg, #5a67d8 0%, #667eea 30%, #764ba2 65%, #a855f7 100%);
      background-size: 250% 250%;
      animation: gradient-rotate 10s ease infinite;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: -60%;
      left: -20%;
      width: 70%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.10) 0%, transparent 65%);
      pointer-events: none;
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: -40%;
      right: -10%;
      width: 50%;
      height: 180%;
      background: radial-gradient(circle, rgba(255,255,255,0.07) 0%, transparent 60%);
      pointer-events: none;
    }
    .header-stats {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .header-stat-pill {
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.22);
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.95);
      letter-spacing: 0.01em;
    }

    /* Search box with icon */
    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
    }
    .search-wrap::before {
      content: '⌕';
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      pointer-events: none;
      color: #9ca3af;
      line-height: 1;
    }
    .search-wrap .search-box {
      padding-left: 42px;
      width: 100%;
      border-radius: 999px;
    }

    /* Pill-shaped sort buttons */
    .sort-btn {
      border-radius: 999px;
      font-size: 13px;
    }

    /* City card hero redesign */
    .city-card {
      padding: 0;
      overflow: hidden;
    }
    .city-card-hero {
      height: 88px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      padding: 0 18px 12px;
    }
    .city-card-hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, rgba(255,255,255,0.10) 0%, transparent 55%);
      pointer-events: none;
    }
    .city-card-initial {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 72px;
      font-weight: 900;
      color: rgba(255,255,255,0.18);
      line-height: 1;
      user-select: none;
      letter-spacing: -4px;
    }
    .city-card-hero-text {
      position: relative;
      z-index: 1;
    }
    .city-card-hero-name {
      font-size: 20px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1.15;
      text-shadow: 0 1px 4px rgba(0,0,0,0.18);
    }
    .city-card-hero-state {
      font-size: 12px;
      color: rgba(255,255,255,0.82);
      margin-top: 2px;
      font-weight: 600;
    }
    .city-card-body {
      padding: 14px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    /* Gradient stat value */
    .stat {
      background: #f5f7ff;
      border: 1px solid #e0e7ff;
    }
    .stat-value {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .city-stat-bar {
      height: 4px;
      border-radius: 999px;
      background: #e0e7ff;
      margin-top: 6px;
      overflow: hidden;
    }
    .city-stat-bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #667eea, #764ba2);
      transition: width 0.6s ease;
    }

    /* Source breakdown chips on city card */
    .city-source-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      min-height: 44px;
      align-content: flex-start;
    }
    .city-source-chips.is-empty {
      visibility: hidden;
      pointer-events: none;
    }
    .city-source-chip {
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .city-source-chip.nature        { background: #dcfce7; color: #166534; border-color: #86efac; }
    .city-source-chip.coffee        { background: #fef3c7; color: #78350f; border-color: #fcd34d; }
    .city-source-chip.restaurants   { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
    .city-source-chip.retail        { background: #ede9fe; color: #5b21b6; border-color: #c4b5fd; }
    .city-source-chip.entertainment { background: #eff6ff; color: #1e40af; border-color: #93c5fd; }
    .city-source-chip.festivals     { background: #fdf4ff; color: #86198f; border-color: #e879f9; }
    .city-source-chip.wildlife      { background: #fff7ed; color: #9a3412; border-color: #fdba74; }

    /* City button enhancements */
    .city-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 10px;
      letter-spacing: 0.01em;
      margin-top: auto;
    }
    .city-btn:hover {
      background: linear-gradient(135deg, #5568d3 0%, #6a3e94 100%);
      box-shadow: 0 6px 18px rgba(102,126,234,0.38);
    }

    /* Skeleton loading cards */
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position:  600px 0; }
    }
    .skeleton-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
    }
    .skeleton-hero {
      height: 88px;
      background: linear-gradient(90deg, #e0e7ff 25%, #eef2ff 50%, #e0e7ff 75%);
      background-size: 1200px 100%;
      animation: shimmer 1.6s infinite linear;
    }
    .skeleton-body {
      padding: 14px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .skeleton-line {
      height: 11px;
      border-radius: 6px;
      background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
      background-size: 1200px 100%;
      animation: shimmer 1.6s infinite linear;
    }
    .skeleton-line.wide   { width: 65%; }
    .skeleton-line.narrow { width: 38%; }
    .skeleton-line.full   { width: 100%; }
    .skeleton-btn {
      height: 38px;
      border-radius: 10px;
      margin-top: 4px;
      background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
      background-size: 1200px 100%;
      animation: shimmer 1.6s infinite linear;
    }

    /* Location cards — left accent stripe by source type */
    .loc-card {
      border-left: 4px solid #e5e7eb;
      padding-left: 16px;
    }
    .loc-card[data-source-type="nature"]        { border-left-color: #22c55e; }
    .loc-card[data-source-type="coffee"]        { border-left-color: #f59e0b; }
    .loc-card[data-source-type="restaurants"]   { border-left-color: #ef4444; }
    .loc-card[data-source-type="retail"]        { border-left-color: #8b5cf6; }
    .loc-card[data-source-type="entertainment"] { border-left-color: #3b82f6; }
    .loc-card[data-source-type="festivals"]     { border-left-color: #d946ef; }
    .loc-card[data-source-type="wildlife"]      { border-left-color: #f97316; }

    /* Enhanced empty state */
    .empty-state {
      background: linear-gradient(135deg, #f8faff 0%, #f0f4ff 100%);
      border: 1px dashed #c7d2fe;
      border-radius: 16px;
    }
    .empty-state-icon {
      filter: drop-shadow(0 4px 12px rgba(102,126,234,0.2));
    }

    /* Controls glassmorphism panel */
    .controls {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 14px;
      padding: 14px 16px;
      box-shadow: 0 4px 20px rgba(102,126,234,0.08);
    }

    /* ── FURTHER VISUAL ENHANCEMENTS ─────────────────────────────────── */

    /* Staggered city card entrance */
    @keyframes cardFadeInUp {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }
    .city-card {
      animation: cardFadeInUp 0.38s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* Location card entrance */
    @keyframes locCardSlideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .loc-card {
      animation: locCardSlideIn 0.28s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* Source-type subtle background tints on location cards */
    .loc-card[data-source-type="nature"]        { background: linear-gradient(160deg, #f0fdf4 0%, #ffffff 45%); }
    .loc-card[data-source-type="coffee"]        { background: linear-gradient(160deg, #fffbeb 0%, #ffffff 45%); }
    .loc-card[data-source-type="restaurants"]   { background: linear-gradient(160deg, #fff1f2 0%, #ffffff 45%); }
    .loc-card[data-source-type="retail"]        { background: linear-gradient(160deg, #f5f3ff 0%, #ffffff 45%); }
    .loc-card[data-source-type="entertainment"] { background: linear-gradient(160deg, #eff6ff 0%, #ffffff 45%); }
    .loc-card[data-source-type="festivals"]     { background: linear-gradient(160deg, #fdf4ff 0%, #ffffff 45%); }
    .loc-card[data-source-type="wildlife"]      { background: linear-gradient(160deg, #fff7ed 0%, #ffffff 45%); }

    /* Category summary pill-row above location list */
    .loc-category-bar {
      display: none;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      padding: 9px 14px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      margin-bottom: 10px;
    }
    .loc-category-bar.visible { display: flex; }
    .loc-cat-bar-label {
      font-size: 11px;
      font-weight: 700;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-right: 2px;
    }
    .loc-cat-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid transparent;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
      user-select: none;
    }
    .loc-cat-pill:hover { opacity: 0.8; transform: translateY(-1px); }
    .loc-cat-pill.nature        { background: #dcfce7; color: #166534; border-color: #86efac; }
    .loc-cat-pill.coffee        { background: #fef3c7; color: #78350f; border-color: #fcd34d; }
    .loc-cat-pill.restaurants   { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
    .loc-cat-pill.retail        { background: #ede9fe; color: #5b21b6; border-color: #c4b5fd; }
    .loc-cat-pill.entertainment { background: #eff6ff; color: #1e40af; border-color: #93c5fd; }
    .loc-cat-pill.festivals     { background: #fdf4ff; color: #86198f; border-color: #e879f9; }
    .loc-cat-pill.wildlife      { background: #fff7ed; color: #9a3412; border-color: #fdba74; }
    .loc-cat-pill.other         { background: #f3f4f6; color: #374151; border-color: #d1d5db; }

    /* Filter panel collapse toggle */
    .loc-filter-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .loc-filter-section-label {
      font-size: 11px;
      font-weight: 700;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .loc-filter-toggle-btn {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid #e5e7eb;
      background: white;
      font-size: 11px;
      font-weight: 700;
      color: #6b7280;
      cursor: pointer;
      transition: all 0.15s;
    }
    .loc-filter-toggle-btn:hover { border-color: #667eea; color: #667eea; }
    .loc-filter-collapsible {
      overflow: hidden;
      transition: max-height 0.32s ease, opacity 0.28s ease;
      max-height: 800px;
      opacity: 1;
    }
    .loc-filter-collapsible.collapsed {
      max-height: 0 !important;
      opacity: 0;
    }

    /* Floating jump-to-top button */
    .jump-to-top-btn {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 300;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      color: white;
      font-size: 20px;
      font-weight: 800;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(102,126,234,0.45);
      opacity: 0;
      transform: translateY(14px) scale(0.8);
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease, box-shadow 0.2s ease;
    }
    .jump-to-top-btn.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }
    .jump-to-top-btn:hover {
      box-shadow: 0 6px 24px rgba(102,126,234,0.6);
      transform: translateY(-2px) scale(1.07);
    }

    /* Locations header respects animated gradient like main header */
    .locations-header {
      background-size: 250% 250% !important;
      animation: gradient-rotate 14s ease infinite !important;
      transition: background 0.6s ease;
    }

    /* Results count — gradient text */
    .loc-results-count {
      font-weight: 800;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Page-level fade transitions */
    #cityGrid, #locationsPage {
      transition: opacity 0.2s ease;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>🌆 City Explorer</h1>
        <div class="header-subtitle">Explore adventures grouped by city</div>
        <div class="header-stats" id="headerStats"></div>
      </div>
      <button class="close-btn" onclick="closeViewerWindow()" title="Close this window">✕</button>
    </div>

    <div class="controls">
      <label class="sr-only" for="searchBox">Search cities</label>
      <div class="search-wrap">
        <input type="text" class="search-box" id="searchBox" placeholder="Search cities..." onkeyup="filterCities()">
      </div>
      <button class="sort-btn" id="sortByNameBtn" onclick="sortBy('name')">A–Z</button>
      <button class="sort-btn active" id="sortByCountBtn" onclick="sortBy('count')">Most Locations</button>
      <button class="sort-btn" id="sortByDistanceBtn" onclick="sortBy('distance')" title="Sort by drive time (requires location permission)">🚗 Drive Time</button>
      <button class="sort-btn" id="getLocationBtn" onclick="enableDriveTimes()" title="Get your location to show drive times">📍 My Location</button>
      <div class="active-sources-row" id="activeSourcesRow" aria-live="polite"></div>
      <div id="cityPrefilterNotice" class="city-prefilter-notice" aria-live="polite"></div>
    </div>

    <div id="cityGrid" class="city-grid">
      <div class="skeleton-card"><div class="skeleton-hero"></div><div class="skeleton-body"><div class="skeleton-line wide"></div><div class="skeleton-line narrow"></div><div class="skeleton-line full"></div><div class="skeleton-btn"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-hero"></div><div class="skeleton-body"><div class="skeleton-line wide"></div><div class="skeleton-line narrow"></div><div class="skeleton-line full"></div><div class="skeleton-btn"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-hero"></div><div class="skeleton-body"><div class="skeleton-line wide"></div><div class="skeleton-line narrow"></div><div class="skeleton-line full"></div><div class="skeleton-btn"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-hero"></div><div class="skeleton-body"><div class="skeleton-line wide"></div><div class="skeleton-line narrow"></div><div class="skeleton-line full"></div><div class="skeleton-btn"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-hero"></div><div class="skeleton-body"><div class="skeleton-line wide"></div><div class="skeleton-line narrow"></div><div class="skeleton-line full"></div><div class="skeleton-btn"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-hero"></div><div class="skeleton-body"><div class="skeleton-line wide"></div><div class="skeleton-line narrow"></div><div class="skeleton-line full"></div><div class="skeleton-btn"></div></div></div>
    </div>

    <!-- floating jump-to-top -->
    <button id="jumpToTopBtn" class="jump-to-top-btn" aria-label="Jump to top" title="Back to top">↑</button>

    <!-- ══ LOCATIONS PAGE (shown when a city card is clicked) ══ -->
    <div id="locationsPage">

      <!-- Header with back button -->
      <div class="locations-header" id="locationsHeader">
        <button class="back-btn" onclick="goBackToCities()">← Back to Cities</button>
        <div class="locations-title">
          <h2 id="locationsPageTitle">Locations</h2>
          <div class="subtitle" id="locationsPageSubtitle"></div>
        </div>
      </div>

      <!-- Category summary bar -->
      <div id="locCategoryBar" class="loc-category-bar" aria-label="Location categories"></div>

      <!-- Filter & Sort Controls (mirrors Adventure Planner) -->
      <div class="locations-controls">
        <div class="loc-filter-header">
          <span class="loc-filter-section-label">Filters &amp; Sort</span>
          <button type="button" class="loc-filter-toggle-btn" id="locFilterToggleBtn" onclick="toggleLocFilterPanel()" aria-expanded="true" title="Collapse/expand filters">▲ Hide Filters</button>
        </div>
        <div class="loc-filter-collapsible" id="locFilterCollapsible">
        <div class="loc-presets-row">
          <label class="sr-only" for="locPresetName">Preset name</label>
          <input id="locPresetName" class="loc-preset-input" type="text" placeholder="Preset name...">
          <label class="sr-only" for="locPresetScope">Preset scope</label>
          <select id="locPresetScope" class="loc-preset-select loc-preset-scope">
            <option value="city">City Preset</option>
            <option value="global">Global Preset</option>
          </select>
          <button class="loc-mini-btn" onclick="saveLocPreset()">Save Preset</button>
          <label class="sr-only" for="locPresetSelect">Saved presets</label>
          <select id="locPresetSelect" class="loc-preset-select"></select>
          <button class="loc-mini-btn" onclick="loadSelectedLocPreset()">Load</button>
          <button class="loc-mini-btn" onclick="deleteSelectedLocPreset()">Delete</button>
          <button id="copyShareBtn" class="loc-mini-btn" onclick="copyShareLink()">Copy Share Link</button>
          <div class="loc-smart-presets" aria-label="Smart preset suggestions">
            <button id="locPresetClosestNowBtn" type="button" class="loc-smart-preset-btn" data-smart-preset="closest-now" onclick="applySmartLocPreset('closest-now')">🕒 Closest now</button>
            <button id="locPresetBestValueBtn" type="button" class="loc-smart-preset-btn" data-smart-preset="best-value" onclick="applySmartLocPreset('best-value')">💎 Best value</button>
            <button id="locPresetMostUniqueBtn" type="button" class="loc-smart-preset-btn" data-smart-preset="most-unique" onclick="applySmartLocPreset('most-unique')">✨ Most unique</button>
          </div>
          <div id="locFamilyBar" class="loc-family-bar" aria-label="Family planning preferences">
            <div id="locFamilyPresetRow" class="loc-family-row"></div>
            <div id="locFamilyToggleRow" class="loc-family-row"></div>
          </div>
        </div>
        <div class="loc-check-row">
          <label class="loc-check"><input id="locFilterOpenNow" type="checkbox" onchange="applyLocFilters()"> Open now</label>
          <label class="loc-check"><input id="locFilterClosingSoon" type="checkbox" onchange="applyLocFilters()"> Closing within 2h</label>
        </div>
         <div class="locations-controls-grid">
          <div class="loc-filter-item">
            <label for="locSearchName">Search by Name</label>
            <input id="locSearchName" class="loc-filter-input" type="text" placeholder="Search locations..." oninput="applyLocFilters()">
          </div>
          <div class="loc-filter-item">
            <label for="locFilterDifficulty">Difficulty</label>
            <select id="locFilterDifficulty" class="loc-filter-select" onchange="applyLocFilters()">
              <option value="">Any Difficulty</option>

    <script src="../JS Files/family-experience-foundation.js"></script>
    <script>
    // ── City card gradient palette (deterministic by city name) ────────────
    const CITY_CARD_GRADIENTS = [
      'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
      'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
      'linear-gradient(135deg, #4facfe 0%, #00c6fb 100%)',
      'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
      'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
      'linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)',
      'linear-gradient(135deg, #30cfd0 0%, #330867 100%)',
      'linear-gradient(135deg, #f7971e 0%, #ffd200 100%)',
      'linear-gradient(135deg, #6a11cb 0%, #2575fc 100%)',
      'linear-gradient(135deg, #11998e 0%, #38ef7d 100%)',
      'linear-gradient(135deg, #fc4a1a 0%, #f7b733 100%)',
      'linear-gradient(135deg, #4776e6 0%, #8e54e9 100%)',
    ];
    function cityCardGradient(cityName) {
      let h = 5381;
      for (let i = 0; i < (cityName || '').length; i++) {
        h = ((h << 5) + h) ^ cityName.charCodeAt(i);
        h = h & 0xFFFFFF;
      }
      return CITY_CARD_GRADIENTS[Math.abs(h) % CITY_CARD_GRADIENTS.length];
    }

    // Get data from sessionStorage (cached from parent window) or fallback to parent window
    let adventuresData = [];
    let citiesData = {};
    let currentSort = 'count';
    const DEFAULT_CITY_VIEWER_SOURCES = [
      'Retail_Food_and_Drink.xlsx / Coffee',
      'Retail_Food_and_Drink.xlsx / Restaurants',
      'Retail_Food_and_Drink.xlsx / Retail',
      'Nature_Locations.xlsx / Nature_Locations',
      'Entertainment_Locations.xlsx / Festivals',
      'Entertainment_Locations.xlsx / Wildlife_Animals',
      'Entertainment_Locations.xlsx / General_Entertainment'
    ];

    // ── Subtab → exact source/table prefilter mapping ────────────────────────
    // Keys must be lowercased (they are matched against a lowercased prefilterTag).
    // Values are arrays of exact sourceLabel strings for that subtab.
    // Add a new entry here whenever a new worksheet tab / data source is onboarded.
    const SUBTAB_SOURCE_MAP = {
      // Food & Drink subtabs
      'coffee':                ['Retail_Food_and_Drink.xlsx / Coffee'],
      'restaurants':           ['Retail_Food_and_Drink.xlsx / Restaurants'],
      'restaurant':            ['Retail_Food_and_Drink.xlsx / Restaurants'],
      'retail':                ['Retail_Food_and_Drink.xlsx / Retail'],
      'food':                  ['Retail_Food_and_Drink.xlsx / Coffee',
                                'Retail_Food_and_Drink.xlsx / Restaurants'],
      'food_and_drink':        ['Retail_Food_and_Drink.xlsx / Coffee',
                                'Retail_Food_and_Drink.xlsx / Restaurants',
                                'Retail_Food_and_Drink.xlsx / Retail'],
      // Nature subtabs
      'nature':                ['Nature_Locations.xlsx / Nature_Locations'],
      'nature_locations':      ['Nature_Locations.xlsx / Nature_Locations'],
      // Entertainment subtabs
      'festivals':             ['Entertainment_Locations.xlsx / Festivals'],
      'festival':              ['Entertainment_Locations.xlsx / Festivals'],
      'entertainment':         ['Entertainment_Locations.xlsx / Festivals',
                                'Entertainment_Locations.xlsx / General_Entertainment'],
      'general_entertainment': ['Entertainment_Locations.xlsx / General_Entertainment'],
      // Wildlife & Animals subtabs
      'wildlife-animals':      ['Entertainment_Locations.xlsx / Wildlife_Animals'],
      'wildlife_animals':      ['Entertainment_Locations.xlsx / Wildlife_Animals'],
      'wildlife':              ['Entertainment_Locations.xlsx / Wildlife_Animals'],
      'animals':               ['Entertainment_Locations.xlsx / Wildlife_Animals'],
    };
    const SOURCE_SUBTAB_LABELS = {
      outdoors: 'Outdoors',
      entertainment: 'Entertainment',
      'food-drink': 'Food & Drink',
      retail: 'Retail',
      'wildlife-animals': 'Wildlife & Animals',
      'regional-festivals': 'Regional Festivals',
      'bike-trails': 'Bike Trails'
    };
    let cityViewerDataMeta = {
      configuredSources: [],
      dataMode: '',
      loadedFrom: 'unknown'
    };

    function sanitizeSourceList(values) {
      return Array.from(new Set((Array.isArray(values) ? values : [])
        .map(value => String(value || '').trim())
        .filter(Boolean)));
    }

    function resolveActiveSources() {
      const configured = sanitizeSourceList(cityViewerDataMeta.configuredSources);
      if (configured.length) return configured;

      const fromRows = sanitizeSourceList(adventuresData.map(row => row && row.sourceLabel));
      if (fromRows.length) return fromRows;

      if (String(cityViewerDataMeta.dataMode || '').toLowerCase() === 'curated-only') {
        return DEFAULT_CITY_VIEWER_SOURCES.slice();
      }

      return ['Unknown source'];
    }

    function toActiveSourceChipModel(source) {
      const fullLabel = String(source || '').trim() || 'Unknown source';
      if (fullLabel === 'Unknown source') {
        return { shortLabel: fullLabel, fullLabel };
      }

      const splitIndex = fullLabel.indexOf(' / ');
      const tableName = splitIndex >= 0 ? fullLabel.slice(splitIndex + 3) : fullLabel;
      const shortLabel = String(tableName || fullLabel)
        .replace(/[_-]+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();

      return {
        shortLabel: shortLabel || fullLabel,
        fullLabel
      };
    }

    function renderActiveSources() {
      const row = document.getElementById('activeSourcesRow');
      if (!row) return;

      const sources = resolveActiveSources();
      const label = String(cityViewerDataMeta.dataMode || '').toLowerCase() === 'curated-only'
        ? 'Active curated feeds:'
        : 'Active sources:';

      row.classList.toggle('is-empty', sources.length === 1 && sources[0] === 'Unknown source');
      row.innerHTML = `<span class="active-sources-label">${escHtml(label)}</span>${sources
        .map(source => {
          const model = toActiveSourceChipModel(source);
          return `<span class="active-source-chip" title="${escAttr(model.fullLabel)}">${escHtml(model.shortLabel)}</span>`;
        })
        .join('')}`;
    }

    // Helper function to load data from sessionStorage
    function isEmbeddedViewer() {
      try {
        const params = new URLSearchParams(window.location.search || '');
        return params.get('embedded') === '1' || (window.parent && window.parent !== window);
      } catch (_error) {
        return window.parent && window.parent !== window;
      }
    }

    function getHostWindow() {
      if (window.parent && window.parent !== window) return window.parent;
      if (window.opener && !window.opener.closed) return window.opener;
      return window;
    }

    function closeViewerWindow() {
      if (isEmbeddedViewer() && window.parent && window.parent !== window) {
        const params = new URLSearchParams(window.location.search || '');
        window.parent.postMessage({
          type: 'planner-inline-tool-close',
          tool: 'city-viewer',
          sourceSubtab: String(params.get('sourceSubtab') || '')
        }, window.location.origin);
        return;
      }
      window.close();
    }

    function loadCityViewerData() {
      try {
        // First, try to get data from the cached key passed in the URL
        const urlParams = new URLSearchParams(window.location.search);
        const dataKey = urlParams.get('dataKey');
        const corrId = urlParams.get('corrId');
        const dataMode = String(urlParams.get('dataMode') || '').trim();

        cityViewerDataMeta = {
          configuredSources: [],
          dataMode,
          loadedFrom: 'unknown',
          exportedAt: '',
          cacheKey: '',
          totalCount: 0
        };

        console.log(`🔗 City Viewer loaded with corrId=${corrId}, dataKey=${dataKey}`);

        if (dataKey) {
          const cachedData = window.sessionStorage.getItem(dataKey);
          if (cachedData) {
            try {
              const payload = JSON.parse(cachedData);
              if (Array.isArray(payload.adventuresData)) {
                adventuresData = payload.adventuresData;
                cityViewerDataMeta.configuredSources = sanitizeSourceList(payload.configuredSources);
                cityViewerDataMeta.dataMode = String(payload.dataMode || cityViewerDataMeta.dataMode || '').trim();
                cityViewerDataMeta.loadedFrom = 'dataKey';
                cityViewerDataMeta.exportedAt = String(payload.exportedAt || '').trim();
                cityViewerDataMeta.cacheKey = String(dataKey || '').trim();
                cityViewerDataMeta.totalCount = Number(payload.totalCount || adventuresData.length || 0) || adventuresData.length;
                console.log(`✅ Loaded ${adventuresData.length} adventures from sessionStorage`);
                return true;
              }
            } catch (e) {
              console.warn('⚠️ Failed to parse cached data:', e);
            }
          }
        }

        // Fallback: Try to get latest cached data
        const latestKey = window.sessionStorage.getItem('city_viewer_data_latest');
        if (latestKey) {
          const cachedData = window.sessionStorage.getItem(latestKey);
          if (cachedData) {
            try {
              const payload = JSON.parse(cachedData);
              if (Array.isArray(payload.adventuresData)) {
                adventuresData = payload.adventuresData;
                cityViewerDataMeta.configuredSources = sanitizeSourceList(payload.configuredSources);
                cityViewerDataMeta.dataMode = String(payload.dataMode || cityViewerDataMeta.dataMode || '').trim();
                cityViewerDataMeta.loadedFrom = 'latestCache';
                cityViewerDataMeta.exportedAt = String(payload.exportedAt || '').trim();
                cityViewerDataMeta.cacheKey = String(latestKey || '').trim();
                cityViewerDataMeta.totalCount = Number(payload.totalCount || adventuresData.length || 0) || adventuresData.length;
                console.log(`✅ Loaded ${adventuresData.length} adventures from latest cache`);
                return true;
              }
            } catch (e) {
              console.warn('⚠️ Failed to parse latest cache:', e);
            }
          }
        }

        // If curated-only mode was requested, avoid broad fallback sources.
        if (dataMode === 'curated-only') {
          console.warn('⚠️ Curated City Explorer mode requested, but curated cache is unavailable.');
          return false;
        }

        // Fallback: Try to get from parent window (for popup windows)
        const hostWindow = getHostWindow();
        if (hostWindow && Array.isArray(hostWindow.adventuresData)) {
          adventuresData = hostWindow.adventuresData;
          cityViewerDataMeta.loadedFrom = 'parentWindow';
          cityViewerDataMeta.exportedAt = '';
          cityViewerDataMeta.cacheKey = '';
          cityViewerDataMeta.totalCount = adventuresData.length;
          console.log(`✅ Loaded ${adventuresData.length} adventures from parent window`);
          return true;
        }

        return false;
      } catch (error) {
        console.error('❌ Error loading city viewer data:', error);
        return false;
      }
    }

    // Initialize city viewer
    function init() {
      if (isEmbeddedViewer()) {
        document.body.classList.add('embedded-viewer');
      }
      resolveNearbyDebugThresholdsFromUrl();
      resolvePrefilterFromUrl();
      syncBulkActionInputHint();
      familyPreferences = loadFamilyPreferences();
      renderFamilyExperienceControls();
      renderPrefilterNotice();
      // Load data from sessionStorage or parent window
      if (!loadCityViewerData()) {
        const grid = document.getElementById('cityGrid');
        const isCuratedOnly = String(cityViewerDataMeta && cityViewerDataMeta.dataMode ? cityViewerDataMeta.dataMode : '').toLowerCase() === 'curated-only';
        if (isCuratedOnly) {
          console.info('ℹ️ Curated-only City Viewer opened with no cached curated rows.');
          grid.innerHTML = `
            <div class="empty-state u-grid-full-span">
              <div class="empty-state-icon">🗂️</div>
              <div class="empty-state-text">No curated rows available yet</div>
              <div class="u-note-muted">Sign in and refresh data in the main app, then open City Explorer again.</div>
            </div>
          `;
          return;
        }
        console.error('❌ Failed to load adventure data');
        grid.innerHTML = `
          <div class="empty-state u-grid-full-span">
            <div class="empty-state-icon">❌</div>
            <div class="empty-state-text">Error loading data</div>
            <div class="u-note-muted">Could not load adventure data. Please ensure you have data loaded in the main window.</div>
          </div>
        `;
        return;
      }

      console.log('🌆 City Viewer initializing with', adventuresData.length, 'adventures');
      runDeferredCityViewerWork(renderActiveSources);

      // Group by city
      adventuresData.forEach(adventure => {
        const city = adventure.city || (adventure.values && adventure.values[0][10]);
        const state = adventure.state || (adventure.values && adventure.values[0][9]);

        if (city && state) {
          const key = `${city}, ${state}`;
          if (!citiesData[key]) {
            citiesData[key] = {
              city: city,
              state: state,
              count: 0,
              locations: []
            };
          }
          citiesData[key].count++;
          citiesData[key].locations.push(adventure);
        }
      });

      console.log('✅ Grouped into', Object.keys(citiesData).length, 'cities');

      pendingShareState = parseShareStateFromUrl();
       renderCities();

      if (pendingShareState && pendingShareState.cityKey) {
        const [city, state] = String(pendingShareState.cityKey).split(',').map(s => s && s.trim());
        if (city && state && citiesData[pendingShareState.cityKey]) {
          viewCity(city, state);
        }
      }
     }


    function renderCities() {
      const grid = document.getElementById('cityGrid');
      renderPrefilterNotice();

      // Update header stats pills
      const headerStats = document.getElementById('headerStats');
      if (headerStats) {
        const totalCities = Object.keys(citiesData).length;
        const totalLocations = adventuresData.length;
        if (totalCities > 0) {
          headerStats.innerHTML = `
            <span class="header-stat-pill">🏙️ ${totalCities} Cities</span>
            <span class="header-stat-pill">📍 ${totalLocations.toLocaleString()} Locations</span>
          `;
        }
      }

      if (Object.keys(citiesData).length === 0) {
        grid.innerHTML = `
          <div class="empty-state u-grid-full-span">
            <div class="empty-state-icon">🏙️</div>
            <div class="empty-state-text">No cities found</div>
            <div class="u-note-muted">Load adventure data in the main window to see cities here</div>
          </div>
        `;
        return;
      }

      let citiesArray = Object.values(citiesData);

      if (prefilterTag) {
        citiesArray = citiesArray.filter((city) => Array.isArray(city.locations) && city.locations.some((loc) => locationMatchesPrefilter(loc)));
      }

      // Sort
      if (currentSort === 'name') {
        citiesArray.sort((a, b) => a.city.localeCompare(b.city));
      } else if (currentSort === 'count') {
        citiesArray.sort((a, b) => b.count - a.count);
      } else if (currentSort === 'distance') {
        citiesArray.sort((a, b) => (a.distance || Infinity) - (b.distance || Infinity));
      }

      // Filter
      const searchTerm = document.getElementById('searchBox')?.value?.toLowerCase() || '';
      if (searchTerm) {
        citiesArray = citiesArray.filter(c =>
          c.city.toLowerCase().includes(searchTerm) ||
          c.state.toLowerCase().includes(searchTerm)
        );
      }

      grid.innerHTML = citiesArray.map((city, idx) => {
        const driveTimeText = city.distance !== undefined
          ? `🚗 ${city.driveTime || 'calculating...'}`
          : '';

        const gradient = cityCardGradient(city.city);
        const initial = escHtml(city.city[0] || '?');
        const animDelay = `${Math.min(idx * 0.045, 0.6).toFixed(3)}s`;

        // Build source breakdown chips
        const sourceTypeCounts = {};
        (city.locations || []).forEach(loc => {
          const src = String((loc && loc.sourceLabel) || '').toLowerCase();
          const type = src.includes('nature') ? 'nature'
            : src.includes('coffee') ? 'coffee'
            : src.includes('restaurant') ? 'restaurants'
            : src.includes('retail') ? 'retail'
            : src.includes('festival') ? 'festivals'
            : src.includes('wildlife') ? 'wildlife'
            : src.includes('entertainment') ? 'entertainment'
            : null;
          if (type) sourceTypeCounts[type] = (sourceTypeCounts[type] || 0) + 1;
        });
        const SOURCE_CHIP_LABELS = {

    /**
     * Enable drive time calculations
     */
    async function enableDriveTimes() {
      console.log('📍 Getting user location...');

      const btn = document.getElementById('getLocationBtn');
      btn.disabled = true;
      btn.textContent = '📍 Getting location...';

      try {
        if (!navigator.geolocation) {
          btn.disabled = false;
          btn.textContent = '📍 Not supported';
          alert('Geolocation is not supported by this browser.');
          return;
        }

        navigator.geolocation.getCurrentPosition(
          (position) => {
            const userLat = position.coords.latitude;
            const userLng = position.coords.longitude;

            console.log(`✅ User location: ${userLat}, ${userLng}`);

            // Calculate distance for each city
            Object.values(citiesData).forEach(city => {
              if (city.latitude && city.longitude) {
                const cityLat = parseFloat(city.latitude);
                const cityLng = parseFloat(city.longitude);

                // Haversine formula
                const R = 3959; // miles
                const dLat = (cityLat - userLat) * Math.PI / 180;
                const dLng = (cityLng - userLng) * Math.PI / 180;
                const a =
                  Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(userLat * Math.PI / 180) * Math.cos(cityLat * Math.PI / 180) *
                  Math.sin(dLng/2) * Math.sin(dLng/2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                const distance = R * c;

                // Estimate drive time (60 mph average)
                const hours = Math.floor(distance / 60);
                const minutes = Math.round((distance / 60 - hours) * 60);

                city.distance = distance;
                city.driveTime = hours > 0
                  ? `${hours}h ${minutes}m (${distance.toFixed(1)} mi)`
                  : `${minutes}m (${distance.toFixed(1)} mi)`;
              }
            });

            console.log('✅ Drive times calculated');
            btn.disabled = false;
            btn.textContent = '✅ Drive times enabled';
            renderCities();

          },
          (error) => {
            console.error('❌ Location error:', error.message);
            btn.disabled = false;
            btn.textContent = '📍 Location failed - try again';
            alert('Could not get your location. Please check permissions.');
          }
        );
      } catch (error) {
        console.error('❌ Error:', error);
        btn.disabled = false;
        btn.textContent = '📍 Error - try again';
        alert('Error: ' + error.message);
      }
    }

      const headerList = Array.isArray(headers) ? headers : [];
      for (const alias of (aliases || [])) {
        const target = normalizeHeader(alias);
        const exact = headerList.findIndex((header) => normalizeHeader(header) === target);
        if (exact >= 0) return exact;
        const partial = headerList.findIndex((header) => normalizeHeader(header).includes(target));
