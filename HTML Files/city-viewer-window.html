<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>City Viewer - Kyle's Adventure Finder</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
      color: #1f2937;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 4px;
    }

    .header-subtitle {
      font-size: 14px;
      opacity: 0.9;
    }

    .close-btn {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 24px;
      transition: all 0.2s;
    }

    .close-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
    }

    .search-box:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .sort-btn {
      padding: 12px 16px;
      background: white;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }

    .sort-btn:hover {
      border-color: #667eea;
      color: #667eea;
    }

    .sort-btn.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .city-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .city-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
    }

    .city-card:hover {
      border-color: #667eea;
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.15);
      transform: translateY(-4px);
    }

    .city-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .city-state {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 12px;
    }

    .city-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .stat {
      background: #f3f4f6;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
    }

    .stat-label {
      color: #6b7280;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: #667eea;
    }

    .city-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      margin-top: auto;
    }

    .city-btn:hover {
      background: #5568d3;
      transform: translateY(-2px);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #6b7280;
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .empty-state-text {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      font-size: 16px;
      color: #6b7280;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #e5e7eb;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>🌆 City Viewer</h1>
        <div class="header-subtitle">Explore adventures grouped by city</div>
      </div>
      <button class="close-btn" onclick="window.close()" title="Close this window">✕</button>
    </div>

    <div class="controls">
      <input type="text" class="search-box" id="searchBox" placeholder="Search cities..." onkeyup="filterCities()">
      <button class="sort-btn" id="sortByNameBtn" onclick="sortBy('name')">Sort A-Z</button>
      <button class="sort-btn active" id="sortByCountBtn" onclick="sortBy('count')">Sort by Count</button>
      <button class="sort-btn" id="sortByDistanceBtn" onclick="sortBy('distance')" title="Sort by drive time (requires location permission)">🚗 Sort by Drive Time</button>
      <button class="sort-btn" id="getLocationBtn" onclick="enableDriveTimes()" title="Get your location to show drive times">📍 Show My Drive Times</button>
    </div>

    <div id="cityGrid" class="city-grid">
      <div class="loading">
        <span class="spinner"></span> Loading cities...
      </div>
    </div>
  </div>

  <script>
    // Get data from sessionStorage (cached from parent window) or fallback to parent window
    let adventuresData = [];
    let citiesData = {};
    let currentSort = 'count';

    // Helper function to load data from sessionStorage
    function loadCityViewerData() {
      try {
        // First, try to get data from the cached key passed in the URL
        const urlParams = new URLSearchParams(window.location.search);
        const dataKey = urlParams.get('dataKey');
        const corrId = urlParams.get('corrId');

        console.log(`🔗 City Viewer loaded with corrId=${corrId}, dataKey=${dataKey}`);

        if (dataKey) {
          const cachedData = window.sessionStorage.getItem(dataKey);
          if (cachedData) {
            try {
              const payload = JSON.parse(cachedData);
              if (Array.isArray(payload.adventuresData)) {
                adventuresData = payload.adventuresData;
                console.log(`✅ Loaded ${adventuresData.length} adventures from sessionStorage`);
                return true;
              }
            } catch (e) {
              console.warn('⚠️ Failed to parse cached data:', e);
            }
          }
        }

        // Fallback: Try to get latest cached data
        const latestKey = window.sessionStorage.getItem('city_viewer_data_latest');
        if (latestKey) {
          const cachedData = window.sessionStorage.getItem(latestKey);
          if (cachedData) {
            try {
              const payload = JSON.parse(cachedData);
              if (Array.isArray(payload.adventuresData)) {
                adventuresData = payload.adventuresData;
                console.log(`✅ Loaded ${adventuresData.length} adventures from latest cache`);
                return true;
              }
            } catch (e) {
              console.warn('⚠️ Failed to parse latest cache:', e);
            }
          }
        }

        // Fallback: Try to get from parent window (for popup windows)
        const parentWindow = window.opener || window;
        if (parentWindow && Array.isArray(parentWindow.adventuresData)) {
          adventuresData = parentWindow.adventuresData;
          console.log(`✅ Loaded ${adventuresData.length} adventures from parent window`);
          return true;
        }

        return false;
      } catch (error) {
        console.error('❌ Error loading city viewer data:', error);
        return false;
      }
    }

    // Initialize city viewer
    function init() {
      // Load data from sessionStorage or parent window
      if (!loadCityViewerData()) {
        console.error('❌ Failed to load adventure data');
        const grid = document.getElementById('cityGrid');
        grid.innerHTML = `
          <div class="empty-state" style="grid-column: 1 / -1;">
            <div class="empty-state-icon">❌</div>
            <div class="empty-state-text">Error loading data</div>
            <div style="font-size: 14px; color: #9ca3af;">Could not load adventure data. Please ensure you have data loaded in the main window.</div>
          </div>
        `;
        return;
      }

      console.log('🌆 City Viewer initializing with', adventuresData.length, 'adventures');

      // Group by city
      adventuresData.forEach(adventure => {
        const city = adventure.city || (adventure.values && adventure.values[0][10]);
        const state = adventure.state || (adventure.values && adventure.values[0][9]);

        if (city && state) {
          const key = `${city}, ${state}`;
          if (!citiesData[key]) {
            citiesData[key] = {
              city: city,
              state: state,
              count: 0,
              locations: []
            };
          }
          citiesData[key].count++;
          citiesData[key].locations.push(adventure);
        }
      });

      console.log('✅ Grouped into', Object.keys(citiesData).length, 'cities');

      renderCities();
    }


    function renderCities() {
      const grid = document.getElementById('cityGrid');

      if (Object.keys(citiesData).length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column: 1 / -1;">
            <div class="empty-state-icon">🏙️</div>
            <div class="empty-state-text">No cities found</div>
            <div style="font-size: 14px; color: #9ca3af;">Load adventure data in the main window to see cities here</div>
          </div>
        `;
        return;
      }

      let citiesArray = Object.values(citiesData);

      // Sort
      if (currentSort === 'name') {
        citiesArray.sort((a, b) => a.city.localeCompare(b.city));
      } else if (currentSort === 'count') {
        citiesArray.sort((a, b) => b.count - a.count);
      } else if (currentSort === 'distance') {
        citiesArray.sort((a, b) => (a.distance || Infinity) - (b.distance || Infinity));
      }

      // Filter
      const searchTerm = document.getElementById('searchBox')?.value?.toLowerCase() || '';
      if (searchTerm) {
        citiesArray = citiesArray.filter(c =>
          c.city.toLowerCase().includes(searchTerm) ||
          c.state.toLowerCase().includes(searchTerm)
        );
      }

      grid.innerHTML = citiesArray.map(city => {
        const driveTimeHtml = city.distance !== undefined
          ? `<div style="font-size: 13px; color: #0891b2; font-weight: 600; margin-top: 8px; padding-top: 8px; border-top: 1px solid #e5e7eb;">🚗 ${city.driveTime || 'calculating...'}</div>`
          : '';

        return `
          <div class="city-card" onclick="viewCity('${city.city}', '${city.state}')">
            <div class="city-name">${city.city}</div>
            <div class="city-state">${city.state}</div>
            <div class="city-stats">
              <div class="stat">
                <div class="stat-label">📍 Locations</div>
                <div class="stat-value">${city.count}</div>
              </div>
            </div>
            ${driveTimeHtml}
            <button class="city-btn">View Locations</button>
          </div>
        `;
      }).join('');
    }

    function filterCities() {
      renderCities();
    }

    function sortBy(type) {
      currentSort = type;
      document.getElementById('sortByNameBtn').classList.toggle('active', type === 'name');
      document.getElementById('sortByCountBtn').classList.toggle('active', type === 'count');
      document.getElementById('sortByDistanceBtn').classList.toggle('active', type === 'distance');
      renderCities();
    }

    /**
     * Enable drive time calculations
     */
    async function enableDriveTimes() {
      console.log('📍 Getting user location...');

      const btn = document.getElementById('getLocationBtn');
      btn.disabled = true;
      btn.textContent = '📍 Getting location...';

      try {
        if (!navigator.geolocation) {
          throw new Error('Geolocation not supported');
        }

        navigator.geolocation.getCurrentPosition(
          (position) => {
            const userLat = position.coords.latitude;
            const userLng = position.coords.longitude;

            console.log(`✅ User location: ${userLat}, ${userLng}`);

            // Calculate distance for each city
            Object.values(citiesData).forEach(city => {
              if (city.latitude && city.longitude) {
                const cityLat = parseFloat(city.latitude);
                const cityLng = parseFloat(city.longitude);

                // Haversine formula
                const R = 3959; // miles
                const dLat = (cityLat - userLat) * Math.PI / 180;
                const dLng = (cityLng - userLng) * Math.PI / 180;
                const a =
                  Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(userLat * Math.PI / 180) * Math.cos(cityLat * Math.PI / 180) *
                  Math.sin(dLng/2) * Math.sin(dLng/2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                const distance = R * c;

                // Estimate drive time (60 mph average)
                const hours = Math.floor(distance / 60);
                const minutes = Math.round((distance / 60 - hours) * 60);

                city.distance = distance;
                city.driveTime = hours > 0
                  ? `${hours}h ${minutes}m (${distance.toFixed(1)} mi)`
                  : `${minutes}m (${distance.toFixed(1)} mi)`;
              }
            });

            console.log('✅ Drive times calculated');
            btn.disabled = false;
            btn.textContent = '✅ Drive times enabled';
            renderCities();

          },
          (error) => {
            console.error('❌ Location error:', error.message);
            btn.disabled = false;
            btn.textContent = '📍 Location failed - try again';
            alert('Could not get your location. Please check permissions.');
          }
        );
      } catch (error) {
        console.error('❌ Error:', error);
        btn.disabled = false;
        btn.textContent = '📍 Error - try again';
        alert('Error: ' + error.message);
      }
    }

    function viewCity(city, state) {
      console.log(`👀 Viewing city: ${city}, ${state}`);
      const locations = citiesData[`${city}, ${state}`]?.locations || [];

      if (locations.length === 0) {
        alert('No locations found for this city');
        return;
      }

      // Create modal or show in parent window
      alert(`Found ${locations.length} locations in ${city}, ${state}.\n\nThis feature will show detailed location list.`);
    }

    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

    console.log('✅ City Viewer window loaded');
  </script>


</body>
</html>
