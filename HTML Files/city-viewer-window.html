          console.warn('⚠️ Maps API load failed; using fallback map renderer.', error && error.message ? error.message : error);
        });
      }

      // Wait two animation frames so the browser finishes the CSS layout change
      // before we measure the map container or initialise Google Maps.
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          if (locSplitView && !window.__cvMapsReady) {
            // Maps API still loading – queue a retry for when it arrives
            window.__cvMapsQueue = window.__cvMapsQueue || [];
            window.__cvMapsQueue.push(() => {
              if (locSplitView) renderLocMap(lastFilteredLocations);

    function getLocPoint(loc, locId) {
      if (locPointCache[locId]) return locPointCache[locId];
      const latRaw = locVal(loc, 25, 'latitude') || locVal(loc, 26, 'lat') || loc.latitude || loc.lat;
      const lngRaw = locVal(loc, 26, 'longitude') || locVal(loc, 27, 'lng') || loc.longitude || loc.lng;
      const lat = parseFloat(latRaw);
      const lng = parseFloat(lngRaw);
      if (Number.isFinite(lat) && Number.isFinite(lng)) {
        locPointCache[locId] = { x: lng, y: lat, geo: true };
        return locPointCache[locId];
      }
      let hash = 0;
      for (let i = 0; i < locId.length; i++) hash = (hash * 31 + locId.charCodeAt(i)) | 0;
      const x = 10 + Math.abs(hash % 80);
      const y = 10 + Math.abs((hash >> 8) % 80);
      locPointCache[locId] = { x, y, geo: false };
      return locPointCache[locId];
    }

    function renderLocMap(locations) {
      const canvas = document.getElementById('locMapCanvas');
      const count = document.getElementById('locMapCount');
      if (!canvas || !count) return;
      count.textContent = `${locations.length} pins`;
      // Only clear canvas when Google Maps is NOT mounted – clearing the Google Maps
      // container destroys its tile DOM and makes the map go blank.
      if (!locGoogleMap) {
        canvas.innerHTML = '';
      } else if (!canvas.querySelector('.gm-style')) {
        // Google Maps DOM was removed externally – reset so next call re-initialises
        locGoogleMap = null;
        locGoogleMarkers = [];
        canvas.innerHTML = '';
      }
       if (!locSplitView || locations.length === 0) return;

       const points = locations.map(loc => {
         const locId = getLocId(loc);
         return { locId, loc, point: getLocPoint(loc, locId), name: String(locVal(loc, 0, 'name') || 'Location') };
       });

      if (renderGoogleMap(points)) return;
      if (renderMapboxMap(points)) return;
      renderCanvasMap(points);
    }

    function renderGoogleMap(points) {
      // Need the full Google Maps library, not just the namespace stub.
      // The bootstrap loader creates window.google.maps but NOT Map/Marker/etc.
      // Those are only available after __cvMapsInit fires (traditional load callback).
      if (!window.__cvMapsReady) return false;
      if (!(window.google && window.google.maps && window.google.maps.Map)) return false;
      const geoPoints = points.filter(p => p.point.geo);
      if (!geoPoints.length) return false;

      const canvas = document.getElementById('locMapCanvas');
      const center = { lat: geoPoints[0].point.y, lng: geoPoints[0].point.x };

      if (!locGoogleMap) {
        // First render: clear any placeholder content then create the map
        canvas.innerHTML = '';
        locGoogleMap = new window.google.maps.Map(canvas, {
          zoom: 10,
          center,
          mapTypeControl: false,
          streetViewControl: false,
          fullscreenControl: false
        });
      } else {
        // Map already initialised – trigger resize so tiles fill the now-visible container
        window.google.maps.event.trigger(locGoogleMap, 'resize');
        locGoogleMap.setCenter(center);
      }

      locGoogleMarkers.forEach(m => m.setMap(null));
      locGoogleMarkers = [];

      geoPoints.forEach(item => {
        const marker = new window.google.maps.Marker({
          map: locGoogleMap,
          position: { lat: item.point.y, lng: item.point.x },
          title: item.name
        });
        marker.__locId = item.locId;
        marker.addListener('click', () => setActiveLocation(item.locId, true));
        locGoogleMarkers.push(marker);
      });

      const bounds = new window.google.maps.LatLngBounds();
      geoPoints.forEach(item => bounds.extend({ lat: item.point.y, lng: item.point.x }));
      if (geoPoints.length > 1) locGoogleMap.fitBounds(bounds);
      updateMapHighlights();
      return true;
    }

    function renderMapboxMap(points) {
      if (!window.mapboxgl) return false;
      if (!window.mapboxgl.accessToken && !window.MAPBOX_TOKEN) return false;
      if (!window.mapboxgl.accessToken && window.MAPBOX_TOKEN) {
        window.mapboxgl.accessToken = window.MAPBOX_TOKEN;
      }

      const geoPoints = points.filter(p => p.point.geo);
      if (!geoPoints.length) return false;

      const canvas = document.getElementById('locMapCanvas');
      if (!locMapboxMap) {
        canvas.innerHTML = '';
        locMapboxMap = new window.mapboxgl.Map({
          container: 'locMapCanvas',
          style: 'mapbox://styles/mapbox/streets-v12',
          center: [geoPoints[0].point.x, geoPoints[0].point.y],
          zoom: 9
        });
      }

      locMapboxMarkers.forEach(m => m.remove());
      locMapboxMarkers = [];

      geoPoints.forEach(item => {
        const el = document.createElement('button');
        el.className = 'map-pin';
        el.dataset.locId = item.locId;
        el.type = 'button';
        el.title = item.name;
        el.textContent = '•';
        el.onclick = () => setActiveLocation(item.locId, true);

        const marker = new window.mapboxgl.Marker(el)
          .setLngLat([item.point.x, item.point.y])
          .addTo(locMapboxMap);

        marker.__locId = item.locId;
        locMapboxMarkers.push(marker);
      });

      if (geoPoints.length > 1) {
        const bounds = new window.mapboxgl.LngLatBounds();
        geoPoints.forEach(item => bounds.extend([item.point.x, item.point.y]));
        locMapboxMap.fitBounds(bounds, { padding: 32 });
      }
      updateMapHighlights();
      return true;
    }

    function renderCanvasMap(points) {
      const canvas = document.getElementById('locMapCanvas');
      canvas.innerHTML = '';

      const geoPoints = points.filter(p => p.point.geo);
       const minX = geoPoints.length ? Math.min(...geoPoints.map(p => p.point.x)) : 0;
       const maxX = geoPoints.length ? Math.max(...geoPoints.map(p => p.point.x)) : 100;
       const minY = geoPoints.length ? Math.min(...geoPoints.map(p => p.point.y)) : 0;
       const maxY = geoPoints.length ? Math.max(...geoPoints.map(p => p.point.y)) : 100;
       const xRange = Math.max(0.001, maxX - minX);
       const yRange = Math.max(0.001, maxY - minY);

       points.forEach((item, idx) => {
         const pin = document.createElement('button');
         pin.className = 'map-pin';
         pin.type = 'button';
         pin.dataset.locId = item.locId;
         pin.title = item.name;
         pin.textContent = String((idx % 9) + 1);
         const left = item.point.geo ? (5 + ((item.point.x - minX) / xRange) * 90) : item.point.x;
         const top = item.point.geo ? (95 - ((item.point.y - minY) / yRange) * 90) : item.point.y;
         pin.style.left = `${left}%`;
         pin.style.top = `${top}%`;
         pin.onclick = () => setActiveLocation(item.locId, true);
         canvas.appendChild(pin);
       });
      highlightActiveLocation();
      updateMapHighlights();
     }

    function buildDayPlan() {
      const ids = Array.from(getShortlistSet());
      const selected = ids.map(id => findLocationById(id)).filter(Boolean);
      if (selected.length < 2) {

      }

      const optimized = buildOptimizedRoutePlan(selected);
      if (!optimized.primary) {
        showRouteToast('Unable to build an optimized route from current selections.', true);
        return;
      }

      activeOptimizedVariantId = optimized.primary.id;

    }

    function stopHasCoords(stop) {
      return Number.isFinite(stop.lat) && Number.isFinite(stop.lng);
    }

    function stopToGoogleQuery(stop) {
      if (stop.placeId) return `place_id:${stop.placeId}`;
      if (stopHasCoords(stop)) return `${stop.lat},${stop.lng}`;
      return stop.address || stop.name;
    }

    function openDayPlanRoute(provider) {
      if (!lastBuiltDayPlanRoute || lastBuiltDayPlanRoute.length < 2) {
        buildDayPlan();
      }
      if (!lastBuiltDayPlanRoute || lastBuiltDayPlanRoute.length < 2) {
        showRouteToast('Build a day plan with at least 2 stops first.', true);
        return;
      }

      let url = '';
      if (provider === 'mapbox') {
        const coords = lastBuiltDayPlanRoute
          .filter(stopHasCoords)
          .map(s => `${s.lng},${s.lat}`);
        if (coords.length < 2) {
          showRouteToast('Mapbox route needs at least 2 geo-coded stops.', true);
          return;
        }
        url = `https://www.mapbox.com/directions/?profile=mapbox/driving&coordinates=${encodeURIComponent(coords.join(';'))}`;
      } else {
        const origin = stopToGoogleQuery(lastBuiltDayPlanRoute[0]);
        const destination = stopToGoogleQuery(lastBuiltDayPlanRoute[lastBuiltDayPlanRoute.length - 1]);
        const waypoints = lastBuiltDayPlanRoute.slice(1, -1).map(stopToGoogleQuery).filter(Boolean);
        const params = new URLSearchParams({
          api: '1',
          travelmode: 'driving',
          origin,
          destination
        });
        if (waypoints.length) params.set('waypoints', waypoints.join('|'));
        url = `https://www.google.com/maps/dir/?${params.toString()}`;
      }

      const win = window.open(url, '_blank', 'noopener');
      if (win) showRouteToast(`Opening ${provider === 'mapbox' ? 'Mapbox' : 'Google'} route...`, false);
      else showRouteToast('Popup blocked. Allow popups for route links.', true);
    }

    function escHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escAttr(str) {
      return escHtml(str).replace(/`/g, '&#096;');
    }

    function cssEscape(str) {
      if (window.CSS && typeof window.CSS.escape === 'function') return window.CSS.escape(str);
      return String(str).replace(/[^a-zA-Z0-9_-]/g, '\\$&');
    }

    function locVal(loc, colIndex, fallbackKey) {
      const row = loc && loc.values && Array.isArray(loc.values[0]) ? loc.values[0] : null;
      if (row && Number.isInteger(colIndex) && colIndex >= 0 && colIndex < row.length) {
        const byIndex = row[colIndex];
        if (byIndex !== undefined && byIndex !== null && String(byIndex).trim() !== '') {
          return byIndex;
        }
      }
      return (loc && fallbackKey ? loc[fallbackKey] : '') || '';
    }

    function isPlaceholderText(value) {
      const text = String(value || '').trim().toLowerCase();
      if (!text) return true;
      return ['n/a', 'na', 'none', 'null', 'undefined', 'skip', 'unavailable', 'not available', '(empty)'].includes(text);
    }

    function normalizeExternalUrl(rawValue) {
      const raw = String(rawValue || '').trim();
      if (!raw || isPlaceholderText(raw)) return '';
      const lower = raw.toLowerCase();
      if (lower.startsWith('javascript:') || lower.startsWith('data:')) return '';
      if (lower.startsWith('http://') || lower.startsWith('https://')) return raw;
      if (lower.startsWith('www.')) return `https://${raw}`;
      return '';
    }

    function isLikelyValidPlaceId(rawValue) {
      const value = String(rawValue || '').trim();
      if (!value) return false;
      if (isPlaceholderText(value)) return false;
      if (/\s/.test(value)) return false;
      return value.length >= 8;
    }

    function buildGoogleOpenUrlForLocation(loc) {
      const directUrl = normalizeExternalUrl(locVal(loc, 23, 'googleUrl'));
      if (directUrl) return directUrl;

      const placeId = String(locVal(loc, 1, 'googlePlaceId') || '').trim();
      const name = String(locVal(loc, 0, 'name') || '').trim();
      const address = String(locVal(loc, 11, 'address') || '').trim();
      const lat = Number(locVal(loc, 25, 'latitude') || loc.latitude || loc.lat);
      const lng = Number(locVal(loc, 26, 'longitude') || loc.longitude || loc.lng);

      if (isLikelyValidPlaceId(placeId)) {
        const params = new URLSearchParams({
          api: '1',
          query: address || name || placeId,
          query_place_id: placeId
        });
        return `https://www.google.com/maps/search/?${params.toString()}`;
      }

      if (Number.isFinite(lat) && Number.isFinite(lng)) {
        const params = new URLSearchParams({ api: '1', query: `${lat},${lng}` });
        return `https://www.google.com/maps/search/?${params.toString()}`;
      }

      const fallbackQuery = address || name;
      if (!fallbackQuery) return '';
      const params = new URLSearchParams({ api: '1', query: fallbackQuery });
      return `https://www.google.com/maps/search/?${params.toString()}`;
    }

    function parseShareStateFromUrl() {
      try {
        const p = new URLSearchParams(window.location.search);
        const raw = p.get('sv');
        if (!raw) return null;
        const normalized = raw.replace(/-/g, '+').replace(/_/g, '/');
        const json = decodeURIComponent(atob(normalized));
        return JSON.parse(json);
      } catch (e) {
        console.warn('⚠️ Share state parse failed', e);
        return null;
      }
    }

    function getOpenInfoForToday(hoursText) {
      const text = String(hoursText || '').toLowerCase();
      if (!text) return { isOpen: true, minutesUntilClose: null };
      if (text.includes('closed')) return { isOpen: false, minutesUntilClose: null };
      if (text.includes('open 24') || text.includes('24/7')) return { isOpen: true, minutesUntilClose: 999 };
      if (text.includes('open daily')) return { isOpen: true, minutesUntilClose: null };

      const rangeMatch = text.match(/(\d{1,2})(?::(\d{2}))?\s*(am|pm)?\s*[-–to]+\s*(\d{1,2})(?::(\d{2}))?\s*(am|pm)/i);
      if (!rangeMatch) return { isOpen: true, minutesUntilClose: null };

      function toMinutes(hours, minutes, suffix) {
        let h = Number(hours) || 0;
        const m = Number(minutes) || 0;
        const meridiem = String(suffix || '').toLowerCase();
        if (meridiem === 'pm' && h < 12) h += 12;
        if (meridiem === 'am' && h === 12) h = 0;
        return (h * 60) + m;
      }

      const now = new Date();
      const nowMinutes = (now.getHours() * 60) + now.getMinutes();
      const openMinutes = toMinutes(rangeMatch[1], rangeMatch[2], rangeMatch[3]);
      let closeMinutes = toMinutes(rangeMatch[4], rangeMatch[5], rangeMatch[6]);
      if (closeMinutes <= openMinutes) closeMinutes += 24 * 60;
      const normalizedNow = nowMinutes < openMinutes ? nowMinutes + (24 * 60) : nowMinutes;
      const isOpen = normalizedNow >= openMinutes && normalizedNow <= closeMinutes;
      const untilClose = isOpen ? Math.max(0, closeMinutes - normalizedNow) : null;
      return { isOpen, minutesUntilClose: untilClose };
    }

    function computeWildlifeFilterBreakdown(locations, filters) {
      const out = { search: 0, difficulty: 0, cost: 0, tag: 0, openNow: 0, closingSoon: 0 };
      const list = Array.isArray(locations) ? locations : [];
      list.forEach(function (loc) {
        const name = String(locVal(loc, 0, 'name')).toLowerCase();
        const tags = getLocationTags(loc).join(',').toLowerCase();
        const difficulty = String(locVal(loc, 7, 'difficulty')).toLowerCase();
        const cost = String(locVal(loc, 14, 'cost')).toLowerCase();
        const openInfo = getOpenInfoForToday(locVal(loc, 5, 'hours'));

        if (filters.searchTerm && !name.includes(filters.searchTerm)) out.search += 1;
        if (filters.diffFilter && !difficulty.includes(filters.diffFilter)) out.difficulty += 1;
        if (filters.costFilter && !cost.includes(filters.costFilter)) out.cost += 1;
        if (filters.tagFilter && !tags.includes(filters.tagFilter)) out.tag += 1;
        if (filters.openNowOnly && !openInfo.isOpen) out.openNow += 1;
        if (filters.closingSoonOnly && !(openInfo.isOpen && openInfo.minutesUntilClose !== null && openInfo.minutesUntilClose <= 120)) out.closingSoon += 1;
      });
      return out;
    }

    function formatRelativeAge(isoText) {
      const ts = Date.parse(String(isoText || ''));
      if (!Number.isFinite(ts)) return 'unknown';
      const mins = Math.max(0, Math.round((Date.now() - ts) / 60000));
      if (mins < 1) return 'just now';
      if (mins < 60) return mins + 'm ago';
      const hours = Math.floor(mins / 60);
      if (hours < 24) return hours + 'h ago';
      const days = Math.floor(hours / 24);
      return days + 'd ago';
    }

    function computeSourceConfidenceModel() {
      const totalRows = Array.isArray(adventuresData) ? adventuresData.length : 0;
      const withSourceLabel = totalRows ? adventuresData.filter(function (row) { return String(row && row.sourceLabel || '').trim().length > 0; }).length : 0;
      const sourceCoverage = totalRows ? (withSourceLabel / totalRows) : 0;
      const configuredSources = sanitizeSourceList(cityViewerDataMeta && cityViewerDataMeta.configuredSources);
      const configuredCount = configuredSources.filter(function (s) { return s !== 'Unknown source'; }).length;
      const loadMode = String(cityViewerDataMeta && cityViewerDataMeta.loadedFrom || 'unknown');
      const ageMins = Math.round((Date.now() - Date.parse(String(cityViewerDataMeta && cityViewerDataMeta.exportedAt || ''))) / 60000);

      let score = 55;
      score += Math.round(sourceCoverage * 30);
      if (configuredCount >= 6) score += 8;
      if (loadMode === 'dataKey') score += 7;
      else if (loadMode === 'latestCache') score += 4;
      else if (loadMode === 'parentWindow') score -= 8;
      if (Number.isFinite(ageMins)) {
        if (ageMins > 360) score -= 10;
        else if (ageMins <= 30) score += 5;
      }

      score = Math.max(0, Math.min(100, score));
      const tier = score >= 80 ? 'high' : (score >= 62 ? 'medium' : 'low');
      const label = tier === 'high' ? 'High confidence' : (tier === 'medium' ? 'Medium confidence' : 'Low confidence');
      return { score: score, tier: tier, label: label, totalRows: totalRows, configuredCount: configuredCount, sourceCoveragePct: Math.round(sourceCoverage * 100) };
    }

    function renderWildlifeDiagnosticsStrip(cityEntry, visibleResults) {

      const hiddenByFilters = Math.max(0, wildlifeMatches.length - visible.length);

        grid.innerHTML = `
          <div class="loc-empty">
            <div class="loc-empty-icon">🔍</div>
            <div class="loc-empty-text">${hasFilters ? 'No locations match your current filters' : 'No locations available right now'}</div>
            <div class="u-note-sm">${hasFilters ? 'Try removing one filter chip at a time or reset everything.' : 'Try another city or sync additional sources.'}</div>
            <div class="loc-empty-actions">
              ${hasFilters ? '<button class="loc-mini-btn" onclick="resetLocFilters()">Reset Filters</button>' : ''}
              <button class="loc-mini-btn" onclick="document.getElementById(\'locFilterOpenNow\').checked = true; applyLocFilters();">Show Open Now</button>
            </div>
          </div>`;
        return;
      }

      grid.innerHTML = locations.map((loc, idx) => {
        const locId = getLocId(loc);
        const encodedLocId = encodeURIComponent(locId);
        const name = locVal(loc, 0, 'name') || 'Unnamed Location';
        const website = locVal(loc, 2, 'website');
        const driveTime = locVal(loc, 4, 'driveTime');
        const locAnimDelay = `${Math.min(idx * 0.035, 0.5).toFixed(3)}s`;
        const hours = locVal(loc, 5, 'hours');
        const duration = locVal(loc, 6, 'duration');
        const difficulty = locVal(loc, 7, 'difficulty');
        const trailLen = locVal(loc, 8, 'trailLength');
        const address = locVal(loc, 11, 'address');
        const phone = locVal(loc, 12, 'phone');
        const rating = locVal(loc, 13, 'rating');
        const cost = locVal(loc, 14, 'cost');
        const description = locVal(loc, 12, 'description');
        const googleUrl = locVal(loc, 23, 'googleUrl');
        const placeId = String(locVal(loc, 1, 'googlePlaceId') || '').trim();
        const hasPlaceId = placeId && !isPlaceholderText(placeId);
        const isNatureSource = isNatureLocationRecord(loc);
        const originBadge = getLocationOriginBadge(loc);
        const originKey = getLocSourceKey(loc);
        const tagEntries = getLocationDerivedTags(loc);
        const editState = getLocationEditState(locId);
        const noteText = editState.note;
        const visitCount = Math.max(0, editState.visitCount || 0);

        // Derive source type for the left-stripe accent
        const srcLabel = String((loc && loc.sourceLabel) || '').toLowerCase();
        const locSourceType = srcLabel.includes('nature') ? 'nature'
          : srcLabel.includes('coffee') ? 'coffee'
          : srcLabel.includes('restaurant') ? 'restaurants'
          : srcLabel.includes('retail') ? 'retail'
          : srcLabel.includes('festival') ? 'festivals'
          : srcLabel.includes('wildlife') ? 'wildlife'
          : srcLabel.includes('entertainment') ? 'entertainment'
          : '';

        return `
          <div class="loc-card" data-loc-id="${escAttr(locId)}" data-source-type="${locSourceType}" data-location-origin="${escAttr(originKey)}" role="button" tabindex="0" style="animation-delay:${locAnimDelay}" onclick="openLocationDetailByEncodedId('${encodedLocId}')" onkeydown="handleLocCardKeydown(event, '${encodedLocId}')" onmouseenter="setActiveLocation('${escAttr(locId)}', false)">
            <div class="loc-card-header">
              <div>
                <div class="loc-card-name">${escHtml(name)}</div>
                ${hasPlaceId ? `<div class="loc-place-id">Google Place ID: ${escHtml(placeId)}</div>` : ''}
              </div>
              <div class="loc-card-meta">
                <span class="loc-meta-badge ${escAttr(originBadge.className)}">${escHtml(originBadge.label)}</span>
                ${isNatureSource && difficulty ? `<span class="loc-meta-badge">⛰️ ${escHtml(difficulty)}</span>` : ''}
                ${cost ? `<span class="loc-meta-badge cost">💰 ${escHtml(cost)}</span>` : ''}
                ${renderRatingBadgeHtml(rating)}
              </div>
            </div>
            ${tagEntries.length ? `<div class="loc-card-tags">${tagEntries.map((entry) => `<span class="loc-tag-pill ${entry.isAdded ? 'is-user-large' : ''}">${escHtml(entry.text)}</span>`).join('')}</div>` : ''}
            ${editState.visited ? `<div class="loc-visited-chip">✅ Visited${visitCount > 0 ? ` · Visits: ${visitCount}` : ''}</div>` : ''}
            ${noteText ? `<div class="loc-note-block">📝 ${escHtml(noteText)}</div>` : ''}
            ${renderLocationInsightsMarkup(loc, cityEntry)}
            <div class="loc-card-details">
              ${driveTime ? `<div class="loc-detail-row"><span class="loc-detail-icon">🚗</span><span class="loc-detail-value">${escHtml(driveTime)}</span></div>` : ''}
              ${hours ? `<div class="loc-detail-row"><span class="loc-detail-icon">🕐</span><span class="loc-detail-value">${escHtml(hours)}</span></div>` : ''}
              ${isNatureSource && duration ? `<div class="loc-detail-row"><span class="loc-detail-icon">⏱️</span><span class="loc-detail-value">${escHtml(duration)}</span></div>` : ''}
              ${isNatureSource && trailLen ? `<div class="loc-detail-row"><span class="loc-detail-icon">📏</span><span class="loc-detail-value">${escHtml(trailLen)}</span></div>` : ''}
              ${address ? `<div class="loc-detail-row"><span class="loc-detail-icon">📍</span><span class="loc-detail-value">${escHtml(address)}</span></div>` : ''}
              ${phone ? `<div class="loc-detail-row"><span class="loc-detail-icon">📞</span><span class="loc-detail-value">${escHtml(phone)}</span></div>` : ''}
            </div>
            ${description ? `<div class="loc-card-description">${escHtml(description)}</div>` : ''}
            <div class="loc-card-footer">
              ${website ? `<a class="loc-action-btn" href="${escAttr(website)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🌐 Website</a>` : ''}
              ${googleUrl ? `<a class="loc-action-btn" href="${escAttr(googleUrl)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🗺️ Google Maps</a>` : ''}
              <button class="loc-action-btn loc-select-btn ${shortlist.has(locId) ? 'active' : ''}" data-loc-id="${escAttr(locId)}" onclick="event.stopPropagation();toggleShortlistByEncodedId('${encodedLocId}')">${shortlist.has(locId) ? 'Selected' : 'Add to Plan'}</button>
              ${renderQuickActionsMenu(locId, encodedLocId)}
            </div>
          </div>`;
      }).join('');

      highlightActiveLocation();
      updateShortlistButtons();
    }

    function viewCity(city, state) {
      const key = `${city}, ${state}`;
      const cityEntry = citiesData[key];
      if (!cityEntry || !cityEntry.locations.length) {
        alert('No locations found for this city');
        return;
      }

      currentCityKey = key;
      activeLocId = null;
      activeLocQuickTag = null;
      activeLocSourceFilter = '';
      activeLocationDetailId = null;
      lastRankBadgeIndex = {};
      const viewLocations = refreshCityNearbyBlend(cityEntry);

      document.getElementById('locationsPageTitle').textContent = `📍 ${city}`;
      renderLocationsPageSubtitle(cityEntry);

      // Apply city-matched gradient to the locations header
      const locHeader = document.getElementById('locationsHeader');
      if (locHeader) {
        locHeader.style.background = cityCardGradient(city);
        locHeader.style.backgroundSize = '250% 250%';
      }
      document.getElementById('locSearchName').value = '';
      document.getElementById('locFilterDifficulty').value = '';
      document.getElementById('locFilterCost').value = '';
      document.getElementById('locFilterTag').value = '';
      document.getElementById('locFilterOpenNow').checked = false;
      document.getElementById('locFilterClosingSoon').checked = false;
      document.getElementById('locSortBy').value = 'name';
      locSortOrder = 'asc';
      document.getElementById('locSortOrderBtn').textContent = '↑';
      setSplitView(false);

      buildQuickTagPills(viewLocations);
      populateTagDatalist(viewLocations);
      refreshPresetSelect();
      renderShortlistTray();
      renderDataFreshnessBadge();
      document.getElementById('locDayPlan').classList.remove('visible');

      if (pendingShareState && pendingShareState.cityKey === currentCityKey) {
        if (pendingShareState.filters) applyLocFilterState(pendingShareState.filters);
        if (Array.isArray(pendingShareState.shortlist)) setShortlistSet(new Set(pendingShareState.shortlist));
        pendingShareState = null;
      }

      document.querySelector('.controls').style.display = 'none';
      document.getElementById('cityGrid').style.display = 'none';
      document.getElementById('locationsPage').style.display = 'block';
      setLocationResultsMode();
      syncBulkActionInputHint();

      applyLocFilters();
    }

    function goBackToCities() {
      currentCityKey = null;
      activeLocId = null;
      activeLocationDetailId = null;
      const wildlifeStrip = document.getElementById('wildlifeDiagnosticsStrip');
      if (wildlifeStrip) {
        wildlifeStrip.classList.remove('visible');
        wildlifeStrip.innerHTML = '';
      }
      const catBar = document.getElementById('locCategoryBar');
      if (catBar) { catBar.classList.remove('visible'); catBar.innerHTML = ''; }
      document.getElementById('locationsPage').style.display = 'none';
      document.getElementById('cityGrid').style.display = 'grid';
      document.querySelector('.controls').style.display = 'flex';
      setLocationResultsMode();
    }

    // ── Filter panel collapse toggle ──────────────────────────────────────
    let locFilterPanelCollapsed = false;
    function toggleLocFilterPanel() {
      const collapsible = document.getElementById('locFilterCollapsible');
      const toggleBtn   = document.getElementById('locFilterToggleBtn');
      if (!collapsible || !toggleBtn) return;
      locFilterPanelCollapsed = !locFilterPanelCollapsed;
      collapsible.classList.toggle('collapsed', locFilterPanelCollapsed);
      toggleBtn.textContent = locFilterPanelCollapsed ? '▼ Show Filters' : '▲ Hide Filters';
      toggleBtn.setAttribute('aria-expanded', String(!locFilterPanelCollapsed));
    }

    // ── Jump-to-top ───────────────────────────────────────────────────────
    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ── Category summary bar ──────────────────────────────────────────────
    const CAT_META = {
      nature:        { label: '🌿 Nature',        cls: 'nature' },
      coffee:        { label: '☕ Coffee',         cls: 'coffee' },
      restaurants:   { label: '🍽️ Dining',         cls: 'restaurants' },
      retail:        { label: '🛍️ Retail',         cls: 'retail' },
      entertainment: { label: '🎭 Entertainment',  cls: 'entertainment' },
      festivals:     { label: '🎉 Festivals',      cls: 'festivals' },
      wildlife:      { label: '🦁 Wildlife',       cls: 'wildlife' },
    };

    function getLocSourceType(loc) {
      const src = String((loc && loc.sourceLabel) || '').toLowerCase();
      if (src.includes('nature'))        return 'nature';
      if (src.includes('coffee'))        return 'coffee';
      if (src.includes('restaurant'))    return 'restaurants';
      if (src.includes('retail'))        return 'retail';
      if (src.includes('festival'))      return 'festivals';
      if (src.includes('wildlife'))      return 'wildlife';
      if (src.includes('entertainment')) return 'entertainment';
      return 'other';
    }

    function renderCategoryBar(allCityLocs, visibleLocs) {
      const bar = document.getElementById('locCategoryBar');
      if (!bar) return;
      if (!allCityLocs || !allCityLocs.length) {
        bar.classList.remove('visible');
        return;
      }
      // Count visible per type
      const counts = {};
      visibleLocs.forEach(loc => {
        const t = getLocSourceType(loc);
        counts[t] = (counts[t] || 0) + 1;
      });
      const totalVisible = visibleLocs.length;
      if (!totalVisible) { bar.classList.remove('visible'); return; }

      const pills = Object.entries(counts)
        .sort((a, b) => b[1] - a[1])
        .map(([type, count]) => {
          const meta = CAT_META[type] || { label: type, cls: 'other' };
          return `<span class="loc-cat-pill ${meta.cls}" title="Filter by ${meta.label}" onclick="filterByCategory('${type}')">${meta.label} <strong>${count}</strong></span>`;
        }).join('');

      bar.innerHTML = `<span class="loc-cat-bar-label">In view</span>${pills}`;
      bar.classList.add('visible');
    }

    function filterByCategory(type) {
      // Map type back to a tag/search term and apply
      const tagMap = {
        nature: 'Nature', coffee: 'Coffee', restaurants: 'Restaurant',
        retail: 'Retail', festivals: 'Festival', wildlife: 'Wildlife', entertainment: 'Entertainment'
      };
      const tagInput = document.getElementById('locFilterTag');
      if (tagInput) {
        tagInput.value = tagMap[type] || type;
        applyLocFilters();
      }
    }

    function timeToMinutes(timeStr) {
      const [h, m] = timeStr.split(':').map(Number);
      return h * 60 + m;
    }


    function calculateRouteQuality() {
      if (!lastBuiltDayPlanRoute || lastBuiltDayPlanRoute.length < 1) {
        showRouteToast('Build a day plan first', true);
        return;
      }
      const options = {
        startTime: document.getElementById('locTimeStart')?.value || '09:00',
        endTime: document.getElementById('locTimeEnd')?.value || '17:00',
        perStopMinutes: parseInt(document.getElementById('locTimePerStop')?.value, 10) || 60
      };

      if (Array.isArray(lastOptimizedRouteVariants) && lastOptimizedRouteVariants.length) {
        const refreshedPlan = buildOptimizedPlanFromCurrentSelection(options);
        if (!refreshedPlan || !refreshedPlan.primary) {
          showRouteToast('Unable to refresh optimizer plan.', true);
          return;
        }
        lastOptimizedRouteVariants = refreshedPlan.variants;
        if (!activeOptimizedVariantId) activeOptimizedVariantId = refreshedPlan.primary.id;
        const activeVariant = refreshedPlan.variants.find(variant => variant.id === activeOptimizedVariantId) || refreshedPlan.primary;
        activeOptimizedVariantId = activeVariant.id;
        renderPlannedRoute(activeVariant.route, activeVariant.analysis, refreshedPlan, activeOptimizedVariantId);
        showRouteToast(activeVariant.analysis.confidenceLevel === 'low' ? 'Route exceeds or strains the time window' : 'Route feasibility updated', activeVariant.analysis.confidenceLevel === 'low');
        return;
      }

      const route = lastBuiltDayPlanRoute.map(stop => findLocationById(stop.locId)).filter(Boolean);
      const fallbackAnalysis = analyzeRoutePlan(route, options);
      renderRoutePlanSummary(fallbackAnalysis);
      renderRouteQualityPanel(fallbackAnalysis);
      showRouteToast(fallbackAnalysis.confidenceLevel === 'low' ? 'Route exceeds or strains the time window' : 'Route feasibility updated', fallbackAnalysis.confidenceLevel === 'low');
    }

    function bulkAddTopRated(count) {
      if (!currentCityKey || !citiesData[currentCityKey]) return;
      const locs = getCurrentCityLocationsForView().slice();
      locs.sort((a, b) => (parseFloat(locVal(b, 13, 'rating')) || 0) - (parseFloat(locVal(a, 13, 'rating')) || 0));
      const topN = locs.slice(0, count);
      const shortlist = getShortlistSet();
      topN.forEach(loc => shortlist.add(getLocId(loc)));
      setShortlistSet(shortlist);
      showRouteToast(`Added top ${count} rated locations`, false);
    }

    function bulkFilterOpenNow() {
      document.getElementById('locFilterOpenNow').checked = true;
      applyLocFilters();
      showRouteToast('Showing only open locations', false);
    }

    window.viewCity = viewCity;
    window.goBackToCities = goBackToCities;
    window.toggleLocQuickTag = toggleLocQuickTag;
    window.toggleLocSortOrder = toggleLocSortOrder;
    window.resetLocFilters = resetLocFilters;
    window.clearSingleFilterChip = clearSingleFilterChip;
    window.applyLocFilters = applyLocFilters;
    window.saveLocPreset = saveLocPreset;
    window.loadSelectedLocPreset = loadSelectedLocPreset;
    window.deleteSelectedLocPreset = deleteSelectedLocPreset;
    window.applySmartLocPreset = applySmartLocPreset;
    window.toggleSplitView = toggleSplitView;
    window.toggleShortlistByEncodedId = toggleShortlistByEncodedId;
    window.setActiveLocation = setActiveLocation;
    window.buildDayPlan = buildDayPlan;
    window.clearShortlist = clearShortlist;
    window.copyShareLink = copyShareLink;
    window.openDayPlanRoute = openDayPlanRoute;
    window.applyOptimizedRouteVariant = applyOptimizedRouteVariant;
    window.applyOptimizerWeightsFromControls = applyOptimizerWeightsFromControls;
    window.exportSelectedOptimizedRoute = exportSelectedOptimizedRoute;
    window.calculateRouteQuality = calculateRouteQuality;
    window.bulkAddTopRated = bulkAddTopRated;
    window.bulkFilterOpenNow = bulkFilterOpenNow;
    window.selectAllVisibleLocations = selectAllVisibleLocations;
    window.applyBulkSelectionAction = applyBulkSelectionAction;
    window.syncBulkActionInputHint = syncBulkActionInputHint;
    window.runQuickActionByEncodedId = runQuickActionByEncodedId;
    window.openLocationDetailByEncodedId = openLocationDetailByEncodedId;
    window.handleLocCardKeydown = handleLocCardKeydown;
    window.goBackToLocationResults = goBackToLocationResults;
    window.toggleLocFilterPanel = toggleLocFilterPanel;
    window.scrollToTop = scrollToTop;
    window.filterByCategory = filterByCategory;
    window.openNearbyDiagnosticsFromCityViewer = openNearbyDiagnosticsFromCityViewer;
    window.toggleFamilyPreference = toggleFamilyPreference;
    window.applyFamilyPreset = applyFamilyPreset;

    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
    updateRouteButtonsState();

    // ── Jump-to-top scroll listener ───────────────────────────────────────
    (function () {
      const btn = document.getElementById('jumpToTopBtn');
      if (!btn) return;
      const THRESHOLD = 320;
      window.addEventListener('scroll', function () {
        if (window.scrollY > THRESHOLD) {
          btn.classList.add('visible');
        } else {
          btn.classList.remove('visible');
        }
      }, { passive: true });
    })();

    console.log('✅ City Viewer window loaded');
    </script>
<script src="../JS Files/button-reliability-system.js"></script>
