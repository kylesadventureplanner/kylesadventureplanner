<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>City Explorer - Kyle's Adventure Finder</title>
  <script src="../JS Files/mobile-view-persistence-bootstrap.js"></script>
  <!--
    Google Maps is lazy-loaded only when split map view is enabled.
    This prevents third-party script cost from delaying initial page load.
  -->
  <script>
    window.__cvMapsReady = false;
    window.__cvMapsQueue = [];
    window.__cvMapsScriptRequested = false;
    window.__cvMapsLoadPromise = null;
    window.__cvMapsInit  = function () {
      window.__cvMapsReady = true;
      (window.__cvMapsQueue || []).forEach(function (fn) { try { fn(); } catch (_) {} });
      window.__cvMapsQueue = [];
    };
  </script>
  <link rel="stylesheet" href="../CSS/utilities.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
      color: #1f2937;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 4px;
    }

    .header-subtitle {
      font-size: 14px;
      opacity: 0.9;
    }

    .close-btn {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 24px;
      transition: all 0.2s;
    }

    .close-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .active-sources-row {
      flex-basis: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-top: 2px;
    }

    .active-sources-label {
      font-size: 12px;
      font-weight: 700;
      color: #6b7280;
      margin-right: 2px;
    }

    .active-source-chip {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid #dbeafe;
      background: #eff6ff;
      color: #1e40af;
      font-size: 11px;
      font-weight: 600;
      line-height: 1;
      max-width: 210px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: help;
    }

    .active-sources-row.is-empty .active-source-chip {
      border-color: #e5e7eb;
      background: #f9fafb;
      color: #6b7280;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
    }

    .search-box:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .sort-btn {
      padding: 12px 16px;
      background: white;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }

    .sort-btn:hover {
      border-color: #667eea;
      color: #667eea;
    }

    .sort-btn.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .city-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .city-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
    }

    .city-card:hover {
      border-color: #667eea;
      box-shadow: 0 10px 25px rgba(102,126,234,0.15);
      transform: translateY(-4px);
    }

    .city-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .city-state {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 12px;
    }

    .city-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .stat {
      background: #f3f4f6;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
    }

    .stat-label {
      color: #6b7280;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: #667eea;
    }

    .city-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      margin-top: auto;
    }

    .city-btn:hover {
      background: #5568d3;
      transform: translateY(-2px);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #6b7280;
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .empty-state-text {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      font-size: 16px;
      color: #6b7280;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #e5e7eb;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Locations Page ─────────────────────────────────── */
    #locationsPage {
      display: none;
    }

    .locations-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 24px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }

     .back-btn {
        padding: 7px 14px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        background: white !important;
        color: #374151 !important;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: all 0.15s ease;
        white-space: nowrap;
      }
      .back-btn:hover {
        background: #f3f4f6 !important;
        border-color: #d1d5db !important;
      }

    .locations-title {
      flex: 1;
      min-width: 0;
    }
    .locations-title h2 { font-size: 22px; margin: 0 0 2px 0; }
    .locations-title .subtitle { font-size: 13px; opacity: 0.85; }

    /* Filter/Sort Panel */
    .locations-controls {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 12px;
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.06);
      backdrop-filter: blur(2px);
    }

    .locations-controls-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
      margin-bottom: 10px;
    }

    .loc-filter-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .loc-filter-item label {
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .loc-filter-input,
    .loc-filter-select {
      padding: 8px 10px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 13px;
      color: #374151;
      background: white;
      width: 100%;
    }
    .loc-filter-input:focus,
    .loc-filter-select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.12);
    }

    /* Quick tag filters */
    .loc-quick-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .loc-active-filters {
      display: none;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed #e5e7eb;
    }
    .loc-active-filters.visible { display: flex; }
    .loc-active-filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 9px;
      border-radius: 999px;
      background: #eef2ff;
      border: 1px solid #c7d2fe;
      color: #3730a3;
      font-size: 11px;
      font-weight: 700;
    }
    .loc-active-filter-chip button {
      border: none;
      background: transparent;
      color: #4338ca;
      font-size: 12px;
      cursor: pointer;
      line-height: 1;
      font-weight: 700;
      padding: 0;
    }
    .loc-active-filter-clear {
      margin-left: auto;
      font-size: 11px;
      font-weight: 700;
      color: #1d4ed8;
      border: none;
      background: transparent;
      cursor: pointer;
    }
    .loc-tag-btn {
      padding: 6px 14px;
      border-radius: 999px;
      border: 2px solid #e5e7eb;
      background: white;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: #374151;
    }
    .loc-tag-btn:hover {
      border-color: #667eea;
      color: #667eea;
    }
    .loc-tag-btn.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-color: transparent;
      color: white;
    }

    /* Sort + results row */
    .loc-sort-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 8px 0 0 0;
      border-top: 1px solid #f3f4f6;
      margin-top: 10px;
    }
    .loc-sort-label { font-size: 12px; color: #6b7280; font-weight: 600; }
    .loc-sort-select {
      padding: 7px 10px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 13px;
      background: white;
      cursor: pointer;
    }
    .loc-sort-order-btn {
      width: 34px;
      height: 34px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .loc-sort-order-btn:hover { border-color: #667eea; background: #f0f4ff; }
    .loc-results-count {
      margin-left: auto;
      font-size: 13px;
      color: #6b7280;
      font-weight: 600;
    }
    .loc-reset-btn {
      padding: 7px 14px;
      background: white;
      border: 1px solid #fca5a5;
      color: #dc2626;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      transition: all 0.2s;
    }
    .loc-reset-btn:hover { background: #fef2f2; }

    /* Location Cards */
    .locations-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .loc-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 18px 20px;
      transition: all 0.2s;
      cursor: pointer;
    }
    .loc-card:hover {
      border-color: #667eea;
      box-shadow: 0 6px 20px rgba(102,126,234,0.15);
      transform: translateY(-2px);
    }
    .loc-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .loc-card-name {
      font-size: 16px;
      font-weight: 700;
      color: #1f2937;
      flex: 1;
    }
    .loc-card-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .loc-meta-badge {
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      background: #f3f4f6;
      color: #374151;
    }
    .loc-meta-badge.cost              { background: #ecfdf5; color: #065f46; }
    .loc-meta-badge.rating            { background: #fffbeb; color: #92400e; }

    .loc-card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 10px;
    }
    .loc-tag-pill {
      background: #dbeafe;
      color: #1e40af;
      padding: 3px 9px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
    }

    .loc-card-details {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 6px;
      font-size: 13px;
      color: #6b7280;
    }
    .loc-detail-row { display: flex; gap: 6px; align-items: baseline; }
    .loc-detail-icon { width: 16px; flex-shrink: 0; }
    .loc-detail-value { color: #374151; }

    .loc-card-description {
      font-size: 13px;
      color: #6b7280;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #f3f4f6;
      line-height: 1.5;
    }

    .loc-card-insights {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed #e5e7eb;
    }
    .loc-rank-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .loc-rank-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid transparent;
      line-height: 1.2;
    }
    .loc-rank-badge.best-value {
      background: #ecfdf5;
      border-color: #86efac;
      color: #166534;
    }
    .loc-rank-badge.most-unique {
      background: #f5f3ff;
      border-color: #c4b5fd;
      color: #6d28d9;
    }
    .loc-rank-badge.quick-stop {
      background: #eff6ff;
      border-color: #93c5fd;
      color: #1d4ed8;
    }
    .loc-rank-badge.balanced {
      background: #f3f4f6;
      border-color: #d1d5db;
      color: #374151;
    }
    .loc-confidence-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid transparent;
    }
    .loc-confidence-indicator.high {
      background: #dcfce7;
      border-color: #86efac;
      color: #166534;
    }
    .loc-confidence-indicator.medium {
      background: #fef3c7;
      border-color: #fcd34d;
      color: #92400e;
    }
    .loc-confidence-indicator.low {
      background: #fee2e2;
      border-color: #fca5a5;
      color: #991b1b;
    }

    .loc-card-footer {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #f3f4f6;
    }
    .loc-action-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      background: white;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: #374151;
      text-decoration: none;
    }
    .loc-action-btn:hover { border-color: #667eea; color: #667eea; background: #f0f4ff; }

    #locationDetailPage {
      display: none;
      margin-top: 10px;
    }
    .location-detail-header {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid #e5e7eb;
    }
    .location-detail-title {
      margin: 0;
      font-size: 18px;
      color: #111827;
    }
    .location-detail-subtitle {
      margin-top: 4px;
      font-size: 13px;
      color: #6b7280;
    }
    .location-detail-content {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .loc-empty {
      text-align: center;
      padding: 60px 20px;
      color: #9ca3af;
      background: #ffffff;
      border: 1px dashed #d1d5db;
      border-radius: 12px;
    }
    .loc-empty-icon { font-size: 56px; margin-bottom: 12px; }
    .loc-empty-text { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: #6b7280; }
    .loc-empty-actions {
      margin-top: 12px;
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* Presets, shortlist, map split */
    .loc-presets-row {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid #f3f4f6;
    }
    .loc-preset-input,
    .loc-preset-select {
      padding: 7px 10px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 12px;
      min-width: 140px;
      background: white;
    }
    .loc-preset-scope {
      min-width: 120px;
    }
    .loc-mini-btn {
      padding: 6px 9px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      background: white;
      cursor: pointer;
    }
    .loc-mini-btn:hover { border-color: #667eea; color: #667eea; }
    .loc-mini-btn.success { border-color: #86efac; color: #166534; }
    .loc-smart-presets {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      width: 100%;
      margin-top: 2px;
    }
    .loc-smart-preset-btn {
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid #c7d2fe;
      background: #eef2ff;
      color: #3730a3;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s ease;
    }
    .loc-smart-preset-btn:hover {
      border-color: #818cf8;
      background: #e0e7ff;
      transform: translateY(-1px);
    }
    .loc-smart-preset-btn.is-active {
      background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
      border-color: transparent;
      color: #ffffff;
      box-shadow: 0 8px 18px rgba(79, 70, 229, 0.24);
    }

    .loc-check-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    @media (max-width: 900px) {
      .locations-controls {
        padding: 10px 12px;
        margin-bottom: 10px;
      }

      .locations-controls-grid {
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 8px;
        margin-bottom: 8px;
      }

      .loc-presets-row {
        margin-bottom: 6px;
        padding-bottom: 6px;
      }

      .loc-sort-row {
        margin-top: 8px;
        padding-top: 6px;
      }
    }

    @media (max-width: 600px) {
      .locations-controls {
        padding: 8px 10px;
        margin-bottom: 8px;
      }

      .loc-presets-row {
        gap: 5px;
        margin-bottom: 5px;
        padding-bottom: 5px;
      }

      .loc-smart-presets {
        gap: 5px;
        margin-top: 1px;
      }

      .loc-check-row {
        gap: 8px;
        margin-top: 4px;
      }

      .locations-controls-grid {
        grid-template-columns: 1fr;
        gap: 7px;
        margin-bottom: 7px;
      }

      .loc-filter-item label {
        font-size: 10px;
      }

      .loc-filter-input,
      .loc-filter-select {
        padding: 7px 9px;
        font-size: 12px;
      }

      .loc-mini-btn,
      .loc-smart-preset-btn {
        font-size: 11px;
        padding: 6px 8px;
      }

      .loc-active-filters {
        margin-top: 6px;
        padding-top: 6px;
      }

      .loc-sort-row {
        gap: 6px;
        margin-top: 6px;
        padding-top: 5px;
      }

      .loc-sort-select {
        padding: 6px 8px;
        font-size: 12px;
      }

      .loc-sort-order-btn {
        width: 30px;
        height: 30px;
      }
    }
    .loc-check {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #4b5563;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
    }
    .loc-check input { cursor: pointer; }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
      white-space: nowrap;
    }

    .loc-toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 9999;
      background: #111827;
      color: #f9fafb;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.22);
    }
    .loc-toast.visible {
      opacity: 1;

<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>🌆 City Explorer</h1>
        <div class="header-subtitle">Explore adventures grouped by city</div>
      </div>
      <button class="close-btn" onclick="closeViewerWindow()" title="Close this window">✕</button>
    </div>

    <div class="controls">
      <label class="sr-only" for="searchBox">Search cities</label>
      <input type="text" class="search-box" id="searchBox" placeholder="Search cities..." onkeyup="filterCities()">
      <button class="sort-btn" id="sortByNameBtn" onclick="sortBy('name')">Sort A-Z</button>
      <button class="sort-btn active" id="sortByCountBtn" onclick="sortBy('count')">Sort by Count</button>
      <button class="sort-btn" id="sortByDistanceBtn" onclick="sortBy('distance')" title="Sort by drive time (requires location permission)">🚗 Sort by Drive Time</button>
      <button class="sort-btn" id="getLocationBtn" onclick="enableDriveTimes()" title="Get your location to show drive times">📍 Show My Drive Times</button>
      <div class="active-sources-row" id="activeSourcesRow" aria-live="polite"></div>
    </div>

    <div id="cityGrid" class="city-grid">
      <div class="loading">
        <span class="spinner"></span> Loading cities...
      </div>
    </div>

    <!-- ══ LOCATIONS PAGE (shown when a city card is clicked) ══ -->
    <div id="locationsPage">

      <!-- Header with back button -->
      <div class="locations-header">
        <button class="back-btn" onclick="goBackToCities()">← Back to Cities</button>
        <div class="locations-title">
          <h2 id="locationsPageTitle">Locations</h2>
          <div class="subtitle" id="locationsPageSubtitle"></div>
        </div>
      </div>

      <!-- Filter & Sort Controls (mirrors Adventure Planner) -->
      <div class="locations-controls">
        <div class="loc-presets-row">
          <label class="sr-only" for="locPresetName">Preset name</label>
          <input id="locPresetName" class="loc-preset-input" type="text" placeholder="Preset name...">
          <label class="sr-only" for="locPresetScope">Preset scope</label>
          <select id="locPresetScope" class="loc-preset-select loc-preset-scope">
            <option value="city">City Preset</option>
            <option value="global">Global Preset</option>
          </select>
          <button class="loc-mini-btn" onclick="saveLocPreset()">Save Preset</button>
          <label class="sr-only" for="locPresetSelect">Saved presets</label>
          <select id="locPresetSelect" class="loc-preset-select"></select>
          <button class="loc-mini-btn" onclick="loadSelectedLocPreset()">Load</button>
          <button class="loc-mini-btn" onclick="deleteSelectedLocPreset()">Delete</button>
          <button id="copyShareBtn" class="loc-mini-btn" onclick="copyShareLink()">Copy Share Link</button>
          <div class="loc-smart-presets" aria-label="Smart preset suggestions">
            <button id="locPresetClosestNowBtn" type="button" class="loc-smart-preset-btn" data-smart-preset="closest-now" onclick="applySmartLocPreset('closest-now')">🕒 Closest now</button>
            <button id="locPresetBestValueBtn" type="button" class="loc-smart-preset-btn" data-smart-preset="best-value" onclick="applySmartLocPreset('best-value')">💎 Best value</button>
            <button id="locPresetMostUniqueBtn" type="button" class="loc-smart-preset-btn" data-smart-preset="most-unique" onclick="applySmartLocPreset('most-unique')">✨ Most unique</button>
          </div>
        </div>
        <div class="loc-check-row">
          <label class="loc-check"><input id="locFilterOpenNow" type="checkbox" onchange="applyLocFilters()"> Open now</label>
          <label class="loc-check"><input id="locFilterClosingSoon" type="checkbox" onchange="applyLocFilters()"> Closing within 2h</label>
        </div>
         <div class="locations-controls-grid">
          <div class="loc-filter-item">
            <label for="locSearchName">Search by Name</label>
            <input id="locSearchName" class="loc-filter-input" type="text" placeholder="Search locations..." oninput="applyLocFilters()">
          </div>
          <div class="loc-filter-item">
            <label for="locFilterDifficulty">Difficulty</label>
            <select id="locFilterDifficulty" class="loc-filter-select" onchange="applyLocFilters()">
              <option value="">Any Difficulty</option>
              <option value="easy">Easy</option>
              <option value="moderate">Moderate</option>
              <option value="hard">Hard</option>
            </select>
          </div>
          <div class="loc-filter-item">
            <label for="locFilterCost">Cost</label>
            <select id="locFilterCost" class="loc-filter-select" onchange="applyLocFilters()">
              <option value="">Any Cost</option>
              <option value="free">Free</option>
              <option value="$">$</option>
              <option value="$$">$$</option>
              <option value="$$$">$$$</option>
            </select>
          </div>
          <div class="loc-filter-item">
            <label for="locFilterTag">Filter by Tag</label>
            <input id="locFilterTag" class="loc-filter-input" type="text" placeholder="e.g. hiking, restaurant…" list="locTagDatalist" oninput="applyLocFilters()">
            <datalist id="locTagDatalist"></datalist>
          </div>
        </div>

        <!-- Quick Tag Buttons (populated dynamically) -->
        <div id="locQuickTags" class="loc-quick-tags"></div>
        <div id="locActiveFilters" class="loc-active-filters" aria-live="polite"></div>

        <!-- Sort Row -->
        <div class="loc-sort-row">
          <span class="loc-sort-label">Sort by:</span>
          <label class="sr-only" for="locSortBy">Sort locations</label>
          <select id="locSortBy" class="loc-sort-select" onchange="applyLocFilters()">
            <option value="name">Name</option>
            <option value="driveTime">Drive time</option>
            <option value="difficulty">Difficulty</option>
            <option value="cost">Cost</option>
            <option value="rating">Rating</option>
            <option value="tags">Tags</option>
            <option value="bestValue">Best value</option>
            <option value="mostUnique">Most unique</option>
          </select>
          <button id="locSortOrderBtn" class="loc-sort-order-btn" title="Toggle sort order" onclick="toggleLocSortOrder()">↑</button>
          <button class="loc-mini-btn" id="locSplitToggleBtn" onclick="toggleSplitView()">Show Map</button>
           <button class="loc-reset-btn" onclick="resetLocFilters()">Reset Filters</button>
           <div class="loc-results-count" id="locResultsCount">0 locations</div>
         </div>
       </div>

      <div id="locMainLayout" class="loc-main-layout">
        <div id="locationsGrid" class="locations-grid"></div>
        <aside class="loc-map-panel" id="locMapPanel">
          <div class="loc-map-header">
            <span>Map Pins (synced with list)</span>
            <span id="locMapCount">0 pins</span>
          </div>
          <div id="locMapCanvas" class="loc-map-canvas"></div>
        </aside>
      </div>

      <!-- Bulk Actions Toolbar -->
      <div class="loc-bulk-actions mobile-sticky-actions" id="locBulkActions">
        <div class="loc-bulk-title">⚡ Quick Actions</div>
        <div class="loc-bulk-btn-row">
          <button class="loc-mini-btn" onclick="bulkAddTopRated(5)" title="Add top 5 rated">Top 5 ⭐</button>
          <button class="loc-mini-btn" onclick="bulkAddTopRated(10)" title="Add top 10 rated">Top 10 ⭐</button>
          <button class="loc-mini-btn" onclick="bulkFilterOpenNow()" title="Show only open now">🟢 Open Now</button>
          <button class="loc-mini-btn" onclick="resetLocFilters()" title="Clear all filters">Reset Filters</button>
          <button class="loc-mini-btn" onclick="clearShortlist()" title="Clear shortlist">Clear Selected</button>
        </div>
      </div>

      <div id="locationDetailPage">
        <div class="location-detail-header">
          <button class="back-btn" onclick="goBackToLocationResults()">← Back to Locations</button>
          <div>
            <h3 id="locationDetailTitle" class="location-detail-title">Location Details</h3>
            <div id="locationDetailSubtitle" class="location-detail-subtitle"></div>
          </div>
        </div>
        <div id="locationDetailContent" class="location-detail-content"></div>
      </div>

      <div class="loc-shortlist-tray" id="locShortlistTray">
        <div class="loc-shortlist-top">
          <div id="locShortlistCount" class="loc-shortlist-count">0 selected</div>
          <button class="loc-mini-btn" onclick="buildDayPlan()">Build Day Plan</button>
          <button id="openGoogleRouteBtn" class="loc-mini-btn" onclick="openDayPlanRoute('google')" disabled>Open Google Route</button>
          <button id="openMapboxRouteBtn" class="loc-mini-btn" onclick="openDayPlanRoute('mapbox')" disabled>Open Mapbox Route</button>
          <button id="locExportVariantBtn" class="loc-mini-btn" onclick="exportSelectedOptimizedRoute()" disabled>Export Active Route</button>
          <button class="loc-mini-btn" onclick="clearShortlist()">Clear</button>
        </div>
        <div id="locShortlistChips" class="loc-shortlist-chip-wrap"></div>
        <div id="locCompareTray" class="loc-compare-tray"></div>

        <!-- Time-Window Itinerary Builder -->
        <div id="locTimeWindow" class="loc-time-window">
          <div class="u-text-12-strong u-mb-8">⏰ Plan by Time Window</div>
          <div class="u-grid-3-gap-8 u-mb-10">
            <div>
              <label for="locTimeStart" class="u-text-11-light">Start Time</label>
              <input id="locTimeStart" class="loc-time-input" type="time" value="09:00">
            </div>
            <div>
              <label for="locTimeEnd" class="u-text-11-light">End Time</label>
              <input id="locTimeEnd" class="loc-time-input" type="time" value="17:00">
            </div>
            <div>
              <label for="locTimePerStop" class="u-text-11-light">Per Stop (min)</label>
              <input id="locTimePerStop" class="loc-time-input" type="number" value="60" min="15" max="240">
            </div>
          </div>

        </div>

        <div id="locDayPlan" class="loc-day-plan">
          <div class="u-text-12-strong u-mb-4">Suggested Route</div>
          <div id="locDayPlanSummary" class="u-text-12-light"></div>
          <div id="locRouteTradeoffPanel" class="loc-route-tradeoff-panel"></div>
          <ol id="locDayPlanList" class="loc-day-plan-list"></ol>
        </div>
      </div>
    </div>

    </div><!-- /.container -->

    <div id="locToast" class="loc-toast" role="status" aria-live="polite"></div>

    <script>
    // Get data from sessionStorage (cached from parent window) or fallback to parent window
    let adventuresData = [];
    let citiesData = {};
    let currentSort = 'count';
    const DEFAULT_CITY_VIEWER_SOURCES = [
      'Retail_Food_and_Drink.xlsx / Coffee',
      'Retail_Food_and_Drink.xlsx / Restaurants',
      'Retail_Food_and_Drink.xlsx / Retail',
      'Nature_Locations.xlsx / Nature_Locations',
      'Entertainment_Locations.xlsx / Festivals',
      'Entertainment_Locations.xlsx / General_Entertainment'
    ];

    // ── Subtab → exact source/table prefilter mapping ────────────────────────
    // Keys must be lowercased (they are matched against a lowercased prefilterTag).
    // Values are arrays of exact sourceLabel strings for that subtab.
    // Add a new entry here whenever a new worksheet tab / data source is onboarded.
    const SUBTAB_SOURCE_MAP = {
      // Food & Drink subtabs
      'coffee':                ['Retail_Food_and_Drink.xlsx / Coffee'],
      'restaurants':           ['Retail_Food_and_Drink.xlsx / Restaurants'],
      'restaurant':            ['Retail_Food_and_Drink.xlsx / Restaurants'],
      'retail':                ['Retail_Food_and_Drink.xlsx / Retail'],

                                'Retail_Food_and_Drink.xlsx / Restaurants',
                                'Retail_Food_and_Drink.xlsx / Retail'],
      // Nature subtabs
      'nature':                ['Nature_Locations.xlsx / Nature_Locations'],
      'nature_locations':      ['Nature_Locations.xlsx / Nature_Locations'],
      // Entertainment subtabs
      'festivals':             ['Entertainment_Locations.xlsx / Festivals'],

                                'Entertainment_Locations.xlsx / General_Entertainment'],

    };
    let cityViewerDataMeta = {
      configuredSources: [],
      dataMode: '',
      loadedFrom: 'unknown'
    };

    function sanitizeSourceList(values) {
      return Array.from(new Set((Array.isArray(values) ? values : [])
        .map(value => String(value || '').trim())
        .filter(Boolean)));
    }

    function resolveActiveSources() {
      const configured = sanitizeSourceList(cityViewerDataMeta.configuredSources);
      if (configured.length) return configured;

      const fromRows = sanitizeSourceList(adventuresData.map(row => row && row.sourceLabel));
      if (fromRows.length) return fromRows;

      if (String(cityViewerDataMeta.dataMode || '').toLowerCase() === 'curated-only') {
        return DEFAULT_CITY_VIEWER_SOURCES.slice();
      }

      return ['Unknown source'];
    }

    function toActiveSourceChipModel(source) {
      const fullLabel = String(source || '').trim() || 'Unknown source';
      if (fullLabel === 'Unknown source') {
        return { shortLabel: fullLabel, fullLabel };
      }

      const splitIndex = fullLabel.indexOf(' / ');
      const tableName = splitIndex >= 0 ? fullLabel.slice(splitIndex + 3) : fullLabel;
      const shortLabel = String(tableName || fullLabel)
        .replace(/[_-]+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();

      return {
        shortLabel: shortLabel || fullLabel,
        fullLabel
      };
    }

    function renderActiveSources() {
      const row = document.getElementById('activeSourcesRow');
      if (!row) return;

      const sources = resolveActiveSources();
      const label = String(cityViewerDataMeta.dataMode || '').toLowerCase() === 'curated-only'
        ? 'Active curated feeds:'
        : 'Active sources:';

      row.classList.toggle('is-empty', sources.length === 1 && sources[0] === 'Unknown source');
      row.innerHTML = `<span class="active-sources-label">${escHtml(label)}</span>${sources
        .map(source => {
          const model = toActiveSourceChipModel(source);
          return `<span class="active-source-chip" title="${escAttr(model.fullLabel)}">${escHtml(model.shortLabel)}</span>`;
        })
        .join('')}`;
    }

    // Helper function to load data from sessionStorage
    function isEmbeddedViewer() {
      try {
        const params = new URLSearchParams(window.location.search || '');
        return params.get('embedded') === '1' || (window.parent && window.parent !== window);
      } catch (_error) {
        return window.parent && window.parent !== window;
      }
    }

    function getHostWindow() {
      if (window.parent && window.parent !== window) return window.parent;
      if (window.opener && !window.opener.closed) return window.opener;
      return window;
    }

    function closeViewerWindow() {
      if (isEmbeddedViewer() && window.parent && window.parent !== window) {
        const params = new URLSearchParams(window.location.search || '');
        window.parent.postMessage({
          type: 'planner-inline-tool-close',
          tool: 'city-viewer',
          sourceSubtab: String(params.get('sourceSubtab') || '')
        }, window.location.origin);
        return;
      }
      window.close();
    }

    function loadCityViewerData() {
      try {
        // First, try to get data from the cached key passed in the URL
        const urlParams = new URLSearchParams(window.location.search);
        const dataKey = urlParams.get('dataKey');
        const corrId = urlParams.get('corrId');
        const dataMode = String(urlParams.get('dataMode') || '').trim();

        cityViewerDataMeta = {
          configuredSources: [],
          dataMode,
          loadedFrom: 'unknown'
        };

        console.log(`🔗 City Viewer loaded with corrId=${corrId}, dataKey=${dataKey}`);

        if (dataKey) {
          const cachedData = window.sessionStorage.getItem(dataKey);
          if (cachedData) {
            try {
              const payload = JSON.parse(cachedData);
              if (Array.isArray(payload.adventuresData)) {
                adventuresData = payload.adventuresData;
                cityViewerDataMeta.configuredSources = sanitizeSourceList(payload.configuredSources);
                cityViewerDataMeta.dataMode = String(payload.dataMode || cityViewerDataMeta.dataMode || '').trim();
                cityViewerDataMeta.loadedFrom = 'dataKey';
                console.log(`✅ Loaded ${adventuresData.length} adventures from sessionStorage`);
                return true;
              }
            } catch (e) {
              console.warn('⚠️ Failed to parse cached data:', e);
            }
          }
        }

        // Fallback: Try to get latest cached data
        const latestKey = window.sessionStorage.getItem('city_viewer_data_latest');
        if (latestKey) {
          const cachedData = window.sessionStorage.getItem(latestKey);
          if (cachedData) {
            try {
              const payload = JSON.parse(cachedData);
              if (Array.isArray(payload.adventuresData)) {
                adventuresData = payload.adventuresData;
                cityViewerDataMeta.configuredSources = sanitizeSourceList(payload.configuredSources);
                cityViewerDataMeta.dataMode = String(payload.dataMode || cityViewerDataMeta.dataMode || '').trim();
                cityViewerDataMeta.loadedFrom = 'latestCache';
                console.log(`✅ Loaded ${adventuresData.length} adventures from latest cache`);
                return true;
              }
            } catch (e) {
              console.warn('⚠️ Failed to parse latest cache:', e);
            }
          }
        }

        // If curated-only mode was requested, avoid broad fallback sources.
        if (dataMode === 'curated-only') {
          console.warn('⚠️ Curated City Explorer mode requested, but curated cache is unavailable.');
          return false;
        }

        // Fallback: Try to get from parent window (for popup windows)
        const hostWindow = getHostWindow();
        if (hostWindow && Array.isArray(hostWindow.adventuresData)) {
          adventuresData = hostWindow.adventuresData;
          cityViewerDataMeta.loadedFrom = 'parentWindow';
          console.log(`✅ Loaded ${adventuresData.length} adventures from parent window`);
          return true;
        }

        return false;
      } catch (error) {
        console.error('❌ Error loading city viewer data:', error);
        return false;
      }
    }

    /**
     * Enable drive time calculations
     */
    async function enableDriveTimes() {
      console.log('📍 Getting user location...');

      const btn = document.getElementById('getLocationBtn');
      btn.disabled = true;
      btn.textContent = '📍 Getting location...';

      try {
        if (!navigator.geolocation) {
          btn.disabled = false;
          btn.textContent = '📍 Not supported';
          alert('Geolocation is not supported by this browser.');
          return;
        }

        navigator.geolocation.getCurrentPosition(
          (position) => {
            const userLat = position.coords.latitude;
            const userLng = position.coords.longitude;

            console.log(`✅ User location: ${userLat}, ${userLng}`);

            // Calculate distance for each city
            Object.values(citiesData).forEach(city => {
              if (city.latitude && city.longitude) {
                const cityLat = parseFloat(city.latitude);
                const cityLng = parseFloat(city.longitude);

                // Haversine formula
                const R = 3959; // miles
                const dLat = (cityLat - userLat) * Math.PI / 180;
                const dLng = (cityLng - userLng) * Math.PI / 180;
                const a =
                  Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(userLat * Math.PI / 180) * Math.cos(cityLat * Math.PI / 180) *
                  Math.sin(dLng/2) * Math.sin(dLng/2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                const distance = R * c;

                // Estimate drive time (60 mph average)
                const hours = Math.floor(distance / 60);
                const minutes = Math.round((distance / 60 - hours) * 60);

                city.distance = distance;
                city.driveTime = hours > 0
                  ? `${hours}h ${minutes}m (${distance.toFixed(1)} mi)`
                  : `${minutes}m (${distance.toFixed(1)} mi)`;
              }
            });

            console.log('✅ Drive times calculated');
            btn.disabled = false;
            btn.textContent = '✅ Drive times enabled';
            renderCities();

          },
          (error) => {
            console.error('❌ Location error:', error.message);
            btn.disabled = false;
            btn.textContent = '📍 Location failed - try again';
            alert('Could not get your location. Please check permissions.');
          }
        );
      } catch (error) {
        console.error('❌ Error:', error);
        btn.disabled = false;
        btn.textContent = '📍 Error - try again';
        alert('Error: ' + error.message);
      }
    }

    function resolvePrefilterFromUrl() {
      try {
        const p = new URLSearchParams(window.location.search);
        prefilterTag = String(p.get('prefilterTag') || '').trim().toLowerCase();
        prefilterLabel = String(p.get('prefilterLabel') || '').trim();

        prefilterTag = '';
        prefilterLabel = '';
      }

    function locationMatchesPrefilter(loc) {
      if (!prefilterTag) return true;

      // ── 1. Exact source/table lookup (fast, precise) ─────────────────────
      const mappedSources = SUBTAB_SOURCE_MAP[prefilterTag];
      if (mappedSources && mappedSources.length) {
        const srcLabel = String(loc.sourceLabel || '').trim();
        return mappedSources.some(s => srcLabel === s);
      }

      // ── 2. Fallback: fuzzy tag / name / description scan ──────────────────
      const tags = String(locVal(loc, 3, 'tags') || '').toLowerCase();
      const name = String(locVal(loc, 0, 'name') || '').toLowerCase();
      const desc = String(locVal(loc, 16, 'description') || '').toLowerCase();
      return tags.includes(prefilterTag) || name.includes(prefilterTag) || desc.includes(prefilterTag);

    function parseDriveMinutes(value) {
      const text = String(value || '').toLowerCase().trim();
      if (!text) return Number.POSITIVE_INFINITY;
      const hoursMatch = text.match(/(\d+(?:\.\d+)?)\s*h/);
      const minsMatch = text.match(/(\d+(?:\.\d+)?)\s*m/);
      const minuteWordMatch = text.match(/~?\s*(\d+(?:\.\d+)?)\s*minutes?/);
      let total = 0;
      let matched = false;
      if (hoursMatch) {
        total += Number(hoursMatch[1]) * 60;
        matched = true;
      }
      if (minsMatch) {
        total += Number(minsMatch[1]);
        matched = true;
      }
      if (!matched && minuteWordMatch) {
        total = Number(minuteWordMatch[1]);
        matched = true;
      }
      return matched && Number.isFinite(total) ? total : Number.POSITIVE_INFINITY;
    }

    function getLocationTags(loc) {
      return String(locVal(loc, 3, 'tags') || '')
        .split(',')
        .map(tag => tag.trim())
        .filter(Boolean);
    }

    function getLocationCostRank(loc) {
      const raw = String(locVal(loc, 14, 'cost') || '').toLowerCase().trim();
      const costOrder = { free: 0, '$': 1, '$$': 2, '$$$': 3, '$$$$': 4 };
      return costOrder[raw] ?? 2;
    }

    function getLocationBestValueScore(loc) {
      const rating = parseFloat(locVal(loc, 13, 'rating')) || 0;
      const openInfo = getOpenInfoForToday(locVal(loc, 5, 'hours'));
      const driveMins = parseDriveMinutes(locVal(loc, 4, 'driveTime'));
      const tagCount = getLocationTags(loc).length;
      const costRank = getLocationCostRank(loc);
      const driveBonus = Number.isFinite(driveMins) ? Math.max(0, 35 - Math.min(driveMins, 35)) : 0;
      return (rating * 30) - (costRank * 12) + driveBonus + (openInfo.isOpen ? 8 : 0) + (tagCount * 2);
    }

    function buildCityTagFrequency(locations) {
      return locations.reduce((acc, loc) => {
        getLocationTags(loc).forEach(tag => {
          const norm = tag.toLowerCase();
          acc[norm] = (acc[norm] || 0) + 1;
        });
        return acc;
      }, {});
    }

    function getLocationMostUniqueScore(loc, cityEntry) {
      const tagFreq = buildCityTagFrequency((cityEntry && cityEntry.locations) || []);
      const tags = getLocationTags(loc);
      const rarityScore = tags.reduce((sum, tag) => {
        const count = tagFreq[String(tag || '').toLowerCase()] || 1;
        return sum + (12 / count);
      }, 0);
      const descriptionLength = String(locVal(loc, 16, 'description') || '').trim().length;
      const rating = parseFloat(locVal(loc, 13, 'rating')) || 0;
      return rarityScore + Math.min(18, descriptionLength / 18) + rating;
    }

    function parseDurationMinutes(value) {
      const text = String(value || '').toLowerCase().trim();
      if (!text) return 60;
      const hoursMatch = text.match(/(\d+(?:\.\d+)?)\s*h/);
      const minsMatch = text.match(/(\d+(?:\.\d+)?)\s*m(in(ute)?s?)?/);
      const hourWordMatch = text.match(/(\d+(?:\.\d+)?)\s*hours?/);
      const minuteWordMatch = text.match(/(\d+(?:\.\d+)?)\s*minutes?/);
      let total = 0;
      let matched = false;
      if (hoursMatch) {
        total += Number(hoursMatch[1]) * 60;
        matched = true;
      }
      if (hourWordMatch && !hoursMatch) {
        total += Number(hourWordMatch[1]) * 60;
        matched = true;
      }
      if (minsMatch) {
        total += Number(minsMatch[1]);
        matched = true;
      }
      if (minuteWordMatch && !minsMatch) {
        total += Number(minuteWordMatch[1]);
        matched = true;
      }
      if (!matched) {
        const rawNumber = Number.parseInt(text, 10);
        if (Number.isFinite(rawNumber)) return rawNumber;
      }
      return matched && total > 0 ? total : 60;
    }

    function formatMinutesCompact(minutes) {
      const value = Math.max(0, Math.round(Number(minutes) || 0));
      const hours = Math.floor(value / 60);
      const mins = value % 60;
      if (hours && mins) return `${hours}h ${mins}m`;
      if (hours) return `${hours}h`;
      return `${mins}m`;
    }

    function estimateTravelMinutesBetweenStops(fromLoc, toLoc) {
      if (!fromLoc || !toLoc) return 0;
      const fromLat = parseFloat(locVal(fromLoc, 25, 'latitude') || locVal(fromLoc, 26, 'lat') || fromLoc.latitude || fromLoc.lat);
      const fromLng = parseFloat(locVal(fromLoc, 26, 'longitude') || locVal(fromLoc, 27, 'lng') || fromLoc.longitude || fromLoc.lng);
      const toLat = parseFloat(locVal(toLoc, 25, 'latitude') || locVal(toLoc, 26, 'lat') || toLoc.latitude || toLoc.lat);
      const toLng = parseFloat(locVal(toLoc, 26, 'longitude') || locVal(toLoc, 27, 'lng') || toLoc.longitude || toLoc.lng);

      if (Number.isFinite(fromLat) && Number.isFinite(fromLng) && Number.isFinite(toLat) && Number.isFinite(toLng)) {
        const toRad = (deg) => (deg * Math.PI) / 180;
        const earthMiles = 3959;
        const dLat = toRad(toLat - fromLat);
        const dLng = toRad(toLng - fromLng);
        const a =
          Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos(toRad(fromLat)) * Math.cos(toRad(toLat)) *
          Math.sin(dLng / 2) * Math.sin(dLng / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        const miles = earthMiles * c;
        return Math.max(6, Math.min(55, Math.round((miles * 2.6) + 4)));
      }

      const fromPoint = getLocPoint(fromLoc, getLocId(fromLoc));
      const toPoint = getLocPoint(toLoc, getLocId(toLoc));
      const dx = fromPoint.x - toPoint.x;
      const dy = fromPoint.y - toPoint.y;
      const distance = Math.sqrt(dx * dx + dy * dy);
      return Math.max(8, Math.min(40, Math.round(distance * 6)));
    }

    function getPlannerConfidenceClass(level) {
      if (level === 'high') return 'high';
      if (level === 'medium') return 'medium';
      return 'low';
    }

    function analyzeRoutePlan(route, options) {
      const safeRoute = Array.isArray(route) ? route.filter(Boolean) : [];
      const normalizedOptions = options || {};
      const startStr = String(normalizedOptions.startTime || document.getElementById('locTimeStart')?.value || '09:00');
      const endStr = String(normalizedOptions.endTime || document.getElementById('locTimeEnd')?.value || '17:00');
      const perStopOverride = Math.max(15, parseInt(normalizedOptions.perStopMinutes || document.getElementById('locTimePerStop')?.value, 10) || 60);

      const stops = safeRoute.map(loc => ({
        loc,
        locId: getLocId(loc),
        name: String(locVal(loc, 0, 'name') || 'Location'),
        rating: parseFloat(locVal(loc, 13, 'rating')) || 0,
        costRank: getLocationCostRank(loc),
        uniqueScore: getLocationMostUniqueScore(loc, currentCityKey ? citiesData[currentCityKey] : null),
        bestValueScore: getLocationBestValueScore(loc),
        durationMinutes: perStopOverride || parseDurationMinutes(locVal(loc, 6, 'duration')),
        tags: getLocationTags(loc)
      }));

      let travelMinutes = 0;
      for (let i = 0; i < safeRoute.length - 1; i++) {
        travelMinutes += estimateTravelMinutesBetweenStops(safeRoute[i], safeRoute[i + 1]);
      }

      const stopMinutes = stops.reduce((sum, stop) => sum + stop.durationMinutes, 0);
      const availableMinutes = Math.max(0, timeToMinutes(endStr) - timeToMinutes(startStr));
      const totalRequiredMinutes = travelMinutes + stopMinutes;
      const slackMinutes = availableMinutes - totalRequiredMinutes;
      const uniqueTagCount = new Set(stops.flatMap(stop => stop.tags.map(tag => tag.toLowerCase()))).size;
      const averageRating = stops.length ? (stops.reduce((sum, stop) => sum + stop.rating, 0) / stops.length) : 0;
      const averageCostRank = stops.length ? (stops.reduce((sum, stop) => sum + stop.costRank, 0) / stops.length) : 0;
      const averageUniqueScore = stops.length ? (stops.reduce((sum, stop) => sum + stop.uniqueScore, 0) / stops.length) : 0;
      const averageBestValue = stops.length ? (stops.reduce((sum, stop) => sum + stop.bestValueScore, 0) / stops.length) : 0;
      const efficiencyScore = Math.max(0, 100 - Math.min(70, travelMinutes * 1.4));
      const affordabilityScore = Math.max(0, 100 - (averageCostRank * 18));
      const varietyScore = Math.min(100, uniqueTagCount * 10 + averageUniqueScore * 1.3);
      const qualityScore = Math.min(100, averageRating * 20.5);
      const valueScore = Math.min(100, averageBestValue * 0.9);
      const rawScore = (qualityScore * 0.32) + (efficiencyScore * 0.24) + (affordabilityScore * 0.14) + (varietyScore * 0.15) + (valueScore * 0.15);
      const itineraryScore = Math.max(1, Math.min(100, Math.round(rawScore)));

      let confidenceLabel = 'Risky';
      let confidenceLevel = 'low';
      let confidenceReason = 'Current time window is likely too tight for the selected stops.';
      if (slackMinutes >= 60) {
        confidenceLabel = 'Comfortable';
        confidenceLevel = 'high';
        confidenceReason = 'Strong buffer remains after travel and stop-time estimates.';
      } else if (slackMinutes >= 0) {
        confidenceLabel = 'Tight';
        confidenceLevel = 'medium';
        confidenceReason = 'This plan works, but there is limited slack for delays.';
      }

      return {
        stops,
        startStr,
        endStr,
        perStopMinutes: perStopOverride,
        availableMinutes,
        travelMinutes,
        stopMinutes,
        totalRequiredMinutes,
        slackMinutes,
        uniqueTagCount,
        averageRating,
        itineraryScore,
        efficiencyScore,
        confidenceLabel,
        confidenceLevel,
        confidenceReason
      };
    }

    function toRouteStopDescriptor(loc) {
      return {
        locId: getLocId(loc),
        name: String(locVal(loc, 0, 'name') || ''),
        placeId: String(locVal(loc, 1, 'googlePlaceId') || ''),
        address: String(locVal(loc, 11, 'address') || ''),
        lat: parseFloat(locVal(loc, 25, 'latitude') || locVal(loc, 26, 'lat') || loc.latitude || loc.lat),
        lng: parseFloat(locVal(loc, 26, 'longitude') || locVal(loc, 27, 'lng') || loc.longitude || loc.lng)
      };
    }

    function routeSignature(route) {
      return route.map(loc => getLocId(loc)).join('|');
    }

    function buildNearestNeighborRoute(selected) {
      const remaining = selected.slice().sort((a, b) => String(locVal(a, 0, 'name')).localeCompare(String(locVal(b, 0, 'name'))));
      const route = [remaining.shift()];
      while (remaining.length) {
        const last = route[route.length - 1];
        const lastPt = getLocPoint(last, getLocId(last));
        let bestIdx = 0;
        let bestDist = Infinity;
        remaining.forEach((candidate, idx) => {
          const pt = getLocPoint(candidate, getLocId(candidate));
          const dx = lastPt.x - pt.x;
          const dy = lastPt.y - pt.y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < bestDist) { bestDist = d; bestIdx = idx; }
        });
        route.push(remaining.splice(bestIdx, 1)[0]);
      }
      return route;
    }

    function buildRouteVariantCandidates(selected) {
      const candidates = [
        {
          id: 'balanced-core',
          label: 'Balanced optimizer',
          role: 'primary-candidate',
          route: buildNearestNeighborRoute(selected)
        },
        {
          id: 'quality-first',
          label: 'Quality-first alternate',
          role: 'quality-alt',
          route: selected.slice().sort((a, b) => {
            const ratingCmp = (parseFloat(locVal(b, 13, 'rating')) || 0) - (parseFloat(locVal(a, 13, 'rating')) || 0);
            if (ratingCmp !== 0) return ratingCmp;
            return getLocationBestValueScore(b) - getLocationBestValueScore(a);
          })
        },
        {
          id: 'budget-friendly',
          label: 'Budget-friendly alternate',
          role: 'budget-alt',
          route: selected.slice().sort((a, b) => {
            const costCmp = getLocationCostRank(a) - getLocationCostRank(b);
            if (costCmp !== 0) return costCmp;
            const driveCmp = parseDriveMinutes(locVal(a, 4, 'driveTime')) - parseDriveMinutes(locVal(b, 4, 'driveTime'));
            if (Number.isFinite(driveCmp) && driveCmp !== 0) return driveCmp;
            return (parseFloat(locVal(b, 13, 'rating')) || 0) - (parseFloat(locVal(a, 13, 'rating')) || 0);
          })
        }
      ];

      const seen = new Set();
      return candidates.filter(candidate => {
        const sig = routeSignature(candidate.route);
        if (!sig || seen.has(sig)) return false;
        seen.add(sig);
        return true;
      });
    }

    function scoreRouteVariant(analysis) {
      const weights = optimizerWeights || { rating: 4, cost: 3, travel: 4 };
      const ratingWeight = Math.max(1, Math.min(5, Number(weights.rating) || 4));
      const costWeight = Math.max(1, Math.min(5, Number(weights.cost) || 3));
      const travelWeight = Math.max(1, Math.min(5, Number(weights.travel) || 4));
      if (!analysis) return 0;
      const confidenceBonus = analysis.confidenceLevel === 'high' ? 12 : (analysis.confidenceLevel === 'medium' ? 6 : 0);
      return analysis.itineraryScore
        + confidenceBonus
        + (analysis.averageRating * ratingWeight * 2)
        - (analysis.averageCostRank * costWeight * 2.8)
        + ((analysis.efficiencyScore / 100) * travelWeight * 10);
    }

    function clampOptimizerWeight(value, fallback) {
      const numeric = Number.parseInt(String(value || ''), 10);
      if (!Number.isFinite(numeric)) return fallback;
      return Math.max(1, Math.min(5, numeric));
    }

    function getOptimizerWeightsFromControls() {
      const rating = clampOptimizerWeight(document.getElementById('locWeightRating')?.value, optimizerWeights.rating || 4);
      const cost = clampOptimizerWeight(document.getElementById('locWeightCost')?.value, optimizerWeights.cost || 3);
      const travel = clampOptimizerWeight(document.getElementById('locWeightTravel')?.value, optimizerWeights.travel || 4);
      return { rating, cost, travel };
    }

    function syncOptimizerWeightControls() {
      const ratingSel = document.getElementById('locWeightRating');
      const costSel = document.getElementById('locWeightCost');
      const travelSel = document.getElementById('locWeightTravel');
      if (ratingSel) ratingSel.value = String(optimizerWeights.rating || 4);
      if (costSel) costSel.value = String(optimizerWeights.cost || 3);
      if (travelSel) travelSel.value = String(optimizerWeights.travel || 4);
      const summary = document.querySelector('[data-optimizer-weights]');
      if (summary) {
        summary.textContent = `Weights: rating ${optimizerWeights.rating} · cost ${optimizerWeights.cost} · travel ${optimizerWeights.travel}`;
      }
    }

    function buildRouteTradeoffSentence(baseAnalysis, altAnalysis) {
      if (!baseAnalysis || !altAnalysis) return 'Tradeoff data unavailable.';
      const deltaTravel = Math.round(altAnalysis.travelMinutes - baseAnalysis.travelMinutes);
      const deltaRating = altAnalysis.averageRating - baseAnalysis.averageRating;
      const deltaCost = altAnalysis.averageCostRank - baseAnalysis.averageCostRank;
      const travelText = `${deltaTravel >= 0 ? '+' : ''}${deltaTravel} min travel`;
      const ratingText = `${deltaRating >= 0 ? '+' : ''}${deltaRating.toFixed(1)} rating`;
      const costText = deltaCost < 0
        ? `${Math.abs(deltaCost).toFixed(1)} cost-rank cheaper`
        : (deltaCost > 0 ? `${deltaCost.toFixed(1)} cost-rank pricier` : 'same cost profile');
      return `${travelText} for ${ratingText}; ${costText}.`;
    }

    function buildOptimizedRoutePlan(selected, options) {
      const variants = buildRouteVariantCandidates(selected).map(variant => {
        const analysis = analyzeRoutePlan(variant.route, options);
        return {
          ...variant,
          analysis,
          utilityScore: scoreRouteVariant(analysis)
        };
      });
      variants.sort((a, b) => b.utilityScore - a.utilityScore);

      const primary = variants[0] || null;
      if (!primary) return { primary: null, variants: [] };

      const budgetAlt = variants.find(v => v.role === 'budget-alt' && v.id !== primary.id) || null;
      const qualityAlt = variants.find(v => v.role === 'quality-alt' && v.id !== primary.id) || null;

      const annotated = variants.map(variant => {
        const tradeoff = variant.id === primary.id
          ? 'Baseline route optimized for score and feasibility.'
          : buildRouteTradeoffSentence(primary.analysis, variant.analysis);
        return {
          ...variant,
          tradeoff,
          isBudgetAlt: Boolean(budgetAlt && budgetAlt.id === variant.id),
          isQualityAlt: Boolean(qualityAlt && qualityAlt.id === variant.id)
        };
      });

      return {
        primary,
        variants: annotated,
        budgetAlt,
        qualityAlt
      };
    }

    function buildOptimizedPlanFromCurrentSelection(options) {
      const shortlistIds = Array.from(getShortlistSet());
      const selected = shortlistIds.map(id => findLocationById(id)).filter(Boolean);
      if (selected.length < 2) return null;
      return buildOptimizedRoutePlan(selected, options);
    }

        return;
      }

        </div>
        <div class="loc-route-tradeoff-note" data-route-tradeoff>${escHtml(plan.variants.find(v => v.id !== primary.id)?.tradeoff || 'Tradeoff data unavailable.')}</div>
        <div class="loc-route-tradeoff-note" data-budget-alt-route>${plan.budgetAlt ? `Budget-friendly alternate: ${escHtml(plan.budgetAlt.tradeoff)}` : 'Budget-friendly alternate route not available for this selection.'}</div>
        <div class="loc-route-variant-grid">

              <div class="loc-route-variant-tradeoff">${escHtml(variant.tradeoff)}</div>
              <button type="button" class="loc-route-variant-btn" onclick="applyOptimizedRouteVariant('${escAttr(variant.id)}')">Use this route</button>
            </div>

    }

    function renderPlannedRoute(route, analysis, optimizedPlan, activeVariantId) {
      if (!Array.isArray(route) || !route.length) return;
      lastBuiltDayPlanRoute = route.map(toRouteStopDescriptor);
      document.getElementById('locDayPlan').classList.add('visible');
      document.getElementById('locTimeWindow').style.display = 'block';
      renderRoutePlanSummary(analysis);
      document.getElementById('locDayPlanList').innerHTML = route
        .map((loc, index) => {
          const stopDuration = parseDurationMinutes(locVal(loc, 6, 'duration'));
          const nextLeg = index < route.length - 1 ? estimateTravelMinutesBetweenStops(loc, route[index + 1]) : 0;
          return `<li>${escHtml(locVal(loc, 0, 'name') || 'Location')} <span class="u-note-muted">· stop ${escHtml(formatMinutesCompact(stopDuration))}${nextLeg ? ` · next leg ${escHtml(formatMinutesCompact(nextLeg))}` : ''}</span></li>`;
        })
        .join('');
      renderRouteQualityPanel(analysis);
      renderRouteTradeoffPanel(optimizedPlan, activeVariantId);
      updateVariantExportButton();
      updateRouteButtonsState();
    }

    function applyOptimizedRouteVariant(variantId) {
      const selectedId = String(variantId || '').trim();
      if (!selectedId || !Array.isArray(lastOptimizedRouteVariants) || !lastOptimizedRouteVariants.length) return;
      const selectedVariant = lastOptimizedRouteVariants.find(variant => variant.id === selectedId);
      if (!selectedVariant) return;

      activeOptimizedVariantId = selectedVariant.id;
      const optimizedPlan = {
        primary: lastOptimizedRouteVariants[0],
        variants: lastOptimizedRouteVariants,
        budgetAlt: lastOptimizedRouteVariants.find(v => v.isBudgetAlt) || null,
        qualityAlt: lastOptimizedRouteVariants.find(v => v.isQualityAlt) || null
      };
      renderPlannedRoute(selectedVariant.route, selectedVariant.analysis, optimizedPlan, activeOptimizedVariantId);
      showRouteToast(`Applied route: ${selectedVariant.label}`, false);
    }

    function applyOptimizerWeightsFromControls() {
      const weights = getOptimizerWeightsFromControls();
      optimizerWeights = { ...weights };
      const options = {
        startTime: document.getElementById('locTimeStart')?.value || '09:00',
        endTime: document.getElementById('locTimeEnd')?.value || '17:00',
        perStopMinutes: parseInt(document.getElementById('locTimePerStop')?.value, 10) || 60
      };
      const plan = buildOptimizedPlanFromCurrentSelection(options);
      if (!plan || !plan.primary) {
        showRouteToast('Select at least 2 locations to tune optimizer weights.', true);
        return;
      }
      const prevActive = activeOptimizedVariantId;
      lastOptimizedRouteVariants = plan.variants;
      activeOptimizedVariantId = plan.variants.some(variant => variant.id === prevActive) ? prevActive : plan.primary.id;
      const activeVariant = plan.variants.find(variant => variant.id === activeOptimizedVariantId) || plan.primary;
      renderPlannedRoute(activeVariant.route, activeVariant.analysis, plan, activeOptimizedVariantId);
      showRouteToast(`Optimizer weights updated (R${weights.rating}/C${weights.cost}/T${weights.travel}).`, false);
    }

      const variants = Array.isArray(lastOptimizedRouteVariants) ? lastOptimizedRouteVariants : [];
      const active = variants.find(variant => variant.id === activeOptimizedVariantId) || variants[0];
      if (!active) {
        showRouteToast('Build a route first to export a variant.', true);
        return;
      }
      const payload = {
        exportedAt: new Date().toISOString(),
        cityKey: currentCityKey || '',
        variantId: active.id,
        variantLabel: active.label,

        analysis: {
          itineraryScore: active.analysis.itineraryScore,
          confidence: active.analysis.confidenceLabel,

          stopMinutes: active.analysis.stopMinutes,
          totalRequiredMinutes: active.analysis.totalRequiredMinutes
        },
        route: active.route.map(toRouteStopDescriptor)
      };

    function getLocationConfidenceModel(loc) {
      const rating = parseFloat(locVal(loc, 13, 'rating'));
      const hours = String(locVal(loc, 5, 'hours') || '').trim();
      const address = String(locVal(loc, 11, 'address') || '').trim();
      const description = String(locVal(loc, 16, 'description') || '').trim();
      const driveMins = parseDriveMinutes(locVal(loc, 4, 'driveTime'));
      const website = String(locVal(loc, 2, 'website') || '').trim();
      const googleUrl = String(locVal(loc, 23, 'googleUrl') || '').trim();
      const lat = parseFloat(locVal(loc, 25, 'latitude') || locVal(loc, 26, 'lat') || loc.latitude || loc.lat);
      const lng = parseFloat(locVal(loc, 26, 'longitude') || locVal(loc, 27, 'lng') || loc.longitude || loc.lng);

      let score = 0;
      if (Number.isFinite(rating) && rating > 0) score += 2;
      if (hours) score += 1;
      if (address) score += 1;
      if (description.length >= 40) score += 1;
      if (website || googleUrl) score += 1;
      if (Number.isFinite(lat) && Number.isFinite(lng)) score += 1;
      if (Number.isFinite(driveMins)) score += 1;

      if (score >= 7) {
        return {
          level: 'high',
          label: 'High confidence',
          reason: 'Strong coverage across ratings, hours, address, links, and map data.'
        };
      }
      if (score >= 4) {
        return {
          level: 'medium',
          label: 'Medium confidence',
          reason: 'Useful listing, but some planning details are still limited.'
        };
      }
      return {
        level: 'low',
        label: 'Low confidence',
        reason: 'Only partial planning data is available for this location.'
      };
    }

    function buildRankBadgeIndexForCity(cityEntry) {
      const index = {};
      const locations = (cityEntry && Array.isArray(cityEntry.locations))
        ? cityEntry.locations.filter(locationMatchesPrefilter)
        : [];
      const rankingDefinitions = [
        {
          key: 'best-value',
          label: 'Best value',
          icon: '💎',
          className: 'best-value',
          scoreFor: item => getLocationBestValueScore(item),
          order: 'desc'
        },
        {
          key: 'most-unique',
          label: 'Unique pick',
          icon: '✨',
          className: 'most-unique',
          scoreFor: item => getLocationMostUniqueScore(item, cityEntry),
          order: 'desc'
        },
        {
          key: 'quick-stop',
          label: 'Quick stop',
          icon: '⚡',
          className: 'quick-stop',
          scoreFor: item => parseDriveMinutes(locVal(item, 4, 'driveTime')),
          order: 'asc'
        }
      ];

      rankingDefinitions.forEach((definition) => {
        const ranked = locations
          .map(item => ({ id: getLocId(item), score: definition.scoreFor(item) }))
          .filter(item => Number.isFinite(item.score))
          .sort((a, b) => definition.order === 'asc' ? a.score - b.score : b.score - a.score)
          .slice(0, 2);

        ranked.forEach((row, rankIdx) => {
          index[row.id] = index[row.id] || [];
          index[row.id].push({
            key: definition.key,
            label: `${definition.icon} ${definition.label} #${rankIdx + 1}`,
            className: definition.className
          });
        });
      });

      return index;
    }

      const locId = getLocId(loc);
      const badges = Array.isArray(lastRankBadgeIndex[locId]) ? lastRankBadgeIndex[locId].slice(0, 2) : [];

    function ensureCityMapsApiLoaded() {
      if (window.__cvMapsReady) return Promise.resolve(true);
      if (window.__cvMapsLoadPromise) return window.__cvMapsLoadPromise;

      window.__cvMapsLoadPromise = new Promise((resolve, reject) => {
        window.__cvMapsQueue = window.__cvMapsQueue || [];
        window.__cvMapsQueue.push(() => resolve(true));

        if (window.__cvMapsScriptRequested) return;
        window.__cvMapsScriptRequested = true;

        const apiKey = 'AIzaSyCwkOvyiQyJkiaCWkZUEP2PJGaWhk-HYXc';
        const script = document.createElement('script');
        script.async = true;
        script.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&libraries=places,geometry&callback=__cvMapsInit`;
        script.onerror = () => {
          window.__cvMapsLoadPromise = null;
          reject(new Error('Google Maps failed to load.'));
        };
        document.head.appendChild(script);
      });

      return window.__cvMapsLoadPromise;
    }

    function toggleSplitView() {
      setSplitView(!locSplitView);
      saveLastLocState();

      if (locSplitView) {
        ensureCityMapsApiLoaded().then(() => {
          if (locSplitView) renderLocMap(lastFilteredLocations);
        }).catch((error) => {
          console.warn('⚠️ Maps API load failed; using fallback map renderer.', error && error.message ? error.message : error);
        });
      }

      // Wait two animation frames so the browser finishes the CSS layout change
      // before we measure the map container or initialise Google Maps.
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          if (locSplitView && !window.__cvMapsReady) {
            // Maps API still loading – queue a retry for when it arrives
            window.__cvMapsQueue = window.__cvMapsQueue || [];
            window.__cvMapsQueue.push(() => {
              if (locSplitView) renderLocMap(lastFilteredLocations);
            });
            // Still render now so the canvas fallback shows something immediately
          }
          renderLocMap(lastFilteredLocations);
        });
      });
      updateUrlFromState();
    }

    function findLocationById(locId) {
      const cityEntry = citiesData[currentCityKey];
      if (!cityEntry) return null;

    function getLocPoint(loc, locId) {
      if (locPointCache[locId]) return locPointCache[locId];
      const latRaw = locVal(loc, 25, 'latitude') || locVal(loc, 26, 'lat') || loc.latitude || loc.lat;
      const lngRaw = locVal(loc, 26, 'longitude') || locVal(loc, 27, 'lng') || loc.longitude || loc.lng;
      const lat = parseFloat(latRaw);
      const lng = parseFloat(lngRaw);
      if (Number.isFinite(lat) && Number.isFinite(lng)) {
        locPointCache[locId] = { x: lng, y: lat, geo: true };
        return locPointCache[locId];
      }
      let hash = 0;
      for (let i = 0; i < locId.length; i++) hash = (hash * 31 + locId.charCodeAt(i)) | 0;
      const x = 10 + Math.abs(hash % 80);
      const y = 10 + Math.abs((hash >> 8) % 80);
      locPointCache[locId] = { x, y, geo: false };
      return locPointCache[locId];
    }

    function renderLocMap(locations) {
      const canvas = document.getElementById('locMapCanvas');
      const count = document.getElementById('locMapCount');
      if (!canvas || !count) return;
      count.textContent = `${locations.length} pins`;
      // Only clear canvas when Google Maps is NOT mounted – clearing the Google Maps
      // container destroys its tile DOM and makes the map go blank.
      if (!locGoogleMap) {
        canvas.innerHTML = '';
      } else if (!canvas.querySelector('.gm-style')) {
        // Google Maps DOM was removed externally – reset so next call re-initialises
        locGoogleMap = null;
        locGoogleMarkers = [];
        canvas.innerHTML = '';
      }
       if (!locSplitView || locations.length === 0) return;

       const points = locations.map(loc => {
         const locId = getLocId(loc);
         return { locId, loc, point: getLocPoint(loc, locId), name: String(locVal(loc, 0, 'name') || 'Location') };
       });

      if (renderGoogleMap(points)) return;
      if (renderMapboxMap(points)) return;
      renderCanvasMap(points);
    }

    function renderGoogleMap(points) {
      // Need the full Google Maps library, not just the namespace stub.
      // The bootstrap loader creates window.google.maps but NOT Map/Marker/etc.
      // Those are only available after __cvMapsInit fires (traditional load callback).
      if (!window.__cvMapsReady) return false;
      if (!(window.google && window.google.maps && window.google.maps.Map)) return false;
      const geoPoints = points.filter(p => p.point.geo);
      if (!geoPoints.length) return false;

      const canvas = document.getElementById('locMapCanvas');
      const center = { lat: geoPoints[0].point.y, lng: geoPoints[0].point.x };

      if (!locGoogleMap) {
        // First render: clear any placeholder content then create the map
        canvas.innerHTML = '';
        locGoogleMap = new window.google.maps.Map(canvas, {
          zoom: 10,
          center,
          mapTypeControl: false,
          streetViewControl: false,
          fullscreenControl: false
        });
      } else {
        // Map already initialised – trigger resize so tiles fill the now-visible container
        window.google.maps.event.trigger(locGoogleMap, 'resize');
        locGoogleMap.setCenter(center);
      }

      locGoogleMarkers.forEach(m => m.setMap(null));
      locGoogleMarkers = [];

      geoPoints.forEach(item => {
        const marker = new window.google.maps.Marker({
          map: locGoogleMap,
          position: { lat: item.point.y, lng: item.point.x },
          title: item.name
        });
        marker.__locId = item.locId;
        marker.addListener('click', () => setActiveLocation(item.locId, true));
        locGoogleMarkers.push(marker);
      });

      const bounds = new window.google.maps.LatLngBounds();
      geoPoints.forEach(item => bounds.extend({ lat: item.point.y, lng: item.point.x }));
      if (geoPoints.length > 1) locGoogleMap.fitBounds(bounds);
      updateMapHighlights();
      return true;
    }

    function renderMapboxMap(points) {
      if (!window.mapboxgl) return false;
      if (!window.mapboxgl.accessToken && !window.MAPBOX_TOKEN) return false;
      if (!window.mapboxgl.accessToken && window.MAPBOX_TOKEN) {
        window.mapboxgl.accessToken = window.MAPBOX_TOKEN;
      }

      const geoPoints = points.filter(p => p.point.geo);
      if (!geoPoints.length) return false;

      const canvas = document.getElementById('locMapCanvas');
      if (!locMapboxMap) {
        canvas.innerHTML = '';
        locMapboxMap = new window.mapboxgl.Map({
          container: 'locMapCanvas',
          style: 'mapbox://styles/mapbox/streets-v12',
          center: [geoPoints[0].point.x, geoPoints[0].point.y],
          zoom: 9
        });
      }

      locMapboxMarkers.forEach(m => m.remove());
      locMapboxMarkers = [];

      geoPoints.forEach(item => {
        const el = document.createElement('button');
        el.className = 'map-pin';
        el.dataset.locId = item.locId;
        el.type = 'button';
        el.title = item.name;
        el.textContent = '•';
        el.onclick = () => setActiveLocation(item.locId, true);

        const marker = new window.mapboxgl.Marker(el)
          .setLngLat([item.point.x, item.point.y])
          .addTo(locMapboxMap);

        marker.__locId = item.locId;
        locMapboxMarkers.push(marker);
      });

      if (geoPoints.length > 1) {
        const bounds = new window.mapboxgl.LngLatBounds();
        geoPoints.forEach(item => bounds.extend([item.point.x, item.point.y]));
        locMapboxMap.fitBounds(bounds, { padding: 32 });
      }
      updateMapHighlights();
      return true;
    }

    function renderCanvasMap(points) {
      const canvas = document.getElementById('locMapCanvas');
      canvas.innerHTML = '';

      const geoPoints = points.filter(p => p.point.geo);
       const minX = geoPoints.length ? Math.min(...geoPoints.map(p => p.point.x)) : 0;
       const maxX = geoPoints.length ? Math.max(...geoPoints.map(p => p.point.x)) : 100;
       const minY = geoPoints.length ? Math.min(...geoPoints.map(p => p.point.y)) : 0;
       const maxY = geoPoints.length ? Math.max(...geoPoints.map(p => p.point.y)) : 100;
       const xRange = Math.max(0.001, maxX - minX);
       const yRange = Math.max(0.001, maxY - minY);

       points.forEach((item, idx) => {
         const pin = document.createElement('button');
         pin.className = 'map-pin';
         pin.type = 'button';
         pin.dataset.locId = item.locId;
         pin.title = item.name;
         pin.textContent = String((idx % 9) + 1);
         const left = item.point.geo ? (5 + ((item.point.x - minX) / xRange) * 90) : item.point.x;
         const top = item.point.geo ? (95 - ((item.point.y - minY) / yRange) * 90) : item.point.y;
         pin.style.left = `${left}%`;
         pin.style.top = `${top}%`;
         pin.onclick = () => setActiveLocation(item.locId, true);
         canvas.appendChild(pin);
       });
      highlightActiveLocation();
      updateMapHighlights();
     }

    function highlightActiveLocation() {
