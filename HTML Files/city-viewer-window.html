<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>City Viewer - Kyle's Adventure Finder</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
      color: #1f2937;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 4px;
    }

    .header-subtitle {
      font-size: 14px;
      opacity: 0.9;
    }

    .close-btn {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 24px;
      transition: all 0.2s;
    }

    .close-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
    }

    .search-box:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .sort-btn {
      padding: 12px 16px;
      background: white;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }

    .sort-btn:hover {
      border-color: #667eea;
      color: #667eea;
    }

    .sort-btn.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .city-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .city-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
    }

    .city-card:hover {
      border-color: #667eea;
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.15);
      transform: translateY(-4px);
    }

    .city-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .city-state {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 12px;
    }

    .city-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .stat {
      background: #f3f4f6;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
    }

    .stat-label {
      color: #6b7280;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: #667eea;
    }

    .city-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      margin-top: auto;
    }

    .city-btn:hover {
      background: #5568d3;
      transform: translateY(-2px);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #6b7280;
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .empty-state-text {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      font-size: 16px;
      color: #6b7280;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #e5e7eb;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Locations Page ─────────────────────────────────── */
    #locationsPage {
      display: none;
    }

    .locations-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 24px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .back-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .back-btn:hover { background: rgba(255,255,255,0.35); }

    .locations-title {
      flex: 1;
      min-width: 0;
    }
    .locations-title h2 { font-size: 22px; margin: 0 0 2px 0; }
    .locations-title .subtitle { font-size: 13px; opacity: 0.85; }

    /* Filter/Sort Panel */
    .locations-controls {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 16px;
    }

    .locations-controls-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .loc-filter-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .loc-filter-item label {
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .loc-filter-input,
    .loc-filter-select {
      padding: 9px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 13px;
      color: #374151;
      background: white;
      width: 100%;
    }
    .loc-filter-input:focus,
    .loc-filter-select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.12);
    }

    /* Quick tag filters */
    .loc-quick-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .loc-tag-btn {
      padding: 6px 14px;
      border-radius: 999px;
      border: 2px solid #e5e7eb;
      background: white;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: #374151;
    }
    .loc-tag-btn:hover {
      border-color: #667eea;
      color: #667eea;
    }
    .loc-tag-btn.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-color: transparent;
      color: white;
    }

    /* Sort + results row */
    .loc-sort-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: 10px 0 0 0;
      border-top: 1px solid #f3f4f6;
      margin-top: 14px;
    }
    .loc-sort-label { font-size: 12px; color: #6b7280; font-weight: 600; }
    .loc-sort-select {
      padding: 7px 10px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 13px;
      background: white;
      cursor: pointer;
    }
    .loc-sort-order-btn {
      width: 34px;
      height: 34px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .loc-sort-order-btn:hover { border-color: #667eea; background: #f0f4ff; }
    .loc-results-count {
      margin-left: auto;
      font-size: 13px;
      color: #6b7280;
      font-weight: 600;
    }
    .loc-reset-btn {
      padding: 7px 14px;
      background: white;
      border: 1px solid #fca5a5;
      color: #dc2626;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      transition: all 0.2s;
    }
    .loc-reset-btn:hover { background: #fef2f2; }

    /* Location Cards */
    .locations-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .loc-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 18px 20px;
      transition: all 0.2s;
    }
    .loc-card:hover {
      border-color: #667eea;
      box-shadow: 0 6px 20px rgba(102,126,234,0.15);
      transform: translateY(-2px);
    }
    .loc-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .loc-card-name {
      font-size: 16px;
      font-weight: 700;
      color: #1f2937;
      flex: 1;
    }
    .loc-card-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .loc-meta-badge {
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      background: #f3f4f6;
      color: #374151;
    }
    .loc-meta-badge.difficulty-easy   { background: #dcfce7; color: #166534; }
    .loc-meta-badge.difficulty-moderate { background: #fef9c3; color: #854d0e; }
    .loc-meta-badge.difficulty-hard   { background: #fee2e2; color: #991b1b; }
    .loc-meta-badge.cost              { background: #ecfdf5; color: #065f46; }
    .loc-meta-badge.rating            { background: #fffbeb; color: #92400e; }

    .loc-card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 10px;
    }
    .loc-tag-pill {
      background: #dbeafe;
      color: #1e40af;
      padding: 3px 9px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
    }

    .loc-card-details {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 6px;
      font-size: 13px;
      color: #6b7280;
    }
    .loc-detail-row { display: flex; gap: 6px; align-items: baseline; }
    .loc-detail-icon { width: 16px; flex-shrink: 0; }
    .loc-detail-value { color: #374151; }

    .loc-card-description {
      font-size: 13px;
      color: #6b7280;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #f3f4f6;
      line-height: 1.5;
    }

    .loc-card-footer {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #f3f4f6;
    }
    .loc-action-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      background: white;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: #374151;
      text-decoration: none;
    }
    .loc-action-btn:hover { border-color: #667eea; color: #667eea; background: #f0f4ff; }
    .loc-action-btn.primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-color: transparent;
    }
    .loc-action-btn.primary:hover { opacity: 0.9; }

    .loc-empty {
      text-align: center;
      padding: 60px 20px;
      color: #9ca3af;
    }
    .loc-empty-icon { font-size: 56px; margin-bottom: 12px; }
    .loc-empty-text { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: #6b7280; }

    /* Presets, shortlist, map split */
    .loc-presets-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid #f3f4f6;
    }
    .loc-preset-input,
    .loc-preset-select {
      padding: 7px 10px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 12px;
      min-width: 140px;
      background: white;
    }
    .loc-mini-btn {
      padding: 7px 10px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      background: white;
      cursor: pointer;
    }
    .loc-mini-btn:hover { border-color: #667eea; color: #667eea; }
    .loc-mini-btn.success { border-color: #86efac; color: #166534; }

    .loc-check-row {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .loc-check {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #4b5563;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
    }
    .loc-check input { cursor: pointer; }

    .loc-main-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      align-items: start;
    }
    .loc-main-layout.split {
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr);
    }

    .loc-map-panel {
      display: none;
      position: sticky;
      top: 12px;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
    }
    .loc-main-layout.split .loc-map-panel { display: block; }

    .loc-map-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid #f3f4f6;
      font-size: 12px;
      color: #6b7280;
      font-weight: 600;
    }
    .loc-map-canvas {
      height: 460px;
      position: relative;
      background:
        radial-gradient(circle at 30% 20%, rgba(99, 102, 241, 0.15), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(16, 185, 129, 0.12), transparent 35%),
        linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
    }
    .map-pin {
      position: absolute;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      border: 2px solid white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      transform: translate(-50%, -50%);
      background: #667eea;
      color: white;
      font-size: 11px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .map-pin.active,
    .map-pin:hover {
      background: #ef4444;
      transform: translate(-50%, -50%) scale(1.12);
      z-index: 3;
    }

    .loc-shortlist-tray {
      position: sticky;
      bottom: 10px;
      background: #111827;
      color: white;
      border-radius: 12px;
      padding: 12px;
      margin-top: 14px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    }
    .loc-shortlist-top {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .loc-shortlist-count {
      font-size: 12px;
      font-weight: 700;
      color: #c7d2fe;
      margin-right: auto;
    }
    .loc-shortlist-chip-wrap { display: flex; gap: 6px; flex-wrap: wrap; }
    .loc-shortlist-chip {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.24);
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      cursor: pointer;
    }
    .loc-day-plan {
      margin-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.2);
      padding-top: 10px;
      display: none;
    }
    .loc-day-plan.visible { display: block; }
    .loc-day-plan-list {
      margin: 6px 0 0 16px;
      font-size: 12px;
      line-height: 1.45;
      color: #e5e7eb;
    }
    .loc-select-btn.active {
      background: #1d4ed8;
      color: white;
      border-color: #1d4ed8;
    }
    .loc-card.active {
      border-color: #ef4444;
      box-shadow: 0 6px 20px rgba(239, 68, 68, 0.18);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>🌆 City Viewer</h1>
        <div class="header-subtitle">Explore adventures grouped by city</div>
      </div>
      <button class="close-btn" onclick="window.close()" title="Close this window">✕</button>
    </div>

    <div class="controls">
      <input type="text" class="search-box" id="searchBox" placeholder="Search cities..." onkeyup="filterCities()">
      <button class="sort-btn" id="sortByNameBtn" onclick="sortBy('name')">Sort A-Z</button>
      <button class="sort-btn active" id="sortByCountBtn" onclick="sortBy('count')">Sort by Count</button>
      <button class="sort-btn" id="sortByDistanceBtn" onclick="sortBy('distance')" title="Sort by drive time (requires location permission)">🚗 Sort by Drive Time</button>
      <button class="sort-btn" id="getLocationBtn" onclick="enableDriveTimes()" title="Get your location to show drive times">📍 Show My Drive Times</button>
    </div>

    <div id="cityGrid" class="city-grid">
      <div class="loading">
        <span class="spinner"></span> Loading cities...
      </div>
    </div>

    <!-- ══ LOCATIONS PAGE (shown when a city card is clicked) ══ -->
    <div id="locationsPage">

      <!-- Header with back button -->
      <div class="locations-header">
        <button class="back-btn" onclick="goBackToCities()">← Back</button>
        <div class="locations-title">
          <h2 id="locationsPageTitle">Locations</h2>
          <div class="subtitle" id="locationsPageSubtitle"></div>
        </div>
      </div>

      <!-- Filter & Sort Controls (mirrors Adventure Planner) -->
      <div class="locations-controls">
        <div class="loc-presets-row">
          <input id="locPresetName" class="loc-preset-input" type="text" placeholder="Preset name...">
          <button class="loc-mini-btn" onclick="saveLocPreset()">Save Preset</button>
          <select id="locPresetSelect" class="loc-preset-select"></select>
          <button class="loc-mini-btn" onclick="loadSelectedLocPreset()">Load</button>
          <button class="loc-mini-btn" onclick="deleteSelectedLocPreset()">Delete</button>
          <button id="copyShareBtn" class="loc-mini-btn" onclick="copyShareLink()">Copy Share Link</button>
        </div>
        <div class="loc-check-row">
          <label class="loc-check"><input id="locFilterOpenNow" type="checkbox" onchange="applyLocFilters()"> Open now</label>
          <label class="loc-check"><input id="locFilterClosingSoon" type="checkbox" onchange="applyLocFilters()"> Closing within 2h</label>
        </div>
         <div class="locations-controls-grid">
          <div class="loc-filter-item">
            <label for="locSearchName">Search by Name</label>
            <input id="locSearchName" class="loc-filter-input" type="text" placeholder="Search locations..." oninput="applyLocFilters()">
          </div>
          <div class="loc-filter-item">
            <label for="locFilterDifficulty">Difficulty</label>
            <select id="locFilterDifficulty" class="loc-filter-select" onchange="applyLocFilters()">
              <option value="">Any Difficulty</option>
              <option value="easy">Easy</option>
              <option value="moderate">Moderate</option>
              <option value="hard">Hard</option>
            </select>
          </div>
          <div class="loc-filter-item">
            <label for="locFilterCost">Cost</label>
            <select id="locFilterCost" class="loc-filter-select" onchange="applyLocFilters()">
              <option value="">Any Cost</option>
              <option value="free">Free</option>
              <option value="$">$</option>
              <option value="$$">$$</option>
              <option value="$$$">$$$</option>
            </select>
          </div>
          <div class="loc-filter-item">
            <label for="locFilterTag">Filter by Tag</label>
            <input id="locFilterTag" class="loc-filter-input" type="text" placeholder="e.g. hiking, restaurant…" list="locTagDatalist" oninput="applyLocFilters()">
            <datalist id="locTagDatalist"></datalist>
          </div>
        </div>

        <!-- Quick Tag Buttons (populated dynamically) -->
        <div id="locQuickTags" class="loc-quick-tags"></div>

        <!-- Sort Row -->
        <div class="loc-sort-row">
          <span class="loc-sort-label">Sort by:</span>
          <select id="locSortBy" class="loc-sort-select" onchange="applyLocFilters()">
            <option value="name">Name</option>
            <option value="difficulty">Difficulty</option>
            <option value="cost">Cost</option>
            <option value="rating">Rating</option>
            <option value="tags">Tags</option>
          </select>
          <button id="locSortOrderBtn" class="loc-sort-order-btn" title="Toggle sort order" onclick="toggleLocSortOrder()">↑</button>
          <button class="loc-mini-btn" id="locSplitToggleBtn" onclick="toggleSplitView()">Show Map</button>
           <button class="loc-reset-btn" onclick="resetLocFilters()">Reset Filters</button>
           <div class="loc-results-count" id="locResultsCount">0 locations</div>
         </div>
       </div>

      <div id="locMainLayout" class="loc-main-layout">
        <div id="locationsGrid" class="locations-grid"></div>
        <aside class="loc-map-panel" id="locMapPanel">
          <div class="loc-map-header">
            <span>Map Pins (synced with list)</span>
            <span id="locMapCount">0 pins</span>
          </div>
          <div id="locMapCanvas" class="loc-map-canvas"></div>
        </aside>
      </div>

      <div class="loc-shortlist-tray" id="locShortlistTray" style="display:none;">
        <div class="loc-shortlist-top">
          <div id="locShortlistCount" class="loc-shortlist-count">0 selected</div>
          <button class="loc-mini-btn" onclick="buildDayPlan()">Build Day Plan</button>
          <button class="loc-mini-btn" onclick="clearShortlist()">Clear</button>
        </div>
        <div id="locShortlistChips" class="loc-shortlist-chip-wrap"></div>
        <div id="locDayPlan" class="loc-day-plan">
          <div style="font-size:12px; font-weight:700; margin-bottom:4px;">Suggested Route</div>
          <div id="locDayPlanSummary" style="font-size:12px; color:#cbd5e1;"></div>
          <ol id="locDayPlanList" class="loc-day-plan-list"></ol>
        </div>
      </div>
    </div>

  </div><!-- /.container -->

  <script>
    // Get data from sessionStorage (cached from parent window) or fallback to parent window
    let adventuresData = [];
    let citiesData = {};
    let currentSort = 'count';

    // Helper function to load data from sessionStorage
    function loadCityViewerData() {
      try {
        // First, try to get data from the cached key passed in the URL
        const urlParams = new URLSearchParams(window.location.search);
        const dataKey = urlParams.get('dataKey');
        const corrId = urlParams.get('corrId');

        console.log(`🔗 City Viewer loaded with corrId=${corrId}, dataKey=${dataKey}`);

        if (dataKey) {
          const cachedData = window.sessionStorage.getItem(dataKey);
          if (cachedData) {
            try {
              const payload = JSON.parse(cachedData);
              if (Array.isArray(payload.adventuresData)) {
                adventuresData = payload.adventuresData;
                console.log(`✅ Loaded ${adventuresData.length} adventures from sessionStorage`);
                return true;
              }
            } catch (e) {
              console.warn('⚠️ Failed to parse cached data:', e);
            }
          }
        }

        // Fallback: Try to get latest cached data
        const latestKey = window.sessionStorage.getItem('city_viewer_data_latest');
        if (latestKey) {
          const cachedData = window.sessionStorage.getItem(latestKey);
          if (cachedData) {
            try {
              const payload = JSON.parse(cachedData);
              if (Array.isArray(payload.adventuresData)) {
                adventuresData = payload.adventuresData;
                console.log(`✅ Loaded ${adventuresData.length} adventures from latest cache`);
                return true;
              }
            } catch (e) {
              console.warn('⚠️ Failed to parse latest cache:', e);
            }
          }
        }

        // Fallback: Try to get from parent window (for popup windows)
        const parentWindow = window.opener || window;
        if (parentWindow && Array.isArray(parentWindow.adventuresData)) {
          adventuresData = parentWindow.adventuresData;
          console.log(`✅ Loaded ${adventuresData.length} adventures from parent window`);
          return true;
        }

        return false;
      } catch (error) {
        console.error('❌ Error loading city viewer data:', error);
        return false;
      }
    }

    // Initialize city viewer
    function init() {
      // Load data from sessionStorage or parent window
      if (!loadCityViewerData()) {
        console.error('❌ Failed to load adventure data');
        const grid = document.getElementById('cityGrid');
        grid.innerHTML = `
          <div class="empty-state" style="grid-column: 1 / -1;">
            <div class="empty-state-icon">❌</div>
            <div class="empty-state-text">Error loading data</div>
            <div style="font-size: 14px; color: #9ca3af;">Could not load adventure data. Please ensure you have data loaded in the main window.</div>
          </div>
        `;
        return;
      }

      console.log('🌆 City Viewer initializing with', adventuresData.length, 'adventures');

      // Group by city
      adventuresData.forEach(adventure => {
        const city = adventure.city || (adventure.values && adventure.values[0][10]);
        const state = adventure.state || (adventure.values && adventure.values[0][9]);

        if (city && state) {
          const key = `${city}, ${state}`;
          if (!citiesData[key]) {
            citiesData[key] = {
              city: city,
              state: state,
              count: 0,
              locations: []
            };
          }
          citiesData[key].count++;
          citiesData[key].locations.push(adventure);
        }
      });

      console.log('✅ Grouped into', Object.keys(citiesData).length, 'cities');

      pendingShareState = parseShareStateFromUrl();
       renderCities();

      if (pendingShareState && pendingShareState.cityKey) {
        const [city, state] = String(pendingShareState.cityKey).split(',').map(s => s && s.trim());
        if (city && state && citiesData[pendingShareState.cityKey]) {
          viewCity(city, state);
        }
      }
     }


    function renderCities() {
      const grid = document.getElementById('cityGrid');

      if (Object.keys(citiesData).length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column: 1 / -1;">
            <div class="empty-state-icon">🏙️</div>
            <div class="empty-state-text">No cities found</div>
            <div style="font-size: 14px; color: #9ca3af;">Load adventure data in the main window to see cities here</div>
          </div>
        `;
        return;
      }

      let citiesArray = Object.values(citiesData);

      // Sort
      if (currentSort === 'name') {
        citiesArray.sort((a, b) => a.city.localeCompare(b.city));
      } else if (currentSort === 'count') {
        citiesArray.sort((a, b) => b.count - a.count);
      } else if (currentSort === 'distance') {
        citiesArray.sort((a, b) => (a.distance || Infinity) - (b.distance || Infinity));
      }

      // Filter
      const searchTerm = document.getElementById('searchBox')?.value?.toLowerCase() || '';
      if (searchTerm) {
        citiesArray = citiesArray.filter(c =>
          c.city.toLowerCase().includes(searchTerm) ||
          c.state.toLowerCase().includes(searchTerm)
        );
      }

      grid.innerHTML = citiesArray.map(city => {
        const driveTimeHtml = city.distance !== undefined
          ? `<div style="font-size: 13px; color: #0891b2; font-weight: 600; margin-top: 8px; padding-top: 8px; border-top: 1px solid #e5e7eb;">🚗 ${city.driveTime || 'calculating...'}</div>`
          : '';

        return `
          <div class="city-card" onclick="viewCity('${city.city}', '${city.state}')">
            <div class="city-name">${city.city}</div>
            <div class="city-state">${city.state}</div>
            <div class="city-stats">
              <div class="stat">
                <div class="stat-label">📍 Locations</div>
                <div class="stat-value">${city.count}</div>
              </div>
            </div>
            ${driveTimeHtml}
            <button class="city-btn">View Locations</button>
          </div>
        `;
      }).join('');
    }

    function filterCities() {
      renderCities();
    }

    function sortBy(type) {
      currentSort = type;
      document.getElementById('sortByNameBtn').classList.toggle('active', type === 'name');
      document.getElementById('sortByCountBtn').classList.toggle('active', type === 'count');
      document.getElementById('sortByDistanceBtn').classList.toggle('active', type === 'distance');
      renderCities();
    }

    /**
     * Enable drive time calculations
     */
    async function enableDriveTimes() {
      console.log('📍 Getting user location...');

      const btn = document.getElementById('getLocationBtn');
      btn.disabled = true;
      btn.textContent = '📍 Getting location...';

      try {
        if (!navigator.geolocation) {
          throw new Error('Geolocation not supported');
        }

        navigator.geolocation.getCurrentPosition(
          (position) => {
            const userLat = position.coords.latitude;
            const userLng = position.coords.longitude;

            console.log(`✅ User location: ${userLat}, ${userLng}`);

            // Calculate distance for each city
            Object.values(citiesData).forEach(city => {
              if (city.latitude && city.longitude) {
                const cityLat = parseFloat(city.latitude);
                const cityLng = parseFloat(city.longitude);

                // Haversine formula
                const R = 3959; // miles
                const dLat = (cityLat - userLat) * Math.PI / 180;
                const dLng = (cityLng - userLng) * Math.PI / 180;
                const a =
                  Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(userLat * Math.PI / 180) * Math.cos(cityLat * Math.PI / 180) *
                  Math.sin(dLng/2) * Math.sin(dLng/2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                const distance = R * c;

                // Estimate drive time (60 mph average)
                const hours = Math.floor(distance / 60);
                const minutes = Math.round((distance / 60 - hours) * 60);

                city.distance = distance;
                city.driveTime = hours > 0
                  ? `${hours}h ${minutes}m (${distance.toFixed(1)} mi)`
                  : `${minutes}m (${distance.toFixed(1)} mi)`;
              }
            });

            console.log('✅ Drive times calculated');
            btn.disabled = false;
            btn.textContent = '✅ Drive times enabled';
            renderCities();

          },
          (error) => {
            console.error('❌ Location error:', error.message);
            btn.disabled = false;
            btn.textContent = '📍 Location failed - try again';
            alert('Could not get your location. Please check permissions.');
          }
        );
      } catch (error) {
        console.error('❌ Error:', error);
        btn.disabled = false;
        btn.textContent = '📍 Error - try again';
        alert('Error: ' + error.message);
      }
    }

    // ── Locations Page State ────────────────────────────────────────────────
    let currentCityKey = null;       // "City, State"
    let locSortOrder = 'asc';        // 'asc' | 'desc'
    let activeLocQuickTag = null;    // quick-tag pill value or null
    let locSplitView = false;
    let lastFilteredLocations = [];
    let activeLocId = null;
    const locPointCache = {};
    let pendingShareState = null;
    let locGoogleMap = null;
    let locGoogleMarkers = [];
    let locMapboxMap = null;
    let locMapboxMarkers = [];
    const CLOSING_SOON_MINUTES = 120;

    function cityStateKey(cityKey) { return `cityViewer:lastState:${cityKey}`; }
    function cityPresetKey(cityKey) { return `cityViewer:presets:${cityKey}`; }
    function cityShortlistKey(cityKey) { return `cityViewer:shortlist:${cityKey}`; }

    function getLocId(loc) {
      const placeId = String(locVal(loc, 1, 'googlePlaceId') || '').trim();
      if (placeId) return `pid:${placeId}`;
      const name = String(locVal(loc, 0, 'name') || '').trim();
      const addr = String(locVal(loc, 11, 'address') || '').trim();
      return `fallback:${name}::${addr}`;
    }

    function getLocFilterState() {
      return {
        searchName: document.getElementById('locSearchName').value,
        difficulty: document.getElementById('locFilterDifficulty').value,
        cost: document.getElementById('locFilterCost').value,
        tagText: document.getElementById('locFilterTag').value,
        openNow: document.getElementById('locFilterOpenNow').checked,
        closingSoon: document.getElementById('locFilterClosingSoon').checked,
        sortBy: document.getElementById('locSortBy').value,
        sortOrder: locSortOrder,
        quickTag: activeLocQuickTag,
        splitView: locSplitView
      };
    }

    function applyLocFilterState(state) {
      if (!state) return;
      document.getElementById('locSearchName').value = state.searchName || '';
      document.getElementById('locFilterDifficulty').value = state.difficulty || '';
      document.getElementById('locFilterCost').value = state.cost || '';
      document.getElementById('locFilterTag').value = state.tagText || '';
      document.getElementById('locFilterOpenNow').checked = Boolean(state.openNow);
      document.getElementById('locFilterClosingSoon').checked = Boolean(state.closingSoon);
      document.getElementById('locSortBy').value = state.sortBy || 'name';
      locSortOrder = state.sortOrder === 'desc' ? 'desc' : 'asc';
      document.getElementById('locSortOrderBtn').textContent = locSortOrder === 'asc' ? '↑' : '↓';
      activeLocQuickTag = state.quickTag || null;
      document.querySelectorAll('#locQuickTags .loc-tag-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tag === activeLocQuickTag);
      });
      setSplitView(Boolean(state.splitView));
    }

    function saveLastLocState() {
      if (!currentCityKey) return;
      window.localStorage.setItem(cityStateKey(currentCityKey), JSON.stringify(getLocFilterState()));
    }

    function restoreLastLocState() {
      if (!currentCityKey) return;
      try {
        const raw = window.localStorage.getItem(cityStateKey(currentCityKey));
        if (raw) applyLocFilterState(JSON.parse(raw));
      } catch (e) {
        console.warn('⚠️ Could not restore location state', e);
      }
    }

    function getPresetsForCity() {
      if (!currentCityKey) return {};
      try { return JSON.parse(window.localStorage.getItem(cityPresetKey(currentCityKey)) || '{}'); }
      catch (_) { return {}; }
    }

    function setPresetsForCity(presets) {
      if (!currentCityKey) return;
      window.localStorage.setItem(cityPresetKey(currentCityKey), JSON.stringify(presets));
      refreshPresetSelect();
    }

    function refreshPresetSelect() {
      const select = document.getElementById('locPresetSelect');
      const presets = getPresetsForCity();
      const names = Object.keys(presets).sort();
      select.innerHTML = [`<option value="">Saved presets...</option>`]
        .concat(names.map(name => `<option value="${escAttr(name)}">${escHtml(name)}</option>`))
        .join('');
    }

    function saveLocPreset() {
      const name = document.getElementById('locPresetName').value.trim();
      if (!name) return alert('Enter a preset name first.');
      const presets = getPresetsForCity();
      presets[name] = getLocFilterState();
      setPresetsForCity(presets);
      document.getElementById('locPresetName').value = '';
    }

    function loadSelectedLocPreset() {
      const name = document.getElementById('locPresetSelect').value;
      if (!name) return;
      const presets = getPresetsForCity();
      if (!presets[name]) return;
      applyLocFilterState(presets[name]);
      applyLocFilters();
    }

    function deleteSelectedLocPreset() {
      const name = document.getElementById('locPresetSelect').value;
      if (!name) return;
      const presets = getPresetsForCity();
      delete presets[name];
      setPresetsForCity(presets);
    }

    function getShortlistSet() {
      if (!currentCityKey) return new Set();
      try {
        const raw = JSON.parse(window.localStorage.getItem(cityShortlistKey(currentCityKey)) || '[]');
        return new Set(Array.isArray(raw) ? raw : []);
      } catch (_) {
        return new Set();
      }
    }

    function setShortlistSet(setObj) {
      if (!currentCityKey) return;
      window.localStorage.setItem(cityShortlistKey(currentCityKey), JSON.stringify(Array.from(setObj)));
      renderShortlistTray();
      updateShortlistButtons();
    }

    function toggleShortlistByEncodedId(encoded) {
      toggleShortlistById(decodeURIComponent(encoded));
    }

    function toggleShortlistById(locId) {
      const setObj = getShortlistSet();
      if (setObj.has(locId)) setObj.delete(locId);
      else setObj.add(locId);
      setShortlistSet(setObj);
      updateUrlFromState();
    }

    function clearShortlist() {
      setShortlistSet(new Set());
      document.getElementById('locDayPlan').classList.remove('visible');
    }

    function updateShortlistButtons() {
      const setObj = getShortlistSet();
      document.querySelectorAll('.loc-select-btn').forEach(btn => {
        btn.classList.toggle('active', setObj.has(btn.dataset.locId));
        btn.textContent = setObj.has(btn.dataset.locId) ? 'Selected' : 'Add to Plan';
      });
    }

    function setSplitView(enabled) {
      locSplitView = !!enabled;
      const layout = document.getElementById('locMainLayout');
      const btn = document.getElementById('locSplitToggleBtn');
      layout.classList.toggle('split', locSplitView);
      btn.textContent = locSplitView ? 'Hide Map' : 'Show Map';
    }

    function toggleSplitView() {
      setSplitView(!locSplitView);
      saveLastLocState();
      renderLocMap(lastFilteredLocations);
      updateUrlFromState();
    }

    function findLocationById(locId) {
      const cityEntry = citiesData[currentCityKey];
      if (!cityEntry) return null;
      return cityEntry.locations.find(loc => getLocId(loc) === locId) || null;
    }

    function getLocPoint(loc, locId) {
      if (locPointCache[locId]) return locPointCache[locId];
      const latRaw = locVal(loc, 25, 'latitude') || locVal(loc, 26, 'lat') || loc.latitude || loc.lat;
      const lngRaw = locVal(loc, 26, 'longitude') || locVal(loc, 27, 'lng') || loc.longitude || loc.lng;
      const lat = parseFloat(latRaw);
      const lng = parseFloat(lngRaw);
      if (Number.isFinite(lat) && Number.isFinite(lng)) {
        locPointCache[locId] = { x: lng, y: lat, geo: true };
        return locPointCache[locId];
      }
      let hash = 0;
      for (let i = 0; i < locId.length; i++) hash = (hash * 31 + locId.charCodeAt(i)) | 0;
      const x = 10 + Math.abs(hash % 80);
      const y = 10 + Math.abs((hash >> 8) % 80);
      locPointCache[locId] = { x, y, geo: false };
      return locPointCache[locId];
    }

    function renderLocMap(locations) {
      const canvas = document.getElementById('locMapCanvas');
      const count = document.getElementById('locMapCount');
      if (!canvas || !count) return;
      count.textContent = `${locations.length} pins`;
      canvas.innerHTML = '';
       if (!locSplitView || locations.length === 0) return;

       const points = locations.map(loc => {
         const locId = getLocId(loc);
         return { locId, loc, point: getLocPoint(loc, locId), name: String(locVal(loc, 0, 'name') || 'Location') };
       });

      if (renderGoogleMap(points)) return;
      if (renderMapboxMap(points)) return;
      renderCanvasMap(points);
    }

    function renderGoogleMap(points) {
      if (!(window.google && window.google.maps)) return false;
      const geoPoints = points.filter(p => p.point.geo);
      if (!geoPoints.length) return false;

      const canvas = document.getElementById('locMapCanvas');
      canvas.innerHTML = '';
      const center = { lat: geoPoints[0].point.y, lng: geoPoints[0].point.x };
      locGoogleMap = locGoogleMap || new window.google.maps.Map(canvas, { zoom: 10, center });
      locGoogleMap.setCenter(center);

      locGoogleMarkers.forEach(m => m.setMap(null));
      locGoogleMarkers = [];

      geoPoints.forEach(item => {
        const marker = new window.google.maps.Marker({
          map: locGoogleMap,
          position: { lat: item.point.y, lng: item.point.x },
          title: item.name
        });
        marker.__locId = item.locId;
        marker.addListener('click', () => setActiveLocation(item.locId, true));
        locGoogleMarkers.push(marker);
      });

      const bounds = new window.google.maps.LatLngBounds();
      geoPoints.forEach(item => bounds.extend({ lat: item.point.y, lng: item.point.x }));
      if (geoPoints.length > 1) locGoogleMap.fitBounds(bounds);
      updateMapHighlights();
      return true;
    }

    function renderMapboxMap(points) {
      if (!window.mapboxgl) return false;
      if (!window.mapboxgl.accessToken && !window.MAPBOX_TOKEN) return false;
      if (!window.mapboxgl.accessToken && window.MAPBOX_TOKEN) {
        window.mapboxgl.accessToken = window.MAPBOX_TOKEN;
      }

      const geoPoints = points.filter(p => p.point.geo);
      if (!geoPoints.length) return false;

      const canvas = document.getElementById('locMapCanvas');
      if (!locMapboxMap) {
        canvas.innerHTML = '';
        locMapboxMap = new window.mapboxgl.Map({
          container: 'locMapCanvas',
          style: 'mapbox://styles/mapbox/streets-v12',
          center: [geoPoints[0].point.x, geoPoints[0].point.y],
          zoom: 9
        });
      }

      locMapboxMarkers.forEach(m => m.remove());
      locMapboxMarkers = [];

      geoPoints.forEach(item => {
        const el = document.createElement('button');
        el.className = 'map-pin';
        el.dataset.locId = item.locId;
        el.type = 'button';
        el.title = item.name;
        el.textContent = '•';
        el.onclick = () => setActiveLocation(item.locId, true);

        const marker = new window.mapboxgl.Marker(el)
          .setLngLat([item.point.x, item.point.y])
          .addTo(locMapboxMap);

        marker.__locId = item.locId;
        locMapboxMarkers.push(marker);
      });

      if (geoPoints.length > 1) {
        const bounds = new window.mapboxgl.LngLatBounds();
        geoPoints.forEach(item => bounds.extend([item.point.x, item.point.y]));
        locMapboxMap.fitBounds(bounds, { padding: 32 });
      }
      updateMapHighlights();
      return true;
    }

    function renderCanvasMap(points) {
      const canvas = document.getElementById('locMapCanvas');
      canvas.innerHTML = '';

      const geoPoints = points.filter(p => p.point.geo);
       const minX = geoPoints.length ? Math.min(...geoPoints.map(p => p.point.x)) : 0;
       const maxX = geoPoints.length ? Math.max(...geoPoints.map(p => p.point.x)) : 100;
       const minY = geoPoints.length ? Math.min(...geoPoints.map(p => p.point.y)) : 0;
       const maxY = geoPoints.length ? Math.max(...geoPoints.map(p => p.point.y)) : 100;
       const xRange = Math.max(0.001, maxX - minX);
       const yRange = Math.max(0.001, maxY - minY);

       points.forEach((item, idx) => {
         const pin = document.createElement('button');
         pin.className = 'map-pin';
         pin.type = 'button';
         pin.dataset.locId = item.locId;
         pin.title = item.name;
         pin.textContent = String((idx % 9) + 1);
         const left = item.point.geo ? (5 + ((item.point.x - minX) / xRange) * 90) : item.point.x;
         const top = item.point.geo ? (95 - ((item.point.y - minY) / yRange) * 90) : item.point.y;
         pin.style.left = `${left}%`;
         pin.style.top = `${top}%`;
         pin.onclick = () => setActiveLocation(item.locId, true);
         canvas.appendChild(pin);
       });
      highlightActiveLocation();
      updateMapHighlights();
     }

    function setActiveLocation(locId, scrollToCard) {
      activeLocId = locId;
      highlightActiveLocation();
      if (scrollToCard) {
        const card = document.querySelector(`.loc-card[data-loc-id="${cssEscape(locId)}"]`);
        if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }

    function highlightActiveLocation() {
      document.querySelectorAll('.loc-card').forEach(card => {
        card.classList.toggle('active', card.dataset.locId === activeLocId);
      });
      document.querySelectorAll('.map-pin').forEach(pin => {
        pin.classList.toggle('active', pin.dataset.locId === activeLocId);
      });
      updateMapHighlights();
     }

    function updateMapHighlights() {
      locGoogleMarkers.forEach(marker => {
        marker.setOpacity(marker.__locId === activeLocId ? 1 : 0.65);
      });
      locMapboxMarkers.forEach(marker => {
        const el = marker.getElement && marker.getElement();
        if (!el) return;
        el.classList.toggle('active', marker.__locId === activeLocId);
      });
    }

    function renderShortlistTray() {
      const tray = document.getElementById('locShortlistTray');
      const chips = document.getElementById('locShortlistChips');
      const count = document.getElementById('locShortlistCount');
      const setObj = getShortlistSet();
      const ids = Array.from(setObj);
      tray.style.display = ids.length ? 'block' : 'none';
      count.textContent = `${ids.length} selected`;

      const items = ids.map(id => findLocationById(id)).filter(Boolean);
      chips.innerHTML = items.map(loc => {
        const locId = getLocId(loc);
        return `<button class="loc-shortlist-chip" onclick="setActiveLocation('${escAttr(locId)}', true)">${escHtml(locVal(loc, 0, 'name') || 'Location')}</button>`;
      }).join('');
    }

    function buildDayPlan() {
      const ids = Array.from(getShortlistSet());
      const selected = ids.map(id => findLocationById(id)).filter(Boolean);
      if (selected.length < 2) {
        alert('Select at least 2 locations to build a route.');
        return;
      }

      const remaining = selected.slice().sort((a, b) => String(locVal(a, 0, 'name')).localeCompare(String(locVal(b, 0, 'name'))));
      const route = [remaining.shift()];
      while (remaining.length) {
        const last = route[route.length - 1];
        const lastPt = getLocPoint(last, getLocId(last));
        let bestIdx = 0;
        let bestDist = Infinity;
        remaining.forEach((candidate, idx) => {
          const pt = getLocPoint(candidate, getLocId(candidate));
          const dx = lastPt.x - pt.x;
          const dy = lastPt.y - pt.y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < bestDist) { bestDist = d; bestIdx = idx; }
        });
        route.push(remaining.splice(bestIdx, 1)[0]);
      }

      let total = 0;
      for (let i = 0; i < route.length - 1; i++) {
        const a = getLocPoint(route[i], getLocId(route[i]));
        const b = getLocPoint(route[i + 1], getLocId(route[i + 1]));
        total += Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
      }

      document.getElementById('locDayPlan').classList.add('visible');
      document.getElementById('locDayPlanSummary').textContent = `Stops: ${route.length} · Approx route score: ${total.toFixed(1)}`;
      document.getElementById('locDayPlanList').innerHTML = route
        .map(loc => `<li>${escHtml(locVal(loc, 0, 'name') || 'Location')}</li>`)
        .join('');
    }

    function parseShareStateFromUrl() {
      try {
        const p = new URLSearchParams(window.location.search);
        const raw = p.get('sv');
        if (!raw) return null;
        const padded = raw.replace(/-/g, '+').replace(/_/g, '/');
        const json = decodeURIComponent(atob(padded));
        return JSON.parse(json);
      } catch (e) {
        console.warn('⚠️ Share state parse failed', e);
        return null;
      }
    }

    function encodeShareState(state) {
      const json = JSON.stringify(state);
      return btoa(encodeURIComponent(json)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
    }

    function updateUrlFromState() {
      if (!currentCityKey) return;
      const payload = {
        cityKey: currentCityKey,
        filters: getLocFilterState(),
        shortlist: Array.from(getShortlistSet())
      };
      const url = new URL(window.location.href);
      url.searchParams.set('sv', encodeShareState(payload));
      window.history.replaceState({}, '', url.toString());
    }

    async function copyShareLink() {
      updateUrlFromState();
      const btn = document.getElementById('copyShareBtn');
      try {
        await navigator.clipboard.writeText(window.location.href);
        btn.classList.add('success');
        btn.textContent = 'Copied!';
        setTimeout(() => {
          btn.classList.remove('success');
          btn.textContent = 'Copy Share Link';
        }, 1500);
      } catch (_) {
        window.prompt('Copy this link:', window.location.href);
      }
    }

    function getOpenInfoForToday(hoursText) {
      const text = String(hoursText || '').trim();
      if (!text) return { isOpen: false, minutesUntilClose: null };

      const now = new Date();
      const dayIdx = now.getDay();
      const nowMins = now.getHours() * 60 + now.getMinutes();
      const dayNames = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];
      const today = dayNames[dayIdx];

      const parts = text.toLowerCase().split(/[;\n,]+/).map(s => s.trim()).filter(Boolean);
      let candidate = '';
      for (const part of parts) {
        if (segmentMatchesDay(part, today)) { candidate = part; break; }
      }
      if (!candidate && parts.length === 1) candidate = parts[0];
      if (!candidate || candidate.includes('closed')) return { isOpen: false, minutesUntilClose: null };

      const m = candidate.match(/(\d{1,2})(?::(\d{2}))?\s*(am|pm)\s*-\s*(\d{1,2})(?::(\d{2}))?\s*(am|pm)/i);
      if (!m) return { isOpen: false, minutesUntilClose: null };

      const open = toMinutes(m[1], m[2], m[3]);
      let close = toMinutes(m[4], m[5], m[6]);
      let current = nowMins;
      if (close <= open) {
        close += 24 * 60;
        if (current < open) current += 24 * 60;
      }
      const isOpen = current >= open && current < close;
      const minutesUntilClose = isOpen ? (close - current) : null;
      return { isOpen, minutesUntilClose };
    }

    function segmentMatchesDay(segment, todayShort) {
      const token = segment.slice(0, 32);
      if (token.includes(todayShort)) return true;
      const days = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];
      const range = token.match(/(sun|mon|tue|wed|thu|fri|sat)\s*-\s*(sun|mon|tue|wed|thu|fri|sat)/);
      if (!range) return false;
      const start = days.indexOf(range[1]);
      const end = days.indexOf(range[2]);
      const today = days.indexOf(todayShort);
      if (start <= end) return today >= start && today <= end;
      return today >= start || today <= end;
    }

    function toMinutes(h, m, ampm) {
      let hour = Number(h || 0);
      const mins = Number(m || 0);
      const suffix = String(ampm || '').toLowerCase();
      if (suffix === 'pm' && hour !== 12) hour += 12;
      if (suffix === 'am' && hour === 12) hour = 0;
      return hour * 60 + mins;
    }

    function viewCity(city, state) {
      const key = `${city}, ${state}`;
      const cityEntry = citiesData[key];
      if (!cityEntry || cityEntry.locations.length === 0) {
        alert('No locations found for this city');
        return;
      }

      currentCityKey = key;
      activeLocId = null;
      activeLocQuickTag = null;

      document.getElementById('locationsPageTitle').textContent = `📍 ${city}`;
      document.getElementById('locationsPageSubtitle').textContent =
        `${state} · ${cityEntry.locations.length} location${cityEntry.locations.length !== 1 ? 's' : ''}`;

      document.getElementById('locSearchName').value = '';
      document.getElementById('locFilterDifficulty').value = '';
      document.getElementById('locFilterCost').value = '';
      document.getElementById('locFilterTag').value = '';
      document.getElementById('locSortBy').value = 'name';
      locSortOrder = 'asc';
      document.getElementById('locSortOrderBtn').textContent = '↑';
      setSplitView(false);

      buildQuickTagPills(cityEntry.locations);
      populateTagDatalist(cityEntry.locations);
      refreshPresetSelect();
      restoreLastLocState();
      if (pendingShareState && pendingShareState.cityKey === currentCityKey) {
        if (pendingShareState.filters) applyLocFilterState(pendingShareState.filters);
        if (Array.isArray(pendingShareState.shortlist)) {
          setShortlistSet(new Set(pendingShareState.shortlist));
        }
        pendingShareState = null;
      }
      renderShortlistTray();
      document.getElementById('locDayPlan').classList.remove('visible');

      document.querySelector('.controls').style.display = 'none';
      document.getElementById('cityGrid').style.display = 'none';
      document.getElementById('locationsPage').style.display = 'block';

      applyLocFilters();
    }

    function goBackToCities() {
      currentCityKey = null;
      activeLocId = null;
      document.getElementById('locationsPage').style.display = 'none';
      document.getElementById('cityGrid').style.display = 'grid';
      document.querySelector('.controls').style.display = 'flex';
    }

    function applyLocFilters() {
      if (!currentCityKey) return;
      const cityEntry = citiesData[currentCityKey];
      if (!cityEntry) return;

      const searchTerm = document.getElementById('locSearchName').value.trim().toLowerCase();
      const diffFilter = document.getElementById('locFilterDifficulty').value.toLowerCase();
      const costFilter = document.getElementById('locFilterCost').value.toLowerCase();
      const tagInput = document.getElementById('locFilterTag').value.trim().toLowerCase();
      const tagFilter = activeLocQuickTag || tagInput;
      const openNowOnly = document.getElementById('locFilterOpenNow').checked;
      const closingSoonOnly = document.getElementById('locFilterClosingSoon').checked;
      const sortKey = document.getElementById('locSortBy').value;

      let results = cityEntry.locations.filter(loc => {
        const name = locVal(loc, 0, 'name').toLowerCase();
        const tags = locVal(loc, 3, 'tags').toLowerCase();
        const difficulty = locVal(loc, 7, 'difficulty').toLowerCase();
        const cost = locVal(loc, 14, 'cost').toLowerCase();
        const hours = locVal(loc, 5, 'hours');
        const openInfo = getOpenInfoForToday(hours);

        if (searchTerm && !name.includes(searchTerm)) return false;
        if (diffFilter && !difficulty.includes(diffFilter)) return false;
        if (costFilter && !cost.includes(costFilter)) return false;
        if (tagFilter && !tags.includes(tagFilter)) return false;
        if (openNowOnly && !openInfo.isOpen) return false;
        if (closingSoonOnly && !(openInfo.isOpen && openInfo.minutesUntilClose !== null && openInfo.minutesUntilClose <= CLOSING_SOON_MINUTES)) return false;
        return true;
      });

      const costOrder = { free: 0, '$': 1, '$$': 2, '$$$': 3, '$$$$': 4 };
      const difficultyOrder = { easy: 0, moderate: 1, hard: 2 };

      results.sort((a, b) => {
        let av;
        let bv;

        if (sortKey === 'difficulty') {
          av = difficultyOrder[locVal(a, 7, 'difficulty').toLowerCase()] ?? 99;
          bv = difficultyOrder[locVal(b, 7, 'difficulty').toLowerCase()] ?? 99;
        } else if (sortKey === 'cost') {
          av = costOrder[locVal(a, 14, 'cost').toLowerCase()] ?? 99;
          bv = costOrder[locVal(b, 14, 'cost').toLowerCase()] ?? 99;
        } else if (sortKey === 'rating') {
          av = parseFloat(locVal(a, 13, 'rating')) || 0;
          bv = parseFloat(locVal(b, 13, 'rating')) || 0;
        } else if (sortKey === 'tags') {
          av = locVal(a, 3, 'tags').toLowerCase();
          bv = locVal(b, 3, 'tags').toLowerCase();
        } else {
          av = locVal(a, 0, 'name').toLowerCase();
          bv = locVal(b, 0, 'name').toLowerCase();
        }

        if (typeof av === 'number' && typeof bv === 'number') {
          return locSortOrder === 'asc' ? av - bv : bv - av;
        }
        const cmp = String(av).localeCompare(String(bv));
        return locSortOrder === 'asc' ? cmp : -cmp;
      });

      document.getElementById('locResultsCount').textContent =
        `${results.length} location${results.length !== 1 ? 's' : ''}`;

      lastFilteredLocations = results;
      saveLastLocState();
      renderLocationCards(results);
      renderLocMap(results);
      renderShortlistTray();
      updateUrlFromState();
    }

    function renderLocationCards(locations) {
      const grid = document.getElementById('locationsGrid');
      const shortlist = getShortlistSet();

      if (locations.length === 0) {
        grid.innerHTML = `
          <div class="loc-empty">
            <div class="loc-empty-icon">🔍</div>
            <div class="loc-empty-text">No locations match your filters</div>
            <div style="font-size:13px;">Try adjusting or resetting the filters above.</div>
          </div>`;
        return;
      }

      grid.innerHTML = locations.map(loc => {
        const locId = getLocId(loc);
        const encodedLocId = encodeURIComponent(locId);
        const name = locVal(loc, 0, 'name') || 'Unnamed Location';
        const website = locVal(loc, 2, 'website');
        const tagsRaw = locVal(loc, 3, 'tags');
        const driveTime = locVal(loc, 4, 'driveTime');
        const hours = locVal(loc, 5, 'hours');
        const duration = locVal(loc, 6, 'duration');
        const difficulty = locVal(loc, 7, 'difficulty');
        const trailLen = locVal(loc, 8, 'trailLength');
        const address = locVal(loc, 11, 'address');
        const phone = locVal(loc, 12, 'phone');
        const rating = locVal(loc, 13, 'rating');
        const cost = locVal(loc, 14, 'cost');
        const description = locVal(loc, 16, 'description');
        const googleUrl = locVal(loc, 23, 'googleUrl');

        const tagList = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];
        const diffClass = difficulty ? `difficulty-${difficulty.toLowerCase().replace(/\s+/g, '-')}` : '';

        const actionBtns = [
          website ? `<a class="loc-action-btn" href="${escAttr(website)}" target="_blank" rel="noopener">🌐 Website</a>` : '',
          googleUrl ? `<a class="loc-action-btn" href="${escAttr(googleUrl)}" target="_blank" rel="noopener">🗺️ Google Maps</a>` : '',
          `<button class="loc-action-btn loc-select-btn ${shortlist.has(locId) ? 'active' : ''}" data-loc-id="${escAttr(locId)}" onclick="toggleShortlistByEncodedId('${encodedLocId}')">${shortlist.has(locId) ? 'Selected' : 'Add to Plan'}</button>`
        ].filter(Boolean).join('');

        return `
          <div class="loc-card" data-loc-id="${escAttr(locId)}" onmouseenter="setActiveLocation('${escAttr(locId)}', false)">
            <div class="loc-card-header">
              <div class="loc-card-name">${escHtml(name)}</div>
              <div class="loc-card-meta">
                ${difficulty ? `<span class="loc-meta-badge ${diffClass}">⛰️ ${escHtml(difficulty)}</span>` : ''}
                ${cost ? `<span class="loc-meta-badge cost">💰 ${escHtml(cost)}</span>` : ''}
                ${rating ? `<span class="loc-meta-badge rating">⭐ ${escHtml(rating)}</span>` : ''}
              </div>
            </div>
            ${tagList.length ? `<div class="loc-card-tags">${tagList.map(t => `<span class="loc-tag-pill">${escHtml(t)}</span>`).join('')}</div>` : ''}
            <div class="loc-card-details">
              ${driveTime ? `<div class="loc-detail-row"><span class="loc-detail-icon">🚗</span><span class="loc-detail-value">${escHtml(driveTime)}</span></div>` : ''}
              ${hours ? `<div class="loc-detail-row"><span class="loc-detail-icon">🕐</span><span class="loc-detail-value">${escHtml(hours)}</span></div>` : ''}
              ${duration ? `<div class="loc-detail-row"><span class="loc-detail-icon">⏱️</span><span class="loc-detail-value">${escHtml(duration)}</span></div>` : ''}
              ${trailLen ? `<div class="loc-detail-row"><span class="loc-detail-icon">📏</span><span class="loc-detail-value">${escHtml(trailLen)}</span></div>` : ''}
              ${address ? `<div class="loc-detail-row"><span class="loc-detail-icon">📍</span><span class="loc-detail-value">${escHtml(address)}</span></div>` : ''}
              ${phone ? `<div class="loc-detail-row"><span class="loc-detail-icon">📞</span><span class="loc-detail-value">${escHtml(phone)}</span></div>` : ''}
            </div>
            ${description ? `<div class="loc-card-description">${escHtml(description)}</div>` : ''}
            <div class="loc-card-footer">${actionBtns}</div>
          </div>`;
      }).join('');

      highlightActiveLocation();
    }

    window.viewCity = viewCity;
    window.goBackToCities = goBackToCities;
    window.toggleLocQuickTag = toggleLocQuickTag;
    window.toggleLocSortOrder = toggleLocSortOrder;
    window.resetLocFilters = resetLocFilters;
    window.applyLocFilters = applyLocFilters;
    window.saveLocPreset = saveLocPreset;
    window.loadSelectedLocPreset = loadSelectedLocPreset;
    window.deleteSelectedLocPreset = deleteSelectedLocPreset;
    window.toggleSplitView = toggleSplitView;
    window.toggleShortlistByEncodedId = toggleShortlistByEncodedId;
    window.setActiveLocation = setActiveLocation;
    window.buildDayPlan = buildDayPlan;
    window.clearShortlist = clearShortlist;
    window.copyShareLink = copyShareLink;

    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

    console.log('✅ City Viewer window loaded');
  </script>
