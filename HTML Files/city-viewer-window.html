    async function fetchTableHeaderRow(filePath, tableName, token) {
      const encodedPath = encodeGraphPath(filePath);
      const url = `https://graph.microsoft.com/v1.0/me/drive/root:/${encodedPath}:/workbook/tables/${encodeURIComponent(tableName)}/headerRowRange?$select=values`;
      const response = await fetch(url, {
        method: 'GET',
        headers: {
          Authorization: `Bearer ${token}`,
          'Content-Type': 'application/json'
        }
      });
      if (!response.ok) throw new Error(`Header load failed (${response.status})`);
      const payload = await response.json().catch(() => ({}));
      const values = Array.isArray(payload.values) && Array.isArray(payload.values[0]) ? payload.values[0] : [];
      return values.map((value) => String(value || '').trim());
    }

    async function fetchTableRows(filePath, tableName, token) {
      const encodedPath = encodeGraphPath(filePath);
      const url = `https://graph.microsoft.com/v1.0/me/drive/root:/${encodedPath}:/workbook/tables/${encodeURIComponent(tableName)}/rows?$top=5000`;
      const response = await fetch(url, {
        method: 'GET',
        headers: {
          Authorization: `Bearer ${token}`,
          'Content-Type': 'application/json'
        }
      });
      if (!response.ok) throw new Error(`Row load failed (${response.status})`);
      const payload = await response.json().catch(() => ({}));
      return Array.isArray(payload.value) ? payload.value : [];
    }

    function findRowIndexForLocation(rows, headers, loc) {
      const placeIdIdx = resolveColumnIndexByAliases(headers, CITY_SYNC_COLUMNS.placeId);
      const nameIdx = resolveColumnIndexByAliases(headers, CITY_SYNC_COLUMNS.name);
      const addressIdx = resolveColumnIndexByAliases(headers, CITY_SYNC_COLUMNS.address);
      const placeId = String(locVal(loc, 1, 'googlePlaceId') || loc.placeId || '').trim().toLowerCase();
      const name = String(locVal(loc, 0, 'name') || loc.name || '').trim().toLowerCase();
      const address = String(locVal(loc, 11, 'address') || loc.address || '').trim().toLowerCase();

      if (placeId && placeIdIdx >= 0) {
        const rowByPlaceId = rows.find((row) => {
          const values = Array.isArray(row && row.values && row.values[0]) ? row.values[0] : [];
          return String(values[placeIdIdx] || '').trim().toLowerCase() === placeId;
        });
        if (rowByPlaceId) return rows.indexOf(rowByPlaceId);
      }

      if (name && nameIdx >= 0) {
        const rowByNameAddress = rows.find((row) => {
          const values = Array.isArray(row && row.values && row.values[0]) ? row.values[0] : [];
          const rowName = String(values[nameIdx] || '').trim().toLowerCase();
          if (rowName !== name) return false;
          if (!address || addressIdx < 0) return true;
          const rowAddress = String(values[addressIdx] || '').trim().toLowerCase();
          return rowAddress === address;
        });
        if (rowByNameAddress) return rows.indexOf(rowByNameAddress);
      }

      if (address && addressIdx >= 0) {
        const rowByAddress = rows.find((row) => {
          const values = Array.isArray(row && row.values && row.values[0]) ? row.values[0] : [];
          return String(values[addressIdx] || '').trim().toLowerCase() === address;
        });
        if (rowByAddress) return rows.indexOf(rowByAddress);
      }

      return -1;
    }

    async function patchTableRow(filePath, tableName, rowIndex, rowValues, token) {
      const encodedPath = encodeGraphPath(filePath);
      const url = `https://graph.microsoft.com/v1.0/me/drive/root:/${encodedPath}:/workbook/tables/${encodeURIComponent(tableName)}/rows/itemAt(index=${rowIndex})`;
      const response = await fetch(url, {
        method: 'PATCH',
        headers: {
          Authorization: `Bearer ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ values: [rowValues] })
      });
      if (!response.ok) throw new Error(`Row update failed (${response.status})`);
      return true;
    }

    async function syncLocationEditsToGraph(locId) {
      if (!currentCityKey) return false;
      const token = getGraphAccessToken();
      if (!token) return false;
      const loc = findLocationById(locId);
      if (!loc) return false;
      const target = parseSourceTarget(loc);
      if (!target) return false;
      const edit = getLocationEditState(locId);

      const candidates = workbookPathCandidates(target.workbook);
      for (const filePath of candidates) {
        try {
          const headers = await fetchTableHeaderRow(filePath, target.tableName, token);
          const rows = await fetchTableRows(filePath, target.tableName, token);
          const rowIndex = findRowIndexForLocation(rows, headers, loc);
          if (rowIndex < 0) continue;

          const values = Array.isArray(rows[rowIndex]?.values?.[0]) ? rows[rowIndex].values[0].slice() : [];
          while (values.length < headers.length) values.push('');

          const nameIdx = resolveColumnIndexByAliases(headers, CITY_SYNC_COLUMNS.name);
          const websiteIdx = resolveColumnIndexByAliases(headers, CITY_SYNC_COLUMNS.website);
          const driveTimeIdx = resolveColumnIndexByAliases(headers, CITY_SYNC_COLUMNS.driveTime);
          const hoursIdx = resolveColumnIndexByAliases(headers, CITY_SYNC_COLUMNS.hours);
          const durationIdx = resolveColumnIndexByAliases(headers, CITY_SYNC_COLUMNS.duration);
          const difficultyIdx = resolveColumnIndexByAliases(headers, CITY_SYNC_COLUMNS.difficulty);
          const trailLengthIdx = resolveColumnIndexByAliases(headers, CITY_SYNC_COLUMNS.trailLength);
          const addressIdx = resolveColumnIndexByAliases(headers, CITY_SYNC_COLUMNS.address);
          const phoneIdx = resolveColumnIndexByAliases(headers, CITY_SYNC_COLUMNS.phone);
          const ratingIdx = resolveColumnIndexByAliases(headers, CITY_SYNC_COLUMNS.rating);
          const costIdx = resolveColumnIndexByAliases(headers, CITY_SYNC_COLUMNS.cost);
          const descriptionIdx = resolveColumnIndexByAliases(headers, CITY_SYNC_COLUMNS.description);
          const googleUrlIdx = resolveColumnIndexByAliases(headers, CITY_SYNC_COLUMNS.googleUrl);
          const tagsIdx = resolveColumnIndexByAliases(headers, CITY_SYNC_COLUMNS.tags);
          const notesIdx = resolveColumnIndexByAliases(headers, CITY_SYNC_COLUMNS.notes);
          const visitedIdx = resolveColumnIndexByAliases(headers, CITY_SYNC_COLUMNS.visited);
          const visitCountIdx = resolveColumnIndexByAliases(headers, CITY_SYNC_COLUMNS.visitCount);

          if (nameIdx >= 0) values[nameIdx] = String(locVal(loc, 0, 'name') || '').trim();
          if (websiteIdx >= 0) values[websiteIdx] = String(locVal(loc, 2, 'website') || '').trim();
          if (driveTimeIdx >= 0) values[driveTimeIdx] = String(locVal(loc, 4, 'driveTime') || '').trim();
          if (hoursIdx >= 0) values[hoursIdx] = String(locVal(loc, 5, 'hours') || '').trim();
          if (durationIdx >= 0) values[durationIdx] = String(locVal(loc, 6, 'duration') || '').trim();
          if (difficultyIdx >= 0) values[difficultyIdx] = String(locVal(loc, 7, 'difficulty') || '').trim();
          if (trailLengthIdx >= 0) values[trailLengthIdx] = String(locVal(loc, 8, 'trailLength') || '').trim();
          if (addressIdx >= 0) values[addressIdx] = String(locVal(loc, 11, 'address') || '').trim();
          if (phoneIdx >= 0) values[phoneIdx] = String(locVal(loc, 12, 'phone') || '').trim();
          if (ratingIdx >= 0) values[ratingIdx] = String(locVal(loc, 13, 'rating') || '').trim();
          if (costIdx >= 0) values[costIdx] = String(locVal(loc, 14, 'cost') || '').trim();
          if (descriptionIdx >= 0) values[descriptionIdx] = String(locVal(loc, 12, 'description') || '').trim();
          if (googleUrlIdx >= 0) values[googleUrlIdx] = String(locVal(loc, 23, 'googleUrl') || '').trim();
          if (tagsIdx >= 0) values[tagsIdx] = getLocationDerivedTags(loc).map((entry) => entry.text).join(', ');
          if (notesIdx >= 0) values[notesIdx] = edit.note || '';
          if (visitedIdx >= 0) values[visitedIdx] = edit.visited ? 'TRUE' : 'FALSE';
          if (visitCountIdx >= 0) values[visitCountIdx] = edit.visitCount > 0 ? String(edit.visitCount) : '';

          await patchTableRow(filePath, target.tableName, rowIndex, values, token);
          return true;
        } catch (error) {
          console.warn('⚠️ City Explorer Excel sync attempt failed:', error && error.message ? error.message : error);
        }
      }
      return false;
    }

    function getLocId(loc) {
      const placeId = String(locVal(loc, 1, 'googlePlaceId') || '').trim();
      if (placeId) return `pid:${placeId}`;
      const name = String(locVal(loc, 0, 'name') || '').trim();
      const addr = String(locVal(loc, 11, 'address') || '').trim();
      return `fallback:${name}::${addr}`;
    }

    function parsePositiveThreshold(rawValue, fallback) {
      const parsed = Number(rawValue);
      if (!Number.isFinite(parsed) || parsed <= 0) return fallback;
      return parsed;
    }

    function getActiveNearbyBlendThresholds() {
      return {
        cityMatchMiles: Number(cityViewerNearbyCityMatchMiles) || CITY_VIEWER_NEARBY_CITY_MATCH_MILES_DEFAULT,
        dedupeGeoMiles: Number(cityViewerNearbyDedupeGeoMiles) || CITY_VIEWER_NEARBY_DEDUPE_GEO_MILES_DEFAULT,
        dedupeNameGeoMiles: Number(cityViewerNearbyDedupeNameGeoMiles) || CITY_VIEWER_NEARBY_DEDUPE_NAME_GEO_MILES_DEFAULT
      };
    }

    function resolveNearbyDebugThresholdsFromUrl() {
      const defaults = {
        cityMatchMiles: CITY_VIEWER_NEARBY_CITY_MATCH_MILES_DEFAULT,
        dedupeGeoMiles: CITY_VIEWER_NEARBY_DEDUPE_GEO_MILES_DEFAULT,
        dedupeNameGeoMiles: CITY_VIEWER_NEARBY_DEDUPE_NAME_GEO_MILES_DEFAULT
      };
      try {
        const p = new URLSearchParams(window.location.search);
        cityViewerNearbyCityMatchMiles = parsePositiveThreshold(
          p.get('debugCityMatchMiles') || p.get('nearbyCityMatchMiles'),
          defaults.cityMatchMiles
        );
        cityViewerNearbyDedupeGeoMiles = parsePositiveThreshold(
          p.get('debugDedupeGeoMiles') || p.get('nearbyDedupeGeoMiles'),
          defaults.dedupeGeoMiles
        );
        cityViewerNearbyDedupeNameGeoMiles = parsePositiveThreshold(
          p.get('debugDedupeNameGeoMiles') || p.get('nearbyDedupeNameGeoMiles'),
          defaults.dedupeNameGeoMiles
        );
      } catch (_error) {
        cityViewerNearbyCityMatchMiles = defaults.cityMatchMiles;
        cityViewerNearbyDedupeGeoMiles = defaults.dedupeGeoMiles;
        cityViewerNearbyDedupeNameGeoMiles = defaults.dedupeNameGeoMiles;
      }
    }

    function resolvePrefilterFromUrl() {
      try {
        const p = new URLSearchParams(window.location.search);
        prefilterTag = String(p.get('prefilterTag') || '').trim().toLowerCase();
        prefilterLabel = String(p.get('prefilterLabel') || '').trim();
        prefilterSourceSubtab = String(p.get('sourceSubtab') || '').trim().toLowerCase();
      } catch (_) {
        prefilterTag = '';
        prefilterLabel = '';
        prefilterSourceSubtab = '';
      }
    }

    function getPrefilterLabel() {
      if (prefilterLabel) return prefilterLabel;
      if (prefilterSourceSubtab && SOURCE_SUBTAB_LABELS[prefilterSourceSubtab]) return SOURCE_SUBTAB_LABELS[prefilterSourceSubtab];
      if (prefilterTag) return prefilterTag;
      return 'Adventure';
    }

    function renderPrefilterNotice() {
      const notice = document.getElementById('cityPrefilterNotice');
      if (!notice) return;
      if (!prefilterTag) {
        notice.classList.remove('visible');
        notice.innerHTML = '';
        return;
      }
      const label = getPrefilterLabel();
      notice.classList.add('visible');
      notice.innerHTML = `
        <span>Filtered from Adventure subtab: <strong>${escHtml(label)}</strong></span>
        <button type="button" class="city-prefilter-clear-btn" onclick="clearAdventurePrefilter()">Show all places</button>
      `;
    }

    function clearAdventurePrefilter() {
      prefilterTag = '';
      prefilterLabel = '';
      prefilterSourceSubtab = '';
      renderPrefilterNotice();
      renderCities();
      if (currentCityKey) applyLocFilters();
      else updateUrlFromState();
    }

    function locationMatchesPrefilter(loc) {
      if (!prefilterTag) return true;

      // ── 1. Exact source/table lookup (fast, precise) ─────────────────────
      const mappedSources = SUBTAB_SOURCE_MAP[prefilterSourceSubtab] || SUBTAB_SOURCE_MAP[prefilterTag];
      if (mappedSources && mappedSources.length) {
        const srcLabel = String(loc.sourceLabel || '').trim();
        if (srcLabel) return mappedSources.some(s => srcLabel === s);
      }

      // ── 2. Fallback: fuzzy tag / name / description scan ──────────────────
      const tags = String(locVal(loc, 3, 'tags') || '').toLowerCase();
      const name = String(locVal(loc, 0, 'name') || '').toLowerCase();
      const desc = String(locVal(loc, 12, 'description') || '').toLowerCase();

      const searchTerms = [prefilterTag];
      if (prefilterSourceSubtab === 'wildlife-animals') {
        searchTerms.push('wildlife', 'animal', 'zoo', 'aquarium', 'sanctuary', 'rescue', 'rehab', 'petting', 'farm', 'safari', 'aviary', 'bird');
      } else if (prefilterSourceSubtab === 'regional-festivals') {
        searchTerms.push('festival', 'fair', 'parade', 'event');
      } else if (prefilterSourceSubtab === 'food-drink') {
        searchTerms.push('restaurant', 'cafe', 'coffee', 'food', 'brewery');
      }

      return searchTerms.some(function (term) {
        return term && (tags.includes(term) || name.includes(term) || desc.includes(term));
      });
    }

    function getLocSourceKey(loc) {
      const source = String((loc && (loc.source || loc.recommendationSource || loc.originSource)) || '').toLowerCase();
      const sourceLabel = String((loc && loc.sourceLabel) || '').toLowerCase();
      const isWebRecommendation =
        !!(loc && (loc.isWebRecommendation || loc.webRecommendation)) ||
        source === 'google' || source === 'web' || source === 'places' || source === 'merged' ||
        sourceLabel.indexOf('web recommendation') >= 0;
      return isWebRecommendation ? 'web' : 'saved';
    }

    function getLocationSourcePriority(loc) {
      return getLocSourceKey(loc) === 'web' ? 1 : 0;
    }

    function calculateGeoMilesBetween(lat1, lng1, lat2, lng2) {
      const aLat = Number(lat1);
      const aLng = Number(lng1);
      const bLat = Number(lat2);
      const bLng = Number(lng2);
      if (![aLat, aLng, bLat, bLng].every(Number.isFinite)) return Number.POSITIVE_INFINITY;
      const toRad = (deg) => deg * (Math.PI / 180);
      const earthRadiusMiles = 3959;
      const dLat = toRad(bLat - aLat);
      const dLng = toRad(bLng - aLng);
      const sinLat = Math.sin(dLat / 2);
      const sinLng = Math.sin(dLng / 2);
      const a = (sinLat * sinLat) + (Math.cos(toRad(aLat)) * Math.cos(toRad(bLat)) * sinLng * sinLng);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return earthRadiusMiles * c;
    }

    function parseNearbyCacheCenter(cacheKey) {
      const parts = String(cacheKey || '').split('|');
      if (parts.length < 2) return null;
      const lat = Number(parts[0]);
      const lng = Number(parts[1]);
      if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null;
      return { lat: lat, lng: lng };
    }

    function getLocationLatLng(loc) {
      const lat = parseFloat(locVal(loc, 25, 'latitude') || loc.latitude || loc.lat);
      const lng = parseFloat(locVal(loc, 26, 'longitude') || loc.longitude || loc.lng);
      if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null;
      return { lat: lat, lng: lng };
    }

    function normalizeLocationIdentityText(value) {
      return String(value || '')
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, ' ')
        .trim();
    }

    function normalizeAddressIdentityText(value) {
      return normalizeLocationIdentityText(value)
        .replace(/\b(street|st\.?)(?=\s|$)/g, 'st')
        .replace(/\b(road|rd\.?)(?=\s|$)/g, 'rd')
        .replace(/\b(avenue|ave\.?)(?=\s|$)/g, 'ave')
        .replace(/\b(boulevard|blvd\.?)(?=\s|$)/g, 'blvd')
        .replace(/\b(drive|dr\.?)(?=\s|$)/g, 'dr')
        .replace(/\b(lane|ln\.?)(?=\s|$)/g, 'ln')
        .replace(/\b(north|n\.?)(?=\s|$)/g, 'n')
        .replace(/\b(south|s\.?)(?=\s|$)/g, 's')
        .replace(/\b(east|e\.?)(?=\s|$)/g, 'e')
        .replace(/\b(west|w\.?)(?=\s|$)/g, 'w')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function buildIdentityModel(raw) {
      const placeId = String((raw && (raw.googlePlaceId || raw.placeId || raw.id)) || '').trim().toLowerCase();
      const name = normalizeLocationIdentityText(raw && raw.name);
      const address = normalizeAddressIdentityText(raw && (raw.address || raw.vicinity || raw.description));
      const point = {
        lat: Number(raw && raw.latitude),
        lng: Number(raw && raw.longitude)
      };
      const hasPoint = Number.isFinite(point.lat) && Number.isFinite(point.lng);
      return {
        placeId,
        name,
        address,
        lat: hasPoint ? point.lat : null,
        lng: hasPoint ? point.lng : null,
        hasPoint
      };
    }

    function isAddressCloseMatch(a, b) {
      const left = String(a || '').trim();
      const right = String(b || '').trim();
      if (!left || !right) return false;
      if (left === right) return true;
      return left.includes(right) || right.includes(left);
    }

    function modelsLikelySameLocation(left, right) {
      if (!left || !right) return false;
      const thresholds = getActiveNearbyBlendThresholds();
      if (left.placeId && right.placeId && left.placeId === right.placeId) return true;
      if (left.name && right.name && left.name === right.name) {
        if (isAddressCloseMatch(left.address, right.address)) return true;
        if (left.hasPoint && right.hasPoint) {
          return calculateGeoMilesBetween(left.lat, left.lng, right.lat, right.lng) <= thresholds.dedupeNameGeoMiles;
        }
      }
      if (left.hasPoint && right.hasPoint) {
        const nearEnough = calculateGeoMilesBetween(left.lat, left.lng, right.lat, right.lng) <= thresholds.dedupeGeoMiles;
        if (!nearEnough) return false;
        if (left.name && right.name) return left.name === right.name;
        return !!(left.address && right.address && isAddressCloseMatch(left.address, right.address));
      }
      return false;
    }

    function getLocationIdentityModel(loc) {
      const point = getLocationLatLng(loc);
      return buildIdentityModel({
        id: loc && loc.id,
        googlePlaceId: locVal(loc, 1, 'googlePlaceId') || (loc && loc.googlePlaceId),
        name: locVal(loc, 0, 'name') || (loc && loc.name),
        address: locVal(loc, 11, 'address') || (loc && loc.address),
        latitude: point && point.lat,
        longitude: point && point.lng
      });
    }

    function getLocationIdentityKey(loc) {
      const model = getLocationIdentityModel(loc);
      if (model.placeId) return 'pid:' + model.placeId;
      const name = model.name;
      const address = model.address;
      if (name && address) return 'nameaddr:' + name + '::' + address;
      if (name && model.hasPoint) return 'namegeo:' + name + '::' + model.lat.toFixed(4) + ',' + model.lng.toFixed(4);
      return name ? 'name:' + name : '';
    }

    function getNearbyAttractionIdentityKey(item) {
      const model = buildIdentityModel(item || {});
      const placeId = model.placeId;
      if (placeId) return 'pid:' + placeId;
      const name = model.name;
      const address = model.address;
      if (name && address) return 'nameaddr:' + name + '::' + address;
      if (name && model.hasPoint) return 'namegeo:' + name + '::' + model.lat.toFixed(4) + ',' + model.lng.toFixed(4);
      return name ? 'name:' + name : '';
    }

    function readNearbyAttractionsCacheEntries() {
      try {
        const raw = window.localStorage.getItem(CITY_VIEWER_NEARBY_CACHE_STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object') return [];
        const now = Date.now();
        return Object.keys(parsed).map((key) => {
          const entry = parsed[key];
          return {
            key: String(key || ''),
            timestamp: Number(entry && entry.timestamp || 0),
            data: Array.isArray(entry && entry.data) ? entry.data : []
          };
        }).filter((entry) => {
          if (!entry.key || !entry.data.length) return false;
          if (!Number.isFinite(entry.timestamp)) return true;
          return (now - entry.timestamp) <= CITY_VIEWER_NEARBY_CACHE_MAX_AGE_MS;
        });
      } catch (_error) {
        return [];
      }
    }

    function getCityLocationsForView(cityEntry) {
      if (!cityEntry) return [];
      if (Array.isArray(cityEntry.effectiveLocations)) return cityEntry.effectiveLocations;
      return Array.isArray(cityEntry.locations) ? cityEntry.locations : [];
    }

    function getCurrentCityLocationsForView() {
      return currentCityKey ? getCityLocationsForView(citiesData[currentCityKey]) : [];
    }

    function buildNearbyRecommendationGoogleUrl(item) {
      const existingUrl = String((item && item.googleUrl) || '').trim();
      if (existingUrl) return existingUrl;
      const query = String(item && item.name || 'Nearby place').trim();
      const placeId = String((item && (item.googlePlaceId || item.placeId)) || '').trim();
      const lat = Number(item && item.latitude);
      const lng = Number(item && item.longitude);
      const params = new URLSearchParams({
        api: '1',
        query: Number.isFinite(lat) && Number.isFinite(lng) ? `${lat},${lng}` : query
      });
      if (placeId) params.set('query_place_id', placeId);
      return `https://www.google.com/maps/search/?${params.toString()}`;
    }

    function estimateNearbyDriveTimeText(item) {
      const existing = String((item && (item.driveTimeText || item.driveTime)) || '').trim();
      if (existing) return existing;
      const distance = Number(item && item.distance);
      if (!Number.isFinite(distance) || distance <= 0) return '';
      const minutes = Math.max(5, Math.round(distance * 4));
      return minutes >= 60 ? `${Math.round(minutes / 60)}h` : `${minutes}m`;
    }

    function buildNearbyRecommendationTagText(item) {
      const tokens = [];
      const rawTags = String((item && item.tags) || '').trim();
      if (rawTags) tokens.push.apply(tokens, rawTags.split(','));
      if (Array.isArray(item && item.types)) tokens.push.apply(tokens, item.types);
      if (item && item.category) tokens.push(item.category);
      tokens.push('nearby');
      return Array.from(new Set(tokens
        .map((token) => String(token || '').replace(/_/g, ' ').trim().toLowerCase())
        .filter(Boolean)))
        .slice(0, 8)
        .join(', ');
    }

    function buildNearbyWebRecommendationRecord(item, cityEntry) {
      if (!item || !cityEntry) return null;
      const name = String(item.name || '').trim();
      if (!name) return null;
      const address = String(item.address || item.vicinity || item.description || '').trim();
      const googlePlaceId = String(item.googlePlaceId || item.placeId || item.id || '').trim();
      const rating = Number(item.rating || 0);
      const latitude = Number(item.latitude);
      const longitude = Number(item.longitude);
      const values = Array.from({ length: 27 }, () => '');
      values[0] = name;
      values[1] = googlePlaceId;
      values[3] = buildNearbyRecommendationTagText(item);
      values[4] = estimateNearbyDriveTimeText(item);
      values[5] = item.openNow === true ? 'Open now' : '';
      values[9] = String(cityEntry.state || '');
      values[10] = String(cityEntry.city || '');
      values[11] = address;
      values[13] = Number.isFinite(rating) && rating > 0 ? rating.toFixed(1) : '';
      values[16] = String(item.rankingReasonText || item.description || 'Nearby web recommendation').trim();
      values[23] = buildNearbyRecommendationGoogleUrl(item);
      values[25] = Number.isFinite(latitude) ? String(latitude) : '';
      values[26] = Number.isFinite(longitude) ? String(longitude) : '';
      return {
        city: cityEntry.city,
        state: cityEntry.state,
        name: name,
        googlePlaceId: googlePlaceId,
        address: address,
        description: String(item.rankingReasonText || item.description || 'Nearby web recommendation').trim(),
        driveTime: values[4],
        hours: values[5],
        rating: values[13],
        website: '',
        googleUrl: values[23],
        tags: values[3],
        latitude: Number.isFinite(latitude) ? latitude : '',
        longitude: Number.isFinite(longitude) ? longitude : '',
        source: 'web',
        recommendationSource: String(item.source || 'web'),
        sourceLabel: 'Web recommendation / Nearby cache',
        isWebRecommendation: true,
        webRecommendation: true,
        values: [values]
      };
    }

    function refreshCityNearbyBlend(cityEntry) {
      const savedLocations = Array.isArray(cityEntry && cityEntry.locations) ? cityEntry.locations.slice() : [];
      if (!cityEntry) return savedLocations;
      const savedIdentityKeys = new Set(savedLocations.map(getLocationIdentityKey).filter(Boolean));
      const savedIdentityModels = savedLocations.map(getLocationIdentityModel);
      const geoAnchors = savedLocations.map(getLocationLatLng).filter(Boolean);
      const thresholds = getActiveNearbyBlendThresholds();
      const relevantEntries = geoAnchors.length
        ? readNearbyAttractionsCacheEntries().filter((entry) => {
          const center = parseNearbyCacheCenter(entry.key);
          if (!center) return false;
          return geoAnchors.some((anchor) => calculateGeoMilesBetween(center.lat, center.lng, anchor.lat, anchor.lng) <= thresholds.cityMatchMiles);
        })
        : [];
      const webLocations = [];
      const acceptedWebModels = [];
      const stats = {
        cacheEntryCount: relevantEntries.length,
        rawNearbyCount: 0,
        skippedExistsCount: 0,
        skippedIdentityCount: 0,
        skippedFuzzyCount: 0,
        addedWebCount: 0,
        activeCityMatchMiles: thresholds.cityMatchMiles,
        activeDedupeGeoMiles: thresholds.dedupeGeoMiles,
        activeDedupeNameGeoMiles: thresholds.dedupeNameGeoMiles
      };
      relevantEntries.forEach((entry) => {
        entry.data.forEach((item) => {
          if (!item) return;
          stats.rawNearbyCount += 1;
          if (item.exists) {
            stats.skippedExistsCount += 1;
            return;
          }
          const itemKey = getNearbyAttractionIdentityKey(item);
          if (itemKey && savedIdentityKeys.has(itemKey)) {
            stats.skippedIdentityCount += 1;
            return;
          }
          const itemModel = buildIdentityModel(item || {});
          const matchedSaved = savedIdentityModels.some((savedModel) => modelsLikelySameLocation(savedModel, itemModel));
          const matchedWeb = acceptedWebModels.some((webModel) => modelsLikelySameLocation(webModel, itemModel));
          if (matchedSaved || matchedWeb) {
            stats.skippedFuzzyCount += 1;
            return;
          }
          const record = buildNearbyWebRecommendationRecord(item, cityEntry);
          if (!record) return;
          const recordKey = getLocationIdentityKey(record);
          if (recordKey && savedIdentityKeys.has(recordKey)) {
            stats.skippedIdentityCount += 1;
            return;
          }
          if (recordKey) savedIdentityKeys.add(recordKey);
          webLocations.push(record);
          acceptedWebModels.push(getLocationIdentityModel(record));
          stats.addedWebCount += 1;
        });
      });
      webLocations.sort((a, b) => String(locVal(a, 0, 'name') || '').localeCompare(String(locVal(b, 0, 'name') || '')));
      cityEntry.effectiveLocations = savedLocations.concat(webLocations);
      cityEntry.nearbyBlendMeta = {
        savedCount: savedLocations.length,
        webCount: webLocations.length,
        totalCount: savedLocations.length + webLocations.length,
        cacheMatchCount: relevantEntries.length,
        rawNearbyCount: stats.rawNearbyCount,
        skippedExistsCount: stats.skippedExistsCount,
        skippedIdentityCount: stats.skippedIdentityCount,
        skippedFuzzyCount: stats.skippedFuzzyCount,
        dedupedCount: stats.skippedIdentityCount + stats.skippedFuzzyCount,
        addedWebCount: stats.addedWebCount,
        activeCityMatchMiles: stats.activeCityMatchMiles,
        activeDedupeGeoMiles: stats.activeDedupeGeoMiles,
        activeDedupeNameGeoMiles: stats.activeDedupeNameGeoMiles
      };
      return cityEntry.effectiveLocations;
    }

    function renderLocationsPageSubtitle(cityEntry) {

      const meta = cityEntry.nearbyBlendMeta || { savedCount: getCityLocationsForView(cityEntry).length, webCount: 0 };
      const webCount = Number(meta.webCount || 0);
      if (webCount > 0) {

    function toggleLocSourceFilter(sourceKey) {
      const next = String(sourceKey || '').trim().toLowerCase();
      activeLocSourceFilter = activeLocSourceFilter === next ? '' : (next === 'saved' || next === 'web' ? next : '');

    function getLocFilterCriteria() {
      return {
        searchTerm: String((document.getElementById('locSearchName') && document.getElementById('locSearchName').value) || '').trim().toLowerCase(),
        diffFilter: String((document.getElementById('locFilterDifficulty') && document.getElementById('locFilterDifficulty').value) || '').toLowerCase(),
        costFilter: String((document.getElementById('locFilterCost') && document.getElementById('locFilterCost').value) || '').toLowerCase(),
        tagFilter: String(activeLocQuickTag || ((document.getElementById('locFilterTag') && document.getElementById('locFilterTag').value) || '')).trim().toLowerCase(),
        openNowOnly: !!(document.getElementById('locFilterOpenNow') && document.getElementById('locFilterOpenNow').checked),
        closingSoonOnly: !!(document.getElementById('locFilterClosingSoon') && document.getElementById('locFilterClosingSoon').checked),
        sourceFilter: String(activeLocSourceFilter || '').trim().toLowerCase(),
        familyPreferences: normalizeFamilyPreferences(familyPreferences || loadFamilyPreferences())
      };
    }

    function locationMatchesLocCriteria(loc, criteria, options) {
      const settings = options || {};
      const filters = criteria || getLocFilterCriteria();
      if (!locationMatchesPrefilter(loc)) return false;
      const name = String(locVal(loc, 0, 'name')).toLowerCase();
      const tags = getLocationTags(loc).join(',').toLowerCase();
      const difficulty = String(locVal(loc, 7, 'difficulty')).toLowerCase();
      const cost = String(locVal(loc, 14, 'cost')).toLowerCase();
      const openInfo = getOpenInfoForToday(locVal(loc, 5, 'hours'));
      if (filters.searchTerm && !name.includes(filters.searchTerm)) return false;
      if (filters.diffFilter && !difficulty.includes(filters.diffFilter)) return false;
      if (filters.costFilter && !cost.includes(filters.costFilter)) return false;
      if (filters.tagFilter && !tags.includes(filters.tagFilter)) return false;
      if (filters.openNowOnly && !openInfo.isOpen) return false;
      if (filters.closingSoonOnly && !(openInfo.isOpen && openInfo.minutesUntilClose !== null && openInfo.minutesUntilClose <= 120)) return false;
      if (!settings.ignoreSourceFilter && filters.sourceFilter && getLocSourceKey(loc) !== filters.sourceFilter) return false;

      const prefs = normalizeFamilyPreferences(filters.familyPreferences || familyPreferences || loadFamilyPreferences());
      const driveMinutes = getLocationDriveMinutesForFamily(loc);
      if (prefs.nearbyOnly && Number.isFinite(driveMinutes) && driveMinutes > 120) return false;
      if (prefs.dayTrip && Number.isFinite(driveMinutes) && (driveMinutes < 45 || driveMinutes > 240)) return false;
      if (prefs.overnightStay && Number.isFinite(driveMinutes) && driveMinutes < 150) return false;
      if (prefs.freeOnly && !/free/i.test(cost)) return false;
      if (prefs.budgetMode && !locationLooksBudgetFriendly(loc)) return false;
      if (prefs.indoorOnly && !locationLooksIndoor(loc)) return false;
      if (prefs.petFriendly && !locationLooksPetFriendly(loc)) return false;
      if (prefs.lowWalking && !locationLooksLowWalking(loc)) return false;

      return true;
    }

    function compareLocationsForSort(a, b, sortBy, cityEntry) {
      const sourcePriority = getLocationSourcePriority(a) - getLocationSourcePriority(b);
      if (sourcePriority !== 0) return sourcePriority;
      const costOrder = { free: 0, '$': 1, '$$': 2, '$$$': 3, '$$$$': 4 };
      const diffOrder = { easy: 0, moderate: 1, hard: 2 };
      let av;
      let bv;
      if (sortBy === 'driveTime') {
        av = parseDriveMinutes(locVal(a, 4, 'driveTime'));
        bv = parseDriveMinutes(locVal(b, 4, 'driveTime'));
      } else if (sortBy === 'difficulty') {
        av = diffOrder[String(locVal(a, 7, 'difficulty')).toLowerCase()] ?? 99;
        bv = diffOrder[String(locVal(b, 7, 'difficulty')).toLowerCase()] ?? 99;
      } else if (sortBy === 'cost') {
        av = costOrder[String(locVal(a, 14, 'cost')).toLowerCase()] ?? 99;
        bv = costOrder[String(locVal(b, 14, 'cost')).toLowerCase()] ?? 99;
      } else if (sortBy === 'rating') {
        av = parseFloat(locVal(a, 13, 'rating')) || 0;
        bv = parseFloat(locVal(b, 13, 'rating')) || 0;
      } else if (sortBy === 'bestValue') {
        av = getLocationBestValueScore(a);
        bv = getLocationBestValueScore(b);
      } else if (sortBy === 'mostUnique') {
        av = getLocationMostUniqueScore(a, cityEntry);
        bv = getLocationMostUniqueScore(b, cityEntry);
      } else if (sortBy === 'tags') {
        av = String(locVal(a, 3, 'tags')).toLowerCase();
        bv = String(locVal(b, 3, 'tags')).toLowerCase();
      } else {
        av = String(locVal(a, 0, 'name')).toLowerCase();
        bv = String(locVal(b, 0, 'name')).toLowerCase();
      }
      if (typeof av === 'number' && typeof bv === 'number') {
        const delta = locSortOrder === 'asc' ? av - bv : bv - av;
        if (delta !== 0) return delta;
      } else {
        const cmp = String(av).localeCompare(String(bv));
        if (cmp !== 0) return locSortOrder === 'asc' ? cmp : -cmp;
      }
      return String(locVal(a, 0, 'name') || '').localeCompare(String(locVal(b, 0, 'name') || ''));
    }

    function getLocFilterState() {
      return {
        searchName: document.getElementById('locSearchName').value,
        difficulty: document.getElementById('locFilterDifficulty').value,
        cost: document.getElementById('locFilterCost').value,
        tagText: document.getElementById('locFilterTag').value,
        openNow: document.getElementById('locFilterOpenNow').checked,
        closingSoon: document.getElementById('locFilterClosingSoon').checked,
        sourceFilter: activeLocSourceFilter,
        sortBy: document.getElementById('locSortBy').value,
        sortOrder: locSortOrder,

    function applyLocFilterState(state) {
      if (!state) return;
      document.getElementById('locSearchName').value = state.searchName || '';
      document.getElementById('locFilterDifficulty').value = state.difficulty || '';
      document.getElementById('locFilterCost').value = state.cost || '';
      document.getElementById('locFilterTag').value = state.tagText || '';
      document.getElementById('locFilterOpenNow').checked = Boolean(state.openNow);
      document.getElementById('locFilterClosingSoon').checked = Boolean(state.closingSoon);

      document.querySelectorAll('#locQuickTags .loc-tag-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tag === activeLocQuickTag);
      });
      setSplitView(Boolean(state.splitView));
      if (state.familyPreferences && typeof state.familyPreferences === 'object') {
        saveFamilyPreferences(state.familyPreferences);
      }
      activeFamilyPreset = String(state.familyPresetKey || '').trim();
      renderFamilyExperienceControls();

      catch (_) { return {}; }

      if (!currentCityKey) return;

    function refreshPresetSelect() {
      const select = document.getElementById('locPresetSelect');
      if (!select) return;
      const cityPresets = getPresetsForCity();
      const globalPresets = getGlobalPresets();
      const cityNames = Object.keys(cityPresets).sort();
      const globalNames = Object.keys(globalPresets).sort();
      const options = ['<option value="">Saved presets...</option>'];
      if (cityNames.length) {
        options.push('<optgroup label="This City">');
        cityNames.forEach(name => options.push(`<option value="city::${escAttr(name)}">📍 ${escHtml(name)}</option>`));
        options.push('</optgroup>');
      }
      if (globalNames.length) {
        options.push('<optgroup label="Global">');
        globalNames.forEach(name => options.push(`<option value="global::${escAttr(name)}">🌐 ${escHtml(name)}</option>`));
        options.push('</optgroup>');

      select.innerHTML = options.join('');

    function parsePresetOption(value) {
      const v = String(value || '');
      if (!v) return null;
      if (v.startsWith('city::')) return { scope: 'city', name: v.slice(6) };
      if (v.startsWith('global::')) return { scope: 'global', name: v.slice(8) };
      return { scope: 'city', name: v }; // backwards compatibility
    }

    function saveLocPreset() {
      const name = document.getElementById('locPresetName').value.trim();
      if (!name) return alert('Enter a preset name first.');
      const scope = (document.getElementById('locPresetScope')?.value || 'city');
      if (scope === 'global') {
        const presets = getGlobalPresets();
        presets[name] = getLocFilterState();
        setGlobalPresets(presets);
      } else {
        const presets = getPresetsForCity();
        presets[name] = getLocFilterState();
        setPresetsForCity(presets);
      }
      document.getElementById('locPresetName').value = '';
    }

    function loadSelectedLocPreset() {
      const parsed = parsePresetOption(document.getElementById('locPresetSelect').value);
      if (!parsed) return;
      const source = parsed.scope === 'global' ? getGlobalPresets() : getPresetsForCity();
      if (!source[parsed.name]) return;
      applyLocFilterState(source[parsed.name]);
      applyLocFilters();
    }

    function deleteSelectedLocPreset() {
      const parsed = parsePresetOption(document.getElementById('locPresetSelect').value);
      if (!parsed) return;
      if (parsed.scope === 'global') {
        const presets = getGlobalPresets();
        delete presets[parsed.name];
        setGlobalPresets(presets);
      } else {
        const presets = getPresetsForCity();
        delete presets[parsed.name];
        setPresetsForCity(presets);
      }
    }

    function parseDriveMinutes(value) {
      const text = String(value || '').toLowerCase().trim();
      if (!text) return Number.POSITIVE_INFINITY;
      const hoursMatch = text.match(/(\d+(?:\.\d+)?)\s*h/);
      const minsMatch = text.match(/(\d+(?:\.\d+)?)\s*m/);
      const minuteWordMatch = text.match(/~?\s*(\d+(?:\.\d+)?)\s*minutes?/);
      let total = 0;
      let matched = false;
      if (hoursMatch) {
        total += Number(hoursMatch[1]) * 60;
        matched = true;
      }
      if (minsMatch) {
        total += Number(minsMatch[1]);
        matched = true;
      }
      if (!matched && minuteWordMatch) {
        total = Number(minuteWordMatch[1]);
        matched = true;
      }
      return matched && Number.isFinite(total) ? total : Number.POSITIVE_INFINITY;
    }

    function getLocationTags(loc) {
      return getLocationDerivedTags(loc).map((entry) => entry.text);
    }

    function getLocationCostRank(loc) {
      const raw = String(locVal(loc, 14, 'cost') || '').toLowerCase().trim();
      const costOrder = { free: 0, '$': 1, '$$': 2, '$$$': 3, '$$$$': 4 };
      return costOrder[raw] ?? 2;
    }

    function getLocationBestValueScore(loc) {
      const rating = parseFloat(locVal(loc, 13, 'rating')) || 0;
      const openInfo = getOpenInfoForToday(locVal(loc, 5, 'hours'));
      const driveMins = parseDriveMinutes(locVal(loc, 4, 'driveTime'));
      const tagCount = getLocationTags(loc).length;
      const costRank = getLocationCostRank(loc);
      const driveBonus = Number.isFinite(driveMins) ? Math.max(0, 35 - Math.min(driveMins, 35)) : 0;
      return (rating * 30) - (costRank * 12) + driveBonus + (openInfo.isOpen ? 8 : 0) + (tagCount * 2);
    }

    function buildCityTagFrequency(locations) {
      return locations.reduce((acc, loc) => {
        getLocationTags(loc).forEach(tag => {
          const norm = tag.toLowerCase();
          acc[norm] = (acc[norm] || 0) + 1;
        });
        return acc;
      }, {});
    }

    function getLocationMostUniqueScore(loc, cityEntry) {
      const tagFreq = buildCityTagFrequency(getCityLocationsForView(cityEntry));
      const tags = getLocationTags(loc);
      const rarityScore = tags.reduce((sum, tag) => {
        const count = tagFreq[String(tag || '').toLowerCase()] || 1;
        return sum + (12 / count);
      }, 0);
      const descriptionLength = String(locVal(loc, 12, 'description') || '').trim().length;
      const rating = parseFloat(locVal(loc, 13, 'rating')) || 0;
      return rarityScore + Math.min(18, descriptionLength / 18) + rating;
    }

    function parseDurationMinutes(value) {
      const text = String(value || '').toLowerCase().trim();
      if (!text) return 60;
      const hoursMatch = text.match(/(\d+(?:\.\d+)?)\s*h/);
      const minsMatch = text.match(/(\d+(?:\.\d+)?)\s*m(in(ute)?s?)?/);
      const hourWordMatch = text.match(/(\d+(?:\.\d+)?)\s*hours?/);
      const minuteWordMatch = text.match(/(\d+(?:\.\d+)?)\s*minutes?/);
      let total = 0;
      let matched = false;
      if (hoursMatch) {
        total += Number(hoursMatch[1]) * 60;
        matched = true;
      }
      if (hourWordMatch && !hoursMatch) {
        total += Number(hourWordMatch[1]) * 60;
        matched = true;
      }
      if (minsMatch) {
        total += Number(minsMatch[1]);
        matched = true;
      }
      if (minuteWordMatch && !minsMatch) {
        total += Number(minuteWordMatch[1]);
        matched = true;
      }
      if (!matched) {
        const rawNumber = Number.parseInt(text, 10);
        if (Number.isFinite(rawNumber)) return rawNumber;
      }
      return matched && total > 0 ? total : 60;
    }

    function formatMinutesCompact(minutes) {
      const value = Math.max(0, Math.round(Number(minutes) || 0));
      const hours = Math.floor(value / 60);
      const mins = value % 60;
      if (hours && mins) return `${hours}h ${mins}m`;
      if (hours) return `${hours}h`;
      return `${mins}m`;
    }

    function estimateTravelMinutesBetweenStops(fromLoc, toLoc) {
      if (!fromLoc || !toLoc) return 0;
      const fromLat = parseFloat(locVal(fromLoc, 25, 'latitude') || locVal(fromLoc, 26, 'lat') || fromLoc.latitude || fromLoc.lat);
      const fromLng = parseFloat(locVal(fromLoc, 26, 'longitude') || locVal(fromLoc, 27, 'lng') || fromLoc.longitude || fromLoc.lng);
      const toLat = parseFloat(locVal(toLoc, 25, 'latitude') || locVal(toLoc, 26, 'lat') || toLoc.latitude || toLoc.lat);
      const toLng = parseFloat(locVal(toLoc, 26, 'longitude') || locVal(toLoc, 27, 'lng') || toLoc.longitude || toLoc.lng);

      if (Number.isFinite(fromLat) && Number.isFinite(fromLng) && Number.isFinite(toLat) && Number.isFinite(toLng)) {
        const toRad = (deg) => (deg * Math.PI) / 180;
        const earthMiles = 3959;
        const dLat = toRad(toLat - fromLat);
        const dLng = toRad(toLng - fromLng);
        const a =
          Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos(toRad(fromLat)) * Math.cos(toRad(toLat)) *
          Math.sin(dLng / 2) * Math.sin(dLng / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        const miles = earthMiles * c;
        return Math.max(6, Math.min(55, Math.round((miles * 2.6) + 4)));
      }

      const fromPoint = getLocPoint(fromLoc, getLocId(fromLoc));
      const toPoint = getLocPoint(toLoc, getLocId(toLoc));
      const dx = fromPoint.x - toPoint.x;
      const dy = fromPoint.y - toPoint.y;
      const distance = Math.sqrt(dx * dx + dy * dy);
      return Math.max(8, Math.min(40, Math.round(distance * 6)));
    }

    function getPlannerConfidenceClass(level) {
      if (level === 'high') return 'high';
      if (level === 'medium') return 'medium';
      return 'low';
    }

    function analyzeRoutePlan(route, options) {
      const safeRoute = Array.isArray(route) ? route.filter(Boolean) : [];
      const normalizedOptions = options || {};
      const startStr = String(normalizedOptions.startTime || document.getElementById('locTimeStart')?.value || '09:00');
      const endStr = String(normalizedOptions.endTime || document.getElementById('locTimeEnd')?.value || '17:00');
      const perStopOverride = Math.max(15, parseInt(normalizedOptions.perStopMinutes || document.getElementById('locTimePerStop')?.value, 10) || 60);

      const stops = safeRoute.map(loc => ({
        loc,
        locId: getLocId(loc),
        name: String(locVal(loc, 0, 'name') || 'Location'),
        rating: parseFloat(locVal(loc, 13, 'rating')) || 0,
        costRank: getLocationCostRank(loc),
        uniqueScore: getLocationMostUniqueScore(loc, currentCityKey ? citiesData[currentCityKey] : null),
        bestValueScore: getLocationBestValueScore(loc),
        durationMinutes: perStopOverride || parseDurationMinutes(locVal(loc, 6, 'duration')),
        tags: getLocationTags(loc)
      }));

      let travelMinutes = 0;
      for (let i = 0; i < safeRoute.length - 1; i++) {
        travelMinutes += estimateTravelMinutesBetweenStops(safeRoute[i], safeRoute[i + 1]);
      }

      const stopMinutes = stops.reduce((sum, stop) => sum + stop.durationMinutes, 0);
      const availableMinutes = Math.max(0, timeToMinutes(endStr) - timeToMinutes(startStr));
      const totalRequiredMinutes = travelMinutes + stopMinutes;
      const slackMinutes = availableMinutes - totalRequiredMinutes;
      const uniqueTagCount = new Set(stops.flatMap(stop => stop.tags.map(tag => tag.toLowerCase()))).size;
      const averageRating = stops.length ? (stops.reduce((sum, stop) => sum + stop.rating, 0) / stops.length) : 0;
      const averageCostRank = stops.length ? (stops.reduce((sum, stop) => sum + stop.costRank, 0) / stops.length) : 0;
      const averageUniqueScore = stops.length ? (stops.reduce((sum, stop) => sum + stop.uniqueScore, 0) / stops.length) : 0;
      const averageBestValue = stops.length ? (stops.reduce((sum, stop) => sum + stop.bestValueScore, 0) / stops.length) : 0;
      const efficiencyScore = Math.max(0, 100 - Math.min(70, travelMinutes * 1.4));
      const affordabilityScore = Math.max(0, 100 - (averageCostRank * 18));
      const varietyScore = Math.min(100, uniqueTagCount * 10 + averageUniqueScore * 1.3);
      const qualityScore = Math.min(100, averageRating * 20.5);
      const valueScore = Math.min(100, averageBestValue * 0.9);
      const rawScore = (qualityScore * 0.32) + (efficiencyScore * 0.24) + (affordabilityScore * 0.14) + (varietyScore * 0.15) + (valueScore * 0.15);
      const itineraryScore = Math.max(1, Math.min(100, Math.round(rawScore)));

      let confidenceLabel = 'Risky';
      let confidenceLevel = 'low';
      let confidenceReason = 'Current time window is likely too tight for the selected stops.';
      if (slackMinutes >= 60) {
        confidenceLabel = 'Comfortable';
        confidenceLevel = 'high';
        confidenceReason = 'Strong buffer remains after travel and stop-time estimates.';
      } else if (slackMinutes >= 0) {
        confidenceLabel = 'Tight';
        confidenceLevel = 'medium';
        confidenceReason = 'This plan works, but there is limited slack for delays.';
      }

      return {
        stops,
        startStr,
        endStr,
        perStopMinutes: perStopOverride,
        availableMinutes,
        travelMinutes,
        stopMinutes,
        totalRequiredMinutes,
        slackMinutes,
        uniqueTagCount,
        averageRating,
        itineraryScore,
        efficiencyScore,
        confidenceLabel,
        confidenceLevel,
        confidenceReason
      };
    }

    function toRouteStopDescriptor(loc) {
      return {
        locId: getLocId(loc),
        name: String(locVal(loc, 0, 'name') || ''),
        placeId: String(locVal(loc, 1, 'googlePlaceId') || ''),
        address: String(locVal(loc, 11, 'address') || ''),
        lat: parseFloat(locVal(loc, 25, 'latitude') || locVal(loc, 26, 'lat') || loc.latitude || loc.lat),
        lng: parseFloat(locVal(loc, 26, 'longitude') || locVal(loc, 27, 'lng') || loc.longitude || loc.lng)
      };
    }

    function routeSignature(route) {
      return route.map(loc => getLocId(loc)).join('|');
    }

    function buildNearestNeighborRoute(selected) {
      const remaining = selected.slice().sort((a, b) => String(locVal(a, 0, 'name')).localeCompare(String(locVal(b, 0, 'name'))));
      const route = [remaining.shift()];
      while (remaining.length) {
        const last = route[route.length - 1];
        const lastPt = getLocPoint(last, getLocId(last));
        let bestIdx = 0;
        let bestDist = Infinity;
        remaining.forEach((candidate, idx) => {
          const pt = getLocPoint(candidate, getLocId(candidate));
          const dx = lastPt.x - pt.x;
          const dy = lastPt.y - pt.y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < bestDist) { bestDist = d; bestIdx = idx; }
        });
        route.push(remaining.splice(bestIdx, 1)[0]);
      }
      return route;
    }

    function buildRouteVariantCandidates(selected) {
      const candidates = [
        {
          id: 'balanced-core',
          label: 'Balanced optimizer',
          role: 'primary-candidate',
          route: buildNearestNeighborRoute(selected)
        },
        {
          id: 'quality-first',
          label: 'Quality-first alternate',
          role: 'quality-alt',
          route: selected.slice().sort((a, b) => {
            const ratingCmp = (parseFloat(locVal(b, 13, 'rating')) || 0) - (parseFloat(locVal(a, 13, 'rating')) || 0);
            if (ratingCmp !== 0) return ratingCmp;
            return getLocationBestValueScore(b) - getLocationBestValueScore(a);
          })
        },
        {
          id: 'budget-friendly',
          label: 'Budget-friendly alternate',
          role: 'budget-alt',
          route: selected.slice().sort((a, b) => {
            const costCmp = getLocationCostRank(a) - getLocationCostRank(b);
            if (costCmp !== 0) return costCmp;
            const driveCmp = parseDriveMinutes(locVal(a, 4, 'driveTime')) - parseDriveMinutes(locVal(b, 4, 'driveTime'));
            if (Number.isFinite(driveCmp) && driveCmp !== 0) return driveCmp;
            return (parseFloat(locVal(b, 13, 'rating')) || 0) - (parseFloat(locVal(a, 13, 'rating')) || 0);
          })
        }
      ];

      const seen = new Set();
      return candidates.filter(candidate => {
        const sig = routeSignature(candidate.route);
        if (!sig || seen.has(sig)) return false;
        seen.add(sig);
        return true;
      });
    }

    function scoreRouteVariant(analysis) {
      const weights = optimizerWeights || { rating: 4, cost: 3, travel: 4 };
      const ratingWeight = Math.max(1, Math.min(5, Number(weights.rating) || 4));
      const costWeight = Math.max(1, Math.min(5, Number(weights.cost) || 3));
      const travelWeight = Math.max(1, Math.min(5, Number(weights.travel) || 4));
      if (!analysis) return 0;
      const confidenceBonus = analysis.confidenceLevel === 'high' ? 12 : (analysis.confidenceLevel === 'medium' ? 6 : 0);
      return analysis.itineraryScore
        + confidenceBonus
        + (analysis.averageRating * ratingWeight * 2)
        - (analysis.averageCostRank * costWeight * 2.8)
        + ((analysis.efficiencyScore / 100) * travelWeight * 10);
    }

    function clampOptimizerWeight(value, fallback) {
      const numeric = Number.parseInt(String(value || ''), 10);
      if (!Number.isFinite(numeric)) return fallback;
      return Math.max(1, Math.min(5, numeric));
    }

    function getOptimizerWeightsFromControls() {
      const rating = clampOptimizerWeight(document.getElementById('locWeightRating')?.value, optimizerWeights.rating || 4);
      const cost = clampOptimizerWeight(document.getElementById('locWeightCost')?.value, optimizerWeights.cost || 3);
      const travel = clampOptimizerWeight(document.getElementById('locWeightTravel')?.value, optimizerWeights.travel || 4);
      return { rating, cost, travel };
    }

    function syncOptimizerWeightControls() {
      const ratingSel = document.getElementById('locWeightRating');
      const costSel = document.getElementById('locWeightCost');
      const travelSel = document.getElementById('locWeightTravel');
      if (ratingSel) ratingSel.value = String(optimizerWeights.rating || 4);
      if (costSel) costSel.value = String(optimizerWeights.cost || 3);
      if (travelSel) travelSel.value = String(optimizerWeights.travel || 4);
      const summary = document.querySelector('[data-optimizer-weights]');
      if (summary) {
        summary.textContent = `Weights: rating ${optimizerWeights.rating} · cost ${optimizerWeights.cost} · travel ${optimizerWeights.travel}`;
      }
    }

    function buildRouteTradeoffSentence(baseAnalysis, altAnalysis) {
      if (!baseAnalysis || !altAnalysis) return 'Tradeoff data unavailable.';
      const deltaTravel = Math.round(altAnalysis.travelMinutes - baseAnalysis.travelMinutes);
      const deltaRating = altAnalysis.averageRating - baseAnalysis.averageRating;
      const deltaCost = altAnalysis.averageCostRank - baseAnalysis.averageCostRank;
      const travelText = `${deltaTravel >= 0 ? '+' : ''}${deltaTravel} min travel`;
      const ratingText = `${deltaRating >= 0 ? '+' : ''}${deltaRating.toFixed(1)} rating`;
      const costText = deltaCost < 0
        ? `${Math.abs(deltaCost).toFixed(1)} cost-rank cheaper`
        : (deltaCost > 0 ? `${deltaCost.toFixed(1)} cost-rank pricier` : 'same cost profile');
      return `${travelText} for ${ratingText}; ${costText}.`;
    }

    function buildOptimizedRoutePlan(selected, options) {
      const variants = buildRouteVariantCandidates(selected).map(variant => {
        const analysis = analyzeRoutePlan(variant.route, options);
        return {
          ...variant,
          analysis,
          utilityScore: scoreRouteVariant(analysis)
        };
      });
      variants.sort((a, b) => b.utilityScore - a.utilityScore);

      const primary = variants[0] || null;
      if (!primary) return { primary: null, variants: [] };

      const budgetAlt = variants.find(v => v.role === 'budget-alt' && v.id !== primary.id) || null;
      const qualityAlt = variants.find(v => v.role === 'quality-alt' && v.id !== primary.id) || null;

      const annotated = variants.map(variant => {
        const tradeoff = variant.id === primary.id
          ? 'Baseline route optimized for score and feasibility.'
          : buildRouteTradeoffSentence(primary.analysis, variant.analysis);
        return {
          ...variant,
          tradeoff,
          isBudgetAlt: Boolean(budgetAlt && budgetAlt.id === variant.id),
          isQualityAlt: Boolean(qualityAlt && qualityAlt.id === variant.id)
        };
      });

      return {
        primary,
        variants: annotated,
        budgetAlt,
        qualityAlt
      };
    }

    function buildOptimizedPlanFromCurrentSelection(options) {
      const shortlistIds = Array.from(getShortlistSet());
      const selected = shortlistIds.map(id => findLocationById(id)).filter(Boolean);
      if (selected.length < 2) return null;
      return buildOptimizedRoutePlan(selected, options);
    }

    function renderPlannedRoute(route, analysis, optimizedPlan, activeVariantId) {
      if (!Array.isArray(route) || !route.length) return;
      lastBuiltDayPlanRoute = route.map(toRouteStopDescriptor);
      document.getElementById('locDayPlan').classList.add('visible');
      document.getElementById('locTimeWindow').style.display = 'block';
      renderRoutePlanSummary(analysis);
      document.getElementById('locDayPlanList').innerHTML = route
        .map((loc, index) => {
          const stopDuration = parseDurationMinutes(locVal(loc, 6, 'duration'));
          const nextLeg = index < route.length - 1 ? estimateTravelMinutesBetweenStops(loc, route[index + 1]) : 0;
          return `<li>${escHtml(locVal(loc, 0, 'name') || 'Location')} <span class="u-note-muted">· stop ${escHtml(formatMinutesCompact(stopDuration))}${nextLeg ? ` · next leg ${escHtml(formatMinutesCompact(nextLeg))}` : ''}</span></li>`;
        })
        .join('');
      renderRouteQualityPanel(analysis);
      renderRouteTradeoffPanel(optimizedPlan, activeVariantId);
      updateVariantExportButton();
      updateRouteButtonsState();
    }

    function applyOptimizedRouteVariant(variantId) {
      const selectedId = String(variantId || '').trim();
      if (!selectedId || !Array.isArray(lastOptimizedRouteVariants) || !lastOptimizedRouteVariants.length) return;
      const selectedVariant = lastOptimizedRouteVariants.find(variant => variant.id === selectedId);
      if (!selectedVariant) return;

      activeOptimizedVariantId = selectedVariant.id;
      const optimizedPlan = {
        primary: lastOptimizedRouteVariants[0],
        variants: lastOptimizedRouteVariants,
        budgetAlt: lastOptimizedRouteVariants.find(v => v.isBudgetAlt) || null,
        qualityAlt: lastOptimizedRouteVariants.find(v => v.isQualityAlt) || null
      };
      renderPlannedRoute(selectedVariant.route, selectedVariant.analysis, optimizedPlan, activeOptimizedVariantId);
      showRouteToast(`Applied route: ${selectedVariant.label}`, false);
    }

    function applyOptimizerWeightsFromControls() {
      const weights = getOptimizerWeightsFromControls();
      optimizerWeights = { ...weights };
      const options = {
        startTime: document.getElementById('locTimeStart')?.value || '09:00',
        endTime: document.getElementById('locTimeEnd')?.value || '17:00',
        perStopMinutes: parseInt(document.getElementById('locTimePerStop')?.value, 10) || 60
      };
      const plan = buildOptimizedPlanFromCurrentSelection(options);
      if (!plan || !plan.primary) {
        showRouteToast('Select at least 2 locations to tune optimizer weights.', true);
        return;
      }
      const prevActive = activeOptimizedVariantId;
      lastOptimizedRouteVariants = plan.variants;
      activeOptimizedVariantId = plan.variants.some(variant => variant.id === prevActive) ? prevActive : plan.primary.id;
      const activeVariant = plan.variants.find(variant => variant.id === activeOptimizedVariantId) || plan.primary;
      renderPlannedRoute(activeVariant.route, activeVariant.analysis, plan, activeOptimizedVariantId);
      showRouteToast(`Optimizer weights updated (R${weights.rating}/C${weights.cost}/T${weights.travel}).`, false);
    }

      const variants = Array.isArray(lastOptimizedRouteVariants) ? lastOptimizedRouteVariants : [];
      const active = variants.find(variant => variant.id === activeOptimizedVariantId) || variants[0];
      if (!active) {
        showRouteToast('Build a route first to export a variant.', true);
        return;
      }
      const payload = {
        exportedAt: new Date().toISOString(),
        cityKey: currentCityKey || '',

          itineraryScore: active.analysis.itineraryScore,

          stopMinutes: active.analysis.stopMinutes,

        },

    function getLocationConfidenceModel(loc) {
      const foundation = getFamilyFoundation();
      const prefs = normalizeFamilyPreferences(familyPreferences || loadFamilyPreferences());
      if (foundation && typeof foundation.confidenceScore === 'function' && typeof foundation.buildWhySuggested === 'function') {
        const itemModel = buildFamilyConfidenceItemModel(loc);
        const familyFitParts = [];
        if (prefs.indoorOnly && itemModel.indoor) familyFitParts.push('indoor match');
        if (prefs.petFriendly && itemModel.petFriendly) familyFitParts.push('pet-friendly match');
        if (prefs.lowWalking && itemModel.walkingBurden <= 1) familyFitParts.push('low-walking fit');
        const familyFitLabel = familyFitParts.length ? familyFitParts.join(', ') : '';
        const score = foundation.confidenceScore(itemModel, prefs);
        const reasons = foundation.buildWhySuggested(itemModel, prefs, familyFitLabel ? { familyFitLabel } : null);
        const level = score >= 75 ? 'high' : score >= 55 ? 'medium' : 'low';
        const levelLabel = level === 'high' ? 'High confidence' : (level === 'medium' ? 'Medium confidence' : 'Low confidence');
        return {
          level,
          label: `${levelLabel} (${score}%)`,
          reason: reasons.join(' '),
          score,
          reasons
        };
      }

      const rating = parseFloat(locVal(loc, 13, 'rating'));
      const hours = String(locVal(loc, 5, 'hours') || '').trim();
      const address = String(locVal(loc, 11, 'address') || '').trim();
      const description = String(locVal(loc, 12, 'description') || '').trim();
      const driveMins = parseDriveMinutes(locVal(loc, 4, 'driveTime'));
      const website = String(locVal(loc, 2, 'website') || '').trim();
      const googleUrl = String(locVal(loc, 23, 'googleUrl') || '').trim();
      const lat = parseFloat(locVal(loc, 25, 'latitude') || locVal(loc, 26, 'lat') || loc.latitude || loc.lat);
      const lng = parseFloat(locVal(loc, 26, 'longitude') || locVal(loc, 27, 'lng') || loc.longitude || loc.lng);

      let score = 0;
      if (Number.isFinite(rating) && rating > 0) score += 2;
      if (hours) score += 1;
      if (address) score += 1;
      if (description.length >= 40) score += 1;
      if (website || googleUrl) score += 1;
      if (Number.isFinite(lat) && Number.isFinite(lng)) score += 1;
      if (Number.isFinite(driveMins)) score += 1;

      if (score >= 7) {
        return {
          level: 'high',
          label: 'High confidence',
          reason: 'Strong coverage across ratings, hours, address, links, and map data.',
          reasons: ['Strong listing metadata.']
        };
      }
      if (score >= 4) {
        return {
          level: 'medium',
          label: 'Medium confidence',
          reason: 'Useful listing, but some planning details are still limited.',
          reasons: ['Some planning details available.']
        };
      }
      return {
        level: 'low',
        label: 'Low confidence',
        reason: 'Only partial planning data is available for this location.',
        reasons: ['Limited planning metadata.']
      };
    }

    function buildRankBadgeIndexForCity(cityEntry) {
      const index = {};
      const locations = (cityEntry && Array.isArray(cityEntry.locations))
        ? cityEntry.locations.filter(locationMatchesPrefilter)
        : [];
      const rankingDefinitions = [
        {
          key: 'best-value',
          label: 'Best value',
          icon: '💎',
          className: 'best-value',
          scoreFor: item => getLocationBestValueScore(item),
          order: 'desc'
        },
        {
          key: 'most-unique',
          label: 'Unique pick',
          icon: '✨',
          className: 'most-unique',
          scoreFor: item => getLocationMostUniqueScore(item, cityEntry),
          order: 'desc'
        },
        {
          key: 'quick-stop',
          label: 'Quick stop',
          icon: '⚡',
          className: 'quick-stop',
          scoreFor: item => parseDriveMinutes(locVal(item, 4, 'driveTime')),
          order: 'asc'
        }
      ];

      rankingDefinitions.forEach((definition) => {
        const ranked = locations
          .map(item => ({ id: getLocId(item), score: definition.scoreFor(item) }))
          .filter(item => Number.isFinite(item.score))
          .sort((a, b) => definition.order === 'asc' ? a.score - b.score : b.score - a.score)
          .slice(0, 2);

        ranked.forEach((row, rankIdx) => {
          index[row.id] = index[row.id] || [];
          index[row.id].push({

    function buildBulkCopyPlan(ids, preferredSourceId) {
      const normalized = Array.from(new Set((ids || [])
        .map((id) => String(id || '').trim())
        .filter(Boolean)));
      const preferred = String(preferredSourceId || '').trim();
      const sourceMode = getBulkCopySourceMode();
      const mergeMode = getBulkCopyMergeMode();
      const sourceIds = sourceMode === 'union'
        ? Array.from(new Set((preferred ? [preferred] : []).concat(normalized)))
        : [preferred || normalized[0]].filter(Boolean);
      const sourceSet = new Set(sourceIds);
      const targetIds = sourceMode === 'union'
        ? normalized.slice()
        : normalized.filter((id) => !sourceSet.has(id));
      return { sourceIds, targetIds, sourceMode, mergeMode };
    }

    function replaceLocationDraftTags(locId, nextTags) {
      const location = findLocationById(locId);
      if (!location) return;
      const baseTags = parseTagTokens(locVal(location, 3, 'tags'));
      const next = parseTagTokens((Array.isArray(nextTags) ? nextTags : []).join(','));
      updateLocationEditState(locId, (draft) => {
        draft.addedTags = next.filter((tag) => !baseTags.includes(tag));
        draft.removedTags = baseTags.filter((tag) => !next.includes(tag));
      });
    }

    function getEffectiveLocationTagsById(locId) {
      const normalizedId = String(locId || '').trim();
      if (!normalizedId) return [];
      const loc = findLocationById(normalizedId);
      if (!loc) return [];
      const baseTags = parseTagTokens(locVal(loc, 3, 'tags'));
      const draft = getLocationEditState(normalizedId);
      const removed = new Set((draft.removedTags || []).map((tag) => String(tag || '').trim().toLowerCase()).filter(Boolean));
      const combined = parseTagTokens([...baseTags, ...(draft.addedTags || [])].join(','));
      return combined.filter((tag) => !removed.has(String(tag || '').trim().toLowerCase()));
    }

    function copyTagsFromLocationToTargets(sourceIds, targetIds, options = {}) {
      const sources = Array.from(new Set((Array.isArray(sourceIds) ? sourceIds : [sourceIds])
        .map((id) => String(id || '').trim())
        .filter(Boolean)));
      const sourceSet = new Set(sources);
      const targets = Array.from(new Set((targetIds || []).map((id) => String(id || '').trim()).filter(Boolean)));
      const mergeMode = String(options.mergeMode || 'append').trim().toLowerCase() === 'replace' ? 'replace' : 'append';
      if (!sources.length || !targets.length) {
        showRouteToast('Select one source and at least one different target location.', true);
        return null;
      }

      const sourceTags = parseTagTokens(sources.map((source) => getEffectiveLocationTagsById(source).join(',')).join(','));
      if (!sourceTags.length) {
        showRouteToast('Source location has no tags to copy.', true);
        return null;
      }

      targets.forEach((locId) => {
        if (mergeMode === 'replace') {
          replaceLocationDraftTags(locId, sourceTags);
          return;
        }
        updateLocationEditState(locId, (draft) => {
          sourceTags.forEach((token) => {
            if (!draft.addedTags.includes(token)) draft.addedTags.push(token);
            draft.removedTags = draft.removedTags.filter((tag) => tag !== token);
          });
        });
      });

      return { targets, sourceTags, sourceIds: sources, mergeMode, sourceMode: sourceSet.size > 1 ? 'union' : 'first' };
    }

    function applyBulkActionToIds(action, ids, valueText) {
      const normalizedAction = String(action || '').trim();
      const targets = Array.from(new Set((ids || []).map((id) => String(id || '').trim()).filter(Boolean)));
      if (!targets.length) {
        showRouteToast('Select at least one location first.', true);
        return;
      }
      const tagTokens = parseTagTokens(valueText);
      const noteText = String(valueText || '').trim();
      if ((normalizedAction === 'add-tags' || normalizedAction === 'remove-tags') && !tagTokens.length) {
        showRouteToast('Enter one or more tags first.', true);
        return;
      }
      if (normalizedAction === 'add-note' && !noteText) {
        showRouteToast('Enter a note first.', true);
        return;
      }

      let syncTargets = targets.slice();
      if (normalizedAction === 'copy-tags-from-first') {
        if (targets.length < 2) {
          showRouteToast('Select at least two locations to copy tags.', true);
          return;
        }
        const copyPlan = buildBulkCopyPlan(targets);
        const copyResult = copyTagsFromLocationToTargets(copyPlan.sourceIds, copyPlan.targetIds, { mergeMode: copyPlan.mergeMode });
        if (!copyResult) return;
        syncTargets = copyResult.targets;
        const verb = copyResult.mergeMode === 'replace' ? 'Replaced with' : 'Copied';
        const sourceLabel = copyPlan.sourceMode === 'union' ? `${copyResult.sourceIds.length} selected sources` : 'first selected source';
        showRouteToast(`${verb} ${copyResult.sourceTags.length} tag${copyResult.sourceTags.length === 1 ? '' : 's'} from ${sourceLabel} to ${copyResult.targets.length} selected location${copyResult.targets.length === 1 ? '' : 's'}.`, false);
      } else {

        targets.forEach((locId) => {
          updateLocationEditState(locId, (draft) => {
            if (normalizedAction === 'add-tags') {
              tagTokens.forEach((token) => {
                if (!draft.addedTags.includes(token)) draft.addedTags.push(token);
                draft.removedTags = draft.removedTags.filter((tag) => tag !== token);
              });
            } else if (normalizedAction === 'remove-tags') {
              tagTokens.forEach((token) => {
                if (!draft.removedTags.includes(token)) draft.removedTags.push(token);
                draft.addedTags = draft.addedTags.filter((tag) => tag !== token);
              });
            } else if (normalizedAction === 'add-note') {
              draft.note = noteText;
            } else if (normalizedAction === 'remove-notes') {
              draft.note = '';
            } else if (normalizedAction === 'mark-visited') {
              draft.visited = true;
              if (draft.visitCount < 1) draft.visitCount = 1;
            } else if (normalizedAction === 'add-visit') {
              draft.visited = true;
              draft.visitCount = Math.max(1, draft.visitCount + 1);
            }
          });
        });

        const label = normalizedAction.replace('-', ' ');
        showRouteToast(`Applied ${label} to ${targets.length} location${targets.length === 1 ? '' : 's'}.`, false);
      }
      buildQuickTagPills(getCurrentCityLocationsForView());
      populateTagDatalist(getCurrentCityLocationsForView());
      applyLocFilters();
      if (activeLocationDetailId) {
        const detailLoc = findLocationById(activeLocationDetailId);
        if (detailLoc) renderLocationDetail(detailLoc);
      }
      Promise.all(syncTargets.map((locId) => syncLocationEditsToGraph(locId))).then((results) => {
        if (results.some(Boolean)) {
          showRouteToast('Changes synced to Excel.', false);
        } else {
          console.info('City Explorer edits saved locally; Excel sync unavailable for current session/rows.');
        }
      }).catch((error) => {
        console.warn('⚠️ City Explorer post-edit sync failed:', error && error.message ? error.message : error);
      });
    }

    function applyBulkSelectionAction() {
      const select = document.getElementById('locBulkActionSelect');

      const action = String(select && select.value ? select.value : 'add-tags');

    function runQuickActionByEncodedId(encoded, action) {
      const locId = decodeURIComponent(String(encoded || ''));
      const loc = findLocationById(locId);
      if (!loc) return;
      const actionKey = String(action || '').trim();
      if (actionKey === 'copy-address') {
        copyTextToClipboard(locVal(loc, 11, 'address'), 'Address copied.');
        return;
      }
      if (actionKey === 'copy-gps') {
        copyTextToClipboard(getLocationGeoText(loc), 'GPS coordinates copied.');
        return;
      }
      if (actionKey === 'open-google') {
        const googleUrl = buildGoogleOpenUrlForLocation(loc);
        if (!googleUrl) {
          showRouteToast('No Google URL available for this location.', true);
          return;
        }
        window.open(googleUrl, '_blank', 'noopener');
        return;
      }
      if (actionKey === 'focus-map') {
        if (activeLocationDetailId) {
          goBackToLocationResults();
        }
        if (!locSplitView) setSplitView(true);
        setActiveLocation(locId, true);
        const visible = Array.isArray(lastFilteredLocations) && lastFilteredLocations.length
          ? lastFilteredLocations
          : getCurrentCityLocationsForView();
        requestAnimationFrame(() => renderLocMap(visible));
        showRouteToast('Focused location in split map view.', false);
        return;
      }
      if (actionKey === 'open-batch-tags') {
        openBatchTagActionsFromCityViewer(locId);
        return;
      }
      if (actionKey === 'copy-tags-to-selected') {
        const selectedIds = Array.from(getShortlistSet());
        const copyPlan = buildBulkCopyPlan(selectedIds, locId);
        const copyResult = copyTagsFromLocationToTargets(copyPlan.sourceIds, copyPlan.targetIds, { mergeMode: copyPlan.mergeMode });
        if (!copyResult) return;
        buildQuickTagPills(getCurrentCityLocationsForView());
        populateTagDatalist(getCurrentCityLocationsForView());
        applyLocFilters();
        Promise.all(copyResult.targets.map((targetId) => syncLocationEditsToGraph(targetId))).catch((error) => {
          console.warn('⚠️ City Explorer copy-tags sync failed:', error && error.message ? error.message : error);
        });
        const verb = copyResult.mergeMode === 'replace' ? 'Replaced with' : 'Copied';
        const sourceLabel = copyPlan.sourceMode === 'union' ? `${copyResult.sourceIds.length} selected sources` : 'selected source';
        showRouteToast(`${verb} ${copyResult.sourceTags.length} tag${copyResult.sourceTags.length === 1 ? '' : 's'} from ${sourceLabel} to ${copyResult.targets.length} selected location${copyResult.targets.length === 1 ? '' : 's'}.`, false);
        return;
      }

      let payload = '';
      if (actionKey === 'add-tags') {
        const response = window.prompt('Add tags (comma-separated):', '');
        if (response === null) return;
        payload = response;
      } else if (actionKey === 'remove-tags') {
        const response = window.prompt('Remove tags (comma-separated):', '');
        if (response === null) return;
        payload = response;
      } else if (actionKey === 'add-note') {
        const current = getLocationEditState(locId).note || '';
        const response = window.prompt('Add or update note:', current);
        if (response === null) return;
        payload = response;
      }
      applyBulkActionToIds(actionKey, [locId], payload);
    }

        const type = field.type === 'number' ? 'number' : (field.type === 'url' ? 'url' : 'text');
        const minAttr = field.type === 'number' ? ' min="0"' : '';
        return `<div class="loc-detail-edit-field"><label for="${escAttr(fieldId)}">${label}</label><input id="${escAttr(fieldId)}" type="${type}" value="${escAttr(getLocationFieldValueForEdit(loc, field.key))}"${minAttr}></div>`;

    function collectLocationDetailEditorValues() {
      const values = {};
      CITY_DETAIL_EDITABLE_FIELDS.forEach((field) => {
        const fieldId = `locDetailEdit_${field.key}`;
        const input = document.getElementById(fieldId);
        if (!input) return;
        if (field.type === 'checkbox') {
          values[field.key] = Boolean(input.checked);
          return;
        }
        if (field.type === 'number') {
          values[field.key] = Math.max(0, parseInt(input.value, 10) || 0);
          return;
        }
        values[field.key] = String(input.value || '').trim();
      });
      return values;
    }

      if (!loc || !values || typeof values !== 'object') return;
      setLocationRawValue(loc, 0, 'name', values.name);
      setLocationRawValue(loc, 2, 'website', values.website);
      setLocationRawValue(loc, 3, 'tags', parseTagTokens(values.tags).join(', '));
      setLocationRawValue(loc, 4, 'driveTime', values.driveTime);
      setLocationRawValue(loc, 5, 'hours', values.hours);
      setLocationRawValue(loc, 6, 'duration', values.duration);
      setLocationRawValue(loc, 7, 'difficulty', values.difficulty);
      setLocationRawValue(loc, 8, 'trailLength', values.trailLength);
      setLocationRawValue(loc, 11, 'address', values.address);
      setLocationRawValue(loc, 12, 'phone', values.phone);
      setLocationRawValue(loc, 13, 'rating', values.rating);
      setLocationRawValue(loc, 14, 'cost', values.cost);
      setLocationRawValue(loc, 16, 'description', values.description);
      setLocationRawValue(loc, 23, 'googleUrl', values.googleUrl);

      const locId = getLocId(loc);
      updateLocationEditState(locId, (draft) => {
        draft.addedTags = [];
        draft.removedTags = [];
        draft.note = String(values.note || '').trim();
        draft.visited = Boolean(values.visited);
        draft.visitCount = Math.max(0, parseInt(values.visitCount, 10) || 0);
      });

    async function saveLocationDetailEdits() {
      if (!activeLocationDetailId) return;

    function ensureCityMapsApiLoaded() {
      if (window.__cvMapsReady) return Promise.resolve(true);
      if (window.__cvMapsLoadPromise) return window.__cvMapsLoadPromise;

      window.__cvMapsLoadPromise = new Promise((resolve, reject) => {
        window.__cvMapsQueue = window.__cvMapsQueue || [];
        window.__cvMapsQueue.push(() => resolve(true));

        if (window.__cvMapsScriptRequested) return;
        window.__cvMapsScriptRequested = true;

        const apiKey = 'AIzaSyCwkOvyiQyJkiaCWkZUEP2PJGaWhk-HYXc';
        const script = document.createElement('script');
        script.async = true;
        script.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&libraries=places,geometry&callback=__cvMapsInit`;
        script.onerror = () => {
          window.__cvMapsLoadPromise = null;
          reject(new Error('Google Maps failed to load.'));
        };
        document.head.appendChild(script);
      });

      return window.__cvMapsLoadPromise;
    }
