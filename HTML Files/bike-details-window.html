<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bike Trail Details</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #111827;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px;
    }
    .head {
      background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
      color: #fff;
      padding: 24px;
      border-radius: 14px;
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }
    .head-main { flex: 1; min-width: 0; }
    h1 { margin: 0 0 8px; font-size: 30px; }
    .meta { opacity: 0.95; font-size: 14px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .btn {
      border: 1px solid rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.16);
      color: #fff;
      border-radius: 8px;
      padding: 8px 12px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }
    .auth-btn {
      background: white;
      color: #6b3cc9;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .auth-btn:hover { background: #f3f4f6; }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      border-bottom: 2px solid #e5e7eb;
      overflow-x: auto;
      padding-bottom: 2px;
    }
    .tab-btn {
      padding: 11px 16px;
      background: none;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      color: #6b7280;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .tab-btn.active {
      color: #8b5cf6;
      border-bottom-color: #8b5cf6;
    }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .label { color: #6b7280; font-size: 12px; font-weight: 600; text-transform: uppercase; }
    .value { margin-top: 6px; font-size: 14px; line-height: 1.45; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .tag { background: #f3e8ff; color: #7c3aed; border-radius: 999px; padding: 4px 8px; font-size: 12px; font-weight: 600; }
    .empty { color: #6b7280; }

    a {
      color: #8b5cf6;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }

    .addr-copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-left: 8px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      color: #374151;
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      vertical-align: middle;
    }
    .addr-copy-btn:hover { background: #e5e7eb; }
    .addr-copy-btn.copied { border-color: #86efac; background: #ecfdf5; color: #047857; }

    /* ── Sticky Action Bar ── */
    .action-bar {
      position: sticky;
      bottom: 0;
      z-index: 100;
      background: #fff;
      border-top: 2px solid #e5e7eb;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      box-shadow: 0 -4px 16px rgba(0,0,0,0.08);
      border-radius: 0 0 14px 14px;
    }
    .action-bar-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: #9ca3af;
      letter-spacing: 0.05em;
      margin-right: 4px;
      white-space: nowrap;
    }
    .ab-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      border-radius: 8px;
      border: 2px solid transparent;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
      text-decoration: none;
    }
    .ab-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(0,0,0,0.12); }
    .ab-btn:active { transform: translateY(0); }

    /* Favorite */
    .ab-fav { background: #fff0f3; color: #e11d48; border-color: #fecdd3; }
    .ab-fav:hover { background: #ffe4e6; border-color: #fda4af; }
    .ab-fav.active { background: #e11d48; color: #fff; border-color: #be123c; }

    /* Maps */
    .ab-maps { background: #f5f3ff; color: #7c3aed; border-color: #ddd6fe; }
    .ab-maps:hover { background: #ede9fe; border-color: #c4b5fd; }

    /* Parking */
    .ab-parking { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }
    .ab-parking:hover { background: #dcfce7; border-color: #86efac; }

    /* Star Rating */
    .star-rating {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding: 7px 12px;
      background: #fffbeb;
      border: 2px solid #fde68a;
      border-radius: 8px;
    }
    .star-rating-label {
      font-size: 12px;
      font-weight: 700;
      color: #92400e;
      margin-right: 4px;
    }
    .star-btn {
      background: none;
      border: none;
      padding: 1px 2px;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      transition: transform 0.12s;
      color: #d1d5db;
    }
    .star-btn:hover { transform: scale(1.25); }
    .star-btn.lit { color: #f59e0b; }

    /* Tag Management tab */
    .tm-wrap {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .tm-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .tm-title { margin: 0; font-size: 17px; color: #111827; }
    .tm-status { font-size: 12px; color: #6b7280; }
    .tm-input-row { display: flex; gap: 8px; margin: 10px 0 12px; flex-wrap: wrap; }
    .tm-input {
      flex: 1;
      min-width: 220px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 9px 10px;
      font-size: 14px;
    }
    .tm-btn {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 9px 12px;
      background: #fff;
      color: #374151;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
    }
    .tm-btn.primary { background: #7c3aed; color: #fff; border-color: #6d28d9; }
    .tm-btn.danger { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
    .tm-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .tm-section-label {
      color: #6b7280;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .tm-pills { display: flex; flex-wrap: wrap; gap: 8px; min-height: 34px; }
    .tm-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      border: 1px solid #c4b5fd;
      background: #f5f3ff;
      color: #5b21b6;
      font-weight: 700;
      font-size: 12px;
      padding: 6px 10px;
    }
    .tm-remove-btn {
      border: 0;
      background: transparent;
      color: #5b21b6;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
      padding: 0;
    }
    .tm-suggestions { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
    .tm-suggest-btn {
      border: 1px solid #ddd6fe;
      background: #f5f3ff;
      color: #6d28d9;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .tm-empty { color: #6b7280; font-style: italic; font-size: 13px; }

    /* Notes are now rendered in the top-level Notes tab. */

    .bnm-item {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px;
      background: #fff;
      display: flex;
      gap: 8px;
      justify-content: space-between;
      align-items: flex-start;
    }
    .bnm-text { white-space: pre-wrap; line-height: 1.45; color: #1f2937; font-size: 14px; }
    .bnm-remove {
      border: 1px solid #fecaca;
      border-radius: 7px;
      background: #fef2f2;
      color: #b91c1c;
      font-size: 12px;
      font-weight: 700;
      padding: 5px 8px;
      cursor: pointer;
    }
    .bnm-input {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px;
      font: inherit;
      resize: vertical;
      min-height: 90px;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div id="header" class="head"></div>

  <div id="tabs" class="tabs" aria-label="Bike trail details tabs">
    <button class="tab-btn active" data-tab="overview" type="button">📋 Overview</button>
    <button class="tab-btn" data-tab="details" type="button">ℹ️ Details</button>
    <button class="tab-btn" data-tab="notes" type="button">📝 Notes</button>
    <button class="tab-btn" data-tab="experience" type="button">🎢 Experience</button>
    <button class="tab-btn" data-tab="location" type="button">📍 Location</button>
    <button class="tab-btn" data-tab="links" type="button">🔗 Links</button>
    <button class="tab-btn" data-tab="tag-management" type="button">🏷️ Tag Management</button>
  </div>

  <div id="pane-overview" class="tab-pane active"></div>
  <div id="pane-details" class="tab-pane"></div>
  <div id="pane-notes" class="tab-pane"></div>
  <div id="pane-experience" class="tab-pane"></div>
  <div id="pane-location" class="tab-pane"></div>
  <div id="pane-links" class="tab-pane"></div>
  <div id="pane-tag-management" class="tab-pane"></div>

  <!-- Sticky action bar — always visible regardless of active tab -->
  <div class="action-bar" id="actionBar" style="display:none;">
    <span class="action-bar-label">Quick Actions</span>

    <button type="button" class="ab-btn ab-fav" id="abFavBtn" title="Add to Favorites">
      <span id="abFavIcon">🤍</span> <span id="abFavText">Favorite</span>
    </button>

    <div class="star-rating" title="My star rating">
      <span class="star-rating-label">My Rating:</span>
      <button type="button" class="star-btn" data-star="1" title="1 star">★</button>
      <button type="button" class="star-btn" data-star="2" title="2 stars">★</button>
      <button type="button" class="star-btn" data-star="3" title="3 stars">★</button>
      <button type="button" class="star-btn" data-star="4" title="4 stars">★</button>
      <button type="button" class="star-btn" data-star="5" title="5 stars">★</button>
    </div>

    <a class="ab-btn ab-maps" id="abMapsBtn" href="#" target="_blank" rel="noopener" style="display:none;">
      🗺️ Open Maps
    </a>

    <a class="ab-btn ab-parking" id="abParkingBtn" href="#" target="_blank" rel="noopener" style="display:none;">
      🅿️ Parking Map
    </a>
  </div>
</div>

<script>
  function getParams() {
    return new URLSearchParams(window.location.search || '');
  }

  var BIKE_TAG_STORAGE_KEY = 'adventureFinderTags';
  var BIKE_NOTES_PREFIX = 'NOTES_JSON_V1::';
  var bikeNoteState = {
    sourceIndex: null,
    notes: [],
    data: null
  };
  var bikeTagState = {
    placeId: '',
    currentTags: [],
    sourceTags: []
  };

  function esc(text) {
    return String(text == null ? '' : text)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function normTag(text) {
    return String(text || '').trim().toLowerCase();
  }

  function uniqueTags(tags) {
    var seen = new Set();
    var out = [];
    (tags || []).forEach(function(tag) {
      var value = String(tag || '').trim();
      var key = normTag(value);
      if (!value || seen.has(key)) return;
      seen.add(key);
      out.push(value);
    });
    return out;
  }

  function splitCsvTags(raw) {
    return String(raw || '')
      .split(',')
      .map(function (t) { return t.trim(); })
      .filter(Boolean);
  }

  function getTagManagerFromContext() {
    if (window.tagManager && typeof window.tagManager.getTagsForPlace === 'function') return window.tagManager;
    if (window.opener && !window.opener.closed && window.opener.tagManager && typeof window.opener.tagManager.getTagsForPlace === 'function') {
      return window.opener.tagManager;
    }
    return null;
  }

  function parseBikeNotesBlob(raw) {
    var text = String(raw == null ? '' : raw).trim();
    if (!text) return [];

    var jsonPayload = '';
    if (text.indexOf(BIKE_NOTES_PREFIX) === 0) {
      jsonPayload = text.slice(BIKE_NOTES_PREFIX.length).trim();
    } else if (text.charAt(0) === '[' && text.charAt(text.length - 1) === ']') {
      jsonPayload = text;
    }

    if (jsonPayload) {
      try {
        var parsed = JSON.parse(jsonPayload);
        if (Array.isArray(parsed)) return parsed.map(function (n) { return String(n == null ? '' : n).trim(); }).filter(Boolean);
      } catch (_err) {}
    }

    var byDivider = text.split(/\n-{3,}\n/g).map(function (part) { return part.trim(); }).filter(Boolean);
    if (byDivider.length > 1) return byDivider;

    var byParagraph = text.split(/\n\s*\n/g).map(function (part) { return part.trim(); }).filter(Boolean);
    if (byParagraph.length > 1) return byParagraph;

    return [text];
  }

  function serializeBikeNotesBlob(notes) {
    var clean = (notes || []).map(function (note) { return String(note == null ? '' : note).trim(); }).filter(Boolean);
    return clean.length ? (BIKE_NOTES_PREFIX + JSON.stringify(clean)) : '';
  }

  function readTagMapFromStorage() {
    try { return JSON.parse(localStorage.getItem(BIKE_TAG_STORAGE_KEY) || '{}'); }
    catch (_err) { return {}; }
  }

  function saveTagMapToStorage(tagMap) {
    try { localStorage.setItem(BIKE_TAG_STORAGE_KEY, JSON.stringify(tagMap || {})); }
    catch (_err) {}
  }

  function getBikeTagKeyForData(data, payload) {
    var placeId = String((data && data.googlePlaceId) || '').trim();
    if (placeId) return placeId;
    var dataTagKey = String((data && data.tagKey) || '').trim();
    if (dataTagKey) return dataTagKey;
    var sourceIndex = payload && payload.sourceIndex != null ? String(payload.sourceIndex).trim() : '';
    var id = String((data && data.id) || sourceIndex || '').trim();
    return id ? ('bike:' + id) : '';
  }

  function loadManagedTags(placeId) {
    if (!placeId) return [];
    var manager = getTagManagerFromContext();
    if (manager) {
      return uniqueTags(manager.getTagsForPlace(placeId) || []);
    }
    var tagMap = readTagMapFromStorage();
    return uniqueTags(tagMap[placeId] || []);
  }

  function saveManagedTags(placeId, tags) {
    if (!placeId) return false;
    var normalized = uniqueTags(tags);
    var manager = getTagManagerFromContext();
    if (manager && typeof manager.setTagsForPlace === 'function') {
      manager.setTagsForPlace(placeId, normalized);
      if (typeof manager.saveTags === 'function') manager.saveTags();
      return true;
    }
    var tagMap = readTagMapFromStorage();
    tagMap[placeId] = normalized;
    saveTagMapToStorage(tagMap);
    return true;
  }

  function setBikeNotesStatus(message, isError) {
    var status = document.getElementById('bnmStatus');
    if (!status) return;
    status.textContent = message;
    status.style.color = isError ? '#b91c1c' : '#6b7280';
  }

  function renderBikeNotesPane() {
    var wrap = document.getElementById('bikeDetailNotesWrap');
    if (!wrap) return;

    var notes = bikeNoteState.notes || [];
    wrap.innerHTML =
      '<div class="tm-wrap">' +
      '<div class="tm-head">' +
      '<h3 class="tm-title">Notes</h3>' +
      '<div id="bnmStatus" class="tm-status">Manage notes for this bike trail</div>' +
      '</div>' +
      '<div style="display:grid;gap:8px;">' +
      (notes.length
        ? notes.map(function (note, idx) {
            return '<div class="bnm-item"><div class="bnm-text">' + esc(note) + '</div><button type="button" class="bnm-remove" data-bike-note-index="' + idx + '">Remove</button></div>';
          }).join('')
        : '<span class="tm-empty">No notes yet</span>') +
      '</div>' +
      '<div class="tm-input-row" style="margin-top:10px;">' +
      '<textarea id="bnmInput" class="bnm-input" placeholder="Write a note (Cmd/Ctrl + Enter to add)"></textarea>' +
      '</div>' +
      '<div class="tm-actions">' +
      '<button id="bnmAddBtn" type="button" class="tm-btn">Add Note</button>' +
      '<button id="bnmSaveBtn" type="button" class="tm-btn primary">Save Notes</button>' +
      '</div>' +
      '</div>';
  }

  function addBikeNote(value) {
    var clean = String(value || '').trim();
    if (!clean) return;
    bikeNoteState.notes = (bikeNoteState.notes || []).concat([clean]);
    renderBikeNotesPane();
    setBikeNotesStatus('Note added. Click Save Notes to persist.', false);
  }

  function removeBikeNote(index) {
    if (!Array.isArray(bikeNoteState.notes)) return;
    if (!Number.isInteger(index) || index < 0 || index >= bikeNoteState.notes.length) return;
    bikeNoteState.notes.splice(index, 1);
    renderBikeNotesPane();
    setBikeNotesStatus('Note removed. Click Save Notes to persist.', false);
  }

  async function saveBikeNotes() {
    var serialized = serializeBikeNotesBlob(bikeNoteState.notes || []);
    if (bikeNoteState.data) bikeNoteState.data.notes = serialized;

    var openerWin = window.opener && !window.opener.closed ? window.opener : null;
    if (!openerWin || !Number.isInteger(bikeNoteState.sourceIndex) || bikeNoteState.sourceIndex < 0) {
      setBikeNotesStatus('No opener sync target available.', true);
      return;
    }

    var row = Array.isArray(openerWin.bikeTrailsData) ? openerWin.bikeTrailsData[bikeNoteState.sourceIndex] : null;
    if (!row || !Array.isArray(row.values) || !Array.isArray(row.values[0])) {
      setBikeNotesStatus('Bike row not found in opener.', true);
      return;
    }

    var noteCol = typeof openerWin.getBikeColumnIndexByName === 'function'
      ? openerWin.getBikeColumnIndexByName('Notes')
      : 96;
    if (!Number.isInteger(noteCol) || noteCol < 0) {
      setBikeNotesStatus('Notes column was not found.', true);
      return;
    }

    var values = row.values[0].slice();
    while (values.length <= noteCol) values.push('');
    values[noteCol] = serialized;
    row.values = [values];

    try {
      if (typeof openerWin.updateBikeTrailRowColumns === 'function' && openerWin.accessToken) {
        await openerWin.updateBikeTrailRowColumns(bikeNoteState.sourceIndex, { [noteCol]: serialized }, {
          accessToken: openerWin.accessToken,
          filePath: openerWin.bikeTableConfig && openerWin.bikeTableConfig.filePath,
          tableRef: openerWin.bikeTableConfig && (openerWin.bikeTableConfig.tableRef || openerWin.bikeTableConfig.tableName)
        });
        setBikeNotesStatus('Notes saved to Excel.', false);
      } else {
        setBikeNotesStatus('Notes updated in planner memory (sign in to sync).', false);
      }

      if (typeof openerWin.applyBikeFilters === 'function') openerWin.applyBikeFilters();
      if (typeof openerWin.renderBikeTrailsPage === 'function') openerWin.renderBikeTrailsPage();
    } catch (err) {
      console.warn('⚠️ saveBikeNotes failed:', err);
      setBikeNotesStatus('Failed to save notes to Excel.', true);
    }
  }

  function renderTagManagementPane() {
    var pane = document.getElementById('pane-tag-management');
    if (!pane) return;

    var currentTags = uniqueTags(bikeTagState.currentTags);
    var sourceTags = uniqueTags(bikeTagState.sourceTags).filter(function (tag) {
      return !currentTags.some(function (existing) { return normTag(existing) === normTag(tag); });
    });

    pane.innerHTML = '' +
      '<div class="tm-wrap">' +
        '<div class="tm-head">' +
          '<h3 class="tm-title">Manage Bike Tags</h3>' +
          '<div id="bikeTagStatus" class="tm-status">Tag key: ' + esc(bikeTagState.placeId || 'Unavailable') + '</div>' +
        '</div>' +
        '<div class="tm-section-label">Current Tags</div>' +
        '<div id="bikeTagPills" class="tm-pills">' +
          (currentTags.length
            ? currentTags.map(function (tag) {
                return '<span class="tm-pill">' + esc(tag) +
                  ' <button type="button" class="tm-remove-btn" data-remove-bike-tag="' + esc(tag) + '" title="Remove">×</button></span>';
              }).join('')
            : '<span class="tm-empty">No tags yet</span>') +
        '</div>' +
        '<div class="tm-input-row">' +
          '<input id="bikeTagInput" class="tm-input" type="text" placeholder="Add a tag and press Enter" />' +
          '<button type="button" class="tm-btn" id="bikeAddTagBtn">Add Tag</button>' +
        '</div>' +
        '<div class="tm-section-label">Suggested Tags</div>' +
        '<div id="bikeTagSuggestions" class="tm-suggestions">' +
          (sourceTags.length
            ? sourceTags.map(function (tag) {
                return '<button type="button" class="tm-suggest-btn" data-suggest-bike-tag="' + esc(tag) + '">' + esc(tag) + ' +</button>';
              }).join('')
            : '<span class="tm-empty">No additional suggestions</span>') +
        '</div>' +
        '<div class="tm-actions">' +
          '<button type="button" class="tm-btn primary" id="bikeSaveTagsBtn">Save Tags</button>' +
          '<button type="button" class="tm-btn danger" id="bikeClearTagsBtn">Clear All</button>' +
        '</div>' +
      '</div>';
  }

  function refreshTagManagementUi(message) {
    renderTagManagementPane();
    var status = document.getElementById('bikeTagStatus');
    if (status && message) status.textContent = message;
  }

  function addBikeTag(tag) {
    var clean = String(tag || '').trim();
    if (!clean) return;
    if (bikeTagState.currentTags.some(function (t) { return normTag(t) === normTag(clean); })) return;
    bikeTagState.currentTags.push(clean);
    bikeTagState.currentTags = uniqueTags(bikeTagState.currentTags);
    refreshTagManagementUi();
    var input = document.getElementById('bikeTagInput');
    if (input) input.value = '';
  }

  function removeBikeTag(tag) {
    var key = normTag(tag);
    bikeTagState.currentTags = (bikeTagState.currentTags || []).filter(function (t) {
      return normTag(t) !== key;
    });
    refreshTagManagementUi();
  }

  function saveBikeTags() {
    if (!bikeTagState.placeId) {
      refreshTagManagementUi('Tag key unavailable for this trail');
      return;
    }

    var ok = saveManagedTags(bikeTagState.placeId, bikeTagState.currentTags || []);
    refreshTagManagementUi(ok ? 'Tags saved' : 'Failed to save tags');

    if (window.opener && !window.opener.closed) {
      try {
        if (typeof window.opener.applyBikeFilters === 'function') window.opener.applyBikeFilters();
        if (typeof window.opener.renderBikeTrailsPage === 'function') window.opener.renderBikeTrailsPage();
      } catch (_err) {}
    }
  }

  function bindTagManagementEvents() {
    var pane = document.getElementById('pane-tag-management');
    if (!pane || pane.dataset.boundBikeTagEvents === '1') return;

    pane.addEventListener('click', function (event) {
      var removeBtn = event.target && event.target.closest ? event.target.closest('[data-remove-bike-tag]') : null;
      if (removeBtn) {
        removeBikeTag(removeBtn.getAttribute('data-remove-bike-tag') || '');
        return;
      }

      var suggestBtn = event.target && event.target.closest ? event.target.closest('[data-suggest-bike-tag]') : null;
      if (suggestBtn) {
        addBikeTag(suggestBtn.getAttribute('data-suggest-bike-tag') || '');
        return;
      }

      if (event.target && event.target.id === 'bikeAddTagBtn') {
        var input = document.getElementById('bikeTagInput');
        addBikeTag(input ? input.value : '');
        return;
      }

      if (event.target && event.target.id === 'bikeSaveTagsBtn') {
        saveBikeTags();
        return;
      }

      if (event.target && event.target.id === 'bikeClearTagsBtn') {
        bikeTagState.currentTags = [];
        refreshTagManagementUi();
      }
    });

    pane.addEventListener('keydown', function (event) {
      if (event.target && event.target.id === 'bikeTagInput' && event.key === 'Enter') {
        event.preventDefault();
        addBikeTag(event.target.value || '');
      }
    });

    pane.dataset.boundBikeTagEvents = '1';
  }

  function hydrateBikeTagState(data, payload) {
    var placeId = getBikeTagKeyForData(data, payload);
    var sourceTags = uniqueTags([
      data && data.surface,
      data && data.difficulty
    ].concat(splitCsvTags(data && data.moodTags)));

    bikeTagState.placeId = placeId;
    bikeTagState.sourceTags = sourceTags;
    bikeTagState.currentTags = loadManagedTags(placeId);
    renderTagManagementPane();
    bindTagManagementEvents();
  }

  function getCloseButtonHtml() {
    return '<button type="button" class="auth-btn" id="closeTabBtn">✕ Close Tab</button>';
  }

  function bindCloseButton() {
    var closeBtn = document.getElementById('closeTabBtn');
    if (!closeBtn || closeBtn.dataset.bound === '1') return;

    closeBtn.addEventListener('click', function () {
      window.close();
      setTimeout(function () {
        if (window.history.length > 1) {
          window.history.back();
        }
      }, 120);
    });

    closeBtn.dataset.bound = '1';
  }

  function fromStoredPayload() {
    var params = getParams();
    var detailKey = params.get('detailKey');
    var latestKey = window.localStorage.getItem('bike_trail_details_latest');
    var keyToUse = detailKey || latestKey;
    if (!keyToUse) {
      console.warn('🚴 No detail key found in URL or localStorage');
      return null;
    }

    console.log('🚴 fromStoredPayload - using key:', keyToUse);
    console.log('🚴 fromStoredPayload - detailKey from URL:', detailKey);
    console.log('🚴 fromStoredPayload - latestKey from storage:', latestKey);

    try {
      var raw = window.localStorage.getItem(keyToUse);
      console.log('🚴 fromStoredPayload - raw string length:', raw ? raw.length : 'null');
      console.log('🚴 fromStoredPayload - raw string preview:', raw ? raw.substring(0, 200) : 'null');

      if (!raw) {
        console.warn('🚴 No data stored for key:', keyToUse);
        return null;
      }
      var parsed = JSON.parse(raw);
      console.log('🚴 Successfully retrieved and parsed payload:', parsed);
      console.log('🚴 Parsed payload type:', typeof parsed);
      console.log('🚴 Parsed payload keys:', Object.keys(parsed || {}));
      console.log('🚴 Parsed payload.data exists?', parsed && 'data' in parsed);
      console.log('🚴 Parsed payload.sourceIndex:', parsed && parsed.sourceIndex);
      return parsed;
    } catch (_err) {
      console.error('🚴 Failed to parse stored payload:', _err);
      console.error('🚴 Raw string that failed to parse:', raw);
      return null;
    }
  }

  function fromOpenerBySourceIndex(sourceIndex) {
    try {
      if (!window.opener || !Array.isArray(window.opener.bikeTrailsData)) return null;
      var row = window.opener.bikeTrailsData[sourceIndex];
      if (!row) return null;

      // The bike trails system passes the trail object directly
      return {
        sourceIndex: sourceIndex,
        data: row
      };
    } catch (_err) {
      return null;
    }
  }

  function card(label, value) {
    return '<div class="card"><div class="label">' + label + '</div><div class="value">' +
      (value || '<span class="empty">Not available</span>') + '</div></div>';
  }

  function render(payload) {
    console.log('🚴 render() called with payload:', payload);
    console.log('🚴 Payload type:', typeof payload);
    console.log('🚴 Payload keys:', payload ? Object.keys(payload) : 'null/undefined');
    console.log('🚴 payload.data exists?', payload && 'data' in payload);
    console.log('🚴 payload.sourceIndex exists?', payload && 'sourceIndex' in payload);

    var data = payload && payload.data ? payload.data : null;
    console.log('🚴 data after extraction:', data);
    console.log('🚴 data type:', typeof data);
    if (data) {
      console.log('🚴 data keys:', Object.keys(data).slice(0, 20));
    }

    if (!data) {
      console.warn('🚴 No data found in payload!');
      console.log('🚴 Full payload object for debugging:', JSON.stringify(payload, null, 2));
      document.getElementById('header').innerHTML =
        '<div class="head-main"><h1>Bike Trail Details</h1><div class="meta">No detail payload was available. Open this page from a Bike Trail card.</div></div>' +
        getCloseButtonHtml();
      bindCloseButton();
      return;
    }

    console.log('🚴 Bike trail details payload resolved:', {
      payloadSourceIndex: payload && payload.sourceIndex != null ? String(payload.sourceIndex) : '(empty)',
      payloadName: String(data.name || ''),
      trailKeys: Object.keys(data || {}).slice(0, 10) // Log first 10 property keys
    });

    // Build directions URL
    var directionsUrl = data.mapsLink || data.googleMapsTrailhead || '';
    if (!directionsUrl && data.gpsCoordinates) {
      directionsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(data.gpsCoordinates);
    }
    var googleViewUrl = data.googleUrl || directionsUrl || '';

    var headerActions = [
      directionsUrl ? '<a class="btn" href="' + directionsUrl + '" target="_blank" rel="noopener">🗺️ Open Maps</a>' : '',
      data.parkingLink ? '<a class="btn" href="' + data.parkingLink + '" target="_blank" rel="noopener">🅿️ Parking</a>' : '',
      googleViewUrl ? '<a class="btn" href="' + googleViewUrl + '" target="_blank" rel="noopener">🌐 Google View</a>' : ''
    ].join('');

    document.getElementById('header').innerHTML =
      '<div class="head-main">' +
      '<h1>' + (data.name || 'Bike Trail Details') + '</h1>' +
      '<div class="meta">' + (data.region || data.city || 'Unknown region') + (data.state ? ', ' + data.state : '') + '</div>' +
      (headerActions ? '<div class="actions">' + headerActions + '</div>' : '') +
      '</div>' + getCloseButtonHtml();

    bindCloseButton();
    initActionBar(data, directionsUrl);

    // Overview tab
    document.getElementById('pane-overview').innerHTML =
      '<div class="grid">' +
      card('Region', data.region) +
      card('City', data.city) +
      card('State', data.state) +
      card('Drive Time', data.driveTime) +
      card('Length (miles)', data.lengthMiles ? data.lengthMiles + ' mi' : '') +
      card('Difficulty', data.difficulty) +
      card('Surface Type', data.surface) +
      '</div>' +
      card('Description', data.description || data.vibes);

    // Details tab
    document.getElementById('pane-details').innerHTML =
       '<div class="grid">' +
       card('Difficulty Score', data.difficultyScore ? data.difficultyScore + '/100' : '') +
       card('Elevation Gain', data.elevationGain ? data.elevationGain + ' ft' : '') +
       card('Surface Breakdown', data.surfaceBreakdown) +
       card('Cost', data.cost) +
       card('Hours of Operation', data.hours) +
       card('Parking Capacity', data.parkingCapacity) +
       card('Parking Cost', data.parkingCost) +
       card('Best Time of Day', data.bestTimeOfDay) +
       card('Weather Suitability', data.weatherSuitability) +
       card('Night Riding Suitability', data.nightRidingSuitability) +
      '</div>';

    // Notes tab
    document.getElementById('pane-notes').innerHTML = '<div id="bikeDetailNotesWrap"></div>';

    // Experience tab
    document.getElementById('pane-experience').innerHTML =
      '<div class="grid">' +
      card('Ride Start Experience', data.rideStartExperience) +
      card('Ride Finish Experience', data.rideFinishExperience) +
      card('Ride Flow Profile', data.rideFlowProfile) +
      card('Ride Commitment Level', data.rideCommitmentLevel) +
      card('Ride Mood Tags', data.moodTags) +
      card('Vibes', data.vibes) +
      card('Ride Noise Profile', data.rideNoiseProfile) +
      card('Scenic Highlights', data.highlights || data.scenicNature) +
      card('Seasonal Notes', data.seasonalNotes) +
      '</div>';

    // Location tab
    document.getElementById('pane-location').innerHTML =
      '<div class="grid">' +
      card('Region', data.region) +
      card('City', data.city) +
      card('State', data.state) +
      card('Drive Time', data.driveTime) +
      card('GPS Coordinates', data.gpsCoordinates) +
      card('Parking Capacity', data.parkingCapacity) +
      card('Parking Difficulty', data.parkingDifficulty) +
      card('Parking Distance to Trail', data.parkingDistanceToTrail) +
      card('Parking Cost', data.parkingCost) +
      card('Parking Safety Notes', data.parkingSafetyNotes) +
      card('Google Place ID', data.googlePlaceId) +
      '</div>' +
      card('Maps Link', data.mapsLink ? '<a href="' + data.mapsLink + '" target="_blank" rel="noopener">Open Maps</a>' : '') +
      card('Google URL', googleViewUrl ? '<a href="' + googleViewUrl + '" target="_blank" rel="noopener">Open in Google</a>' : '') +
      card('Parking Link', data.parkingLink ? '<a href="' + data.parkingLink + '" target="_blank" rel="noopener">Open Parking Map</a>' : '');

    // Links tab
    document.getElementById('pane-links').innerHTML =
      '<div class="grid">' +
      card('Official Link 1', data.officialLink1 ? '<a href="' + data.officialLink1 + '" target="_blank" rel="noopener">Open Link</a>' : '') +
      card('Official Link 2', data.officialLink2 ? '<a href="' + data.officialLink2 + '" target="_blank" rel="noopener">Open Link</a>' : '') +
      card('Official Link 3', data.officialLink3 ? '<a href="' + data.officialLink3 + '" target="_blank" rel="noopener">Open Link</a>' : '') +
      card('AllTrails', data.allTrails ? '<a href="' + data.allTrails + '" target="_blank" rel="noopener">Open Link</a>' : '') +
      card('MTBProject', data.mtbProject ? '<a href="' + data.mtbProject + '" target="_blank" rel="noopener">Open Link</a>' : '') +
      card('HikingProject', data.hikingProject ? '<a href="' + data.hikingProject + '" target="_blank" rel="noopener">Open Link</a>' : '') +
      card('Singletracks', data.singletracks ? '<a href="' + data.singletracks + '" target="_blank" rel="noopener">Open Link</a>' : '') +
      card('RideWithGPS', data.rideWithGps ? '<a href="' + data.rideWithGps + '" target="_blank" rel="noopener">Open Link</a>' : '') +
      card('OpenStreetMap', data.openStreetMap ? '<a href="' + data.openStreetMap + '" target="_blank" rel="noopener">Open Link</a>' : '') +
      card('TrailLink', data.trailLink ? '<a href="' + data.trailLink + '" target="_blank" rel="noopener">Open Link</a>' : '') +
      card('Google Maps Trailhead', data.googleMapsTrailhead ? '<a href="' + data.googleMapsTrailhead + '" target="_blank" rel="noopener">Open Link</a>' : '') +
      card('Google Maps Parking', data.googleMapsParking ? '<a href="' + data.googleMapsParking + '" target="_blank" rel="noopener">Open Link</a>' : '') +
      '</div>';

    bikeNoteState.sourceIndex = payload && payload.sourceIndex != null ? Number(payload.sourceIndex) : null;
    bikeNoteState.notes = parseBikeNotesBlob(data.notes);
    bikeNoteState.data = data;
     renderBikeNotesPane();

    hydrateBikeTagState(data, payload);
  }

  // ── Action Bar ──────────────────────────────────────────────
  var STORAGE_PREFIX_BIKE = 'bike_actionbar_';

  function getLocationKey(data) {
    if (data.id) return 'id_' + data.id;
    return 'name_' + String(data.name || '').toLowerCase().replace(/\W+/g, '_');
  }

  function loadActionBarState(key) {
    try { return JSON.parse(localStorage.getItem(STORAGE_PREFIX_BIKE + key) || '{}'); } catch (_) { return {}; }
  }

  function saveActionBarState(key, state) {
    try { localStorage.setItem(STORAGE_PREFIX_BIKE + key, JSON.stringify(state)); } catch (_) {}
  }

  function renderStars(rating) {
    document.querySelectorAll('.star-btn').forEach(function (btn) {
      var n = parseInt(btn.getAttribute('data-star'), 10);
      btn.classList.toggle('lit', n <= rating);
    });
  }

  function initActionBar(data, directionsUrl) {
    var bar = document.getElementById('actionBar');
    if (!bar) return;
    bar.style.display = 'flex';

    var locationKey = getLocationKey(data);
    var state = loadActionBarState(locationKey);

    // ── Favorite button ──
    var favBtn = document.getElementById('abFavBtn');
    var favIcon = document.getElementById('abFavIcon');
    var favText = document.getElementById('abFavText');

    function syncFav(isFav) {
      if (isFav) {
        favBtn.classList.add('active');
        favIcon.textContent = '❤️';
        favText.textContent = 'Favorited';
      } else {
        favBtn.classList.remove('active');
        favIcon.textContent = '🤍';
        favText.textContent = 'Favorite';
      }
    }

    syncFav(!!state.favorite);

    favBtn.addEventListener('click', function () {
      state.favorite = !state.favorite;
      syncFav(state.favorite);
      saveActionBarState(locationKey, state);
      console.log('❤️ Favorite toggled:', state.favorite, 'for', data.name);
    });

    // ── Star rating ──
    var currentRating = state.myRating || 0;
    renderStars(currentRating);

    document.querySelectorAll('.star-btn').forEach(function (btn) {
      btn.addEventListener('mouseenter', function () {
        renderStars(parseInt(btn.getAttribute('data-star'), 10));
      });
      btn.addEventListener('mouseleave', function () {
        renderStars(currentRating);
      });
      btn.addEventListener('click', function () {
        var clicked = parseInt(btn.getAttribute('data-star'), 10);
        currentRating = (currentRating === clicked) ? 0 : clicked;
        renderStars(currentRating);
        state.myRating = currentRating;
        saveActionBarState(locationKey, state);
        console.log('⭐ Rating saved:', currentRating, 'for', data.name);
      });
    });

    // ── Open Maps ──
    var mapsBtn = document.getElementById('abMapsBtn');
    if (directionsUrl) {
      mapsBtn.setAttribute('href', directionsUrl);
      mapsBtn.style.display = 'inline-flex';
    }

    // ── Parking Map ──
    var parkingBtn = document.getElementById('abParkingBtn');
    var parkingUrl = data.parkingLink || '';
    if (!parkingUrl && data.gpsCoordinates) {
      parkingUrl = 'https://www.google.com/maps/search/parking+near+' + encodeURIComponent(data.gpsCoordinates);
    }
    if (parkingUrl) {
      parkingBtn.setAttribute('href', parkingUrl);
      parkingBtn.style.display = 'inline-flex';
    }
  }
  // ── End Action Bar ───────────────────────────────────────────

  function bindTabs() {
    var tabs = document.querySelectorAll('.tab-btn');
    tabs.forEach(function (tab) {
      tab.addEventListener('click', function () {
        var target = tab.getAttribute('data-tab');
        tabs.forEach(function (t) { t.classList.remove('active'); });
        document.querySelectorAll('.tab-pane').forEach(function (pane) { pane.classList.remove('active'); });
        tab.classList.add('active');
        var pane = document.getElementById('pane-' + target);
        if (pane) pane.classList.add('active');
      });
    });
  }

  function copyToClipboard(text) {
    if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
      return navigator.clipboard.writeText(text);
    }

    return new Promise(function (resolve, reject) {
      try {
        var area = document.createElement('textarea');
        area.value = text;
        area.setAttribute('readonly', 'readonly');
        area.style.position = 'fixed';
        area.style.opacity = '0';
        document.body.appendChild(area);
        area.select();
        var ok = document.execCommand('copy');
        document.body.removeChild(area);
        if (ok) resolve();
        else reject(new Error('execCommand copy failed'));
      } catch (err) {
        reject(err);
      }
    });
  }

  (function init() {
    bindTabs();

    // Delegated handler for address/GPS copy buttons
    document.addEventListener('click', function (e) {
      var btn = e.target && e.target.closest ? e.target.closest('.addr-copy-btn') : null;
      if (!btn) return;
      var text = btn.getAttribute('data-copy') || '';
      if (!text) return;
      copyToClipboard(text).then(function () {
        var orig = btn.textContent;
        btn.textContent = '✓ Copied';
        btn.classList.add('copied');
        setTimeout(function () { btn.textContent = orig; btn.classList.remove('copied'); }, 1400);
      }).catch(function () {
        window.prompt('Copy:', text);
      });
    });

    document.addEventListener('click', function (e) {
      var removeBtn = e.target && e.target.closest ? e.target.closest('[data-bike-note-index]') : null;
      if (removeBtn) {
        removeBikeNote(Number(removeBtn.getAttribute('data-bike-note-index')));
        return;
      }

      if (e.target && e.target.id === 'bnmAddBtn') {
        var input = document.getElementById('bnmInput');
        addBikeNote(input ? input.value : '');
        if (input) input.value = '';
        return;
      }

      if (e.target && e.target.id === 'bnmSaveBtn') {
        saveBikeNotes();
      }
    });

    document.addEventListener('keydown', function (e) {
      var active = document.activeElement;
      if (!active || active.id !== 'bnmInput') return;
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
        e.preventDefault();
        addBikeNote(active.value);
        active.value = '';
      }
    });

    var params = getParams();
    console.log('🚴 Bike trail details tab init');

    var payload = fromStoredPayload();
    if (!payload) {
      var sourceIndex = Number(params.get('sourceIndex'));
      if (Number.isInteger(sourceIndex) && sourceIndex >= 0) {
        payload = fromOpenerBySourceIndex(sourceIndex);
      }
    }

    render(payload);
  })();
</script>
