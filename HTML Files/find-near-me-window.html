<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Near Me - Kyle's Adventure Finder</title>
  <link rel="stylesheet" href="../CSS/utilities.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
      color: #1f2937;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .header {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 4px;
    }

    .header-subtitle {
      font-size: 14px;
      opacity: 0.9;
    }

    .close-btn {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 24px;
      transition: all 0.2s;
    }

    .close-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .start-btn {
      background: #10b981;
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .start-btn:hover:not(:disabled) {
      background: #059669;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    .start-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .distance-slider {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .distance-slider label {
      font-weight: 600;
      white-space: nowrap;
    }

    .distance-slider input {
      flex: 1;
      max-width: 200px;
    }

    .distance-value {
      font-weight: 600;
      color: #10b981;
      min-width: 60px;
      text-align: right;
    }

    .results {
      background: white;
      border-radius: 12px;
      padding: 24px;
      border: 1px solid #e5e7eb;
    }

    .results-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .results-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-box {
      background: #f3f4f6;
      padding: 16px;
      border-radius: 8px;
      border-left: 4px solid #10b981;
    }

    .stat-label {
      font-size: 12px;
      color: #6b7280;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #10b981;
    }

    .locations-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 500px;
      overflow-y: auto;
    }

    .location-item {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      transition: all 0.2s;
    }

    .location-item:hover {
      border-color: #10b981;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.1);
    }

    .location-info {
      flex: 1;
    }

    .location-name {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .location-details {
      font-size: 13px;
      color: #6b7280;
    }

    .location-distance {
      background: #d1fae5;
      color: #065f46;
      padding: 8px 12px;
      border-radius: 6px;
      font-weight: 600;
      text-align: center;
      white-space: nowrap;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #6b7280;
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .empty-state-text {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      font-size: 16px;
      color: #6b7280;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #e5e7eb;
      border-top-color: #10b981;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-message {
      background: #fee2e2;
      color: #991b1b;
      padding: 16px;
      border-radius: 8px;
      border-left: 4px solid #dc2626;
      margin-bottom: 16px;
    }

    .refresh-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s;
      margin-top: 12px;
    }

    .refresh-btn:hover {
      background: #5568d3;
    }

  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>📍 Find Near Me</h1>
        <div class="header-subtitle">Discover adventures within your distance</div>
      </div>
      <button class="close-btn" onclick="window.close()" title="Close this window">✕</button>
    </div>

    <div class="controls">
      <button class="start-btn" id="startBtn" onclick="startFindNearMe()">
        🔍 Find My Location
      </button>
      <div class="distance-slider">
        <label for="distanceSlider">Search within:</label>
        <input type="range" id="distanceSlider" min="5" max="100" value="50" step="5" onchange="updateDistance()">
        <span class="distance-value" id="distanceValue">50 miles</span>
      </div>
    </div>

    <div id="resultsContainer" class="results u-hidden">
      <div class="results-title">📍 Nearby Adventures</div>
      <div class="results-stats" id="resultStats"></div>
      <div class="locations-list" id="locationsList"></div>
      <button class="refresh-btn" onclick="startFindNearMe()">🔍 Refresh Search</button>
    </div>

    <div id="emptyState" class="empty-state">
      <div class="empty-state-icon">📍</div>
      <div class="empty-state-text">Ready to find nearby adventures</div>
      <div class="u-note-muted">Click "Find My Location" to get started. You'll need to allow location access.</div>
    </div>
  </div>

  <script>
    const parentWindow = window.opener || window;
    const adventuresData = parentWindow.adventuresData || [];
    let userLocation = null;
    let nearbyAdventures = [];

    function updateDistance() {
      const distance = document.getElementById('distanceSlider').value;
      document.getElementById('distanceValue').textContent = `${distance} miles`;
    }

    async function startFindNearMe() {
      console.log('🔍 Starting Find Near Me...');
      const btn = document.getElementById('startBtn');
      btn.disabled = true;
      btn.textContent = '🔍 Getting location...';

      try {
        if (!navigator.geolocation) {
          throw new Error('Geolocation is not supported by your browser');
        }

        navigator.geolocation.getCurrentPosition(
          (position) => {
            userLocation = {
              lat: position.coords.latitude,
              lng: position.coords.longitude
            };
            console.log(`✅ Location found: ${userLocation.lat}, ${userLocation.lng}`);
            findNearbyAdventures();
            btn.disabled = false;
            btn.textContent = '🔍 Find My Location';
          },
          (error) => {
            console.error('❌ Geolocation error:', error);
            let message = 'Failed to get your location';

            if (error.code === error.PERMISSION_DENIED) {
              message = 'Location permission denied. Please enable location access in your browser settings.';
            } else if (error.code === error.POSITION_UNAVAILABLE) {
              message = 'Location information is unavailable.';
            } else if (error.code === error.TIMEOUT) {
              message = 'Location request timed out. Please try again.';
            }

            showError(message);
            btn.disabled = false;
            btn.textContent = '🔍 Find My Location';
          }
        );
      } catch (error) {
        console.error('❌ Error:', error);
        showError(error.message);
        btn.disabled = false;
        btn.textContent = '🔍 Find My Location';
      }
    }

    function findNearbyAdventures() {
      console.log('🔍 Finding nearby adventures...');

      if (!userLocation || !adventuresData.length) {
        showError('No location data available');
        return;
      }

      const maxDistance = parseInt(document.getElementById('distanceSlider').value);
      nearbyAdventures = [];

      adventuresData.forEach(adventure => {
        let lat, lng;

        if (adventure.values && adventure.values[0]) {
          lat = parseFloat(adventure.values[0][8]);
          lng = parseFloat(adventure.values[0][7]);
        } else {
          lat = parseFloat(adventure.latitude);
          lng = parseFloat(adventure.longitude);
        }

        if (!isNaN(lat) && !isNaN(lng)) {
          const distance = calculateDistance(userLocation.lat, userLocation.lng, lat, lng);
          if (distance <= maxDistance) {
            nearbyAdventures.push({
              ...adventure,
              distance: distance.toFixed(1)
            });
          }
        }
      });

      // Sort by distance
      nearbyAdventures.sort((a, b) => parseFloat(a.distance) - parseFloat(b.distance));

      console.log(`✅ Found ${nearbyAdventures.length} nearby adventures`);
      displayResults();
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
      const R = 3959; // Earth's radius in miles
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    function displayResults() {
      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('resultsContainer').style.display = 'block';

      // Display stats
      document.getElementById('resultStats').innerHTML = `
        <div class="stat-box">
          <div class="stat-label">📍 Found</div>
          <div class="stat-value">${nearbyAdventures.length}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">📊 Closest</div>
          <div class="stat-value">${nearbyAdventures.length > 0 ? nearbyAdventures[0].distance : 'N/A'}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">🎯 Farthest</div>
          <div class="stat-value">${nearbyAdventures.length > 0 ? nearbyAdventures[nearbyAdventures.length - 1].distance : 'N/A'}</div>
        </div>
      `;

      // Display locations
      if (nearbyAdventures.length === 0) {
        document.getElementById('locationsList').innerHTML = `
          <div class="empty-state u-grid-full-span">
            <div class="empty-state-icon">🏜️</div>
            <div class="empty-state-text">No adventures found</div>
            <div class="u-note-muted">Try increasing the search distance</div>
          </div>
        `;
        return;
      }

      document.getElementById('locationsList').innerHTML = nearbyAdventures.map(adventure => {
        const name = adventure.name || (adventure.values && adventure.values[0][0]) || 'Unknown';
        const city = adventure.city || (adventure.values && adventure.values[0][10]) || 'Unknown';
        const state = adventure.state || (adventure.values && adventure.values[0][9]) || 'Unknown';

        return `
          <div class="location-item">
            <div class="location-info">
              <div class="location-name">📍 ${name}</div>
              <div class="location-details">${city}, ${state}</div>
            </div>
            <div class="location-distance">🚗 ${adventure.distance} mi</div>
          </div>
        `;
      }).join('');
    }

    function showError(message) {
      document.getElementById('emptyState').innerHTML = `
        <div class="error-message">❌ ${message}</div>
        <div class="u-text-center">
          <button class="start-btn" onclick="startFindNearMe()">🔍 Try Again</button>
        </div>
      `;
    }

    // Initialize
    console.log('🔍 Find Near Me window loaded with', adventuresData.length, 'adventures');
  </script>
</body>
</html>
