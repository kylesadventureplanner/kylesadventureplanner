<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adventure Details</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #111827;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px;
    }
    .head {
      background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%);
      color: #fff;
      padding: 24px;
      border-radius: 14px;
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }
    .head-main { flex: 1; min-width: 0; }
    h1 { margin: 0 0 8px; font-size: 30px; }
    .meta { opacity: 0.95; font-size: 14px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .btn {
      border: 1px solid rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.16);
      color: #fff;
      border-radius: 8px;
      padding: 8px 12px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }
    .auth-btn {
      background: white;
      color: #1e3a8a;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .auth-btn:hover { background: #f3f4f6; }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      border-bottom: 2px solid #e5e7eb;
      overflow-x: auto;
      padding-bottom: 2px;
    }
    .tab-btn {
      padding: 11px 16px;
      background: none;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      color: #6b7280;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .tab-btn.active {
      color: #1d4ed8;
      border-bottom-color: #1d4ed8;
    }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .label { color: #6b7280; font-size: 12px; font-weight: 600; text-transform: uppercase; }
    .value { margin-top: 6px; font-size: 14px; line-height: 1.45; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .tag { background: #e0ecff; color: #1d4ed8; border-radius: 999px; padding: 4px 8px; font-size: 12px; font-weight: 600; }
    .empty { color: #6b7280; }

    .debug-bar {
      margin-bottom: 12px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      border-radius: 10px;
      padding: 0;
      font-size: 12px;
      line-height: 1.45;
      overflow: hidden;
    }
    .debug-bar.match { border-color: #86efac; }
    .debug-bar.mismatch { border-color: #fca5a5; }
    .debug-bar-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 12px;
      cursor: pointer;
      user-select: none;
      background: transparent;
      border: none;
      width: 100%;
      text-align: left;
      font-size: 12px;
    }
    .debug-bar.match .debug-bar-toggle { color: #065f46; background: #ecfdf5; }
    .debug-bar.mismatch .debug-bar-toggle { color: #991b1b; background: #fef2f2; }
    .debug-bar-body {
      display: none;
      padding: 8px 12px 10px;
    }
    .debug-bar.expanded .debug-bar-body { display: block; }
    .debug-bar.match .debug-bar-body { color: #065f46; }
    .debug-bar.mismatch .debug-bar-body { color: #991b1b; }
    .debug-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .debug-title { font-weight: 700; margin-bottom: 0; }
    .debug-copy-btn {
      border: 1px solid #93c5fd;
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 999px;
      padding: 2px 10px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .debug-copy-btn:hover { background: #dbeafe; }
    .debug-copy-btn.copied { border-color: #86efac; background: #ecfdf5; color: #047857; }
    .debug-copy-btn.error { border-color: #fca5a5; background: #fef2f2; color: #991b1b; }
    .debug-pill {
      background: rgba(255,255,255,0.8);
      border: 1px solid #d1d5db;
      border-radius: 999px;
      padding: 2px 8px;
      font-weight: 600;
    }
    .addr-copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-left: 8px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      color: #374151;
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      vertical-align: middle;
    }
    .addr-copy-btn:hover { background: #e5e7eb; }
    .addr-copy-btn.copied { border-color: #86efac; background: #ecfdf5; color: #047857; }

    /* ── Sticky Action Bar ── */
    .action-bar {
      position: sticky;
      bottom: 0;
      z-index: 100;
      background: #fff;
      border-top: 2px solid #e5e7eb;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      box-shadow: 0 -4px 16px rgba(0,0,0,0.08);
      border-radius: 0 0 14px 14px;
    }
    .action-bar-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: #9ca3af;
      letter-spacing: 0.05em;
      margin-right: 4px;
      white-space: nowrap;
    }
    .ab-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      border-radius: 8px;
      border: 2px solid transparent;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
      text-decoration: none;
    }
    .ab-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(0,0,0,0.12); }
    .ab-btn:active { transform: translateY(0); }

    /* Favorite */
    .ab-fav { background: #fff0f3; color: #e11d48; border-color: #fecdd3; }
    .ab-fav:hover { background: #ffe4e6; border-color: #fda4af; }
    .ab-fav.active { background: #e11d48; color: #fff; border-color: #be123c; }

    /* Maps */
    .ab-maps { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
    .ab-maps:hover { background: #dbeafe; border-color: #93c5fd; }

    /* Parking */
    .ab-parking { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }
    .ab-parking:hover { background: #dcfce7; border-color: #86efac; }

    /* Star Rating */
    .star-rating {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding: 7px 12px;
      background: #fffbeb;
      border: 2px solid #fde68a;
      border-radius: 8px;
    }
    .star-rating-label {
      font-size: 12px;
      font-weight: 700;
      color: #92400e;
      margin-right: 4px;
    }
    .star-btn {
      background: none;
      border: none;
      padding: 1px 2px;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      transition: transform 0.12s;
      color: #d1d5db;
    }
    .star-btn:hover { transform: scale(1.25); }
    .star-btn.lit { color: #f59e0b; }
  </style>
</head>
<body>
<div class="wrap">
  <div id="header" class="head"></div>
  <div id="debugBar" class="debug-bar" style="display:none;"></div>

  <div id="tabs" class="tabs" aria-label="Adventure details tabs">
    <button class="tab-btn active" data-tab="overview" type="button">📋 Overview</button>
    <button class="tab-btn" data-tab="details" type="button">ℹ️ Details</button>
    <button class="tab-btn" data-tab="contact" type="button">📞 Contact</button>
    <button class="tab-btn" data-tab="additional" type="button">📌 Additional</button>
  </div>

  <div id="pane-overview" class="tab-pane active"></div>
  <div id="pane-details" class="tab-pane"></div>
  <div id="pane-contact" class="tab-pane"></div>
  <div id="pane-additional" class="tab-pane"></div>

  <!-- Sticky action bar — always visible regardless of active tab -->
  <div class="action-bar" id="actionBar" style="display:none;">
    <span class="action-bar-label">Quick Actions</span>

    <button type="button" class="ab-btn ab-fav" id="abFavBtn" title="Add to Favorites">
      <span id="abFavIcon">🤍</span> <span id="abFavText">Favorite</span>
    </button>

    <div class="star-rating" title="My star rating">
      <span class="star-rating-label">My Rating:</span>
      <button type="button" class="star-btn" data-star="1" title="1 star">★</button>
      <button type="button" class="star-btn" data-star="2" title="2 stars">★</button>
      <button type="button" class="star-btn" data-star="3" title="3 stars">★</button>
      <button type="button" class="star-btn" data-star="4" title="4 stars">★</button>
      <button type="button" class="star-btn" data-star="5" title="5 stars">★</button>
    </div>

    <a class="ab-btn ab-maps" id="abMapsBtn" href="#" target="_blank" rel="noopener" style="display:none;">
      🗺️ Open Maps
    </a>

    <a class="ab-btn ab-parking" id="abParkingBtn" href="#" target="_blank" rel="noopener" style="display:none;">
      🅿️ Parking Map
    </a>
  </div>
</div>

<script>
  function getParams() {
    return new URLSearchParams(window.location.search || '');
  }

  function getCloseButtonHtml() {
    return '<button type="button" class="auth-btn" id="closeTabBtn">✕ Close Tab</button>';
  }

  function bindCloseButton() {
    var closeBtn = document.getElementById('closeTabBtn');
    if (!closeBtn || closeBtn.dataset.bound === '1') return;

    closeBtn.addEventListener('click', function () {
      window.close();
      setTimeout(function () {
        if (window.history.length > 1) {
          window.history.back();
        }
      }, 120);
    });

    closeBtn.dataset.bound = '1';
  }

  function fromStoredPayload() {
    var params = getParams();
    var detailKey = params.get('detailKey');
    var latestKey = window.localStorage.getItem('adventure_details_latest');
    var keyToUse = detailKey || latestKey;
    if (!keyToUse) return null;

    try {
      var raw = window.localStorage.getItem(keyToUse);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch (_err) {
      return null;
    }
  }

  function fromOpenerBySourceIndex(sourceIndex) {
    try {
      if (!window.opener || !Array.isArray(window.opener.adventuresData)) return null;
      var row = window.opener.adventuresData[sourceIndex];
      if (!row || !Array.isArray(row.values) || !Array.isArray(row.values[0])) return null;
      var values = row.values[0];
      var [
        name, googlePlaceId, website, tags, driveTime, hoursOfOperation,
        activityDuration, difficulty, trailLength, state, city, address,
        phoneNumber, googleRating, cost, directions, description, nearby,
        links, links2, notes, myRating, favoriteStatus, googleUrl
      ] = values;

      return {
        sourceIndex: sourceIndex,
        data: {
          name: name, googlePlaceId: googlePlaceId, website: website, tags: tags,
          driveTime: driveTime, hoursOfOperation: hoursOfOperation, activityDuration: activityDuration,
          difficulty: difficulty, trailLength: trailLength, state: state, city: city, address: address,
          phoneNumber: phoneNumber, googleRating: googleRating, cost: cost, directions: directions,
          description: description, nearby: nearby, links: links, links2: links2,
          notes: notes, myRating: myRating, favoriteStatus: favoriteStatus, googleUrl: googleUrl
        }
      };
    } catch (_err) {
      return null;
    }
  }

  function card(label, value) {
    return '<div class="card"><div class="label">' + label + '</div><div class="value">' +
      (value || '<span class="empty">Not available</span>') + '</div></div>';
  }

  function normalizeForCompare(value) {
    return String(value || '').trim().toLowerCase();
  }

  function buildDebugBundleLine(payload, params) {
    var sourceIndex = String(
      (payload && payload.sourceIndex != null ? payload.sourceIndex : '') ||
      params.get('debugSourceIndex') ||
      params.get('sourceIndex') ||
      ''
    ).trim() || '(empty)';

    var name = String(
      (payload && payload.data ? payload.data.name : '') ||
      params.get('debugName') ||
      ''
    ).trim() || '(empty)';

    var placeId = String(
      (payload && payload.data ? payload.data.googlePlaceId : '') ||
      params.get('debugPlaceId') ||
      ''
    ).trim() || '(empty)';

    var corrId = String(
      (payload && payload.correlationId ? payload.correlationId : '') ||
      params.get('corrId') ||
      ''
    ).trim() || '(empty)';

    return 'sourceIndex=' + sourceIndex + ' | name=' + name + ' | placeId=' + placeId + ' | corrId=' + corrId;
  }

  function copyDebugBundle(text) {
    if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
      return navigator.clipboard.writeText(text);
    }

    return new Promise(function (resolve, reject) {
      try {
        var area = document.createElement('textarea');
        area.value = text;
        area.setAttribute('readonly', 'readonly');
        area.style.position = 'fixed';
        area.style.opacity = '0';
        document.body.appendChild(area);
        area.select();
        var ok = document.execCommand('copy');
        document.body.removeChild(area);
        if (ok) resolve();
        else reject(new Error('execCommand copy failed'));
      } catch (err) {
        reject(err);
      }
    });
  }

  function bindDebugCopyButton(payload) {
    var btn = document.getElementById('copyDebugBundleBtn');
    if (!btn || btn.dataset.bound === '1') return;

    btn.addEventListener('click', function () {
      var params = getParams();
      var line = buildDebugBundleLine(payload, params);

      copyDebugBundle(line).then(function () {
        console.log('📋 Debug bundle copied:', line);
        var original = btn.textContent;
        btn.textContent = 'Copied';
        btn.classList.add('copied');
        setTimeout(function () {
          btn.textContent = original;
          btn.classList.remove('copied');
        }, 1200);
      }).catch(function () {
        btn.classList.add('error');
        setTimeout(function () { btn.classList.remove('error'); }, 1200);
        window.prompt('Copy debug bundle:', line);
      });
    });

    btn.dataset.bound = '1';
  }

  function renderDebugMarker(payload) {
    var debugBar = document.getElementById('debugBar');
    if (!debugBar) return;

    var params = getParams();
    var urlSourceIndex = params.get('debugSourceIndex') || params.get('sourceIndex') || '';
    var urlName = params.get('debugName') || '';
    var urlPlaceId = params.get('debugPlaceId') || '';
    var urlCorrId = params.get('corrId') || '';

    var payloadSourceIndex = payload && payload.sourceIndex != null ? String(payload.sourceIndex) : '';
    var payloadName = payload && payload.data ? String(payload.data.name || '') : '';
    var payloadPlaceId = payload && payload.data ? String(payload.data.googlePlaceId || '') : '';
    var payloadCorrId = payload && payload.correlationId ? String(payload.correlationId) : '';

    var sourceMatches = normalizeForCompare(urlSourceIndex) === normalizeForCompare(payloadSourceIndex);
    var nameMatches = !urlName || normalizeForCompare(urlName) === normalizeForCompare(payloadName);
    var placeMatches = !urlPlaceId || normalizeForCompare(urlPlaceId) === normalizeForCompare(payloadPlaceId);
    var corrMatches = !urlCorrId || normalizeForCompare(urlCorrId) === normalizeForCompare(payloadCorrId);
    var allMatch = sourceMatches && nameMatches && placeMatches && corrMatches;

    // Collapsed by default — click the toggle row to expand
    debugBar.className = 'debug-bar ' + (allMatch ? 'match' : 'mismatch');
    debugBar.style.display = 'block';
    debugBar.innerHTML =
      '<button type="button" class="debug-bar-toggle" id="debugBarToggle">' +
      '<span class="debug-title">🔎 Debug: ' + (allMatch ? 'MATCH ✓' : '⚠️ MISMATCH') + '</span>' +
      '<span style="font-size:10px;opacity:0.7;">▼ expand</span>' +
      '</button>' +
      '<div class="debug-bar-body">' +
      '<div class="debug-head">' +
      '<span class="debug-title">Detail Debug Marker: ' + (allMatch ? 'MATCH' : 'MISMATCH') + '</span>' +
      '<button type="button" class="debug-copy-btn" id="copyDebugBundleBtn">Copy Debug Bundle</button>' +
      '</div>' +
      '<div class="debug-row">' +
      '<span class="debug-pill">URL sourceIndex: ' + (urlSourceIndex || '(empty)') + '</span>' +
      '<span class="debug-pill">Payload sourceIndex: ' + (payloadSourceIndex || '(empty)') + '</span>' +
      '</div>' +
      '<div class="debug-row">' +
      '<span class="debug-pill">URL name: ' + (urlName || '(empty)') + '</span>' +
      '<span class="debug-pill">Payload name: ' + (payloadName || '(empty)') + '</span>' +
      '</div>' +
      '<div class="debug-row">' +
      '<span class="debug-pill">URL placeId: ' + (urlPlaceId || '(empty)') + '</span>' +
      '<span class="debug-pill">Payload placeId: ' + (payloadPlaceId || '(empty)') + '</span>' +
      '</div>' +
      '<div class="debug-row">' +
      '<span class="debug-pill">URL corrId: ' + (urlCorrId || '(empty)') + '</span>' +
      '<span class="debug-pill">Payload corrId: ' + (payloadCorrId || '(empty)') + '</span>' +
      '</div>' +
      '</div>';

    var toggleBtn = document.getElementById('debugBarToggle');
    if (toggleBtn) {
      toggleBtn.addEventListener('click', function () {
        var expanded = debugBar.classList.toggle('expanded');
        var arrow = toggleBtn.querySelector('span:last-child');
        if (arrow) arrow.textContent = expanded ? '▲ collapse' : '▼ expand';
      });
    }

    bindDebugCopyButton(payload);
  }

  function render(payload) {
    var data = payload && payload.data ? payload.data : null;
    if (!data) {
      document.getElementById('header').innerHTML =
        '<div class="head-main"><h1>Adventure Details</h1><div class="meta">No detail payload was available. Open this page from an Adventure card.</div></div>' +
        getCloseButtonHtml();
      bindCloseButton();
      return;
    }

    console.log('🧪 Details tab payload resolved:', {
      payloadSourceIndex: payload && payload.sourceIndex != null ? String(payload.sourceIndex) : '(empty)',
      payloadName: String(data.name || ''),
      payloadPlaceId: String(data.googlePlaceId || ''),
      payloadCorrId: payload && payload.correlationId ? String(payload.correlationId) : '(empty)'
    });

    if (payload && payload.correlationId) {
      console.log('🔗 Detail corrId=' + String(payload.correlationId));
    }

    var tagList = String(data.tags || '').split(',').map(function (t) { return t.trim(); }).filter(Boolean);

    // Build directions URL: prefer stored directions link, fall back to Google Maps search by address
    var directionsUrl = data.directions || '';
    if (!directionsUrl && data.address) {
      directionsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(data.address);
    }

    var headerActions = [
      directionsUrl ? '<a class="btn" href="' + directionsUrl + '" target="_blank" rel="noopener">Directions</a>' : '',
      data.website ? '<a class="btn" href="' + data.website + '" target="_blank" rel="noopener">Website</a>' : '',
      data.googleUrl ? '<a class="btn" href="' + data.googleUrl + '" target="_blank" rel="noopener">Google View</a>' : ''
    ].join('');

    document.getElementById('header').innerHTML =
      '<div class="head-main">' +
      '<h1>' + (data.name || 'Adventure Details') + '</h1>' +
      '<div class="meta">' + (data.city || 'Unknown city') + (data.state ? ', ' + data.state : '') + '</div>' +
      (headerActions ? '<div class="actions">' + headerActions + '</div>' : '') +
      '</div>' + getCloseButtonHtml();

    bindCloseButton();
    renderDebugMarker(payload);
    initActionBar(data, directionsUrl);

    document.getElementById('pane-overview').innerHTML =
      '<div class="grid">' +
      card('Address', data.address ? data.address + ' <button type="button" class="addr-copy-btn" data-copy="' + data.address.replace(/"/g, '&quot;') + '">📋 Copy</button>' : '') +
      card('City', data.city) +
      card('State', data.state) +
      card('Drive Time', data.driveTime) +
      '</div>' +
      card('Description', data.description) +
      card('Tags', tagList.length ? '<div class="tags">' + tagList.map(function (tag) { return '<span class="tag">' + tag + '</span>'; }).join('') + '</div>' : '');

    document.getElementById('pane-details').innerHTML =
      '<div class="grid">' +
      card('Hours', data.hoursOfOperation) +
      card('Duration', data.activityDuration) +
      card('Difficulty', data.difficulty) +
      card('Trail Length', data.trailLength) +
      card('Cost', data.cost) +
      card('Google Rating', data.googleRating) +
      card('My Rating', data.myRating) +
      '</div>';

    document.getElementById('pane-contact').innerHTML =
      '<div class="grid">' +
      card('Phone Number', data.phoneNumber ? '<a href="tel:' + String(data.phoneNumber).replace(/\s+/g, '') + '">' + data.phoneNumber + '</a>' : '') +
      card('Website', data.website ? '<a href="' + data.website + '" target="_blank" rel="noopener">Visit Website</a>' : '') +
      card('Directions', directionsUrl ? '<a href="' + directionsUrl + '" target="_blank" rel="noopener">Get Directions</a>' : '') +
      card('Place ID', data.googlePlaceId) +
      card('Links', data.links ? '<a href="' + data.links + '" target="_blank" rel="noopener">Open Link</a>' : '') +
      card('More Links', data.links2 ? '<a href="' + data.links2 + '" target="_blank" rel="noopener">Open Link</a>' : '') +
      '</div>';

    document.getElementById('pane-additional').innerHTML =
      card('Nearby Attractions', data.nearby) +
      card('Notes', data.notes);
  }

  // ── Action Bar ──────────────────────────────────────────────
  var STORAGE_PREFIX_ADV = 'adv_actionbar_';

  function getLocationKey(data) {
    // Use googlePlaceId first; fall back to a slugified name
    if (data.googlePlaceId) return 'place_' + data.googlePlaceId;
    return 'name_' + String(data.name || '').toLowerCase().replace(/\W+/g, '_');
  }

  function loadActionBarState(key) {
    try { return JSON.parse(localStorage.getItem(STORAGE_PREFIX_ADV + key) || '{}'); } catch (_) { return {}; }
  }

  function saveActionBarState(key, state) {
    try { localStorage.setItem(STORAGE_PREFIX_ADV + key, JSON.stringify(state)); } catch (_) {}
  }

  function renderStars(rating) {
    document.querySelectorAll('.star-btn').forEach(function (btn) {
      var n = parseInt(btn.getAttribute('data-star'), 10);
      btn.classList.toggle('lit', n <= rating);
    });
  }

  function initActionBar(data, directionsUrl) {
    var bar = document.getElementById('actionBar');
    if (!bar) return;
    bar.style.display = 'flex';

    var locationKey = getLocationKey(data);
    var state = loadActionBarState(locationKey);

    // ── Favorite button ──
    var favBtn = document.getElementById('abFavBtn');
    var favIcon = document.getElementById('abFavIcon');
    var favText = document.getElementById('abFavText');

    function syncFav(isFav) {
      if (isFav) {
        favBtn.classList.add('active');
        favIcon.textContent = '❤️';
        favText.textContent = 'Favorited';
      } else {
        favBtn.classList.remove('active');
        favIcon.textContent = '🤍';
        favText.textContent = 'Favorite';
      }
    }

    syncFav(!!state.favorite);

    favBtn.addEventListener('click', function () {
      state.favorite = !state.favorite;
      syncFav(state.favorite);
      saveActionBarState(locationKey, state);
      console.log('❤️ Favorite toggled:', state.favorite, 'for', data.name);
    });

    // ── Star rating ──
    var currentRating = state.myRating || 0;
    renderStars(currentRating);

    document.querySelectorAll('.star-btn').forEach(function (btn) {
      btn.addEventListener('mouseenter', function () {
        renderStars(parseInt(btn.getAttribute('data-star'), 10));
      });
      btn.addEventListener('mouseleave', function () {
        renderStars(currentRating);
      });
      btn.addEventListener('click', function () {
        var clicked = parseInt(btn.getAttribute('data-star'), 10);
        // Click same star again → clear rating
        currentRating = (currentRating === clicked) ? 0 : clicked;
        renderStars(currentRating);
        state.myRating = currentRating;
        saveActionBarState(locationKey, state);
        console.log('⭐ Rating saved:', currentRating, 'for', data.name);
      });
    });

    // ── Open Maps ──
    var mapsBtn = document.getElementById('abMapsBtn');
    if (directionsUrl) {
      mapsBtn.setAttribute('href', directionsUrl);
      mapsBtn.style.display = 'inline-flex';
    }

    // ── Parking Map ── (Adventure data uses data.parkingLink if available, or notes)
    var parkingBtn = document.getElementById('abParkingBtn');
    var parkingUrl = data.parkingLink || '';
    if (!parkingUrl && data.address) {
      // Fall back to a Google Maps parking search near the address
      parkingUrl = 'https://www.google.com/maps/search/parking+near+' + encodeURIComponent(data.address);
    }
    if (parkingUrl) {
      parkingBtn.setAttribute('href', parkingUrl);
      parkingBtn.style.display = 'inline-flex';
    }
  }
  // ── End Action Bar ───────────────────────────────────────────

  function bindTabs() {
    var tabs = document.querySelectorAll('.tab-btn');
    tabs.forEach(function (tab) {
      tab.addEventListener('click', function () {
        var target = tab.getAttribute('data-tab');
        tabs.forEach(function (t) { t.classList.remove('active'); });
        document.querySelectorAll('.tab-pane').forEach(function (pane) { pane.classList.remove('active'); });
        tab.classList.add('active');
        var pane = document.getElementById('pane-' + target);
        if (pane) pane.classList.add('active');
      });
    });
  }

  (function init() {
    bindTabs();

    // Delegated handler for address copy buttons injected into card HTML
    document.addEventListener('click', function (e) {
      var btn = e.target && e.target.closest ? e.target.closest('.addr-copy-btn') : null;
      if (!btn) return;
      var text = btn.getAttribute('data-copy') || '';
      if (!text) return;
      copyDebugBundle(text).then(function () {
        var orig = btn.textContent;
        btn.textContent = '✓ Copied';
        btn.classList.add('copied');
        setTimeout(function () { btn.textContent = orig; btn.classList.remove('copied'); }, 1400);
      }).catch(function () {
        window.prompt('Copy address:', text);
      });
    });

    var params = getParams();
    console.log('🧪 Details tab init URL markers:', {
      sourceIndex: params.get('sourceIndex') || '(empty)',
      debugSourceIndex: params.get('debugSourceIndex') || '(empty)',
      debugName: params.get('debugName') || '(empty)',
      debugPlaceId: params.get('debugPlaceId') || '(empty)',
      corrId: params.get('corrId') || '(empty)',
      detailKey: params.get('detailKey') || '(empty)'
    });

    if (params.get('corrId')) {
      console.log('🔗 Detail corrId=' + String(params.get('corrId')));
    }

    var payload = fromStoredPayload();
    if (!payload) {
      var sourceIndex = Number(params.get('sourceIndex'));
      if (Number.isInteger(sourceIndex) && sourceIndex >= 0) {
        payload = fromOpenerBySourceIndex(sourceIndex);
      }
    }

    render(payload);
  })();
</script>
</body>
</html>
