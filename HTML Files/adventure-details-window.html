<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adventure Details</title>
  <script src="../JS Files/mobile-view-persistence-bootstrap.js"></script>
  <!-- Canonical stylesheet order: tokens -> components -> utilities -> page -->
  <link rel="stylesheet" href="../CSS/design-tokens.css">
  <link rel="stylesheet" href="../CSS/components.css">
  <link rel="stylesheet" href="../CSS/utilities.css">
  <link rel="stylesheet" href="../CSS/adventure-details-window.css">
  <style>
    /* ── Photos Tab ─────────────────────────────────── */
    .ph-empty { color: #9ca3af; font-size: .88em; padding: 10px 0; margin: 0; }
    .ph-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin: 10px 0; }
    .ph-item { border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; background: #f9fafb; position: relative; }
    .ph-search-grid .ph-search-item { border: 2px solid #e5e7eb; border-radius: 8px; overflow: hidden; cursor: pointer; transition: border-color .15s; }
    .ph-search-item.ph-selected { border-color: #2563eb; box-shadow: 0 0 0 2px #93c5fd; }
    .ph-img-wrap { width: 100%; aspect-ratio: 4/3; overflow: hidden; background: #f3f4f6; display: flex; align-items: center; justify-content: center; }
    .ph-thumb { width: 100%; height: 100%; object-fit: cover; display: block; }
    .ph-broken { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 2em; color: #9ca3af; }
    .ph-caption { font-size: .74em; color: #6b7280; padding: 3px 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ph-caption-sm { padding: 3px 4px; }
    .ph-actions { display: flex; gap: 4px; padding: 4px 6px; background: #fff; border-top: 1px solid #e5e7eb; }
    .ph-view-btn { font-size: .74em; color: #2563eb; text-decoration: none; flex: 1; }
    .ph-remove-btn { font-size: .74em; color: #b91c1c; background: none; border: none; cursor: pointer; padding: 0; }
    .ph-caption-input { width: calc(100% - 12px); margin: 4px 6px 0; border: 1px solid #d1d5db; border-radius: 6px; padding: 4px 6px; font-size: .75em; }
    .ph-viewer-backdrop { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.65); z-index: 2600; display: none; }
    .ph-viewer-modal { position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%); width: min(900px, calc(100vw - 20px)); max-height: calc(100vh - 20px); background: #fff; border-radius: 10px; border: 1px solid #e5e7eb; box-shadow: 0 20px 42px rgba(15, 23, 42, 0.35); z-index: 2610; display: none; overflow: hidden; }
    .ph-viewer-head { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; border-bottom: 1px solid #e5e7eb; }
    .ph-viewer-body { padding: 10px; display: grid; gap: 8px; }
    .ph-viewer-img-wrap { width: 100%; max-height: 68vh; overflow: auto; background: #111827; border-radius: 8px; display: flex; justify-content: center; align-items: center; }
    .ph-viewer-img { max-width: 100%; max-height: 68vh; object-fit: contain; }
    .ph-viewer-caption { font-size: .84em; color: #4b5563; }
    .ph-add-tabs { display: flex; gap: 6px; margin: 8px 0; flex-wrap: wrap; }
    .ph-add-tab { padding: 5px 14px; border-radius: 20px; border: 1px solid #d1d5db; background: #f9fafb; font-size: .85em; cursor: pointer; }
    .ph-add-tab.active { background: #2563eb; color: #fff; border-color: #2563eb; }
    .ph-add-pane { margin-top: 10px; }
    .ph-hidden { display: none !important; }
    .ph-search-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .ph-search-row .tm-input { flex: 1; min-width: 0; }
    .ph-api-notice { font-size: .8em; color: #6b7280; margin: 6px 0; }
    .ph-link-btn { background: none; border: none; color: #2563eb; cursor: pointer; text-decoration: underline; font-size: inherit; padding: 0; }
    .ph-api-settings { padding: 10px; border: 1px solid #e5e7eb; border-radius: 8px; background: #f9fafb; margin-top: 8px; }
    .ph-file-input { display: none; }
    .ph-upload-label { display: inline-block; padding: 8px 16px; background: #f3f4f6; border: 2px dashed #d1d5db; border-radius: 8px; cursor: pointer; font-size: .88em; color: #374151; }
    .ph-upload-label:hover { background: #e5e7eb; border-color: #9ca3af; }
    .ph-upload-list { margin: 8px 0; font-size: .82em; color: #374151; }
    .ph-upload-item { padding: 3px 0; }
    .ph-upload-queue { margin: 8px 0; }
    .ph-results-hint { font-size: .82em; color: #6b7280; margin: 4px 0 8px; }
    /* URL upload status bar */
    .ph-url-status { display: flex; align-items: center; gap: 8px; font-size: .82em; border-radius: 6px; padding: 6px 10px; margin-top: 8px; }
    .ph-url-status--hidden { display: none !important; }
    .ph-url-status--uploading { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
    .ph-url-status--success  { background: #ecfdf5; color: #166534; border: 1px solid #86efac; }
    .ph-url-status--error    { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
    .ph-url-status__spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: phSpin .7s linear infinite; flex-shrink: 0; }
    .ph-url-status--success .ph-url-status__spinner,
    .ph-url-status--error   .ph-url-status__spinner { display: none; }
    @keyframes phSpin { to { transform: rotate(360deg); } }
    .ph-url-retry-btn { margin-left: auto; background: none; border: 1px solid currentColor; border-radius: 4px; padding: 2px 8px; cursor: pointer; font-size: .85em; color: inherit; }
    .ph-url-retry-btn:hover { opacity: .75; }

    /* ── Enrich Modal ───────────────────────────────── */
    .enrich-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.48);
      z-index: 2200;
      display: none;
    }
    .enrich-backdrop.open { display: block; }
    .enrich-modal {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(860px, calc(100vw - 24px));
      max-height: calc(100vh - 24px);
      overflow: auto;
      border-radius: 12px;
      background: #fff;
      border: 1px solid #e2e8f0;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.25);
      z-index: 2210;
      display: none;
    }
    .enrich-modal.open { display: block; }
    .enrich-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid #e2e8f0;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 3;
    }
    .enrich-title { font-weight: 700; font-size: 15px; color: #1f2937; }
    .enrich-body { padding: 12px 14px; }
    .enrich-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 10px;
    }
    .enrich-field { display: flex; flex-direction: column; gap: 4px; }
    .enrich-field.full { grid-column: 1 / -1; }
    .enrich-field label { font-size: 12px; font-weight: 600; color: #334155; }
    .enrich-foot {
      padding: 12px 14px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      position: sticky;
      bottom: 0;
      background: #fff;
      z-index: 2;
    }
    @media (max-width: 760px) {
      .enrich-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div id="header" class="head"></div>
  <div id="debugBar" class="debug-bar u-hidden"></div>

  <div id="tabs" class="tabs" aria-label="Adventure details tabs">
    <button class="tab-btn active" data-tab="overview" type="button">📋 Overview</button>
    <button class="tab-btn" data-tab="details" type="button">ℹ️ Details</button>
    <button class="tab-btn" data-tab="notes" type="button">📝 Notes</button>
    <button class="tab-btn" data-tab="contact" type="button">📞 Contact</button>
    <button class="tab-btn" data-tab="additional" type="button">📌 Additional</button>
    <button class="tab-btn" data-tab="tag-management" type="button">🏷️ Tag Management</button>
    <button class="tab-btn" data-tab="photos" type="button">📷 Photos</button>
  </div>

  <div id="pane-overview" class="tab-pane active"></div>
  <div id="pane-details" class="tab-pane"></div>
  <div id="pane-notes" class="tab-pane"></div>
  <div id="pane-contact" class="tab-pane"></div>
  <div id="pane-additional" class="tab-pane"></div>
  <div id="pane-tag-management" class="tab-pane"></div>
  <div id="pane-photos" class="tab-pane"></div>

  <!-- Sticky action bar — always visible regardless of active tab -->
  <div class="action-bar u-hidden mobile-sticky-actions" id="actionBar">
    <span class="action-bar-label">Quick Actions</span>

    <button type="button" class="ab-btn ab-fav" id="abFavBtn" title="Add to Favorites">
      <span id="abFavIcon">🤍</span> <span id="abFavText">Favorite</span>
    </button>

    <div class="star-rating" title="My star rating">
      <span class="star-rating-label">My Rating:</span>
      <button type="button" class="star-btn" data-star="1" title="1 star">★</button>
      <button type="button" class="star-btn" data-star="2" title="2 stars">★</button>
      <button type="button" class="star-btn" data-star="3" title="3 stars">★</button>
      <button type="button" class="star-btn" data-star="4" title="4 stars">★</button>
      <button type="button" class="star-btn" data-star="5" title="5 stars">★</button>
    </div>

    <a class="ab-btn ab-maps u-hidden" id="abMapsBtn" href="#" target="_blank" rel="noopener">
      🗺️ Open Maps
    </a>

    <a class="ab-btn ab-parking u-hidden" id="abParkingBtn" href="#" target="_blank" rel="noopener">
      🅿️ Parking Map
    </a>

    <button type="button" class="ab-btn" id="abLinksBtn" title="Add or update related links">
      🔗 Add Links
    </button>

    <button type="button" class="ab-btn" id="abEnrichBtn" title="Paste free text to enrich fields">
      📝 Enrich
    </button>

    <button type="button" class="ab-btn ab-visited" id="abVisitedBtn" title="Mark this location as visited">
      <span id="abVisitedIcon">✅</span> <span id="abVisitedText">Mark Visited</span>
    </button>
  </div>

  <div id="enrichBackdrop" class="enrich-backdrop" aria-hidden="true"></div>
  <div id="enrichModal" class="enrich-modal" role="dialog" aria-modal="true" aria-labelledby="enrichModalTitle">
    <div class="enrich-head">
      <div id="enrichModalTitle" class="enrich-title">📝 Enrich Location Details</div>
      <button id="enrichCloseBtn" type="button" class="auth-btn">Close</button>
    </div>
    <div class="enrich-body">
      <div class="enrich-field full">
        <label for="enrichRawInput">Paste free-text location details</label>
        <textarea id="enrichRawInput" class="tm-input" rows="7" placeholder="Paste text with address, city/state, phone, hours, and notes..."></textarea>
      </div>
      <div style="margin-top:8px; margin-bottom:10px;">
        <button id="enrichParseBtn" type="button" class="ab-btn ab-google">Parse Text</button>
      </div>
      <div id="enrichParsedFields" class="enrich-grid" style="display:none;">
        <div class="enrich-field"><label for="enrichAddress">Address</label><input id="enrichAddress" class="tm-input" type="text" /></div>
        <div class="enrich-field"><label for="enrichCity">City</label><input id="enrichCity" class="tm-input" type="text" /></div>
        <div class="enrich-field"><label for="enrichState">State</label><input id="enrichState" class="tm-input" type="text" /></div>
        <div class="enrich-field"><label for="enrichPhone">Phone</label><input id="enrichPhone" class="tm-input" type="text" /></div>
        <div class="enrich-field full"><label for="enrichHours">Hours</label><input id="enrichHours" class="tm-input" type="text" /></div>
        <div class="enrich-field full"><label for="enrichDescription">Description</label><textarea id="enrichDescription" class="tm-input" rows="4"></textarea></div>
      </div>
      <div id="enrichHint" class="ph-api-notice" style="margin-top:10px;">Paste text and click Parse Text. Review fields before saving.</div>
    </div>
    <div class="enrich-foot">
      <button id="enrichCancelBtn" type="button" class="auth-btn">Cancel</button>
      <button id="enrichSaveBtn" type="button" class="ab-btn ab-fav">Save to Source</button>
    </div>
  </div>

  <div id="phViewerBackdrop" class="ph-viewer-backdrop" aria-hidden="true"></div>
  <div id="phViewerModal" class="ph-viewer-modal" role="dialog" aria-modal="true" aria-labelledby="phViewerTitle">
    <div class="ph-viewer-head">
      <div id="phViewerTitle" class="enrich-title">📷 Photo Viewer</div>
      <button id="phViewerCloseBtn" type="button" class="auth-btn">Close</button>
    </div>
    <div class="ph-viewer-body">
      <div class="ph-viewer-img-wrap"><img id="phViewerImg" class="ph-viewer-img" src="" alt="Photo preview" /></div>
      <div id="phViewerCaption" class="ph-viewer-caption"></div>
    </div>
  </div>
</div>

<script>
  var TAG_STORAGE_KEY = 'adventureFinderTags';
  var TAG_MIGRATION_MARKER_PREFIX = 'adventureFinderTagsMigrated_';
  var STORAGE_PREFIX_ADV = 'adv_actionbar_';
  var DETAIL_TAGS_COLUMN_INDEX = 3;
  var DETAIL_NOTES_COLUMN_INDEX = 20;
  var DETAIL_NOTES_PREFIX = 'NOTES_JSON_V1::';

  // ── Photos constants ────────────────────────────────────────────
  var PHOTO_STORAGE_KEY = 'adventureFinderPhotos_v1';
  var PHOTO_CSE_SETTINGS_KEY = 'adventureFinderGoogleCseSettings';
  var PHOTO_ONEDRIVE_ROOT = 'Copilot_Apps/Kyles_Adventure_Finder/location-Photos';
  var PHOTO_URLS_JSON_PREFIX = 'PHOTOS_JSON_V1::';

  function toIsoNow() {
    try { return new Date().toISOString(); } catch (_err) { return String(Date.now()); }
  }

  function createTagSaveDebugSeed(state) {
    return {
      runId: 'tagsave_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
      createdAt: toIsoNow(),
      placeKey: state && state.placeKey ? state.placeKey : '(empty)',
      sourceIndex: state && state.sourceIndex != null ? state.sourceIndex : '(empty)',
      name: state && state.data ? String(state.data.name || '') : '',
      placeId: state && state.data ? String(state.data.googlePlaceId || '') : '',
      steps: [],
      finalStatus: 'pending'
    };
  }

  function pushTagSaveDebug(debug, step, detail) {
    if (!debug) return;
    debug.steps.push({ at: toIsoNow(), step: step, detail: detail || {} });
  }

  function formatTagSaveDebug(debug) {
    if (!debug) return 'No debug trace captured yet.';
    var lines = [];
    lines.push('Run: ' + (debug.runId || '(unknown)'));
    lines.push('Created: ' + (debug.createdAt || '(unknown)'));
    lines.push('Final: ' + (debug.finalStatus || '(unknown)'));
    lines.push('PlaceKey: ' + (debug.placeKey || '(empty)'));
    lines.push('SourceIndex: ' + String(debug.sourceIndex));
    lines.push('Name: ' + (debug.name || '(empty)'));
    lines.push('PlaceId: ' + (debug.placeId || '(empty)'));
    lines.push('');
    lines.push('Steps:');
    (debug.steps || []).forEach(function (entry, idx) {
      lines.push((idx + 1) + '. [' + (entry.at || '?') + '] ' + entry.step + ' ' + JSON.stringify(entry.detail || {}));
    });
    return lines.join('\n');
  }

  function refreshTagSaveDebugUi(debug) {
    window.__lastTagSaveDebug = debug || window.__lastTagSaveDebug || null;
    var pre = document.getElementById('tmDebugPre');
    if (!pre) return;
    pre.textContent = formatTagSaveDebug(window.__lastTagSaveDebug);
  }

  function copyLastTagSaveDebug() {
    var text = formatTagSaveDebug(window.__lastTagSaveDebug);
    return copyDebugBundle(text);
  }

  function getLastTagSaveDebugJson() {
    try {
      return JSON.stringify(window.__lastTagSaveDebug || {}, null, 2);
    } catch (_err) {
      return '{}';
    }
  }

  function getParams() {
    return new URLSearchParams(window.location.search || '');
  }

  function getCloseButtonHtml() {
    if (getParams().get('embedded') === '1') return '';
    return '<button type="button" class="auth-btn" id="closeTabBtn">✕ Close Tab</button>';
  }

  function getActiveDetailTabId() {
    var active = document.querySelector('#tabs .tab-btn[aria-selected="true"]') || document.querySelector('#tabs .tab-btn.active');
    return active ? String(active.getAttribute('data-tab') || 'overview').trim() || 'overview' : 'overview';
  }

  function getDetailNavigationContext(payload) {
    var params = getParams();
    var payloadNav = payload && payload.navigation && typeof payload.navigation === 'object' ? payload.navigation : null;
    var sessionId = String((payloadNav && payloadNav.sessionId) || params.get('navSessionId') || '').trim();
    var subtabKey = String((payloadNav && payloadNav.subtabKey) || params.get('navSubtabKey') || '').trim();
    var currentItemId = String((payloadNav && payloadNav.currentItemId) || params.get('navCurrentItemId') || '').trim();
    var previousItemId = String((payloadNav && payloadNav.previousItemId) || params.get('navPreviousItemId') || '').trim();
    var nextItemId = String((payloadNav && payloadNav.nextItemId) || params.get('navNextItemId') || '').trim();
    var hasPreviousRaw = payloadNav && Object.prototype.hasOwnProperty.call(payloadNav, 'hasPrevious')
      ? payloadNav.hasPrevious
      : params.get('navHasPrevious');
    var hasPrevious = hasPreviousRaw === true || String(hasPreviousRaw || '').trim() === '1' || String(hasPreviousRaw || '').trim().toLowerCase() === 'true';
    var hasNextRaw = payloadNav && Object.prototype.hasOwnProperty.call(payloadNav, 'hasNext')
      ? payloadNav.hasNext
      : params.get('navHasNext');
    var hasNext = hasNextRaw === true || String(hasNextRaw || '').trim() === '1' || String(hasNextRaw || '').trim().toLowerCase() === 'true';

    return {
      sessionId: sessionId,
      subtabKey: subtabKey,
      currentItemId: currentItemId,
      previousItemId: previousItemId,
      hasPrevious: hasPrevious,
      nextItemId: nextItemId,
      hasNext: hasNext,
      isValid: !!(subtabKey && (currentItemId || previousItemId || nextItemId || hasPrevious || hasNext))
    };
  }

  function getHeaderActionButtonsHtml(payload) {
    var buttons = [];
    var nav = getDetailNavigationContext(payload);
    if (nav.isValid) {
      var hasPrevious = !!nav.hasPrevious;
      var previousTitle = hasPrevious ? 'Open the previous location in this filtered list' : 'No previous location in this filtered list';
      var hasNext = !!nav.hasNext;
      var nextTitle = hasNext ? 'Open the next location in this filtered list' : 'No next location in this filtered list';
      buttons.push(
        '<button type="button" class="auth-btn detail-nav-btn" id="previousLocationBtn" title="' + escapeHtml(previousTitle) + '"'
        + (hasPrevious ? '' : ' disabled') + '>Previous Location</button>'
      );
      buttons.push(
        '<button type="button" class="auth-btn detail-nav-btn" id="nextLocationBtn" title="' + escapeHtml(nextTitle) + '"'
        + (hasNext ? '' : ' disabled') + '>Next Location</button>'
      );
    }

    var closeButton = getCloseButtonHtml();
    if (closeButton) buttons.push(closeButton);
    if (!buttons.length) return '';
    return '<div class="head-actions-right">' + buttons.join('') + '</div>';
  }

  function bindCloseButton() {
    var closeBtn = document.getElementById('closeTabBtn');
    if (!closeBtn || closeBtn.dataset.bound === '1') return;

    closeBtn.addEventListener('click', function () {
      window.close();
      setTimeout(function () {
        if (window.history.length > 1) window.history.back();
      }, 120);
    });

    closeBtn.dataset.bound = '1';
  }

  function bindDetailNavigationButton(buttonId, direction, payload) {
    var button = document.getElementById(buttonId);
    if (!button || button.dataset.bound === '1') return;

    button.addEventListener('click', function () {
      if (button.disabled) return;
      var hostWin = getOpenerWindow();
      if (!hostWin || typeof hostWin.postMessage !== 'function') {
        showDetailToast('⚠️ Location navigation is only available when opened from Adventure Explorer.', 'info', 3200);
        return;
      }

      var nav = getDetailNavigationContext(payload);
      var normalizedDirection = String(direction || 'next').trim().toLowerCase() === 'previous' ? 'previous' : 'next';
      var targetItemIdHint = normalizedDirection === 'previous'
        ? String(nav.previousItemId || '').trim()
        : String(nav.nextItemId || '').trim();
      hostWin.postMessage({
        type: 'planner-explorer-details-navigate',
        direction: normalizedDirection,
        sourceSubtab: String(nav.subtabKey || '').trim(),
        sessionId: String(nav.sessionId || '').trim(),
        currentItemId: String(nav.currentItemId || '').trim(),
        targetItemIdHint: targetItemIdHint,
        initialTab: getActiveDetailTabId()
      }, window.location.origin);

      button.disabled = true;
      button.textContent = normalizedDirection === 'previous' ? 'Loading previous...' : 'Loading next...';
    });

    button.dataset.bound = '1';
  }

  function bindNavigationButtons(payload) {
    bindDetailNavigationButton('previousLocationBtn', 'previous', payload);
    bindDetailNavigationButton('nextLocationBtn', 'next', payload);
  }

  function isEditableNavigationShortcutTarget(target) {
    if (!target) return false;
    var element = target.nodeType === 1 ? target : target.parentElement;
    if (!element || typeof element.closest !== 'function') return false;
    return !!element.closest('input, textarea, select, [contenteditable], [role="textbox"]');
  }

  function bindNavigationKeyboardShortcuts() {
    if (document.body && document.body.dataset.detailNavShortcutsBound === '1') return;
    if (document.body) document.body.dataset.detailNavShortcutsBound = '1';

    document.addEventListener('keydown', function (event) {
      if (!event || event.defaultPrevented) return;
      if (event.metaKey || event.ctrlKey || event.altKey) return;
      if (isEditableNavigationShortcutTarget(event.target)) return;

      var key = String(event.key || '');
      var code = String(event.code || '');
      var direction = '';
      if (key === '[' || code === 'BracketLeft') direction = 'previous';
      if (key === ']' || code === 'BracketRight') direction = 'next';
      if (!direction) return;

      var buttonId = direction === 'previous' ? 'previousLocationBtn' : 'nextLocationBtn';
      var button = document.getElementById(buttonId);
      if (!button || button.disabled) return;

      event.preventDefault();
      event.stopPropagation();
      button.click();
    }, true);
  }

  function fromStoredPayload() {
    var params = getParams();
    var detailKey = params.get('detailKey');
    var latestKey = window.localStorage.getItem('adventure_details_latest');
    var keyToUse = detailKey || latestKey;
    if (!keyToUse) return null;

    try {
      var raw = window.localStorage.getItem(keyToUse);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch (_err) {
      return null;
    }
  }

  function fromOpenerBySourceIndex(sourceIndex) {
    try {
      if (!window.opener || !Array.isArray(window.opener.adventuresData)) return null;
      var row = window.opener.adventuresData[sourceIndex];
      if (!row || !Array.isArray(row.values) || !Array.isArray(row.values[0])) return null;
      var values = row.values[0];
      var [
        name, googlePlaceId, website, tags, driveTime, hoursOfOperation,
        activityDuration, difficulty, trailLength, state, city, address,

  function copyDebugBundle(text) {
    if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
      return navigator.clipboard.writeText(text);

    return new Promise(function (resolve, reject) {
      try {
        var area = document.createElement('textarea');
        area.value = text;
        area.setAttribute('readonly', 'readonly');
        area.style.position = 'fixed';
        area.style.opacity = '0';
        document.body.appendChild(area);
        area.select();
        var ok = document.execCommand('copy');
        document.body.removeChild(area);
        if (ok) resolve();
        else reject(new Error('execCommand copy failed'));
      } catch (err) {
        reject(err);
      }
    });

  function buildDetailMapsSearchUrl(data) {

      .map(function (part) { return String(part || '').trim(); })
      .filter(Boolean)
      .join(', ');
    var query = addressQuery || String(data && data.name || '').trim();
    if (!query) {
      var fallbackGoogle = String(data && data.googleUrl || '').trim();
      if (/^https?:\/\//i.test(fallbackGoogle)) return fallbackGoogle;
      return '';
    }
    return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(query);
  }

  function buildDetailDirectionsUrl(data) {
    var placeId = String(data && data.googlePlaceId || '').trim();
    var destination = [data && data.address, data && data.city, data && data.state]
      .map(function (part) { return String(part || '').trim(); })
      .filter(Boolean)
      .join(', ');
    if (!destination) destination = String(data && data.name || '').trim();

    if (placeId) {
      var params = new URLSearchParams({ api: '1', destination_place_id: placeId });
      if (destination) params.set('destination', destination);
      return 'https://www.google.com/maps/dir/?' + params.toString();
    }

    if (destination) {
      return 'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(destination);
    }

    var fallbackDirections = String(data && data.directions || '').trim();
    if (/^https?:\/\//i.test(fallbackDirections)) return fallbackDirections;

  function normalizeTagKey(tag) {

  function normalizeTextKey(text) {

  function hasTagCaseInsensitive(tags, candidate) {
    var needle = normalizeTagKey(candidate);
    return (tags || []).some(function (tag) { return normalizeTagKey(tag) === needle; });
  }

  function uniqueTags(tags) {
    var seen = {};
    var out = [];
    (tags || []).forEach(function (tag) {
      var clean = String(tag || '').trim();
      var key = normalizeTagKey(clean);
      if (!clean || seen[key]) return;
      seen[key] = true;
      out.push(clean);
    });
    return out.sort(function (a, b) { return a.localeCompare(b); });
  }

  function getTagStorageMap() {

  function getTagPlaceKey(data) {
    var placeId = data && data.googlePlaceId ? String(data.googlePlaceId).trim() : '';
    if (placeId) return placeId;

    var name = normalizeTextKey(data && data.name);
    var city = normalizeTextKey(data && data.city);
    var state = normalizeTextKey(data && data.state);
    if (!name) return '';

    return 'name|' + name + '|city|' + city + '|state|' + state;

  function getLegacyNameOnlyTagKey(data) {

  function getMigrationMarkerKey(placeKey) {
    return TAG_MIGRATION_MARKER_PREFIX + placeKey;
  }

  function isMigrationMarked(placeKey) {
    try {
      return window.localStorage.getItem(getMigrationMarkerKey(placeKey)) === '1';
    } catch (_err) {
      return false;
    }
  }

  function markMigrationDone(placeKey) {
    try {
      window.localStorage.setItem(getMigrationMarkerKey(placeKey), '1');
    } catch (_err) {}
  }

  function migrateLegacyNameKeyIfNeeded(placeKey, data, map) {
    if (!placeKey || !data || !map || isMigrationMarked(placeKey)) return map;

    var legacyKey = getLegacyNameOnlyTagKey(data);
    if (!legacyKey || legacyKey === placeKey) {
      markMigrationDone(placeKey);
      return map;
    }

    var legacyTags = Array.isArray(map[legacyKey]) ? map[legacyKey] : [];
    var currentTags = Array.isArray(map[placeKey]) ? map[placeKey] : [];

    if (!legacyTags.length) {
      markMigrationDone(placeKey);
      return map;
    }

    var merged = uniqueTags([].concat(currentTags, legacyTags));
    var nextMap = Object.assign({}, map, { [placeKey]: merged });
    delete nextMap[legacyKey];

    if (saveTagStorageMap(nextMap)) {
      console.log('🏷️ Tag key migration completed:', {
        legacyKey: legacyKey,
        newKey: placeKey,
        migratedTagCount: merged.length
      });
      markMigrationDone(placeKey);
      return nextMap;
    }

    return map;
  }

  function getStoredTagsForPlace(placeKey, data) {
    if (!placeKey) return [];
    var map = getTagStorageMap();
    map = migrateLegacyNameKeyIfNeeded(placeKey, data, map);
    var val = map[placeKey];
    return Array.isArray(val) ? uniqueTags(val) : [];
  }

  function setStoredTagsForPlace(placeKey, tags, data) {
    if (!placeKey) return false;
    var map = getTagStorageMap();
    map = migrateLegacyNameKeyIfNeeded(placeKey, data, map);
    map[placeKey] = uniqueTags(tags || []);
    var ok = saveTagStorageMap(map);
    if (ok) markMigrationDone(placeKey);
    return ok;
  }

  function escapeRegExp(value) {

  function buildTagRecommendations(data, currentTags) {
    var EXCLUDED_RECOMMENDATIONS = {
      'city center': true,
      'downtown': true,
      'urban': true,
      'commercial': true
    };

    var recs = new Map();
    var currentTagKeys = (currentTags || []).map(normalizeTagKey);
    var fullText = [
      data && data.name,
      data && data.tags,
      data && data.city,
      data && data.address,
      data && data.description,
      data && data.notes
    ].join(' ').toLowerCase();

    var googleRating = parseFloat(data && data.googleRating) || 0;

    var ruleMap = [
      { keys: ['hike', 'trail', 'hiking', 'trekking', 'mountain', 'alpine'], tags: ['Hiking', 'Outdoor', 'Nature', 'Scenic', 'Adventure'], confidence: 0.95 },
      { keys: ['waterfall', 'cascade', 'falls'], tags: ['Waterfall', 'Nature', 'Scenic', 'Photography', 'Outdoor'], confidence: 0.9 },
      { keys: ['park', 'garden', 'botanical', 'arboretum'], tags: ['Park', 'Nature', 'Family-Friendly', 'Relaxing', 'Scenic'], confidence: 0.85 },
      { keys: ['lake', 'river', 'stream', 'pond', 'creek', 'water'], tags: ['Water Activity', 'Nature', 'Scenic', 'Family-Friendly'], confidence: 0.8 },
      { keys: ['forest', 'woods', 'woodland', 'grove'], tags: ['Nature', 'Hiking', 'Outdoor', 'Relaxing', 'Scenic'], confidence: 0.85 },
      { keys: ['beach', 'shore', 'coast', 'seaside'], tags: ['Beach', 'Outdoor', 'Family-Friendly', 'Scenic', 'Relaxing'], confidence: 0.9 },
      { keys: ['camping', 'camp site'], tags: ['Camping', 'Outdoor', 'Adventure', 'Family-Friendly'], confidence: 0.9 },
      { keys: ['restaurant', 'bistro', 'steakhouse', 'grill'], tags: ['Restaurant', 'Dining', 'Local Favorite', 'Worth Visiting'], confidence: 0.95 },
      { keys: ['cafe', 'coffee', 'espresso', 'tea house'], tags: ['Cafe', 'Coffee', 'Local Favorite', 'Relaxing'], confidence: 0.9 },
      { keys: ['diner', 'fast food', 'quick bite'], tags: ['Casual Dining', 'Quick Service'], confidence: 0.8 },
      { keys: ['bakery', 'pastry'], tags: ['Bakery', 'Local Favorite', 'Worth Visiting'], confidence: 0.85 },
      { keys: ['brewery', 'winery', 'distillery', 'bar', 'pub'], tags: ['Beverage', 'Adult Experience', 'Local Favorite'], confidence: 0.85 },
      { keys: ['food truck', 'street food'], tags: ['Quick Service', 'Casual Dining', 'Local Favorite'], confidence: 0.8 },
      { keys: ['shop', 'store', 'retail', 'boutique'], tags: ['Shopping', 'Local Business', 'Worth Visiting'], confidence: 0.8 },
      { keys: ['market', 'farmer market', 'farmers market'], tags: ['Market', 'Local Business', 'Family-Friendly', 'Worth Visiting'], confidence: 0.9 },
      { keys: ['mall', 'shopping center'], tags: ['Shopping', 'Family-Friendly'], confidence: 0.75 },
      { keys: ['museum', 'gallery', 'exhibition', 'exhibit'], tags: ['Museum', 'Cultural', 'Historical', 'Educational', 'Indoor Activity'], confidence: 0.9 },
      { keys: ['historic', 'history', 'monument', 'landmark', 'heritage'], tags: ['Historical', 'Cultural', 'Worth Visiting', 'Educational'], confidence: 0.85 },
      { keys: ['art', 'artist', 'sculpture', 'craft'], tags: ['Cultural', 'Artistic', 'Local Business'], confidence: 0.8 },
      { keys: ['gym', 'fitness', 'yoga', 'pilates'], tags: ['Fitness', 'Health & Wellness'], confidence: 0.85 },
      { keys: ['sport', 'athletic', 'court', 'field', 'stadium'], tags: ['Sports', 'Active', 'Family-Friendly'], confidence: 0.8 },
      { keys: ['bowling', 'arcade', 'recreation'], tags: ['Entertainment', 'Family-Friendly', 'Fun'], confidence: 0.8 },
      { keys: ['movie', 'cinema', 'theater', 'theatre'], tags: ['Entertainment', 'Family-Friendly', 'Indoor Activity'], confidence: 0.9 },
      { keys: ['music', 'concert', 'live performance'], tags: ['Entertainment', 'Local Favorite', 'Worth Visiting'], confidence: 0.85 },
      { keys: ['amusement', 'theme park', 'carnival'], tags: ['Entertainment', 'Family-Friendly', 'Fun', 'Adventure'], confidence: 0.9 },
      { keys: ['hotel', 'motel', 'inn', 'resort'], tags: ['Accommodation', 'Travel-Friendly'], confidence: 0.85 },
      { keys: ['bed & breakfast', 'bed and breakfast', 'airbnb'], tags: ['Accommodation', 'Local Experience'], confidence: 0.8 }
    ];

    ruleMap.forEach(function (rule) {
      var matchCount = rule.keys.filter(function (key) {
        var regex = new RegExp('\\b' + escapeRegExp(key) + '\\b', 'i');
        return regex.test(fullText);
      }).length;

      if (matchCount > 0) {
        var scoreBoost = matchCount > 1 ? 1.1 : 1.0;
        rule.tags.forEach(function (tag) {
          var existingScore = recs.get(tag) || 0;
          recs.set(tag, Math.max(existingScore, rule.confidence * scoreBoost));
        });
      }
    });

    if (googleRating >= 4.7) {
      recs.set('Top Rated', Math.max(recs.get('Top Rated') || 0, 0.95));
      recs.set('Worth Visiting', Math.max(recs.get('Worth Visiting') || 0, 0.9));
    } else if (googleRating >= 4.3) {
      recs.set('Highly Recommended', Math.max(recs.get('Highly Recommended') || 0, 0.85));
    }

    var familyKeywords = ['family', 'kids', 'child', 'playground', 'park', 'children', 'school', 'educational'];
    if (familyKeywords.some(function (k) { return fullText.indexOf(k) !== -1; })) {
      recs.set('Family-Friendly', Math.max(recs.get('Family-Friendly') || 0, 0.8));
    }

    var relaxingKeywords = ['relax', 'peaceful', 'quiet', 'serene', 'tranquil', 'spa', 'wellness'];
    if (relaxingKeywords.some(function (k) { return fullText.indexOf(k) !== -1; })) {
      recs.set('Relaxing', Math.max(recs.get('Relaxing') || 0, 0.8));
    }

    return Array.from(recs.entries())
      .filter(function (entry) {
        var tag = entry[0];
        var tagKey = normalizeTagKey(tag);
        return currentTagKeys.indexOf(tagKey) === -1 && !EXCLUDED_RECOMMENDATIONS[tagKey];
      })
      .sort(function (a, b) { return b[1] - a[1]; })
      .slice(0, 8)
      .map(function (entry) { return entry[0]; });
  }

  async function syncViaExplorerHost(state, updates) {
    var openerWin = getOpenerWindow();

      return { attempted: false, synced: false, reason: 'host-sync-unavailable', context: window.__detailHostContext || 'none' };
    }
    if (!state || !state.explorerSource) {
      return { attempted: false, synced: false, reason: 'missing-explorer-source', context: window.__detailHostContext || 'none' };
    }

    try {
      var result = await openerWin.syncVisitedExplorerDetailFields(state.explorerSource, updates || {});
      return {
        attempted: true,
        synced: !!(result && result.synced),
        excelSaved: !!(result && result.excelSaved),
        reason: result && result.reason ? result.reason : (result && result.synced ? 'saved' : 'unknown'),
        context: window.__detailHostContext || 'none'

    } catch (error) {
      return {
        attempted: true,

        context: window.__detailHostContext || 'none'

  function findOpenerRowForTagSync(openerWin, state) {
    if (!openerWin || !Array.isArray(openerWin.adventuresData)) return null;

    var sourceIndex = state && Number.isInteger(state.sourceIndex) ? state.sourceIndex : Number(state && state.sourceIndex);
    if (Number.isInteger(sourceIndex) && sourceIndex >= 0 && openerWin.adventuresData[sourceIndex]) {
      return { row: openerWin.adventuresData[sourceIndex], index: sourceIndex, matchType: 'sourceIndex' };
    }

    var data = state && state.data ? state.data : {};
    var placeIdNeedle = normalizeTextKey(data.googlePlaceId);
    var nameNeedle = normalizeTextKey(data.name);
    var cityNeedle = normalizeTextKey(data.city);
    var stateNeedle = normalizeTextKey(data.state);

    for (var i = 0; i < openerWin.adventuresData.length; i++) {
      var row = openerWin.adventuresData[i];
      var values = row && row.values && row.values[0];
      if (!Array.isArray(values)) continue;

      var rowPlaceId = normalizeTextKey(values[1]);
      if (placeIdNeedle && rowPlaceId && rowPlaceId === placeIdNeedle) {
        return { row: row, index: i, matchType: 'placeId' };
      }

      var rowName = normalizeTextKey(values[0]);
      var rowCity = normalizeTextKey(values[10]);
      var rowState = normalizeTextKey(values[9]);
      if (nameNeedle && rowName === nameNeedle && rowCity === cityNeedle && rowState === stateNeedle) {
        return { row: row, index: i, matchType: 'nameCityState' };
      }
    }

    return null;
  }

  async function syncTagsToOpenerAndSpreadsheet(state, debug) {
    var openerWin = getOpenerWindow();
    pushTagSaveDebug(debug, 'host_context', { context: window.__detailHostContext || 'none' });

    var hostSync = await syncViaExplorerHost(state, {
      tagsCsv: uniqueTags(state && state.tags || []).join(', ')
    });
    pushTagSaveDebug(debug, 'host_sync_attempt', hostSync);
    if (hostSync.attempted && hostSync.synced) {
      return { syncedRow: true, excelSaved: !!hostSync.excelSaved, reason: hostSync.excelSaved ? 'saved' : 'sync-only' };
    }

    pushTagSaveDebug(debug, 'opener_check', {
      hasOpener: !!openerWin,
      hasAdventuresData: !!(openerWin && Array.isArray(openerWin.adventuresData)),
      adventuresDataLength: openerWin && Array.isArray(openerWin.adventuresData) ? openerWin.adventuresData.length : 0,
      hasSaveToExcel: !!(openerWin && typeof openerWin.saveToExcel === 'function'),
      context: window.__detailHostContext || 'none'
    });

    if (!openerWin) return { syncedRow: false, excelSaved: false, reason: 'no-opener' };

    var rowMatch = findOpenerRowForTagSync(openerWin, state);
    pushTagSaveDebug(debug, 'row_match', {
      found: !!rowMatch,
      matchType: rowMatch ? rowMatch.matchType : 'none',
      rowIndex: rowMatch ? rowMatch.index : -1,
      hasRowId: !!(rowMatch && rowMatch.row && rowMatch.row.rowId)
    });

    if (!rowMatch || !rowMatch.row || !Array.isArray(rowMatch.row.values) || !Array.isArray(rowMatch.row.values[0])) {
      return { syncedRow: false, excelSaved: false, reason: 'row-not-found' };
    }

    var values = rowMatch.row.values[0];
    var tagsCsv = uniqueTags(state.tags || []).join(', ');
    values[DETAIL_TAGS_COLUMN_INDEX] = tagsCsv;
    pushTagSaveDebug(debug, 'planner_row_updated', {
      rowIndex: rowMatch.index,
      tagsCsvLength: tagsCsv.length,
      tagsCount: uniqueTags(state.tags || []).length
    });

    if (state && state.data) {
      state.data.tags = tagsCsv;
    }

    if (openerWin.currentEditingRow && openerWin.currentEditingRow.values && openerWin.currentEditingRow.values[0]) {
      var currentEditingPlaceId = normalizeTextKey(openerWin.currentEditingRow.values[0][1]);
      var activePlaceId = normalizeTextKey(state && state.data && state.data.googlePlaceId);
      if (activePlaceId && currentEditingPlaceId === activePlaceId) {
        openerWin.currentEditingRow.values[0][DETAIL_TAGS_COLUMN_INDEX] = tagsCsv;
        pushTagSaveDebug(debug, 'current_editing_row_updated', { matchedByPlaceId: true });
      }
    }

    if (typeof openerWin.renderPaginatedCards === 'function') {
      try { openerWin.renderPaginatedCards(); pushTagSaveDebug(debug, 'render_paginated_cards', { ok: true }); } catch (errA) { pushTagSaveDebug(debug, 'render_paginated_cards', { ok: false, error: String(errA && errA.message || errA) }); }
    }
    if (typeof openerWin.renderAdventureCards === 'function') {
      try { await openerWin.renderAdventureCards(); pushTagSaveDebug(debug, 'render_adventure_cards', { ok: true }); } catch (errB) { pushTagSaveDebug(debug, 'render_adventure_cards', { ok: false, error: String(errB && errB.message || errB) }); }
    }
    if (typeof openerWin.applyFilters === 'function') {
      try { openerWin.applyFilters(); pushTagSaveDebug(debug, 'apply_filters', { ok: true }); } catch (errC) { pushTagSaveDebug(debug, 'apply_filters', { ok: false, error: String(errC && errC.message || errC) }); }
    }

    var excelSaved = false;
    try {
      if (typeof openerWin.saveToExcel === 'function') {
        if (rowMatch.row.rowId) {
          try {
            pushTagSaveDebug(debug, 'excel_save_row_attempt', { rowId: String(rowMatch.row.rowId) });
            var rowResult = await openerWin.saveToExcel(rowMatch.row.rowId, values);
            excelSaved = rowResult !== false;
            pushTagSaveDebug(debug, 'excel_save_row_result', { ok: excelSaved, rawResultType: typeof rowResult });
          } catch (firstErr) {
            pushTagSaveDebug(debug, 'excel_save_row_error', { error: String(firstErr && firstErr.message || firstErr) });
            var fullResult = await openerWin.saveToExcel();
            excelSaved = fullResult !== false;
            pushTagSaveDebug(debug, 'excel_save_full_result', { ok: excelSaved, rawResultType: typeof fullResult });
          }
        } else {
          pushTagSaveDebug(debug, 'excel_save_full_attempt', { reason: 'missing_row_id' });
          var fallbackResult = await openerWin.saveToExcel();
          excelSaved = fallbackResult !== false;
          pushTagSaveDebug(debug, 'excel_save_full_result', { ok: excelSaved, rawResultType: typeof fallbackResult });
        }
      } else {
        pushTagSaveDebug(debug, 'excel_save_unavailable', { hasSaveToExcel: false });
      }
    } catch (excelErr) {
      console.warn('⚠️ Could not persist tags to Excel from details tab:', excelErr && excelErr.message ? excelErr.message : excelErr);
      pushTagSaveDebug(debug, 'excel_save_exception', { error: String(excelErr && excelErr.message || excelErr) });
      excelSaved = false;
    }

    return { syncedRow: true, excelSaved: excelSaved, reason: excelSaved ? 'saved' : 'sync-only' };
  }

  // ── Notes Management ─────────────────────────────────────────
  // NOTES_JSON_V1:: prefix is used to distinguish structured JSON arrays
  // from legacy plain-text notes. All notes are stored as a JSON array
  // serialized into a single spreadsheet cell under the "notes" column (index 20).

  function parseDetailNotesBlob(raw) {
    var text = String(raw == null ? '' : raw).trim();
    if (!text) return [];

    var jsonPayload = '';
    if (text.indexOf(DETAIL_NOTES_PREFIX) === 0) {
      jsonPayload = text.slice(DETAIL_NOTES_PREFIX.length).trim();
    } else if (text.charAt(0) === '[' && text.charAt(text.length - 1) === ']') {
      jsonPayload = text;
    }

    if (jsonPayload) {
      try {
        var parsed = JSON.parse(jsonPayload);
        if (Array.isArray(parsed)) {
          return parsed.map(function (n) { return String(n == null ? '' : n).trim(); }).filter(Boolean);
        }
      } catch (_err) {}
    }

    // Legacy plain-text fallback: split by divider lines or double newlines
    var byDivider = text.split(/\n-{3,}\n/g).map(function (p) { return p.trim(); }).filter(Boolean);
    if (byDivider.length > 1) return byDivider;

    var byParagraph = text.split(/\n\s*\n/g).map(function (p) { return p.trim(); }).filter(Boolean);
    if (byParagraph.length > 1) return byParagraph;

    return [text];
  }

  function serializeDetailNotesBlob(notes) {
    var clean = (notes || []).map(function (n) { return String(n == null ? '' : n).trim(); }).filter(Boolean);
    return clean.length ? (DETAIL_NOTES_PREFIX + JSON.stringify(clean)) : '';
  }

  async function saveDetailNotes() {
    if (!window.__detailNotesState) {
      showDetailToast('⚠️ Notes state not initialised.', 'error', 4000);
      return;
    }

    var state = window.__detailNotesState;
    var serialized = serializeDetailNotesBlob(state.notes || []);

    var hostSync = await syncViaExplorerHost(state, { notes: serialized });
    if (hostSync.attempted && hostSync.synced) {
      setDetailNotesStatus('Notes saved to source Excel table.', false);
      showDetailToast('✅ Notes saved and synced to Excel.', 'success', 4000);
      return;
    }

    // Mirror back into the live data object so tag-recommendations etc. see the latest value
    if (state.data) state.data.notes = serialized;

    var openerWin = getOpenerWindow();
    if (!openerWin) {
      setDetailNotesStatus('Notes updated locally (no opener window available).', false);
      showDetailToast('📝 Notes saved locally (open from planner to sync to Excel).', 'info', 4500);
      return;
    }

    // Find the row in the opener's adventure data
    var rowMatch = findOpenerRowForTagSync(openerWin, state);
    if (!rowMatch || !rowMatch.row || !Array.isArray(rowMatch.row.values) || !Array.isArray(rowMatch.row.values[0])) {
      setDetailNotesStatus('Notes updated locally (row not found in opener).', false);
      showDetailToast('⚠️ Notes saved — but could not locate row in planner to sync.', 'info', 4500);
      return;
    }

    // Update the in-memory row
    var values = rowMatch.row.values[0];
    while (values.length <= DETAIL_NOTES_COLUMN_INDEX) values.push('');
    values[DETAIL_NOTES_COLUMN_INDEX] = serialized;

    // Trigger planner re-render
    try {
      if (typeof openerWin.renderPaginatedCards === 'function') openerWin.renderPaginatedCards();
      if (typeof openerWin.applyFilters === 'function') openerWin.applyFilters();
    } catch (_rerr) {}

    // Persist to Excel
    var excelSaved = false;
    try {
      if (typeof openerWin.saveToExcel === 'function') {
        if (rowMatch.row.rowId) {
          await openerWin.saveToExcel(rowMatch.row.rowId, values);
        } else {
          await openerWin.saveToExcel();
        }
        excelSaved = true;
      }
    } catch (_excelErr) {
      console.warn('⚠️ saveDetailNotes: Excel save failed:', _excelErr);
    }

    if (excelSaved) {
      setDetailNotesStatus('Notes saved to Excel.', false);
      showDetailToast('✅ Notes saved and synced to Excel.', 'success', 4000);
      if (typeof openerWin.showToast === 'function') {
        openerWin.showToast('📝 Notes updated for ' + (state.data && state.data.name ? state.data.name : 'location'), 'success', 3000);
      }
    } else {
      setDetailNotesStatus('Notes updated in planner memory (sign in to sync to Excel).', false);
      showDetailToast('⚠️ Notes saved in planner view. Sign in to persist to Excel.', 'info', 5000);
    }
  }

  function getPhotoStorageMap() {

  function getStoredPhotosForPlace(placeKey) {

  function makePhotoId() {
    return 'ph_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
  }

  function normalizePhotoRecord(raw, idxHint) {
    if (!raw) return null;
    var index = Number(idxHint) || 0;
    if (typeof raw === 'string') {
      var urlText = String(raw || '').trim();
      if (!urlText) return null;
      return {
        id: makePhotoId(),
        url: urlText,
        thumbnail: urlText,
        caption: '',
        source: 'legacy-url',
        addedAt: toIsoNow(),
        order: index
      };
    }

    var url = String(raw.url || raw.webUrl || raw.downloadUrl || '').trim();
    if (!url) return null;
    return {
      id: String(raw.id || makePhotoId()).trim() || makePhotoId(),
      url: url,
      thumbnail: String(raw.thumbnail || raw.downloadUrl || raw.url || url).trim(),
      caption: String(raw.caption || raw.name || '').trim(),
      source: String(raw.source || 'unknown').trim() || 'unknown',
      oneDrivePath: String(raw.oneDrivePath || raw.path || '').trim(),
      addedAt: String(raw.addedAt || toIsoNow()).trim(),
      order: index
    };
  }

  function parsePhotosFromSource(raw) {
    var text = String(raw == null ? '' : raw).trim();
    if (!text) return [];
    var payloadText = text.indexOf(PHOTO_URLS_JSON_PREFIX) === 0 ? text.slice(PHOTO_URLS_JSON_PREFIX.length).trim() : text;
    var parsed = null;
    try { parsed = JSON.parse(payloadText); } catch (_err) { parsed = null; }
    if (Array.isArray(parsed)) {
      return parsed.map(function (entry, idx) { return normalizePhotoRecord(entry, idx); }).filter(Boolean);
    }
    return payloadText.split(/[\n,]+/).map(function (entry, idx) {
      return normalizePhotoRecord(String(entry || '').trim(), idx);
    }).filter(Boolean);
  }

  function mergePhotoCollections(primary, secondary) {
    var seen = {};
    var out = [];
    (primary || []).concat(secondary || []).forEach(function (entry, idx) {
      var ph = normalizePhotoRecord(entry, idx);
      if (!ph) return;
      var key = String(ph.url || '').trim().toLowerCase();
      if (!key || seen[key]) return;
      seen[key] = true;
      out.push(ph);
    });
    return out;
  }

  function slugifyLocationName(name) {
    return String(name || 'location').trim().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 60) || 'location';
  }

  async function buildFileFromPhotoUrl(photoUrl) {
    var response = await fetch(photoUrl, { method: 'GET', mode: 'cors' });
    if (!response.ok) throw new Error('Could not fetch image URL (HTTP ' + response.status + ').');
    var blob = await response.blob();
    var extension = (String(blob.type || '').split('/')[1] || 'jpg').replace(/[^a-z0-9]/gi, '').toLowerCase() || 'jpg';
    var base = 'photo-url-' + Date.now() + '.' + extension;
    return new File([blob], base, { type: blob.type || 'image/jpeg' });
  }

  async function uploadPhotoFromExternalUrl(photoUrl, locationName) {
    var file = await buildFileFromPhotoUrl(photoUrl);

  async function searchGoogleImages(query) {
    var settings = getGoogleCseSettings();
    var apiKey = String(settings.apiKey || '').trim();
    var cx = String(settings.cx || '').trim();
    if (!apiKey || !cx) return null; // null = not configured
    var url = 'https://www.googleapis.com/customsearch/v1?key=' + encodeURIComponent(apiKey) +
      '&cx=' + encodeURIComponent(cx) + '&searchType=image&num=10&q=' + encodeURIComponent(query);
    var resp = await fetch(url);
    if (!resp.ok) {
      var errJson = await resp.json().catch(function () { return {}; });
      var msg = (errJson.error && errJson.error.message) ? errJson.error.message : 'HTTP ' + resp.status;
      throw new Error(msg);
    }
    var json = await resp.json();
    return Array.isArray(json.items) ? json.items.map(function (item) {
      return {
        id: makePhotoId(),
        url: item.link || '',
        thumbnail: (item.image && item.image.thumbnailLink) ? item.image.thumbnailLink : item.link || '',
        caption: item.title || '',
        source: 'google'

    }) : [];
  }

  async function uploadPhotoToOneDrive(file, locationName) {
    var accessToken = window.accessToken || (window.parent && window.parent.accessToken) || '';
    if (!accessToken) throw new Error('Sign in to upload photos to OneDrive.');
    var slug = slugifyLocationName(locationName);
    var safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
    var fileName = Date.now() + '_' + safeName;
    var oneDrivePath = PHOTO_ONEDRIVE_ROOT + '/' + slug + '/' + fileName;
    var encodedPath = encodeURIComponent(oneDrivePath).replace(/%2F/g, '/');
    var uploadUrl = 'https://graph.microsoft.com/v1.0/me/drive/root:/' + encodedPath + ':/content';
    var resp = await fetch(uploadUrl, {
      method: 'PUT',
      headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': file.type || 'application/octet-stream' },
      body: file
    });
    if (!resp.ok) throw new Error('Upload failed (HTTP ' + resp.status + ')');
    var json = await resp.json();
    var webUrl = (json['@microsoft.graph.downloadUrl'] || json.webUrl || oneDrivePath);
    return {
      id: makePhotoId(),
      url: webUrl,
      thumbnail: webUrl,
      caption: file.name,
      source: 'onedrive',
      oneDrivePath: oneDrivePath
    };
  }

  function normalizeLinkList(rawText) {
    var lines = String(rawText || '').split(/[\n,]+/).map(function (line) { return line.trim(); }).filter(Boolean);
    var seen = {};
    var urls = [];
    lines.forEach(function (line) {
      var val = line;
      if (!/^https?:\/\//i.test(val) && /^[-a-z0-9_.]+\.[a-z]{2,}/i.test(val)) val = 'https://' + val;
      if (!/^https?:\/\//i.test(val)) return;
      var key = String(val).toLowerCase();
      if (seen[key]) return;
      seen[key] = true;
      urls.push(val);
    });
    return urls;
  }

  function parseFreeTextEnrichment(raw) {
    var text = String(raw || '').trim();
    if (!text) return {};
    var out = {};
    var lines = text.split(/\n+/).map(function (l) { return l.trim(); }).filter(Boolean);
    var addressLine = lines.find(function (l) { return /^\d+\s+.+/.test(l); });
    if (addressLine) out.address = addressLine;

    var cityStateZip = lines.find(function (l) { return /^[A-Za-z .'-]+,\s*[A-Za-z]{2}(?:\s+\d{5}(?:-\d{4})?)?$/.test(l); });
    if (cityStateZip) {
      var m = cityStateZip.match(/^([A-Za-z .'-]+),\s*([A-Za-z]{2})/);
      if (m) {
        out.city = m[1].trim();
        out.state = m[2].trim().toUpperCase();
      }
    }

    var phone = text.match(/(?:\+?1\s*)?(?:\(?\d{3}\)?[\s.-]*)\d{3}[\s.-]*\d{4}/);
    if (phone) out.phone = phone[0].trim();

    var hoursLine = lines.find(function (l) {
      return /(hours|open|closed|mon|tue|wed|thu|fri|sat|sun|am|pm)/i.test(l);
    });
    if (hoursLine) out.hours = hoursLine.replace(/^hours\s*:\s*/i, '').trim();

    if (text.length > 20) out.description = text;
    return out;
  }

    if (!openerWin) return 24;

    var byKnownHelpers = [

      'getAdventureColumnIndexByName'
    ];

    for (var i = 0; i < byKnownHelpers.length; i += 1) {
      var helperName = byKnownHelpers[i];
      if (typeof openerWin[helperName] === 'function') {
        var idx = Number(openerWin[helperName]('Visited'));
        if (Number.isInteger(idx) && idx >= 0) return idx;
      }
    }

    if (openerWin.columnIndices && Number.isInteger(openerWin.columnIndices.Visited) && openerWin.columnIndices.Visited >= 0) {
      return openerWin.columnIndices.Visited;
    }

    return 24;

  async function persistAdventureVisitedCell(openerWin, rowMatch, rowValues, visitedColIndex) {
    if (!openerWin || !rowMatch || !rowMatch.row || !Array.isArray(rowValues) || visitedColIndex < 0) return false;

    if (typeof openerWin.updateAdventureRowColumns === 'function' && Number.isInteger(rowMatch.index) && rowMatch.index >= 0) {
      var updateMap = {};
      updateMap[visitedColIndex] = rowValues[visitedColIndex];
      await openerWin.updateAdventureRowColumns(rowMatch.index, updateMap, {
        accessToken: openerWin.accessToken,
        filePath: openerWin.filePath,
        tableRef: openerWin.tableName
      });
      return true;
    }

    var rowId = rowMatch.row.rowId;
    if (rowId && openerWin.accessToken) {
      var filePath = openerWin.filePath || 'Copilot_Apps/Kyles_Adventure_Finder/Adventure_Finder_Excel_DB.xlsx';
      var tableName = openerWin.tableName || 'MyList';
      var encodedPath = encodeURIComponent(filePath);
      var apiUrl = 'https://graph.microsoft.com/v1.0/me/drive/root:/' + encodedPath + ':/workbook/tables/' + tableName + '/rows/' + rowId;

      var response = await fetch(apiUrl, {
        method: 'PATCH',
        headers: {
          'Authorization': 'Bearer ' + openerWin.accessToken,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ values: [rowValues] })
      });

      if (response.ok) return true;

      if (response.status === 401 && typeof openerWin.rehydrateAuthState === 'function') {
        var refreshed = await openerWin.rehydrateAuthState();
        if (refreshed && openerWin.accessToken) {
          var retryResponse = await fetch(apiUrl, {
            method: 'PATCH',
            headers: {
              'Authorization': 'Bearer ' + openerWin.accessToken,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ values: [rowValues] })
          });
          if (retryResponse.ok) return true;
        }
      }
    }

    if (typeof openerWin.saveToExcel === 'function') {
      if (rowId && openerWin.saveToExcel.length >= 2) {
        await openerWin.saveToExcel(rowId, rowValues);
      } else {
        await openerWin.saveToExcel();
      }
      return true;
    }

    return false;
  }

  function initActionBar(data, directionsUrl, payload) {
    var bar = document.getElementById('actionBar');
    if (!bar) return;
    bar.classList.remove('u-hidden');

    var locationKey = getLocationKey(data);
    var state = loadActionBarState(locationKey);

    var favBtn = document.getElementById('abFavBtn');
    var favIcon = document.getElementById('abFavIcon');
    var favText = document.getElementById('abFavText');

    function syncFav(isFav) {
      if (isFav) {
        favBtn.classList.add('active');
        favIcon.textContent = '❤️';
        favText.textContent = 'Favorited';
      } else {
        favBtn.classList.remove('active');
        favIcon.textContent = '🤍';
        favText.textContent = 'Favorite';
      }
    }

    syncFav(!!state.favorite);

    favBtn.addEventListener('click', function () {
      state.favorite = !state.favorite;
      syncFav(state.favorite);
      saveActionBarState(locationKey, state);
    });

    var currentRating = state.myRating || 0;
    renderStars(currentRating);

    document.querySelectorAll('.star-btn').forEach(function (btn) {
      btn.addEventListener('mouseenter', function () {
        renderStars(parseInt(btn.getAttribute('data-star'), 10));
      });
      btn.addEventListener('mouseleave', function () {
        renderStars(currentRating);
      });
      btn.addEventListener('click', function () {
        var clicked = parseInt(btn.getAttribute('data-star'), 10);
        currentRating = (currentRating === clicked) ? 0 : clicked;
        renderStars(currentRating);
        state.myRating = currentRating;
        saveActionBarState(locationKey, state);
      });
    });

    var mapsBtn = document.getElementById('abMapsBtn');
    if (directionsUrl) {
      mapsBtn.setAttribute('href', directionsUrl);
      mapsBtn.classList.remove('u-hidden');
    }

    var parkingBtn = document.getElementById('abParkingBtn');
    var parkingUrl = data.parkingLink || '';
    if (!parkingUrl && data.address) {
      parkingUrl = 'https://www.google.com/maps/search/parking+near+' + encodeURIComponent(data.address);
    }
    if (parkingUrl) {
      parkingBtn.setAttribute('href', parkingUrl);
      parkingBtn.classList.remove('u-hidden');
    }

    var visitedBtn = document.getElementById('abVisitedBtn');
    var visitedIcon = document.getElementById('abVisitedIcon');
    var visitedText = document.getElementById('abVisitedText');
    var visitedBadge = document.getElementById('detailVisitedBadge');

    var openerWin = getOpenerWindow();
    var syncState = buildDetailSyncState(payload, data);
    var rowMatch = findOpenerRowForTagSync(openerWin, {
      sourceIndex: payload && payload.sourceIndex != null ? Number(payload.sourceIndex) : null,
      data: data
    });
    var rowValues = rowMatch && rowMatch.row && rowMatch.row.values && rowMatch.row.values[0];
    var visitedColIndex = getAdventureVisitedColumnIndex(openerWin);
    var isVisited = String((rowValues && rowValues[visitedColIndex]) || data.visitedStatus || data.visited || '').trim().toLowerCase() === 'yes';

    function syncVisitedUi(flag) {
      if (!visitedBtn || !visitedIcon || !visitedText) return;
      visitedBtn.classList.toggle('active', !!flag);
      visitedIcon.textContent = flag ? '✅' : '🕒';
      visitedText.textContent = flag ? 'Visited' : 'Mark Visited';
      if (visitedBadge) {
        visitedBadge.classList.toggle('is-visited', !!flag);
        visitedBadge.textContent = flag ? '✅ Visited' : '🕒 Not Visited';
      }
    }

    syncVisitedUi(isVisited);
    if (visitedBtn) {
      var canUseRowMatch = !!(rowMatch && Array.isArray(rowValues));
      var canUseHostFallback = !!(syncState && syncState.explorerSource && openerWin && typeof openerWin.syncVisitedExplorerDetailFields === 'function');
      visitedBtn.disabled = !(canUseRowMatch || canUseHostFallback);
      visitedBtn.onclick = async function () {
        var next = !isVisited;
        var previousValue = rowValues && rowValues[visitedColIndex];
        if (rowValues) {
          while (rowValues.length <= visitedColIndex) rowValues.push('');
          rowValues[visitedColIndex] = next ? 'Yes' : '';
        }

        try {
          var saved = false;
          if (rowMatch && rowValues) {
            saved = await persistAdventureVisitedCell(openerWin, rowMatch, rowValues, visitedColIndex);
          }
          if (!saved && canUseHostFallback) {
            var hostSync = await syncViaExplorerHost(syncState, { visitedStatus: next ? 'Yes' : '' });
            saved = !!(hostSync && hostSync.synced);
          }
          if (!saved) throw new Error('Visited cell could not be persisted to Excel.');
          isVisited = next;
          data.visitedStatus = next ? 'Yes' : '';
          data.visited = next ? 'Yes' : '';
          syncVisitedUi(isVisited);
          showDetailToast(next ? '✅ Marked as visited and saved to Excel.' : '✅ Marked as not visited and saved to Excel.', 'success', 3200);
        } catch (err) {
          if (rowValues) rowValues[visitedColIndex] = previousValue;
          syncVisitedUi(isVisited);
          showDetailToast('⚠️ Could not sync visited status to Excel.', 'error', 3600);
        }
      };
    }

    var linksBtn = document.getElementById('abLinksBtn');
    if (linksBtn) {
      linksBtn.onclick = async function () {
        var seed = [data.links || '', data.links2 || ''].filter(Boolean).join('\n');
        var raw = window.prompt('Paste one or more links (one per line or comma-separated):', seed);
        if (raw == null) return;
        var urls = normalizeLinkList(raw);
        if (!urls.length) {
          showDetailToast('⚠️ No valid URLs detected.', 'error', 2600);
          return;
        }
        var linksPrimary = urls.slice(0, 8).join(', ');
        var linksOverflow = urls.slice(8, 16).join(', ');
        var hostResult = await syncViaExplorerHost(syncState, { links: linksPrimary, links2: linksOverflow });
        if (hostResult && hostResult.synced) {
          data.links = linksPrimary;
          data.links2 = linksOverflow;
          showDetailToast('✅ Links saved to source row.', 'success', 2600);
        } else {
          showDetailToast('⚠️ Could not sync links to source row.', 'error', 3200);
        }
      };
    }

    var enrichBtn = document.getElementById('abEnrichBtn');
    if (enrichBtn) {
      enrichBtn.onclick = function () {
        bindEnrichModalControls();
        openEnrichModal({ data: data, syncState: syncState, payload: payload });
      };
    }
  }

  function activateTab(target) {
    var tabs = document.querySelectorAll('.tab-btn');
    var normalized = String(target || '').trim();
    if (!normalized) normalized = 'overview';
    var selectedTab = null;
    tabs.forEach(function (tab) {
      if (tab.getAttribute('data-tab') === normalized) selectedTab = tab;
    });
    if (!selectedTab && tabs.length) selectedTab = tabs[0];

    tabs.forEach(function (t) {
      t.classList.remove('active');
      t.setAttribute('aria-selected', 'false');
      t.setAttribute('tabindex', '-1');
    });
    document.querySelectorAll('.tab-pane').forEach(function (pane) {
      pane.classList.remove('active');
      pane.hidden = true;
      pane.setAttribute('aria-hidden', 'true');
    });
    if (!selectedTab) return;
    selectedTab.classList.add('active');
    selectedTab.setAttribute('aria-selected', 'true');
    selectedTab.setAttribute('tabindex', '0');
    var pane = document.getElementById('pane-' + selectedTab.getAttribute('data-tab'));
    if (pane) {
      pane.classList.add('active');
      pane.hidden = false;
      pane.setAttribute('aria-hidden', 'false');
    }
  }

  function bindTabs() {
    var tabsRoot = document.getElementById('tabs');
    if (!tabsRoot || tabsRoot.dataset.tabsBound === '1') return;
    tabsRoot.dataset.tabsBound = '1';

    function handleTabActivation(event) {
      var tab = closestFromEvent(event, '.tab-btn[data-tab]');
      if (!tab || !tabsRoot.contains(tab)) return false;
      activateTab(tab.getAttribute('data-tab'));
      return true;
    }

    tabsRoot.addEventListener('click', function (event) {
      if (!handleTabActivation(event)) return;
      event.preventDefault();
    }, true);

    tabsRoot.addEventListener('keydown', function (event) {
      if (event.key !== 'Enter' && event.key !== ' ') return;
      if (!handleTabActivation(event)) return;
      event.preventDefault();
    }, true);
  }

  function getEventElement(event) {
    if (!event) return null;

    var target = null;
    if (typeof event.composedPath === 'function') {
      var path = event.composedPath();
      if (Array.isArray(path) && path.length) target = path[0];
    }

    if (!target) target = event.target || null;
    if (!target) return null;
    if (target.nodeType === 1) return target;
    return target.parentElement || null;
  }

  function closestFromEvent(event, selector) {
    var element = getEventElement(event);
    return element && typeof element.closest === 'function' ? element.closest(selector) : null;
  }

  (function init() {
    bindTabs();

    document.addEventListener('click', function (e) {
      var addrBtn = closestFromEvent(e, '.addr-copy-btn');
      if (addrBtn) {
        var text = addrBtn.getAttribute('data-copy') || '';
        if (!text) return;
        copyDebugBundle(text).then(function () {
          var orig = addrBtn.textContent;
          addrBtn.textContent = '✓ Copied';
          addrBtn.classList.add('copied');
          setTimeout(function () { addrBtn.textContent = orig; addrBtn.classList.remove('copied'); }, 1400);
        }).catch(function () {
          window.prompt('Copy address:', text);
        });
        return;
      }

      var removeBtn = closestFromEvent(e, '.tm-remove-btn');
      if (removeBtn) {
        removeTagFromDetailState(removeBtn.getAttribute('data-tag') || '');
        return;
      }

      var suggestBtn = closestFromEvent(e, '.tm-suggest-btn');
      if (suggestBtn) {
        addTagToDetailState(suggestBtn.getAttribute('data-tag') || '');
        return;
      }

      if (closestFromEvent(e, '#tmAddBtn')) {
        var input = document.getElementById('tmInput');
        addTagToDetailState(input ? input.value : '');
        if (input) input.value = '';
        return;
      }

      if (closestFromEvent(e, '#tmSaveBtn')) {
        saveDetailTags();
        return;
      }

      if (closestFromEvent(e, '#tmCopyDebugBtn')) {
        copyLastTagSaveDebug().then(function () {
          showDetailToast('📋 Tag save debug copied to clipboard.', 'info', 2200);
        }).catch(function () {
          window.prompt('Copy tag save debug:', getLastTagSaveDebugJson());
        });
        return;
      }

      if (closestFromEvent(e, '#tmClearBtn')) {
        if (window.__detailTagState) {
          window.__detailTagState.tags = [];
          syncTagManagementUi();
          setTagStatus('Cleared tags. Click Save Tags to persist.', false);
          refreshTagSaveDebugUi(window.__lastTagSaveDebug);
        }
        return;
      }

      if (closestFromEvent(e, '#tmResetBtn') && window.__detailTagState) {
        window.__detailTagState.tags = uniqueTags(window.__detailTagState.sourceTags || []);
        syncTagManagementUi();
        setTagStatus('Reset to source tags. Click Save Tags to persist.', false);
        refreshTagSaveDebugUi(window.__lastTagSaveDebug);
      }

      var removeNoteBtn = closestFromEvent(e, '.dnm-remove');
      if (removeNoteBtn) {
        removeNoteFromDetailState(Number(removeNoteBtn.getAttribute('data-note-index')));
        return;
      }

      if (closestFromEvent(e, '#dnmAddBtn')) {
        var noteInput = document.getElementById('dnmInput');
        addNoteToDetailState(noteInput ? noteInput.value : '');
        if (noteInput) noteInput.value = '';
        return;
      }

      if (closestFromEvent(e, '#dnmSaveBtn')) {
        saveDetailNotes();
      }

      // ── Photos event dispatch ───────────────────────────────
      if (closestFromEvent(e, '#phSaveBtn')) {
        saveLocationPhotos();
        return;
      }

      if (closestFromEvent(e, '#phSearchBtn')) {
        var searchInput = document.getElementById('phSearchInput');
        var query = searchInput ? searchInput.value.trim() : '';
        if (!query) return;
        var resultsWrap = document.getElementById('phSearchResults');
        if (resultsWrap) resultsWrap.innerHTML = '<p class="ph-empty">Searching…</p>';
        searchGoogleImages(query).then(function (results) {
          if (results === null) {
            // Not configured — show settings
            var apiSettings = document.getElementById('phApiSettings');
            if (apiSettings) apiSettings.classList.remove('ph-hidden');
            if (resultsWrap) resultsWrap.innerHTML = '<p class="ph-empty">Configure your Google Custom Search API key above, then search again.</p>';
          } else {
            renderSearchResults(results);
          }
        }).catch(function (err) {
          if (resultsWrap) resultsWrap.innerHTML = '<p class="ph-empty" style="color:#b91c1c">Search failed: ' + escapeHtml(err.message || String(err)) + '</p>';
        });
        return;
      }

      if (closestFromEvent(e, '#phShowSettingsBtn')) {
        var apiSettingsPanel = document.getElementById('phApiSettings');
        if (apiSettingsPanel) apiSettingsPanel.classList.toggle('ph-hidden');
        return;
      }

      if (closestFromEvent(e, '#phSaveSettingsBtn')) {
        var keyInput = document.getElementById('phApiKey');
        var cxInput = document.getElementById('phCx');
        saveGoogleCseSettings({ apiKey: keyInput ? keyInput.value.trim() : '', cx: cxInput ? cxInput.value.trim() : '' });
        showDetailToast('✅ Google CSE settings saved.', 'success', 2400);
        return;
      }

      if (closestFromEvent(e, '#phAddSelectedBtn')) {
        var photoState = window.__detailPhotosState;
        var searchResults = window.__photoSearchResults;
        if (!photoState || !Array.isArray(searchResults)) return;
        var selected = document.querySelectorAll('.ph-search-item.ph-selected');
        var added = 0;
        selected.forEach(function (item) {
          var idx = Number(item.getAttribute('data-search-idx'));
          var ph = searchResults[idx];
          if (ph) { photoState.photos.push(ph); added++; }
        });
        if (added) {
          renderPhotoGallery();
          showDetailToast('✅ ' + added + ' photo' + (added !== 1 ? 's' : '') + ' added. Click Save Photos.', 'info', 3000);
          setPhotoStatus(added + ' photo' + (added !== 1 ? 's' : '') + ' added — click Save Photos to persist.', false);
          // Clear selections
          document.querySelectorAll('.ph-search-item.ph-selected').forEach(function (i) { i.classList.remove('ph-selected'); });
        }
        return;
      }

      if (closestFromEvent(e, '#phAddUrlBtn') || closestFromEvent(e, '.ph-url-retry-btn')) {
        var urlInput = document.getElementById('phUrlInput');
        var photoUrl = urlInput ? urlInput.value.trim() : '';
        if (!photoUrl || !/^https?:\/\//i.test(photoUrl)) {
          showDetailToast('Please enter a valid https:// URL.', 'error', 2800);
          return;
        }
        var urlState = window.__detailPhotosState;
        if (urlState) {
          var locationNameForUrlUpload = (urlState.data && urlState.data.name) || 'location';
          var addUrlBtn = document.getElementById('phAddUrlBtn');
          var urlStatusEl = document.getElementById('phUrlStatus');

          function setUrlStatus(mode, text) {
            if (!urlStatusEl) return;
            urlStatusEl.className = 'ph-url-status ph-url-status--' + mode;
            if (mode === 'uploading') {
              urlStatusEl.innerHTML = '<span class="ph-url-status__spinner"></span><span>' + escapeHtml(text) + '</span>';
            } else if (mode === 'success') {
              urlStatusEl.innerHTML = '✅ ' + escapeHtml(text);
            } else {
              urlStatusEl.innerHTML = '⚠️ <span style="flex:1">' + escapeHtml(text) + '</span>' +
                '<button type="button" class="ph-url-retry-btn">Retry</button>';
            }
          }

          if (addUrlBtn) { addUrlBtn.disabled = true; addUrlBtn.textContent = 'Uploading…'; }
          setUrlStatus('uploading', 'Uploading to OneDrive…');
          setPhotoStatus('Uploading URL image to OneDrive…', false);
          uploadPhotoFromExternalUrl(photoUrl, locationNameForUrlUpload)
            .then(function (uploadedPhoto) {
              urlState.photos.push(uploadedPhoto);
              renderPhotoGallery();
              setPhotoStatus('Photo uploaded to OneDrive — click Save Photos to persist.', false);
              showDetailToast('✅ Photo uploaded to OneDrive. Click Save Photos.', 'success', 3000);
              setUrlStatus('success', 'Uploaded to OneDrive — click Save Photos to keep.');
              if (urlInput) urlInput.value = '';
            })
            .catch(function (err) {
              var msg = (err && err.message ? err.message : String(err));
              setPhotoStatus('URL upload failed: ' + msg, true);
              showDetailToast('⚠️ URL upload failed: ' + msg, 'error', 4200);
              setUrlStatus('error', 'Upload failed: ' + msg + '. Tap Retry to try again.');
            })
            .finally(function () {
              if (addUrlBtn) { addUrlBtn.disabled = false; addUrlBtn.textContent = 'Add Photo'; }
            });
        }
        return;
      }

      if (closestFromEvent(e, '#phViewerCloseBtn, #phViewerBackdrop')) {
        closePhotoViewer();
        return;
      }

      var phViewBtn = closestFromEvent(e, '[data-ph-view-idx]');
      if (phViewBtn) {
        openPhotoViewer(phViewBtn.getAttribute('data-ph-view-idx'));
        return;
      }

      var phRemoveBtn = closestFromEvent(e, '.ph-remove-btn');
      if (phRemoveBtn) {
        var removeIdx = Number(phRemoveBtn.getAttribute('data-ph-idx'));
        var removeState = window.__detailPhotosState;
        if (removeState && Number.isInteger(removeIdx) && removeIdx >= 0 && removeIdx < removeState.photos.length) {
          removeState.photos.splice(removeIdx, 1);
          renderPhotoGallery();
          setPhotoStatus('Photo removed — click Save Photos to persist.', false);
        }
        return;
      }

      if (closestFromEvent(e, '#phUploadBtn')) {
        var uploadInput = document.getElementById('phUploadInput');
        var files = uploadInput && uploadInput.files ? Array.from(uploadInput.files) : [];
        if (!files.length) return;
        var uploadState = window.__detailPhotosState;
        if (!uploadState) return;
        var locationNameForUpload = (uploadState.data && uploadState.data.name) || 'location';
        var uploadBtn = document.getElementById('phUploadBtn');
        if (uploadBtn) { uploadBtn.disabled = true; uploadBtn.textContent = 'Uploading…'; }
        setPhotoStatus('Uploading ' + files.length + ' file' + (files.length !== 1 ? 's' : '') + '…', false);
        Promise.all(files.map(function (file) { return uploadPhotoToOneDrive(file, locationNameForUpload); }))
          .then(function (uploaded) {
            uploaded.forEach(function (ph) { uploadState.photos.push(ph); });
            renderPhotoGallery();
            if (uploadInput) uploadInput.value = '';
            var queueDiv = document.getElementById('phUploadQueue');
            if (queueDiv) queueDiv.innerHTML = '';
            setPhotoStatus(uploaded.length + ' photo' + (uploaded.length !== 1 ? 's' : '') + ' uploaded — click Save Photos.', false);
            showDetailToast('✅ ' + uploaded.length + ' photo' + (uploaded.length !== 1 ? 's' : '') + ' uploaded. Click Save Photos.', 'success', 3500);
          })
          .catch(function (err) {
            setPhotoStatus('Upload failed: ' + (err && err.message ? err.message : String(err)), true);
            showDetailToast('⚠️ Upload failed: ' + (err && err.message ? err.message : String(err)), 'error', 4500);
          })
          .finally(function () {
            if (uploadBtn) { uploadBtn.disabled = false; uploadBtn.textContent = 'Upload to OneDrive'; }
          });
        return;
      }
    });

    document.addEventListener('keydown', function (e) {
      var active = document.activeElement;
      if (active && active.id === 'dnmInput' && (e.key === 'Enter' && (e.metaKey || e.ctrlKey))) {
        e.preventDefault();
        addNoteToDetailState(active.value);
        active.value = '';
        return;
      }

      if (e.key !== 'Enter') return;
      if (!active || active.id !== 'tmInput') return;
      e.preventDefault();
      addTagToDetailState(active.value);
      active.value = '';
    });

    document.addEventListener('change', function (e) {
      var captionInput = closestFromEvent(e, '[data-ph-caption-idx]');
      if (captionInput) {
        var captionState = window.__detailPhotosState;
        var capIdx = Number(captionInput.getAttribute('data-ph-caption-idx'));
        if (captionState && Number.isInteger(capIdx) && capIdx >= 0 && capIdx < captionState.photos.length) {
          captionState.photos[capIdx].caption = String(captionInput.value || '').trim();
          setPhotoStatus('Caption updated — click Save Photos to persist.', false);
        }
        return;
      }

      var fileInput = closestFromEvent(e, '#phUploadInput');
      if (!fileInput) return;
      var files = fileInput.files ? Array.from(fileInput.files) : [];
      var queueDiv = document.getElementById('phUploadQueue');
      var uploadBtn = document.getElementById('phUploadBtn');
      if (queueDiv) {
        queueDiv.innerHTML = files.length
          ? '<div class="ph-upload-list">' + files.map(function (f) {
              return '<div class="ph-upload-item">📄 ' + escapeHtml(f.name) + ' (' + (f.size > 1048576 ? (f.size / 1048576).toFixed(1) + ' MB' : Math.round(f.size / 1024) + ' KB') + ')</div>';
            }).join('') + '</div>'
          : '';
      }
      if (uploadBtn) uploadBtn.disabled = files.length === 0;
    });

    var payload = fromStoredPayload();
    if (!payload) {
      var sourceIndex = Number(getParams().get('sourceIndex'));
      if (Number.isInteger(sourceIndex) && sourceIndex >= 0) payload = fromOpenerBySourceIndex(sourceIndex);
    }

    render(payload);
    activateTab(getParams().get('initialTab') || 'overview');
  })();
</script>
