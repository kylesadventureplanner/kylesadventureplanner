<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adventure Details</title>
  <script src="../JS Files/mobile-view-persistence-bootstrap.js"></script>
  <!-- Canonical stylesheet order: tokens -> components -> utilities -> page -->
  <link rel="stylesheet" href="../CSS/design-tokens.css">
  <link rel="stylesheet" href="../CSS/components.css">
  <link rel="stylesheet" href="../CSS/utilities.css">
  <link rel="stylesheet" href="../CSS/adventure-details-window.css">
</head>
<body>
<div class="wrap">
  <div id="header" class="head"></div>
  <div id="debugBar" class="debug-bar u-hidden"></div>

  <div id="tabs" class="tabs" aria-label="Adventure details tabs">
    <button class="tab-btn active" data-tab="overview" type="button">📋 Overview</button>
    <button class="tab-btn" data-tab="details" type="button">ℹ️ Details</button>
    <button class="tab-btn" data-tab="notes" type="button">📝 Notes</button>
    <button class="tab-btn" data-tab="contact" type="button">📞 Contact</button>
    <button class="tab-btn" data-tab="additional" type="button">📌 Additional</button>
    <button class="tab-btn" data-tab="tag-management" type="button">🏷️ Tag Management</button>
  </div>

  <div id="pane-overview" class="tab-pane active"></div>
  <div id="pane-details" class="tab-pane"></div>
  <div id="pane-notes" class="tab-pane"></div>
  <div id="pane-contact" class="tab-pane"></div>
  <div id="pane-additional" class="tab-pane"></div>
  <div id="pane-tag-management" class="tab-pane"></div>

  <!-- Sticky action bar — always visible regardless of active tab -->
  <div class="action-bar u-hidden mobile-sticky-actions" id="actionBar">
    <span class="action-bar-label">Quick Actions</span>

    <button type="button" class="ab-btn ab-fav" id="abFavBtn" title="Add to Favorites">
      <span id="abFavIcon">🤍</span> <span id="abFavText">Favorite</span>
    </button>

    <div class="star-rating" title="My star rating">
      <span class="star-rating-label">My Rating:</span>
      <button type="button" class="star-btn" data-star="1" title="1 star">★</button>
      <button type="button" class="star-btn" data-star="2" title="2 stars">★</button>
      <button type="button" class="star-btn" data-star="3" title="3 stars">★</button>
      <button type="button" class="star-btn" data-star="4" title="4 stars">★</button>
      <button type="button" class="star-btn" data-star="5" title="5 stars">★</button>
    </div>

    <a class="ab-btn ab-maps u-hidden" id="abMapsBtn" href="#" target="_blank" rel="noopener">
      🗺️ Open Maps
    </a>

    <a class="ab-btn ab-parking u-hidden" id="abParkingBtn" href="#" target="_blank" rel="noopener">
      🅿️ Parking Map
    </a>

    <button type="button" class="ab-btn ab-visited" id="abVisitedBtn" title="Mark this location as visited">
      <span id="abVisitedIcon">✅</span> <span id="abVisitedText">Mark Visited</span>
    </button>
  </div>
</div>

<script>
  var TAG_STORAGE_KEY = 'adventureFinderTags';
  var TAG_MIGRATION_MARKER_PREFIX = 'adventureFinderTagsMigrated_';
  var STORAGE_PREFIX_ADV = 'adv_actionbar_';
  var DETAIL_TAGS_COLUMN_INDEX = 3;
  var DETAIL_NOTES_COLUMN_INDEX = 20;
  var DETAIL_NOTES_PREFIX = 'NOTES_JSON_V1::';

  function toIsoNow() {
    try { return new Date().toISOString(); } catch (_err) { return String(Date.now()); }
  }

  function createTagSaveDebugSeed(state) {
    return {
      runId: 'tagsave_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
      createdAt: toIsoNow(),
      placeKey: state && state.placeKey ? state.placeKey : '(empty)',
      sourceIndex: state && state.sourceIndex != null ? state.sourceIndex : '(empty)',
      name: state && state.data ? String(state.data.name || '') : '',
      placeId: state && state.data ? String(state.data.googlePlaceId || '') : '',
      steps: [],
      finalStatus: 'pending'
    };
  }

  function pushTagSaveDebug(debug, step, detail) {
    if (!debug) return;
    debug.steps.push({ at: toIsoNow(), step: step, detail: detail || {} });
  }

  function formatTagSaveDebug(debug) {
    if (!debug) return 'No debug trace captured yet.';
    var lines = [];
    lines.push('Run: ' + (debug.runId || '(unknown)'));
    lines.push('Created: ' + (debug.createdAt || '(unknown)'));
    lines.push('Final: ' + (debug.finalStatus || '(unknown)'));
    lines.push('PlaceKey: ' + (debug.placeKey || '(empty)'));
    lines.push('SourceIndex: ' + String(debug.sourceIndex));
    lines.push('Name: ' + (debug.name || '(empty)'));
    lines.push('PlaceId: ' + (debug.placeId || '(empty)'));
    lines.push('');
    lines.push('Steps:');
    (debug.steps || []).forEach(function (entry, idx) {
      lines.push((idx + 1) + '. [' + (entry.at || '?') + '] ' + entry.step + ' ' + JSON.stringify(entry.detail || {}));
    });
    return lines.join('\n');
  }

  function refreshTagSaveDebugUi(debug) {
    window.__lastTagSaveDebug = debug || window.__lastTagSaveDebug || null;
    var pre = document.getElementById('tmDebugPre');
    if (!pre) return;
    pre.textContent = formatTagSaveDebug(window.__lastTagSaveDebug);
  }

  function copyLastTagSaveDebug() {
    var text = formatTagSaveDebug(window.__lastTagSaveDebug);
    return copyDebugBundle(text);
  }

  function getLastTagSaveDebugJson() {
    try {
      return JSON.stringify(window.__lastTagSaveDebug || {}, null, 2);
    } catch (_err) {
      return '{}';
    }
  }

  function getParams() {
    return new URLSearchParams(window.location.search || '');
  }

  function getCloseButtonHtml() {
    if (getParams().get('embedded') === '1') return '';
    return '<button type="button" class="auth-btn" id="closeTabBtn">✕ Close Tab</button>';
  }

  function bindCloseButton() {
    var closeBtn = document.getElementById('closeTabBtn');
    if (!closeBtn || closeBtn.dataset.bound === '1') return;

    closeBtn.addEventListener('click', function () {
      window.close();
      setTimeout(function () {
        if (window.history.length > 1) window.history.back();
      }, 120);
    });

    closeBtn.dataset.bound = '1';
  }

  function fromStoredPayload() {
    var params = getParams();
    var detailKey = params.get('detailKey');
    var latestKey = window.localStorage.getItem('adventure_details_latest');
    var keyToUse = detailKey || latestKey;
    if (!keyToUse) return null;

    try {
      var raw = window.localStorage.getItem(keyToUse);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch (_err) {
      return null;
    }
  }

  function fromOpenerBySourceIndex(sourceIndex) {
    try {
      if (!window.opener || !Array.isArray(window.opener.adventuresData)) return null;
      var row = window.opener.adventuresData[sourceIndex];
      if (!row || !Array.isArray(row.values) || !Array.isArray(row.values[0])) return null;
      var values = row.values[0];
      var [
        name, googlePlaceId, website, tags, driveTime, hoursOfOperation,
        activityDuration, difficulty, trailLength, state, city, address,
        phoneNumber, googleRating, cost, directions, description, nearby,
        links, links2, notes, myRating, favoriteStatus, googleUrl
      ] = values;

      return {
        sourceIndex: sourceIndex,
        data: {
          name: name, googlePlaceId: googlePlaceId, website: website, tags: tags,
          driveTime: driveTime, hoursOfOperation: hoursOfOperation, activityDuration: activityDuration,
          difficulty: difficulty, trailLength: trailLength, state: state, city: city, address: address,
          phoneNumber: phoneNumber, googleRating: googleRating, cost: cost, directions: directions,
          description: description, nearby: nearby, links: links, links2: links2,
          notes: notes, myRating: myRating, favoriteStatus: favoriteStatus, googleUrl: googleUrl
        }
      };
    } catch (_err) {
      return null;
    }
  }

  function card(label, value) {
    return '<div class="card"><div class="label">' + label + '</div><div class="value">' +
      (value || '<span class="empty">Not available</span>') + '</div></div>';
  }

  function normalizeForCompare(value) {
    return String(value || '').trim().toLowerCase();
  }

  function buildDebugBundleLine(payload, params) {
    var sourceIndex = String(
      (payload && payload.sourceIndex != null ? payload.sourceIndex : '') ||
      params.get('debugSourceIndex') ||
      params.get('sourceIndex') ||
      ''
    ).trim() || '(empty)';

    var name = String(
      (payload && payload.data ? payload.data.name : '') ||
      params.get('debugName') ||
      ''
    ).trim() || '(empty)';

    var placeId = String(
      (payload && payload.data ? payload.data.googlePlaceId : '') ||
      params.get('debugPlaceId') ||
      ''
    ).trim() || '(empty)';

    var corrId = String(
      (payload && payload.correlationId ? payload.correlationId : '') ||
      params.get('corrId') ||
      ''
    ).trim() || '(empty)';

    return 'sourceIndex=' + sourceIndex + ' | name=' + name + ' | placeId=' + placeId + ' | corrId=' + corrId;
  }

  function copyDebugBundle(text) {
    if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
      return navigator.clipboard.writeText(text);
    }

    return new Promise(function (resolve, reject) {
      try {
        var area = document.createElement('textarea');
        area.value = text;
        area.setAttribute('readonly', 'readonly');
        area.style.position = 'fixed';
        area.style.opacity = '0';
        document.body.appendChild(area);
        area.select();
        var ok = document.execCommand('copy');
        document.body.removeChild(area);
        if (ok) resolve();
        else reject(new Error('execCommand copy failed'));
      } catch (err) {
        reject(err);
      }
    });
  }

  function bindDebugCopyButton(payload) {
    var btn = document.getElementById('copyDebugBundleBtn');
    if (!btn || btn.dataset.bound === '1') return;

    btn.addEventListener('click', function () {
      var params = getParams();
      var line = buildDebugBundleLine(payload, params);

      copyDebugBundle(line).then(function () {
        console.log('📋 Debug bundle copied:', line);
        var original = btn.textContent;
        btn.textContent = 'Copied';
        btn.classList.add('copied');
        setTimeout(function () {
          btn.textContent = original;
          btn.classList.remove('copied');
        }, 1200);
      }).catch(function () {
        btn.classList.add('error');
        setTimeout(function () { btn.classList.remove('error'); }, 1200);
        window.prompt('Copy debug bundle:', line);
      });
    });

    btn.dataset.bound = '1';
  }

  function renderDebugMarker(payload) {
    var debugBar = document.getElementById('debugBar');
    if (!debugBar) return;

    var params = getParams();
    var urlSourceIndex = params.get('debugSourceIndex') || params.get('sourceIndex') || '';
    var urlName = params.get('debugName') || '';
    var urlPlaceId = params.get('debugPlaceId') || '';
    var urlCorrId = params.get('corrId') || '';

    var payloadSourceIndex = payload && payload.sourceIndex != null ? String(payload.sourceIndex) : '';
    var payloadName = payload && payload.data ? String(payload.data.name || '') : '';
    var payloadPlaceId = payload && payload.data ? String(payload.data.googlePlaceId || '') : '';
    var payloadCorrId = payload && payload.correlationId ? String(payload.correlationId) : '';

    var sourceMatches = normalizeForCompare(urlSourceIndex) === normalizeForCompare(payloadSourceIndex);
    var nameMatches = !urlName || normalizeForCompare(urlName) === normalizeForCompare(payloadName);
    var placeMatches = !urlPlaceId || normalizeForCompare(urlPlaceId) === normalizeForCompare(payloadPlaceId);
    var corrMatches = !urlCorrId || normalizeForCompare(urlCorrId) === normalizeForCompare(payloadCorrId);
    var allMatch = sourceMatches && nameMatches && placeMatches && corrMatches;

    debugBar.className = 'debug-bar ' + (allMatch ? 'match' : 'mismatch');
    debugBar.classList.remove('u-hidden');
    debugBar.innerHTML =
      '<button type="button" class="debug-bar-toggle" id="debugBarToggle">' +
      '<span class="debug-title">🔎 Debug: ' + (allMatch ? 'MATCH ✓' : '⚠️ MISMATCH') + '</span>' +
      '<span class="u-text-xs-dim">▼ expand</span>' +
      '</button>' +
      '<div class="debug-bar-body">' +
      '<div class="debug-head">' +
      '<span class="debug-title">Detail Debug Marker: ' + (allMatch ? 'MATCH' : 'MISMATCH') + '</span>' +
      '<button type="button" class="debug-copy-btn" id="copyDebugBundleBtn">Copy Debug Bundle</button>' +
      '</div>' +
      '<div class="debug-row">' +
      '<span class="debug-pill">URL sourceIndex: ' + (urlSourceIndex || '(empty)') + '</span>' +
      '<span class="debug-pill">Payload sourceIndex: ' + (payloadSourceIndex || '(empty)') + '</span>' +
      '</div>' +
      '<div class="debug-row">' +
      '<span class="debug-pill">URL name: ' + (urlName || '(empty)') + '</span>' +
      '<span class="debug-pill">Payload name: ' + (payloadName || '(empty)') + '</span>' +
      '</div>' +
      '<div class="debug-row">' +
      '<span class="debug-pill">URL placeId: ' + (urlPlaceId || '(empty)') + '</span>' +
      '<span class="debug-pill">Payload placeId: ' + (payloadPlaceId || '(empty)') + '</span>' +
      '</div>' +
      '<div class="debug-row">' +
      '<span class="debug-pill">URL corrId: ' + (urlCorrId || '(empty)') + '</span>' +
      '<span class="debug-pill">Payload corrId: ' + (payloadCorrId || '(empty)') + '</span>' +
      '</div>' +
      '</div>';

    var toggleBtn = document.getElementById('debugBarToggle');
    if (toggleBtn) {
      toggleBtn.addEventListener('click', function () {
        var expanded = debugBar.classList.toggle('expanded');
        var arrow = toggleBtn.querySelector('span:last-child');
        if (arrow) arrow.textContent = expanded ? '▲ collapse' : '▼ expand';
      });
    }

    bindDebugCopyButton(payload);
  }

  function escapeHtml(text) {
    return String(text == null ? '' : text)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function buildDetailMapsSearchUrl(data) {
    var addressQuery = [data && data.address, data && data.city, data && data.state]
      .map(function (part) { return String(part || '').trim(); })
      .filter(Boolean)
      .join(', ');
    var query = addressQuery || String(data && data.name || '').trim();
    if (!query) {
      var fallbackGoogle = String(data && data.googleUrl || '').trim();
      if (/^https?:\/\//i.test(fallbackGoogle)) return fallbackGoogle;
      return '';
    }
    return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(query);
  }

  function buildDetailDirectionsUrl(data) {
    var placeId = String(data && data.googlePlaceId || '').trim();
    var destination = [data && data.address, data && data.city, data && data.state]
      .map(function (part) { return String(part || '').trim(); })
      .filter(Boolean)
      .join(', ');
    if (!destination) destination = String(data && data.name || '').trim();

    if (placeId) {
      var params = new URLSearchParams({ api: '1', destination_place_id: placeId });
      if (destination) params.set('destination', destination);
      return 'https://www.google.com/maps/dir/?' + params.toString();
    }

    if (destination) {
      return 'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(destination);
    }

    var fallbackDirections = String(data && data.directions || '').trim();
    if (/^https?:\/\//i.test(fallbackDirections)) return fallbackDirections;
    return '';
  }

  function parseTagCsv(raw) {
    return String(raw || '').split(',').map(function (t) { return t.trim(); }).filter(Boolean);
  }

  function normalizeTagKey(tag) {
    return String(tag || '').trim().toLowerCase();
  }

  function normalizeTextKey(text) {
    return String(text || '').trim().toLowerCase().replace(/\s+/g, ' ');
  }

  function hasTagCaseInsensitive(tags, candidate) {
    var needle = normalizeTagKey(candidate);
    return (tags || []).some(function (tag) { return normalizeTagKey(tag) === needle; });
  }

  function uniqueTags(tags) {
    var seen = {};
    var out = [];
    (tags || []).forEach(function (tag) {
      var clean = String(tag || '').trim();
      var key = normalizeTagKey(clean);
      if (!clean || seen[key]) return;
      seen[key] = true;
      out.push(clean);
    });
    return out.sort(function (a, b) { return a.localeCompare(b); });
  }

  function getTagStorageMap() {
    try {
      var parsed = JSON.parse(window.localStorage.getItem(TAG_STORAGE_KEY) || '{}');
      return parsed && typeof parsed === 'object' ? parsed : {};
    } catch (_err) {
      return {};
    }
  }

  function saveTagStorageMap(map) {
    try {
      window.localStorage.setItem(TAG_STORAGE_KEY, JSON.stringify(map || {}));
      return true;
    } catch (_err) {
      return false;
    }
  }

  function getTagPlaceKey(data) {
    var placeId = data && data.googlePlaceId ? String(data.googlePlaceId).trim() : '';
    if (placeId) return placeId;

    var name = normalizeTextKey(data && data.name);
    var city = normalizeTextKey(data && data.city);
    var state = normalizeTextKey(data && data.state);
    if (!name) return '';

    return 'name|' + name + '|city|' + city + '|state|' + state;
  }

  function getLegacyNameOnlyTagKey(data) {
    var name = normalizeTextKey(data && data.name);
    return name || '';
  }

  function getMigrationMarkerKey(placeKey) {
    return TAG_MIGRATION_MARKER_PREFIX + placeKey;
  }

  function isMigrationMarked(placeKey) {
    try {
      return window.localStorage.getItem(getMigrationMarkerKey(placeKey)) === '1';
    } catch (_err) {
      return false;
    }
  }

  function markMigrationDone(placeKey) {
    try {
      window.localStorage.setItem(getMigrationMarkerKey(placeKey), '1');
    } catch (_err) {}
  }

  function migrateLegacyNameKeyIfNeeded(placeKey, data, map) {
    if (!placeKey || !data || !map || isMigrationMarked(placeKey)) return map;

    var legacyKey = getLegacyNameOnlyTagKey(data);
    if (!legacyKey || legacyKey === placeKey) {
      markMigrationDone(placeKey);
      return map;
    }

    var legacyTags = Array.isArray(map[legacyKey]) ? map[legacyKey] : [];
    var currentTags = Array.isArray(map[placeKey]) ? map[placeKey] : [];

    if (!legacyTags.length) {
      markMigrationDone(placeKey);
      return map;
    }

    var merged = uniqueTags([].concat(currentTags, legacyTags));
    var nextMap = Object.assign({}, map, { [placeKey]: merged });
    delete nextMap[legacyKey];

    if (saveTagStorageMap(nextMap)) {
      console.log('🏷️ Tag key migration completed:', {
        legacyKey: legacyKey,
        newKey: placeKey,
        migratedTagCount: merged.length
      });
      markMigrationDone(placeKey);
      return nextMap;
    }

    return map;
  }

  function getStoredTagsForPlace(placeKey, data) {
    if (!placeKey) return [];
    var map = getTagStorageMap();
    map = migrateLegacyNameKeyIfNeeded(placeKey, data, map);
    var val = map[placeKey];
    return Array.isArray(val) ? uniqueTags(val) : [];
  }

  function setStoredTagsForPlace(placeKey, tags, data) {
    if (!placeKey) return false;
    var map = getTagStorageMap();
    map = migrateLegacyNameKeyIfNeeded(placeKey, data, map);
    map[placeKey] = uniqueTags(tags || []);
    var ok = saveTagStorageMap(map);
    if (ok) markMigrationDone(placeKey);
    return ok;
  }

  function escapeRegExp(value) {
    return String(value || '').replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  function buildTagRecommendations(data, currentTags) {
    var EXCLUDED_RECOMMENDATIONS = {
      'city center': true,
      'downtown': true,
      'urban': true,
      'commercial': true
    };

    var recs = new Map();
    var currentTagKeys = (currentTags || []).map(normalizeTagKey);
    var fullText = [
      data && data.name,
      data && data.tags,
      data && data.city,
      data && data.address,
      data && data.description,
      data && data.notes
    ].join(' ').toLowerCase();

    var googleRating = parseFloat(data && data.googleRating) || 0;

    var ruleMap = [
      { keys: ['hike', 'trail', 'hiking', 'trekking', 'mountain', 'alpine'], tags: ['Hiking', 'Outdoor', 'Nature', 'Scenic', 'Adventure'], confidence: 0.95 },
      { keys: ['waterfall', 'cascade', 'falls'], tags: ['Waterfall', 'Nature', 'Scenic', 'Photography', 'Outdoor'], confidence: 0.9 },
      { keys: ['park', 'garden', 'botanical', 'arboretum'], tags: ['Park', 'Nature', 'Family-Friendly', 'Relaxing', 'Scenic'], confidence: 0.85 },
      { keys: ['lake', 'river', 'stream', 'pond', 'creek', 'water'], tags: ['Water Activity', 'Nature', 'Scenic', 'Family-Friendly'], confidence: 0.8 },
      { keys: ['forest', 'woods', 'woodland', 'grove'], tags: ['Nature', 'Hiking', 'Outdoor', 'Relaxing', 'Scenic'], confidence: 0.85 },
      { keys: ['beach', 'shore', 'coast', 'seaside'], tags: ['Beach', 'Outdoor', 'Family-Friendly', 'Scenic', 'Relaxing'], confidence: 0.9 },
      { keys: ['camping', 'camp site'], tags: ['Camping', 'Outdoor', 'Adventure', 'Family-Friendly'], confidence: 0.9 },
      { keys: ['restaurant', 'bistro', 'steakhouse', 'grill'], tags: ['Restaurant', 'Dining', 'Local Favorite', 'Worth Visiting'], confidence: 0.95 },
      { keys: ['cafe', 'coffee', 'espresso', 'tea house'], tags: ['Cafe', 'Coffee', 'Local Favorite', 'Relaxing'], confidence: 0.9 },
      { keys: ['diner', 'fast food', 'quick bite'], tags: ['Casual Dining', 'Quick Service'], confidence: 0.8 },
      { keys: ['bakery', 'pastry'], tags: ['Bakery', 'Local Favorite', 'Worth Visiting'], confidence: 0.85 },
      { keys: ['brewery', 'winery', 'distillery', 'bar', 'pub'], tags: ['Beverage', 'Adult Experience', 'Local Favorite'], confidence: 0.85 },
      { keys: ['food truck', 'street food'], tags: ['Quick Service', 'Casual Dining', 'Local Favorite'], confidence: 0.8 },
      { keys: ['shop', 'store', 'retail', 'boutique'], tags: ['Shopping', 'Local Business', 'Worth Visiting'], confidence: 0.8 },
      { keys: ['market', 'farmer market', 'farmers market'], tags: ['Market', 'Local Business', 'Family-Friendly', 'Worth Visiting'], confidence: 0.9 },
      { keys: ['mall', 'shopping center'], tags: ['Shopping', 'Family-Friendly'], confidence: 0.75 },
      { keys: ['museum', 'gallery', 'exhibition', 'exhibit'], tags: ['Museum', 'Cultural', 'Historical', 'Educational', 'Indoor Activity'], confidence: 0.9 },
      { keys: ['historic', 'history', 'monument', 'landmark', 'heritage'], tags: ['Historical', 'Cultural', 'Worth Visiting', 'Educational'], confidence: 0.85 },
      { keys: ['art', 'artist', 'sculpture', 'craft'], tags: ['Cultural', 'Artistic', 'Local Business'], confidence: 0.8 },
      { keys: ['gym', 'fitness', 'yoga', 'pilates'], tags: ['Fitness', 'Health & Wellness'], confidence: 0.85 },
      { keys: ['sport', 'athletic', 'court', 'field', 'stadium'], tags: ['Sports', 'Active', 'Family-Friendly'], confidence: 0.8 },
      { keys: ['bowling', 'arcade', 'recreation'], tags: ['Entertainment', 'Family-Friendly', 'Fun'], confidence: 0.8 },
      { keys: ['movie', 'cinema', 'theater', 'theatre'], tags: ['Entertainment', 'Family-Friendly', 'Indoor Activity'], confidence: 0.9 },
      { keys: ['music', 'concert', 'live performance'], tags: ['Entertainment', 'Local Favorite', 'Worth Visiting'], confidence: 0.85 },
      { keys: ['amusement', 'theme park', 'carnival'], tags: ['Entertainment', 'Family-Friendly', 'Fun', 'Adventure'], confidence: 0.9 },
      { keys: ['hotel', 'motel', 'inn', 'resort'], tags: ['Accommodation', 'Travel-Friendly'], confidence: 0.85 },
      { keys: ['bed & breakfast', 'bed and breakfast', 'airbnb'], tags: ['Accommodation', 'Local Experience'], confidence: 0.8 }
    ];

    ruleMap.forEach(function (rule) {
      var matchCount = rule.keys.filter(function (key) {
        var regex = new RegExp('\\b' + escapeRegExp(key) + '\\b', 'i');
        return regex.test(fullText);
      }).length;

      if (matchCount > 0) {
        var scoreBoost = matchCount > 1 ? 1.1 : 1.0;
        rule.tags.forEach(function (tag) {
          var existingScore = recs.get(tag) || 0;
          recs.set(tag, Math.max(existingScore, rule.confidence * scoreBoost));
        });
      }
    });

    if (googleRating >= 4.7) {
      recs.set('Top Rated', Math.max(recs.get('Top Rated') || 0, 0.95));
      recs.set('Worth Visiting', Math.max(recs.get('Worth Visiting') || 0, 0.9));
    } else if (googleRating >= 4.3) {
      recs.set('Highly Recommended', Math.max(recs.get('Highly Recommended') || 0, 0.85));
    }

    var familyKeywords = ['family', 'kids', 'child', 'playground', 'park', 'children', 'school', 'educational'];
    if (familyKeywords.some(function (k) { return fullText.indexOf(k) !== -1; })) {
      recs.set('Family-Friendly', Math.max(recs.get('Family-Friendly') || 0, 0.8));
    }

    var relaxingKeywords = ['relax', 'peaceful', 'quiet', 'serene', 'tranquil', 'spa', 'wellness'];
    if (relaxingKeywords.some(function (k) { return fullText.indexOf(k) !== -1; })) {
      recs.set('Relaxing', Math.max(recs.get('Relaxing') || 0, 0.8));
    }

    return Array.from(recs.entries())
      .filter(function (entry) {
        var tag = entry[0];
        var tagKey = normalizeTagKey(tag);
        return currentTagKeys.indexOf(tagKey) === -1 && !EXCLUDED_RECOMMENDATIONS[tagKey];
      })
      .sort(function (a, b) { return b[1] - a[1]; })
      .slice(0, 8)
      .map(function (entry) { return entry[0]; });
  }

  async function syncViaExplorerHost(state, updates) {
    var openerWin = getOpenerWindow();
    if (!openerWin || typeof openerWin.syncVisitedExplorerDetailFields !== 'function') {
      return { attempted: false, synced: false, reason: 'host-sync-unavailable', context: window.__detailHostContext || 'none' };
    }
    if (!state || !state.explorerSource) {
      return { attempted: false, synced: false, reason: 'missing-explorer-source', context: window.__detailHostContext || 'none' };
    }

    try {
      var result = await openerWin.syncVisitedExplorerDetailFields(state.explorerSource, updates || {});
      return {
        attempted: true,
        synced: !!(result && result.synced),
        excelSaved: !!(result && result.excelSaved),
        reason: result && result.reason ? result.reason : (result && result.synced ? 'saved' : 'unknown'),
        context: window.__detailHostContext || 'none'
      };
    } catch (error) {
      return {
        attempted: true,
        synced: false,
        excelSaved: false,
        reason: String(error && error.message ? error.message : error),
        context: window.__detailHostContext || 'none'
      };
    }
  }

  function findOpenerRowForTagSync(openerWin, state) {
    if (!openerWin || !Array.isArray(openerWin.adventuresData)) return null;

    var sourceIndex = state && Number.isInteger(state.sourceIndex) ? state.sourceIndex : Number(state && state.sourceIndex);
    if (Number.isInteger(sourceIndex) && sourceIndex >= 0 && openerWin.adventuresData[sourceIndex]) {
      return { row: openerWin.adventuresData[sourceIndex], index: sourceIndex, matchType: 'sourceIndex' };
    }

    var data = state && state.data ? state.data : {};
    var placeIdNeedle = normalizeTextKey(data.googlePlaceId);
    var nameNeedle = normalizeTextKey(data.name);
    var cityNeedle = normalizeTextKey(data.city);
    var stateNeedle = normalizeTextKey(data.state);

    for (var i = 0; i < openerWin.adventuresData.length; i++) {
      var row = openerWin.adventuresData[i];
      var values = row && row.values && row.values[0];
      if (!Array.isArray(values)) continue;

      var rowPlaceId = normalizeTextKey(values[1]);
      if (placeIdNeedle && rowPlaceId && rowPlaceId === placeIdNeedle) {
        return { row: row, index: i, matchType: 'placeId' };
      }

      var rowName = normalizeTextKey(values[0]);
      var rowCity = normalizeTextKey(values[10]);
      var rowState = normalizeTextKey(values[9]);
      if (nameNeedle && rowName === nameNeedle && rowCity === cityNeedle && rowState === stateNeedle) {
        return { row: row, index: i, matchType: 'nameCityState' };
      }
    }

    return null;
  }

  async function syncTagsToOpenerAndSpreadsheet(state, debug) {
    var openerWin = getOpenerWindow();
    pushTagSaveDebug(debug, 'host_context', { context: window.__detailHostContext || 'none' });

    var hostSync = await syncViaExplorerHost(state, {
      tagsCsv: uniqueTags(state && state.tags || []).join(', ')
    });
    pushTagSaveDebug(debug, 'host_sync_attempt', hostSync);
    if (hostSync.attempted && hostSync.synced) {
      return { syncedRow: true, excelSaved: !!hostSync.excelSaved, reason: hostSync.excelSaved ? 'saved' : 'sync-only' };
    }

    pushTagSaveDebug(debug, 'opener_check', {
      hasOpener: !!openerWin,
      hasAdventuresData: !!(openerWin && Array.isArray(openerWin.adventuresData)),
      adventuresDataLength: openerWin && Array.isArray(openerWin.adventuresData) ? openerWin.adventuresData.length : 0,
      hasSaveToExcel: !!(openerWin && typeof openerWin.saveToExcel === 'function'),
      context: window.__detailHostContext || 'none'
    });

    if (!openerWin) return { syncedRow: false, excelSaved: false, reason: 'no-opener' };

    var rowMatch = findOpenerRowForTagSync(openerWin, state);
    pushTagSaveDebug(debug, 'row_match', {
      found: !!rowMatch,
      matchType: rowMatch ? rowMatch.matchType : 'none',
      rowIndex: rowMatch ? rowMatch.index : -1,
      hasRowId: !!(rowMatch && rowMatch.row && rowMatch.row.rowId)
    });

    if (!rowMatch || !rowMatch.row || !Array.isArray(rowMatch.row.values) || !Array.isArray(rowMatch.row.values[0])) {
      return { syncedRow: false, excelSaved: false, reason: 'row-not-found' };
    }

    var values = rowMatch.row.values[0];
    var tagsCsv = uniqueTags(state.tags || []).join(', ');
    values[DETAIL_TAGS_COLUMN_INDEX] = tagsCsv;
    pushTagSaveDebug(debug, 'planner_row_updated', {
      rowIndex: rowMatch.index,
      tagsCsvLength: tagsCsv.length,
      tagsCount: uniqueTags(state.tags || []).length
    });

    if (state && state.data) {
      state.data.tags = tagsCsv;
    }

    if (openerWin.currentEditingRow && openerWin.currentEditingRow.values && openerWin.currentEditingRow.values[0]) {
      var currentEditingPlaceId = normalizeTextKey(openerWin.currentEditingRow.values[0][1]);
      var activePlaceId = normalizeTextKey(state && state.data && state.data.googlePlaceId);
      if (activePlaceId && currentEditingPlaceId === activePlaceId) {
        openerWin.currentEditingRow.values[0][DETAIL_TAGS_COLUMN_INDEX] = tagsCsv;
        pushTagSaveDebug(debug, 'current_editing_row_updated', { matchedByPlaceId: true });
      }
    }

    if (typeof openerWin.renderPaginatedCards === 'function') {
      try { openerWin.renderPaginatedCards(); pushTagSaveDebug(debug, 'render_paginated_cards', { ok: true }); } catch (errA) { pushTagSaveDebug(debug, 'render_paginated_cards', { ok: false, error: String(errA && errA.message || errA) }); }
    }
    if (typeof openerWin.renderAdventureCards === 'function') {
      try { await openerWin.renderAdventureCards(); pushTagSaveDebug(debug, 'render_adventure_cards', { ok: true }); } catch (errB) { pushTagSaveDebug(debug, 'render_adventure_cards', { ok: false, error: String(errB && errB.message || errB) }); }
    }
    if (typeof openerWin.applyFilters === 'function') {
      try { openerWin.applyFilters(); pushTagSaveDebug(debug, 'apply_filters', { ok: true }); } catch (errC) { pushTagSaveDebug(debug, 'apply_filters', { ok: false, error: String(errC && errC.message || errC) }); }
    }

    var excelSaved = false;
    try {
      if (typeof openerWin.saveToExcel === 'function') {
        if (rowMatch.row.rowId) {
          try {
            pushTagSaveDebug(debug, 'excel_save_row_attempt', { rowId: String(rowMatch.row.rowId) });
            var rowResult = await openerWin.saveToExcel(rowMatch.row.rowId, values);
            excelSaved = rowResult !== false;
            pushTagSaveDebug(debug, 'excel_save_row_result', { ok: excelSaved, rawResultType: typeof rowResult });
          } catch (firstErr) {
            pushTagSaveDebug(debug, 'excel_save_row_error', { error: String(firstErr && firstErr.message || firstErr) });
            var fullResult = await openerWin.saveToExcel();
            excelSaved = fullResult !== false;
            pushTagSaveDebug(debug, 'excel_save_full_result', { ok: excelSaved, rawResultType: typeof fullResult });
          }
        } else {
          pushTagSaveDebug(debug, 'excel_save_full_attempt', { reason: 'missing_row_id' });
          var fallbackResult = await openerWin.saveToExcel();
          excelSaved = fallbackResult !== false;
          pushTagSaveDebug(debug, 'excel_save_full_result', { ok: excelSaved, rawResultType: typeof fallbackResult });
        }
      } else {
        pushTagSaveDebug(debug, 'excel_save_unavailable', { hasSaveToExcel: false });
      }
    } catch (excelErr) {
      console.warn('⚠️ Could not persist tags to Excel from details tab:', excelErr && excelErr.message ? excelErr.message : excelErr);
      pushTagSaveDebug(debug, 'excel_save_exception', { error: String(excelErr && excelErr.message || excelErr) });
      excelSaved = false;
    }

    return { syncedRow: true, excelSaved: excelSaved, reason: excelSaved ? 'saved' : 'sync-only' };
  }

    } else {
      pushTagSaveDebug(debug, 'opener_toast', { invoked: false });

    refreshTagSaveDebugUi(debug);

  // ── Notes Management ─────────────────────────────────────────
  // NOTES_JSON_V1:: prefix is used to distinguish structured JSON arrays
  // from legacy plain-text notes. All notes are stored as a JSON array
  // serialized into a single spreadsheet cell under the "notes" column (index 20).

  function parseDetailNotesBlob(raw) {
    var text = String(raw == null ? '' : raw).trim();
    if (!text) return [];

    var jsonPayload = '';
    if (text.indexOf(DETAIL_NOTES_PREFIX) === 0) {
      jsonPayload = text.slice(DETAIL_NOTES_PREFIX.length).trim();
    } else if (text.charAt(0) === '[' && text.charAt(text.length - 1) === ']') {
      jsonPayload = text;
    }

    if (jsonPayload) {
      try {
        var parsed = JSON.parse(jsonPayload);
        if (Array.isArray(parsed)) {
          return parsed.map(function (n) { return String(n == null ? '' : n).trim(); }).filter(Boolean);
        }
      } catch (_err) {}
    }

    // Legacy plain-text fallback: split by divider lines or double newlines
    var byDivider = text.split(/\n-{3,}\n/g).map(function (p) { return p.trim(); }).filter(Boolean);
    if (byDivider.length > 1) return byDivider;

    var byParagraph = text.split(/\n\s*\n/g).map(function (p) { return p.trim(); }).filter(Boolean);
    if (byParagraph.length > 1) return byParagraph;

    return [text];
  }

  function serializeDetailNotesBlob(notes) {
    var clean = (notes || []).map(function (n) { return String(n == null ? '' : n).trim(); }).filter(Boolean);

  async function saveDetailNotes() {
    if (!window.__detailNotesState) {
      showDetailToast('⚠️ Notes state not initialised.', 'error', 4000);
      return;
    }

    var state = window.__detailNotesState;
    var serialized = serializeDetailNotesBlob(state.notes || []);

    var hostSync = await syncViaExplorerHost(state, { notes: serialized });
    if (hostSync.attempted && hostSync.synced) {
      setDetailNotesStatus('Notes saved to source Excel table.', false);
      showDetailToast('✅ Notes saved and synced to Excel.', 'success', 4000);
      return;
    }

    // Mirror back into the live data object so tag-recommendations etc. see the latest value
    if (state.data) state.data.notes = serialized;

    var openerWin = getOpenerWindow();
    if (!openerWin) {
      setDetailNotesStatus('Notes updated locally (no opener window available).', false);
      showDetailToast('📝 Notes saved locally (open from planner to sync to Excel).', 'info', 4500);
      return;
    }

    // Find the row in the opener's adventure data
    var rowMatch = findOpenerRowForTagSync(openerWin, state);
    if (!rowMatch || !rowMatch.row || !Array.isArray(rowMatch.row.values) || !Array.isArray(rowMatch.row.values[0])) {
      setDetailNotesStatus('Notes updated locally (row not found in opener).', false);
      showDetailToast('⚠️ Notes saved — but could not locate row in planner to sync.', 'info', 4500);
      return;
    }

    // Update the in-memory row
    var values = rowMatch.row.values[0];
    while (values.length <= DETAIL_NOTES_COLUMN_INDEX) values.push('');
    values[DETAIL_NOTES_COLUMN_INDEX] = serialized;

    // Trigger planner re-render
    try {
      if (typeof openerWin.renderPaginatedCards === 'function') openerWin.renderPaginatedCards();
      if (typeof openerWin.applyFilters === 'function') openerWin.applyFilters();
    } catch (_rerr) {}

    // Persist to Excel
    var excelSaved = false;
    try {
      if (typeof openerWin.saveToExcel === 'function') {
        if (rowMatch.row.rowId) {
          await openerWin.saveToExcel(rowMatch.row.rowId, values);
        } else {
          await openerWin.saveToExcel();
        }
        excelSaved = true;
      }
    } catch (_excelErr) {
      console.warn('⚠️ saveDetailNotes: Excel save failed:', _excelErr);
    }

    if (excelSaved) {
      setDetailNotesStatus('Notes saved to Excel.', false);
      showDetailToast('✅ Notes saved and synced to Excel.', 'success', 4000);
      if (typeof openerWin.showToast === 'function') {
        openerWin.showToast('📝 Notes updated for ' + (state.data && state.data.name ? state.data.name : 'location'), 'success', 3000);
      }
    } else {
      setDetailNotesStatus('Notes updated in planner memory (sign in to sync to Excel).', false);
      showDetailToast('⚠️ Notes saved in planner view. Sign in to persist to Excel.', 'info', 5000);
    }
  }

  // ── End Notes Management ──────────────────────────────────────

  function render(payload) {
    var data = payload && payload.data ? payload.data : null;
    if (!data) {
      document.getElementById('header').innerHTML =
        '<div class="head-main"><h1>Adventure Details</h1><div class="meta">No detail payload was available. Open this page from an Adventure card.</div></div>' +
        getCloseButtonHtml();
      bindCloseButton();
      return;
    }

    var sourceTagList = parseTagCsv(data.tags);
    var storedTagList = getStoredTagsForPlace(getTagPlaceKey(data), data);
    var tagList = uniqueTags([].concat(sourceTagList, storedTagList));

    var directionsUrl = buildDetailDirectionsUrl(data);
    var googleViewUrl = buildDetailMapsSearchUrl(data) || String(data.googleUrl || '').trim() || directionsUrl || '';
    var isVisited = String(data.visitedStatus || data.visited || '').trim().toLowerCase() === 'yes';

    var headerActions = [
      directionsUrl ? '<a class="ab-btn ab-maps" href="' + directionsUrl + '" target="_blank" rel="noopener">🧭 Directions</a>' : '',
      data.website ? '<a class="ab-btn ab-website" href="' + data.website + '" target="_blank" rel="noopener">🌐 Website</a>' : '',
      googleViewUrl ? '<a class="ab-btn ab-google" href="' + googleViewUrl + '" target="_blank" rel="noopener">🔎 Google View</a>' : ''
    ].join('');

    document.getElementById('header').innerHTML =
      '<div class="head-main">' +
      '<h1>' + (data.name || 'Adventure Details') + '</h1>' +
      '<div class="meta">' + (data.city || 'Unknown city') + (data.state ? ', ' + data.state : '') +
      '<span id="detailVisitedBadge" class="detail-visited-badge' + (isVisited ? ' is-visited' : '') + '">' + (isVisited ? '✅ Visited' : '🕒 Not Visited') + '</span>' +
      '</div>' +
      (headerActions ? '<div class="actions">' + headerActions + '</div>' : '') +
      '</div>' + getCloseButtonHtml();

    bindCloseButton();
    renderDebugMarker(payload);
    initActionBar(data, directionsUrl, payload);

    document.getElementById('pane-overview').innerHTML =
      '<div class="grid">' +
      card('Address', data.address ? data.address + ' <button type="button" class="addr-copy-btn" data-copy="' + data.address.replace(/"/g, '&quot;') + '">📋 Copy</button>' : '') +
      card('City', data.city) +
      card('State', data.state) +
      card('Drive Time', data.driveTime) +
      '</div>' +
      card('Description', data.description) +
      card('Tags', '<div id="overviewTagsValue">' + renderTagListHtml(tagList) + '</div>');

    document.getElementById('pane-details').innerHTML =
      '<div class="grid">' +
      card('Hours', data.hoursOfOperation) +
      card('Duration', data.activityDuration) +
      card('Difficulty', data.difficulty) +
      card('Trail Length', data.trailLength) +
      card('Cost', data.cost) +
      card('Google Rating', data.googleRating) +
      card('My Rating', data.myRating) +
      '</div>';

    document.getElementById('pane-notes').innerHTML = '<div id="detailNotesWrap"></div>';
    window.__detailNotesState = {
      placeKey: getTagPlaceKey(data),
      notes: parseDetailNotesBlob(data.notes),
      data: data,
      sourceIndex: payload && payload.sourceIndex != null ? Number(payload.sourceIndex) : null,
      explorerSource: payload && payload.explorerSource ? payload.explorerSource : null
    };
    renderDetailNotesPane();

    renderTagManagementPane(data, sourceTagList, storedTagList, payload);

    document.getElementById('pane-contact').innerHTML =
      '<div class="grid">' +
      card('Phone Number', data.phoneNumber ? '<a href="tel:' + String(data.phoneNumber).replace(/\s+/g, '') + '">' + data.phoneNumber + '</a>' : '') +
      card('Website', data.website ? '<a href="' + data.website + '" target="_blank" rel="noopener">Visit Website</a>' : '') +
      card('Directions', directionsUrl ? '<a href="' + directionsUrl + '" target="_blank" rel="noopener">Get Directions</a>' : '') +
      card('Google URL', googleViewUrl ? '<a href="' + googleViewUrl + '" target="_blank" rel="noopener">Open in Google</a>' : '') +
      card('Place ID', data.googlePlaceId) +
      card('Links', data.links ? '<a href="' + data.links + '" target="_blank" rel="noopener">Open Link</a>' : '') +
      card('More Links', data.links2 ? '<a href="' + data.links2 + '" target="_blank" rel="noopener">Open Link</a>' : '') +
      '</div>';

    document.getElementById('pane-additional').innerHTML = card('Nearby Attractions', data.nearby);
  }

  function getLocationKey(data) {
    if (data.googlePlaceId) return 'place_' + data.googlePlaceId;
    return 'name_' + String(data.name || '').toLowerCase().replace(/\W+/g, '_');
  }

  function loadActionBarState(key) {
    try { return JSON.parse(localStorage.getItem(STORAGE_PREFIX_ADV + key) || '{}'); } catch (_) { return {}; }
  }

  function saveActionBarState(key, state) {
    try { localStorage.setItem(STORAGE_PREFIX_ADV + key, JSON.stringify(state)); } catch (_) {}
  }

  function renderStars(rating) {
    document.querySelectorAll('.star-btn').forEach(function (btn) {
      var n = parseInt(btn.getAttribute('data-star'), 10);
      btn.classList.toggle('lit', n <= rating);
    });
  }

  function getAdventureVisitedColumnIndex(openerWin) {
    if (!openerWin) return 24;

    var byKnownHelpers = [
      'getColumnIndexByName',
      'getAdventureColumnIndexByName'
    ];

    for (var i = 0; i < byKnownHelpers.length; i += 1) {
      var helperName = byKnownHelpers[i];
      if (typeof openerWin[helperName] === 'function') {
        var idx = Number(openerWin[helperName]('Visited'));
        if (Number.isInteger(idx) && idx >= 0) return idx;
      }
    }

    if (openerWin.columnIndices && Number.isInteger(openerWin.columnIndices.Visited) && openerWin.columnIndices.Visited >= 0) {
      return openerWin.columnIndices.Visited;
    }

    return 24;
  }

  async function persistAdventureVisitedCell(openerWin, rowMatch, rowValues, visitedColIndex) {
    if (!openerWin || !rowMatch || !rowMatch.row || !Array.isArray(rowValues) || visitedColIndex < 0) return false;

    if (typeof openerWin.updateAdventureRowColumns === 'function' && Number.isInteger(rowMatch.index) && rowMatch.index >= 0) {
      var updateMap = {};
      updateMap[visitedColIndex] = rowValues[visitedColIndex];
      await openerWin.updateAdventureRowColumns(rowMatch.index, updateMap, {
        accessToken: openerWin.accessToken,
        filePath: openerWin.filePath,
        tableRef: openerWin.tableName
      });
      return true;
    }

    var rowId = rowMatch.row.rowId;
    if (rowId && openerWin.accessToken) {
      var filePath = openerWin.filePath || 'Copilot_Apps/Kyles_Adventure_Finder/Adventure_Finder_Excel_DB.xlsx';
      var tableName = openerWin.tableName || 'MyList';
      var encodedPath = encodeURIComponent(filePath);
      var apiUrl = 'https://graph.microsoft.com/v1.0/me/drive/root:/' + encodedPath + ':/workbook/tables/' + tableName + '/rows/' + rowId;

      var response = await fetch(apiUrl, {
        method: 'PATCH',
        headers: {
          'Authorization': 'Bearer ' + openerWin.accessToken,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ values: [rowValues] })
      });

      if (response.ok) return true;

      if (response.status === 401 && typeof openerWin.rehydrateAuthState === 'function') {
        var refreshed = await openerWin.rehydrateAuthState();
        if (refreshed && openerWin.accessToken) {
          var retryResponse = await fetch(apiUrl, {
            method: 'PATCH',
            headers: {
              'Authorization': 'Bearer ' + openerWin.accessToken,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ values: [rowValues] })
          });
          if (retryResponse.ok) return true;
        }
      }
    }

    if (typeof openerWin.saveToExcel === 'function') {
      if (rowId && openerWin.saveToExcel.length >= 2) {
        await openerWin.saveToExcel(rowId, rowValues);
      } else {
        await openerWin.saveToExcel();
      }
      return true;
    }

    return false;
  }

  function initActionBar(data, directionsUrl, payload) {
    var bar = document.getElementById('actionBar');
    if (!bar) return;
    bar.classList.remove('u-hidden');

    var locationKey = getLocationKey(data);
    var state = loadActionBarState(locationKey);

    var favBtn = document.getElementById('abFavBtn');
    var favIcon = document.getElementById('abFavIcon');
    var favText = document.getElementById('abFavText');

    function syncFav(isFav) {
      if (isFav) {
        favBtn.classList.add('active');
        favIcon.textContent = '❤️';
        favText.textContent = 'Favorited';
      } else {
        favBtn.classList.remove('active');
        favIcon.textContent = '🤍';
        favText.textContent = 'Favorite';
      }
    }

    syncFav(!!state.favorite);

    favBtn.addEventListener('click', function () {
      state.favorite = !state.favorite;
      syncFav(state.favorite);
      saveActionBarState(locationKey, state);
    });

    var currentRating = state.myRating || 0;
    renderStars(currentRating);

    document.querySelectorAll('.star-btn').forEach(function (btn) {
      btn.addEventListener('mouseenter', function () {
        renderStars(parseInt(btn.getAttribute('data-star'), 10));
      });
      btn.addEventListener('mouseleave', function () {
        renderStars(currentRating);
      });
      btn.addEventListener('click', function () {
        var clicked = parseInt(btn.getAttribute('data-star'), 10);
        currentRating = (currentRating === clicked) ? 0 : clicked;
        renderStars(currentRating);
        state.myRating = currentRating;
        saveActionBarState(locationKey, state);
      });
    });

    var mapsBtn = document.getElementById('abMapsBtn');
    if (directionsUrl) {
      mapsBtn.setAttribute('href', directionsUrl);
      mapsBtn.classList.remove('u-hidden');
    }

    var parkingBtn = document.getElementById('abParkingBtn');
    var parkingUrl = data.parkingLink || '';
    if (!parkingUrl && data.address) {
      parkingUrl = 'https://www.google.com/maps/search/parking+near+' + encodeURIComponent(data.address);
    }
    if (parkingUrl) {
      parkingBtn.setAttribute('href', parkingUrl);
      parkingBtn.classList.remove('u-hidden');
    }

    var visitedBtn = document.getElementById('abVisitedBtn');
    var visitedIcon = document.getElementById('abVisitedIcon');
    var visitedText = document.getElementById('abVisitedText');
    var visitedBadge = document.getElementById('detailVisitedBadge');

    var openerWin = getOpenerWindow();
    var rowMatch = findOpenerRowForTagSync(openerWin, {
      sourceIndex: payload && payload.sourceIndex != null ? Number(payload.sourceIndex) : null,
      data: data
    });
    var rowValues = rowMatch && rowMatch.row && rowMatch.row.values && rowMatch.row.values[0];
    var visitedColIndex = getAdventureVisitedColumnIndex(openerWin);
    var isVisited = String((rowValues && rowValues[visitedColIndex]) || data.visitedStatus || data.visited || '').trim().toLowerCase() === 'yes';

    function syncVisitedUi(flag) {
      if (!visitedBtn || !visitedIcon || !visitedText) return;
      visitedBtn.classList.toggle('active', !!flag);
      visitedIcon.textContent = flag ? '✅' : '🕒';
      visitedText.textContent = flag ? 'Visited' : 'Mark Visited';
      if (visitedBadge) {
        visitedBadge.classList.toggle('is-visited', !!flag);
        visitedBadge.textContent = flag ? '✅ Visited' : '🕒 Not Visited';
      }
    }

    syncVisitedUi(isVisited);
    if (visitedBtn) {
      visitedBtn.disabled = !(rowMatch && Array.isArray(rowValues));
      visitedBtn.onclick = async function () {
        if (!rowMatch || !rowValues) return;
        var next = !isVisited;
        var previousValue = rowValues[visitedColIndex];
        while (rowValues.length <= visitedColIndex) rowValues.push('');
        rowValues[visitedColIndex] = next ? 'Yes' : '';

        try {
          var saved = await persistAdventureVisitedCell(openerWin, rowMatch, rowValues, visitedColIndex);
          if (!saved) throw new Error('Visited cell could not be persisted to Excel.');
          isVisited = next;
          data.visitedStatus = next ? 'Yes' : '';
          data.visited = next ? 'Yes' : '';
          syncVisitedUi(isVisited);
          showDetailToast(next ? '✅ Marked as visited and saved to Excel.' : '✅ Marked as not visited and saved to Excel.', 'success', 3200);
        } catch (err) {
          rowValues[visitedColIndex] = previousValue;
          syncVisitedUi(isVisited);
          showDetailToast('⚠️ Could not sync visited status to Excel.', 'error', 3600);
        }
      };
    }
  }

  function activateTab(target) {
    var tabs = document.querySelectorAll('.tab-btn');
    var normalized = String(target || '').trim();
    if (!normalized) normalized = 'overview';
    var selectedTab = null;
    tabs.forEach(function (tab) {
      if (tab.getAttribute('data-tab') === normalized) selectedTab = tab;
    });
    if (!selectedTab && tabs.length) selectedTab = tabs[0];

    tabs.forEach(function (t) {
      t.classList.remove('active');
      t.setAttribute('aria-selected', 'false');
      t.setAttribute('tabindex', '-1');
    });
    document.querySelectorAll('.tab-pane').forEach(function (pane) {
      pane.classList.remove('active');
      pane.hidden = true;
      pane.setAttribute('aria-hidden', 'true');
    });
    if (!selectedTab) return;
    selectedTab.classList.add('active');
    selectedTab.setAttribute('aria-selected', 'true');
    selectedTab.setAttribute('tabindex', '0');
    var pane = document.getElementById('pane-' + selectedTab.getAttribute('data-tab'));
    if (pane) {
      pane.classList.add('active');
      pane.hidden = false;
      pane.setAttribute('aria-hidden', 'false');
    }
  }

  function bindTabs() {
    var tabsRoot = document.getElementById('tabs');
    if (!tabsRoot || tabsRoot.dataset.tabsBound === '1') return;
    tabsRoot.dataset.tabsBound = '1';

    function handleTabActivation(event) {
      var tab = closestFromEvent(event, '.tab-btn[data-tab]');
      if (!tab || !tabsRoot.contains(tab)) return false;
      activateTab(tab.getAttribute('data-tab'));
      return true;
    }

    tabsRoot.addEventListener('click', function (event) {
      if (!handleTabActivation(event)) return;
      event.preventDefault();
    }, true);

    tabsRoot.addEventListener('keydown', function (event) {
      if (event.key !== 'Enter' && event.key !== ' ') return;
      if (!handleTabActivation(event)) return;
      event.preventDefault();
    }, true);
  }

  function getEventElement(event) {
    if (!event) return null;

    var target = null;
    if (typeof event.composedPath === 'function') {
      var path = event.composedPath();
      if (Array.isArray(path) && path.length) target = path[0];
    }

    if (!target) target = event.target || null;
    if (!target) return null;
    if (target.nodeType === 1) return target;
    return target.parentElement || null;
  }

  function closestFromEvent(event, selector) {
    var element = getEventElement(event);
    return element && typeof element.closest === 'function' ? element.closest(selector) : null;
  }

  (function init() {
    bindTabs();

    document.addEventListener('click', function (e) {
      var addrBtn = closestFromEvent(e, '.addr-copy-btn');
      if (addrBtn) {
        var text = addrBtn.getAttribute('data-copy') || '';
        if (!text) return;
        copyDebugBundle(text).then(function () {
          var orig = addrBtn.textContent;
          addrBtn.textContent = '✓ Copied';
          addrBtn.classList.add('copied');
          setTimeout(function () { addrBtn.textContent = orig; addrBtn.classList.remove('copied'); }, 1400);
        }).catch(function () {
          window.prompt('Copy address:', text);
        });
        return;
      }

      var removeBtn = closestFromEvent(e, '.tm-remove-btn');
      if (removeBtn) {
        removeTagFromDetailState(removeBtn.getAttribute('data-tag') || '');
        return;
      }

      var suggestBtn = closestFromEvent(e, '.tm-suggest-btn');
      if (suggestBtn) {
        addTagToDetailState(suggestBtn.getAttribute('data-tag') || '');
        return;
      }

      if (closestFromEvent(e, '#tmAddBtn')) {
        var input = document.getElementById('tmInput');
        addTagToDetailState(input ? input.value : '');
        if (input) input.value = '';
        return;
      }

      if (closestFromEvent(e, '#tmSaveBtn')) {
        saveDetailTags();
        return;
      }

      if (closestFromEvent(e, '#tmCopyDebugBtn')) {
        copyLastTagSaveDebug().then(function () {
          showDetailToast('📋 Tag save debug copied to clipboard.', 'info', 2200);
        }).catch(function () {
          window.prompt('Copy tag save debug:', getLastTagSaveDebugJson());
        });
        return;
      }

      if (closestFromEvent(e, '#tmClearBtn')) {
        if (window.__detailTagState) {
          window.__detailTagState.tags = [];
          syncTagManagementUi();
          setTagStatus('Cleared tags. Click Save Tags to persist.', false);
          refreshTagSaveDebugUi(window.__lastTagSaveDebug);
        }
        return;
      }

      if (closestFromEvent(e, '#tmResetBtn') && window.__detailTagState) {
        window.__detailTagState.tags = uniqueTags(window.__detailTagState.sourceTags || []);
        syncTagManagementUi();
        setTagStatus('Reset to source tags. Click Save Tags to persist.', false);
        refreshTagSaveDebugUi(window.__lastTagSaveDebug);
      }

      var removeNoteBtn = closestFromEvent(e, '.dnm-remove');
      if (removeNoteBtn) {
        removeNoteFromDetailState(Number(removeNoteBtn.getAttribute('data-note-index')));
        return;
      }

      if (closestFromEvent(e, '#dnmAddBtn')) {
        var noteInput = document.getElementById('dnmInput');
        addNoteToDetailState(noteInput ? noteInput.value : '');
        if (noteInput) noteInput.value = '';
        return;
      }

      if (closestFromEvent(e, '#dnmSaveBtn')) {
        saveDetailNotes();
      }
    });

    document.addEventListener('keydown', function (e) {
      var active = document.activeElement;
      if (active && active.id === 'dnmInput' && (e.key === 'Enter' && (e.metaKey || e.ctrlKey))) {
        e.preventDefault();
        addNoteToDetailState(active.value);
        active.value = '';
        return;
      }

      if (e.key !== 'Enter') return;
      if (!active || active.id !== 'tmInput') return;
      e.preventDefault();
      addTagToDetailState(active.value);
      active.value = '';
    });

    var payload = fromStoredPayload();
    if (!payload) {
      var sourceIndex = Number(getParams().get('sourceIndex'));
      if (Number.isInteger(sourceIndex) && sourceIndex >= 0) payload = fromOpenerBySourceIndex(sourceIndex);
    }

    render(payload);
    activateTab(getParams().get('initialTab') || 'overview');
  })();
</script>
