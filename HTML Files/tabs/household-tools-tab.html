<!-- FINANCES TAB CONTENT -->
<!-- Consolidates budgeting, tax planning, and retirement planning in one tab -->

<div id="householdToolsRoot">
  <div class="household-tools-header">
    <h1>Finances</h1>
    <p class="household-tools-subtitle">Keep your budget, tax planning, and retirement planning in one workflow.</p>
  </div>

  <div class="household-tools-subtabs" role="tablist" aria-label="Finance sections">
    <button id="householdToolsTab-budget" type="button" class="household-tools-subtab active" role="tab" aria-controls="householdToolsPane-budget" aria-selected="true" data-household-subtab="budget">💰 Budget</button>
    <button id="householdToolsTab-tax-planning" type="button" class="household-tools-subtab" role="tab" aria-controls="householdToolsPane-tax-planning" aria-selected="false" data-household-subtab="tax-planning">🧾 Tax Planning</button>
    <button id="householdToolsTab-retirement-planning" type="button" class="household-tools-subtab" role="tab" aria-controls="householdToolsPane-retirement-planning" aria-selected="false" data-household-subtab="retirement-planning">🏦 Retirement Planning</button>
  </div>

  <div id="householdToolsPane-budget" class="household-tools-pane is-active" data-household-pane="budget" role="tabpanel" aria-labelledby="householdToolsTab-budget">
    <div class="tab-placeholder">
      <div class="tab-placeholder-icon">💰</div>
      <div class="tab-placeholder-text">Budget</div>
      <div class="tab-placeholder-subtext">Track income, expenses, and monthly goals.</div>
    </div>
  </div>

  <div id="householdToolsPane-tax-planning" class="household-tools-pane" data-household-pane="tax-planning" role="tabpanel" aria-labelledby="householdToolsTab-tax-planning" hidden>
    <div class="tab-placeholder">
      <div class="tab-placeholder-icon">🧾</div>
      <div class="tab-placeholder-text">Tax Planning</div>
      <div class="tab-placeholder-subtext">Organize deductions, deadlines, and filing readiness.</div>
    </div>
  </div>

  <div id="householdToolsPane-retirement-planning" class="household-tools-pane" data-household-pane="retirement-planning" role="tabpanel" aria-labelledby="householdToolsTab-retirement-planning" hidden>
    <div class="tab-placeholder">
      <div class="tab-placeholder-icon">🏦</div>
      <div class="tab-placeholder-text">Retirement Planning</div>
      <div class="tab-placeholder-subtext">Plan long-term savings targets and retirement milestones.</div>
    </div>
  </div>

</div>

<style>
  #householdToolsRoot .household-tools-header {
    margin-bottom: 12px;
  }

  #householdToolsRoot .household-tools-header h1 {
    margin: 0 0 6px;
  }

  #householdToolsRoot .household-tools-subtitle {
    margin: 0;
    color: #6b7280;
    font-size: 14px;
  }

  #householdToolsRoot .household-tools-subtabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 14px;
  }

  #householdToolsRoot .household-tools-subtab {
    border: 1px solid #93c5fd;
    background: linear-gradient(180deg, #eff6ff 0%, #dbeafe 100%);
    color: #1e3a8a;
    border-radius: 999px;
    padding: 8px 12px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.16s ease;
  }

  #householdToolsRoot .household-tools-subtab:hover {
    border-color: #2563eb;
    transform: translateY(-1px);
    box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);
  }

  #householdToolsRoot .household-tools-subtab.active {
    border-color: #1d4ed8;
    background: linear-gradient(180deg, #dbeafe 0%, #bfdbfe 100%);
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.24);
  }
</style>

<script>
  (function () {
    const HOUSEHOLD_SUBTAB_KEYS = ['budget', 'tax-planning', 'retirement-planning'];
    const state = { activeSubTab: 'budget' };

    function isHouseholdToolsTabMountedAndActive(root) {
      if (!root || !document.body || !document.body.contains(root)) return false;
      const pane = root.closest ? root.closest('.app-tab-pane[data-tab]') : null;
      if (!pane) return true;
      const tabId = String(pane.getAttribute('data-tab') || '').trim();
      if (tabId !== 'household-tools') return false;
      return pane.classList.contains('active');
    }

    function getHouseholdSubTabDockElements() {
      return {
        row: document.getElementById('appSubTabsRow'),
        cutout: document.getElementById('appSubTabsCutout'),
        slot: document.getElementById('appSubTabsSlot')
      };
    }

    function getHouseholdSubTabsElement(root) {
      const docked = document.querySelector('#appSubTabsSlot .household-tools-subtabs');
      if (docked) return docked;
      return root ? root.querySelector('.household-tools-subtabs') : null;
    }

    function getHouseholdSubTabButtons(root) {
      const subTabs = getHouseholdSubTabsElement(root);
      return subTabs ? Array.from(subTabs.querySelectorAll('[data-household-subtab]')) : [];
    }

    function updateHouseholdSubTabRowVisibility(row, slot) {
      if (!row || !slot) return;
      const hasVisibleChild = Array.from(slot.children || []).some((child) => !child.hidden && child.getAttribute('aria-hidden') !== 'true');
      row.hidden = !hasVisibleChild;
      row.setAttribute('aria-hidden', hasVisibleChild ? 'false' : 'true');
    }

    function positionHouseholdSubTabDock() {
      const elements = getHouseholdSubTabDockElements();
      const row = elements.row;
      const cutout = elements.cutout;
      if (!row || !cutout || row.hidden) return;

      const subTabs = document.querySelector('#appSubTabsSlot .household-tools-subtabs');
      if (!subTabs || subTabs.hidden || subTabs.getAttribute('aria-hidden') === 'true') return;

      const activePrimaryTab = document.querySelector('.app-tab-btn.active[data-tab="household-tools"]');
      if (!activePrimaryTab) return;

      const rowRect = row.getBoundingClientRect();
      const activeRect = activePrimaryTab.getBoundingClientRect();
      const cutoutWidth = Math.min(cutout.offsetWidth || 0, Math.max(rowRect.width - 8, 0));

      if (!rowRect.width || !cutoutWidth) {
        cutout.style.left = '50%';
        cutout.style.setProperty('--app-subtabs-pointer-left', '50%');
        return;
      }

      const preferredCenter = (activeRect.left - rowRect.left) + (activeRect.width / 2);
      const padding = 8;
      const minCenter = cutoutWidth / 2 + padding;
      const maxCenter = Math.max(rowRect.width - (cutoutWidth / 2) - padding, minCenter);
      const clampedCenter = Math.min(Math.max(preferredCenter, minCenter), maxCenter);
      cutout.style.left = `${clampedCenter}px`;

      const pointerMin = 14;
      const pointerMax = Math.max(cutoutWidth - 14, pointerMin);
      const pointerLeft = Math.min(
        Math.max((preferredCenter - clampedCenter) + (cutoutWidth / 2), pointerMin),
        pointerMax
      );
      cutout.style.setProperty('--app-subtabs-pointer-left', `${pointerLeft}px`);
    }

    function bindHouseholdSubTabDock(root, subTabs) {
      if (!root || !subTabs || subTabs.dataset.householdDockBound === '1') return;
      subTabs.dataset.householdDockBound = '1';

      function resolveDockButtonTarget(event) {
        var rawTarget = event && event.target ? event.target : null;
        var elementTarget = rawTarget && rawTarget.nodeType === Node.ELEMENT_NODE
          ? rawTarget
          : (rawTarget && rawTarget.parentElement ? rawTarget.parentElement : null);
        if (!elementTarget || typeof elementTarget.closest !== 'function') return null;
        var button = elementTarget.closest('[data-household-subtab]');
        if (!button || !subTabs.contains(button)) return null;
        return button;
      }

      subTabs.addEventListener('click', function (event) {
        const button = resolveDockButtonTarget(event);
        if (!button) return;
        event.preventDefault();
        setActiveHouseholdSubTab(root, button.getAttribute('data-household-subtab'));
      });

      subTabs.addEventListener('keydown', function (event) {
        const button = resolveDockButtonTarget(event);
        if (!button) return;
        const buttons = getHouseholdSubTabButtons(root);
        if (!buttons.length) return;

        const currentIndex = buttons.indexOf(button);
        if (currentIndex < 0) return;

        let nextIndex = currentIndex;
        switch (event.key) {
          case 'ArrowRight':
          case 'ArrowDown':
            nextIndex = (currentIndex + 1) % buttons.length;
            break;
          case 'ArrowLeft':
          case 'ArrowUp':
            nextIndex = (currentIndex - 1 + buttons.length) % buttons.length;
            break;
          case 'Home':
            nextIndex = 0;
            break;
          case 'End':
            nextIndex = buttons.length - 1;
            break;
          default:
            return;
        }

        event.preventDefault();
        const nextButton = buttons[nextIndex];
        if (!nextButton) return;
        setActiveHouseholdSubTab(root, nextButton.getAttribute('data-household-subtab'));
        nextButton.focus();
      });
    }

    function syncHouseholdSubTabDock(root) {
      const elements = getHouseholdSubTabDockElements();
      const row = elements.row;
      const slot = elements.slot;
      if (!row || !slot || !root) return;

      const subTabs = getHouseholdSubTabsElement(root);
      if (!subTabs) {
        updateHouseholdSubTabRowVisibility(row, slot);
        return;
      }

      const activePrimaryTab = document.querySelector('.app-tab-btn.active[data-tab]');
      const activeTabId = activePrimaryTab ? String(activePrimaryTab.getAttribute('data-tab') || '') : '';
      const shouldShow = activeTabId === 'household-tools';

      if (shouldShow && !slot.contains(subTabs)) {
        slot.appendChild(subTabs);
      }

      bindHouseholdSubTabDock(root, subTabs);

      if (shouldShow) {
        Array.from(slot.children || []).forEach((child) => {
          const isCurrent = child === subTabs;
          child.hidden = !isCurrent;
          child.setAttribute('aria-hidden', isCurrent ? 'false' : 'true');
        });
      } else {
        subTabs.hidden = true;
        subTabs.setAttribute('aria-hidden', 'true');
      }

      updateHouseholdSubTabRowVisibility(row, slot);
      if (!shouldShow) return;
      requestAnimationFrame(positionHouseholdSubTabDock);
    }

    function bindHouseholdPrimaryTabFallbackSync(root) {
      if (!root || root.dataset.householdPrimaryTabFallbackBound === '1') return;
      root.dataset.householdPrimaryTabFallbackBound = '1';

      const resync = function () {
        const liveRoot = document.getElementById('householdToolsRoot');
        if (!liveRoot) return;
        syncHouseholdSubTabDock(liveRoot);
      };

      document.addEventListener('click', function (event) {
        var rawTarget = event && event.target ? event.target : null;
        var elementTarget = rawTarget && rawTarget.nodeType === Node.ELEMENT_NODE
          ? rawTarget
          : (rawTarget && rawTarget.parentElement ? rawTarget.parentElement : null);
        const button = elementTarget && elementTarget.closest ? elementTarget.closest('.app-tab-btn[data-tab]') : null;
        if (!button) return;
        requestAnimationFrame(resync);
        window.setTimeout(resync, 40);
      }, true);

      window.addEventListener('pageshow', resync);
    }

    function syncHouseholdSubTabs(root) {
      if (!isHouseholdToolsTabMountedAndActive(root)) return;
      getHouseholdSubTabButtons(root).forEach((button) => {
        const tabKey = button.getAttribute('data-household-subtab');
        const isActive = tabKey === state.activeSubTab;
        button.classList.toggle('active', isActive);
        button.setAttribute('aria-selected', isActive ? 'true' : 'false');
        button.setAttribute('tabindex', isActive ? '0' : '-1');
      });

      root.querySelectorAll('[data-household-pane]').forEach((pane) => {
        const paneKey = pane.getAttribute('data-household-pane');
        const isActive = paneKey === state.activeSubTab;
        pane.classList.toggle('is-active', isActive);
        pane.hidden = !isActive;
        pane.setAttribute('aria-hidden', isActive ? 'false' : 'true');
      });

      syncHouseholdSubTabDock(root);
    }

    function setActiveHouseholdSubTab(root, tabKey) {
      state.activeSubTab = HOUSEHOLD_SUBTAB_KEYS.indexOf(tabKey) >= 0 ? tabKey : 'budget';
      syncHouseholdSubTabs(root);
    }

    window.initHouseholdToolsTab = function () {
      const root = document.getElementById('householdToolsRoot');
      if (!root) return;

      if (!root.dataset.householdTabSwitchBound) {
        root.dataset.householdTabSwitchBound = '1';
        window.addEventListener('app:tab-switched', function () {
          const liveRoot = document.getElementById('householdToolsRoot');
          if (!liveRoot) return;
          syncHouseholdSubTabDock(liveRoot);
        });
      }

      if (!root.dataset.householdSubTabDockResizeBound) {
        root.dataset.householdSubTabDockResizeBound = '1';
        window.addEventListener('resize', function () {
          const liveRoot = document.getElementById('householdToolsRoot');
          if (!liveRoot) return;
          syncHouseholdSubTabDock(liveRoot);
        });
      }


      bindHouseholdPrimaryTabFallbackSync(root);
      setActiveHouseholdSubTab(root, 'budget');
      console.log('✅ Finances tab initialized');
    };
  })();
</script>
