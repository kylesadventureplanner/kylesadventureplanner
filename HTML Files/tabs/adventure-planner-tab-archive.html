    <script>
      (function () {
          function bindCardLinkGuard(grid) {
            if (!grid || grid.dataset.linkGuardBound === '1') return;

            // Let links navigate naturally and block card/detail delegated click handlers.
            grid.addEventListener('click', (e) => {
              if (!e.target.closest('a')) return;
              e.stopImmediatePropagation();
            }, true);

            grid.dataset.linkGuardBound = '1';
          }

          function installCardLinkGuardPatch() {
            const originalRenderPaginatedCards = window.renderPaginatedCards;
            if (typeof originalRenderPaginatedCards === 'function' && !window.__cardLinkGuardPatched) {
              window.renderPaginatedCards = function () {
                originalRenderPaginatedCards();
                bindCardLinkGuard(document.getElementById('adventureCardsGrid'));
              };
              window.__cardLinkGuardPatched = true;
            }

            bindCardLinkGuard(document.getElementById('adventureCardsGrid'));
          }

          window.ensureButtonsClickable = function () {
            const selectors = [
              '.auth-btn',
              '.automation-btn',
              '.quick-filter-btn',
              '.control-panel-card button',
              '.pagination-btn',
              '.card-btn',
              '.action-btn',
              'a'
            ];

            selectors.forEach((selector) => {
              document.querySelectorAll(selector).forEach((el) => {
                el.style.pointerEvents = 'auto';
                if (el.tagName !== 'A') {
                  el.style.position = el.style.position || 'relative';
                  el.style.zIndex = '2';
                }
              });
            });

            // Route clicks to the full button surface, even if icons/spans are nested.
            document.querySelectorAll('.automation-btn *, .card-btn *, .action-btn *').forEach((el) => {
              el.style.pointerEvents = 'none';
            });

            document.querySelectorAll('.modal-backdrop').forEach((backdrop) => {
              if (!backdrop.classList.contains('visible')) {
                backdrop.style.pointerEvents = 'none';
                backdrop.style.display = 'none';
                backdrop.style.opacity = '0';
                backdrop.style.zIndex = '-1';
              }
            });
          };

          document.addEventListener('DOMContentLoaded', () => {
            installCardLinkGuardPatch();
            window.ensureButtonsClickable?.();

            // Keep Apply button labeling consistent when shown dynamically.
            const observer = new MutationObserver(() => {
              const applyBtn = document.getElementById('automationApplyBtn');
              if (applyBtn && /apply changes now/i.test(applyBtn.textContent || '')) {
                applyBtn.textContent = '✅ Apply Dry Run Changes';
              }
            });
            observer.observe(document.body, { childList: true, subtree: true, characterData: true });

            // Initialize reliability features
            initNetworkMonitoring();
            window.initSessionManagement?.();
            window.initAPITimeouts?.();
          });

          // ============================================================
          // ADD NEW PLACE MODAL
          // ============================================================
          window.openAddPlaceModal = function() {
            console.log('🆕 Opening Add New Place modal');

            const modal = createAddPlaceModal();
            document.body.appendChild(modal);

            // Show modal
            setTimeout(() => {
              modal.classList.add('visible');
            }, 10);
          };

          function createAddPlaceModal() {
            const backdrop = document.createElement('div');
            backdrop.className = 'modal-backdrop visible';
            backdrop.style.cssText = 'display: flex; align-items: center; justify-content: center; z-index: 10000;';

            const modal = document.createElement('div');
            modal.style.cssText = 'background: white; border-radius: 16px; padding: 32px; max-width: 500px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3);';

            modal.innerHTML = `
        <div style="margin-bottom: 24px;">
          <h2 style="margin: 0 0 8px 0; font-size: 24px; color: #1f2937;">➕ Add New Place</h2>
          <p style="margin: 0; color: #6b7280; font-size: 14px;">Enter any of the following to add a new location:</p>
        </div>

        <div style="display: flex; flex-direction: column; gap: 16px;">
          <div>
            <label style="display: block; margin-bottom: 6px; font-weight: 600; color: #374151; font-size: 14px;">Place Name</label>
            <input id="addPlaceName" type="text" placeholder="e.g., Starbucks Downtown" style="width: 100%; padding: 10px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 14px;" />
          </div>

          <div>
            <label style="display: block; margin-bottom: 6px; font-weight: 600; color: #374151; font-size: 14px;">Google Place ID (optional)</label>
            <input id="addPlaceId" type="text" placeholder="e.g., ChIJ..." style="width: 100%; padding: 10px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 14px;" />
          </div>

          <div>
            <label style="display: block; margin-bottom: 6px; font-weight: 600; color: #374151; font-size: 14px;">Website URL (optional)</label>
            <input id="addPlaceWebsite" type="url" placeholder="e.g., https://example.com" style="width: 100%; padding: 10px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 14px;" />
          </div>

          <div>
            <label style="display: block; margin-bottom: 6px; font-weight: 600; color: #374151; font-size: 14px;">Google Maps URL (optional)</label>
            <input id="addPlaceGoogleUrl" type="url" placeholder="e.g., https://maps.google.com/?cid=..." style="width: 100%; padding: 10px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 14px;" />
          </div>
        </div>

        <div style="margin-top: 24px; display: flex; gap: 12px; justify-content: flex-end;">
          <button id="cancelAddPlace" style="padding: 10px 20px; background: white; color: #6b7280; border: 2px solid #e5e7eb; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s;">Cancel</button>
          <button id="submitAddPlace" style="padding: 10px 20px; background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); transition: all 0.2s;">Add Place</button>
        </div>
      `;

            backdrop.appendChild(modal);

            // Event listeners
            document.getElementById('cancelAddPlace').addEventListener('click', () => {
              backdrop.remove();
            });

            backdrop.addEventListener('click', (e) => {
              if (e.target === backdrop) {
                backdrop.remove();
              }
            });

            document.getElementById('submitAddPlace').addEventListener('click', async () => {
              const name = document.getElementById('addPlaceName').value.trim();
              const placeId = document.getElementById('addPlaceId').value.trim();
              const website = document.getElementById('addPlaceWebsite').value.trim();
              const googleUrl = document.getElementById('addPlaceGoogleUrl').value.trim();

              if (!name && !placeId && !website && !googleUrl) {
                showToast('❌ Please enter at least one field', 'error', 3000);
                return;
              }

              showToast('🔄 Adding new place...', 'info', 2000);
              backdrop.remove();

              try {
                // Here you would call your function to add to Excel
                // For now, just show success
                showToast('✅ Place added successfully! (Feature in development)', 'success', 3000);
              } catch (error) {
                console.error('Error adding place:', error);
                showToast('❌ Failed to add place: ' + error.message, 'error', 5000);
              }
            });

            return backdrop;
          }

          // ============================================================
          // NETWORK STATUS MONITORING
          // ============================================================
          function initNetworkMonitoring() {
            const statusDiv = document.getElementById('networkStatus');
            const statusIcon = document.getElementById('networkStatusIcon');
            const statusText = document.getElementById('networkStatusText');
            let isOnline = navigator.onLine;

            // Check online/offline status
            window.addEventListener('online', () => {
              isOnline = true;
              statusDiv.style.display = 'none';
              console.log('✅ Network connection restored');
              showToast('✅ Connection restored', 'success', 3000);
            });

            window.addEventListener('offline', () => {
              isOnline = false;
              statusDiv.style.display = 'block';
              statusIcon.textContent = '🔴';
              statusText.textContent = 'No Connection';
              console.warn('⚠️ Network connection lost');
              showToast('⚠️ No internet connection', 'warning', 5000);
            });

            // Periodic connection check (every 30 seconds)
            setInterval(() => {
              if (navigator.onLine !== isOnline) {
                if (navigator.onLine) {
                  isOnline = true;
                  statusDiv.style.display = 'none';
                } else {
                  isOnline = false;
                  statusDiv.style.display = 'block';
                }
              }
            }, 30000);
          }

        })();
      </script>
