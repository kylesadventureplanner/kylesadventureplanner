<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trail Explorer - Kyle's Adventure Finder</title>
  <link rel="stylesheet" href="../CSS/design-tokens.css" />
  <link rel="stylesheet" href="../CSS/components.css" />
  <link rel="stylesheet" href="../CSS/utilities.css" />
  <link rel="stylesheet" href="../CSS/browse-page.css" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
      color: #1f2937;
      padding: 20px;
      margin: 0;
    }

    #trailExplorerHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
      padding: 24px;
      border-radius: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }

    .trail-header-main h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1;
      letter-spacing: -0.4px;
    }

    .trail-header-subtitle {
      margin-top: 8px;
      opacity: 0.92;
      font-size: 14px;
    }

    .trail-header-actions {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    #trailExplorerCloseBtn {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: #fff;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 34px;
      line-height: 1;
      transition: all 0.2s;
    }

    #trailExplorerCloseBtn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    #trailExplorerBootstrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #6b7280;
      margin-bottom: 16px;
    }

    .hidden {
      display: none !important;
    }

    .trail-cities-controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 24px;
    }

    .trail-cities-input,
    .trail-cities-select,
    .trail-cities-btn {
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      background: #fff;
      color: #1f2937;
      min-height: 48px;
    }

    .trail-cities-input {
      flex: 1;
      min-width: 240px;
    }

    .trail-cities-btn {
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      background: #fff;
    }

    .trail-cities-btn:hover {
      border-color: #667eea;
      color: #667eea;
    }

    .trail-cities-btn.active {
      border-color: #667eea;
      background: #667eea;
      color: #fff;
    }

    .trail-city-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 12px;
    }

    .trail-city-card {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
      background: #fff;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
      text-align: left;
    }

    .trail-city-card:hover {
      border-color: #667eea;
      box-shadow: 0 10px 25px rgba(102,126,234,0.15);
      transform: translateY(-4px);
    }

    .trail-city-name {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1f2937;
    }

    .trail-city-meta {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 12px;
    }

    .trail-city-stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }

    .trail-city-stat {
      background: #f3f4f6;
      border-radius: 8px;
      padding: 12px;
      min-height: 74px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .trail-city-chip-label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .trail-city-chip-value {
      display: block;
      font-size: 32px;
      line-height: 1;
      color: #667eea;
      font-weight: 700;
    }

    .trail-city-chip-value.is-drive {
      font-size: 15px;
      line-height: 1.2;
      color: #4b5563;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .trail-city-grid {
        gap: 14px;
      }

      .trail-city-card {
        padding: 16px;
      }

      .trail-city-name {
        font-size: 28px;
        margin-bottom: 6px;
      }

      .trail-city-meta {
        margin-bottom: 10px;
      }

      .trail-city-stats {
        gap: 10px;
      }

      .trail-city-stat {
        padding: 10px;
        min-height: 66px;
      }

      .trail-city-stat-drive {
        grid-column: 1 / -1;
      }

      .trail-city-chip-label {
        font-size: 12px;
        margin-bottom: 3px;
      }

      .trail-city-chip-value {
        font-size: 28px;
      }

      .trail-city-chip-value.is-drive {
        font-size: 14px;
      }
    }

    .trail-city-cta {
      width: 100%;
      border: none;
      border-radius: 8px;
      background: #667eea;
      color: #fff;
      padding: 12px 16px;
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      margin-top: auto;
    }

    .trail-results-hero {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 20px 24px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .trail-results-title {
      font-size: 30px;
      font-weight: 800;
      color: #fff;
    }

    .trail-results-subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.9);
      margin-top: 2px;
    }

    .trail-results-back {
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
    }

    .trail-results-back:hover {
      background: rgba(255,255,255,0.35);
    }

    .trail-results-filters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 8px;
      margin-bottom: 14px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
    }

    .trail-results-filters label {
      font-size: 11px;
      font-weight: 700;
      color: #6b7280;
      text-transform: uppercase;
      margin-bottom: 4px;
      display: block;
    }

    .trail-results-filter-input,
    .trail-results-filter-select {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      background: #fff;
      color: #111827;
    }

    .trail-results-clear-btn {
      border: 1px solid #fecaca;
      color: #b91c1c;
      background: #fff;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      align-self: end;
    }

    .trail-results-clear-btn:hover {
      background: #fef2f2;
    }

    .trail-empty {
      border: 1px dashed #d1d5db;
      border-radius: 12px;
      padding: 24px;
      color: #6b7280;
      background: #fff;
      text-align: center;
    }

    /* Standalone trail explorer keeps only cards + pagination when viewing a city. */
    #bikeTrailsTab.trail-city-results-mode > header,
    #bikeTrailsTab.trail-city-results-mode > #bikeControlPanelCard,
    #bikeTrailsTab.trail-city-results-mode > #bikeQuickFiltersCard,
    #bikeTrailsTab.trail-city-results-mode > #bikeBreadcrumbFilterMenu,
    #bikeTrailsTab.trail-city-results-mode > div[style*="padding: 8px 0"],
    #bikeTrailsTab.trail-city-results-mode #bikeTrailExplorerModal {
      display: none !important;
    }

    #bikeTrailsTab.trail-city-results-mode .table-card > .card-header {
      padding-top: 8px;
      padding-bottom: 8px;
    }

    #bikeTrailsTab.trail-city-results-mode .table-card .card-subtitle,
    #bikeTrailsTab.trail-city-results-mode #bikeMetadataDebugLine {
      display: none !important;
    }
  </style>
</head>
<body>
  <header id="trailExplorerHeader">
    <div class="trail-header-main">
      <h1>🗺️ Trail Explorer</h1>
      <div class="trail-header-subtitle">Explore bike trails grouped by city</div>
    </div>
    <div class="trail-header-actions">
      <button id="trailExplorerCloseBtn" type="button" title="Close this tab">×</button>
    </div>
  </header>

  <div id="trailExplorerBootstrap">
    <div class="spinner" aria-hidden="true"></div>
    Loading Trail Explorer...
  </div>

  <section id="trailCitiesPage" class="hidden">
    <div class="trail-cities-controls">
      <input id="trailCitySearchInput" class="trail-cities-input" type="text" placeholder="Search regions..." />
      <select id="trailCitySortSelect" class="trail-cities-select" aria-label="Sort regions">
        <option value="count">Sort by Region Count</option>
        <option value="name">Sort Regions A-Z</option>
        <option value="drive">Sort by Drive Time</option>
      </select>
      <button id="trailCityDriveTimesBtn" type="button" class="trail-cities-btn">📍 Show my drive times</button>
    </div>
    <div id="trailCityGrid" class="trail-city-grid"></div>
  </section>

  <section id="trailCityResultsPage" class="hidden">
    <div class="trail-results-hero">
      <button id="trailBackToCitiesBtn" class="trail-results-back" type="button">← Back</button>
      <div class="trail-results-hero-copy">
        <div id="trailResultsTitle" class="trail-results-title">City Trails</div>
        <div id="trailResultsSubtitle" class="trail-results-subtitle"></div>
      </div>
    </div>

    <div class="trail-results-filters">
      <div>
        <label for="trailResultDifficultyFilter">Difficulty</label>
        <select id="trailResultDifficultyFilter" class="trail-results-filter-select">
          <option value="">Any Difficulty</option>
        </select>
      </div>
      <div>
        <label for="trailResultCostFilter">Cost</label>
        <select id="trailResultCostFilter" class="trail-results-filter-select">
          <option value="">Any Cost</option>
        </select>
      </div>
      <div>
        <label for="trailResultTagFilter">Tag</label>
        <input id="trailResultTagFilter" class="trail-results-filter-input" type="text" placeholder="e.g. scenic, gravel" list="trailResultTagList" />
        <datalist id="trailResultTagList"></datalist>
      </div>
      <button id="trailResultClearFiltersBtn" type="button" class="trail-results-clear-btn">Clear City Filters</button>
    </div>
  </section>

  <main id="bikeTrailsTab" class="hidden"></main>

  <script>
    (function () {
      var BASE_TITLE = 'Trail Explorer - Kyle\'s Adventure Finder';
      var COL = {
        name: 0,
        region: 1,
        driveTime: 2,
        lengthMiles: 3,
        surface: 4,
        difficulty: 6,
        vibes: 12,
        moodTags: 13,
        state: 66,
        city: 67,
        cost: 68,
        gpsCoordinates: 41
      };
      var cityExplorerState = {
        allTrails: [],
        cityBuckets: [],
        selectedRegion: null,
        userLocation: null,
        hasDriveTimes: false
      };

      function setStatus(message) {
        var el = document.getElementById('trailExplorerBootstrap');
        if (el) el.textContent = message;
      }

      function bindHeaderActions() {
        var closeBtn = document.getElementById('trailExplorerCloseBtn');
        if (!closeBtn || closeBtn.dataset.bound === '1') return;
        closeBtn.addEventListener('click', function () {
          var fallback = typeof window.resolvePlannerPageUrl === 'function'
            ? window.resolvePlannerPageUrl('index.html')
            : '../index.html';
          window.close();
          setTimeout(function () {
            if (window.history.length > 1) {
              window.history.back();
            } else {
              window.location.href = fallback;
            }
          }, 120);
        });
        closeBtn.dataset.bound = '1';
      }

      function parseDriveMinutes(value) {
        var text = String(value || '').trim().toLowerCase();
        if (!text) return 0;
        if (/^\d+$/.test(text)) return Number(text);

        var hoursMatch = text.match(/(\d+(?:\.\d+)?)\s*h/);
        var minsMatch = text.match(/(\d+(?:\.\d+)?)\s*m/);
        if (hoursMatch || minsMatch) {
          var hours = hoursMatch ? Number(hoursMatch[1]) : 0;
          var mins = minsMatch ? Number(minsMatch[1]) : 0;
          return Math.round((hours * 60) + mins);
        }

        var colon = text.match(/^(\d{1,2}):(\d{2})$/);
        if (colon) return (Number(colon[1]) * 60) + Number(colon[2]);
        return 0;
      }

      function esc(value) {
        return String(value == null ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function waitFor(checkFn, timeoutMs) {
        var started = Date.now();
        return new Promise(function (resolve) {
          (function poll() {
            if (checkFn()) {
              resolve(true);
              return;
            }
            if (Date.now() - started >= timeoutMs) {
              resolve(false);
              return;
            }
            setTimeout(poll, 120);
          })();
        });
      }

      function mapRowToTrail(row, idx) {
        var values = row && row.values && Array.isArray(row.values[0]) ? row.values[0] : [];
        return {
          id: 'fallback:' + idx,
          name: values[COL.name] || '',
          region: values[COL.region] || '',
          driveTime: values[COL.driveTime] || '',
          driveMinutes: parseDriveMinutes(values[COL.driveTime]),
          lengthMiles: Number(values[COL.lengthMiles] || 0),
          surface: values[COL.surface] || '',
          difficulty: values[COL.difficulty] || '',
          vibes: values[COL.vibes] || '',
          moodTags: values[COL.moodTags] || '',
          state: values[COL.state] || '',
          city: values[COL.city] || '',
          cost: values[COL.cost] || '',
          gpsCoordinates: values[COL.gpsCoordinates] || ''
        };
      }

      function getTrailModels() {
        if (typeof window.getAllBikeTrailModels === 'function') {
          var models = window.getAllBikeTrailModels() || [];
          if (Array.isArray(models) && models.length) {
            return models.map(function (trail) {
              var copy = Object.assign({}, trail || {});
              delete copy.row;
              return copy;
            });
          }
        }

        if (Array.isArray(window.bikeTrailExplorerModelsCache) && window.bikeTrailExplorerModelsCache.length) {
          return window.bikeTrailExplorerModelsCache.slice();
        }

        if (Array.isArray(window.bikeTrailsData) && window.bikeTrailsData.length) {
          return window.bikeTrailsData.map(mapRowToTrail);
        }

        return [];
      }

      function getRegionKey(region) {
        var value = String(region || '').trim();
        return value || 'Unknown Region';
      }

      function buildCityBuckets(trails) {
        var grouped = {};
        (trails || []).forEach(function (trail) {
          var region = String((trail && trail.region) || '').trim();
          var key = getRegionKey(region);
          if (!grouped[key]) {
            grouped[key] = {
              key: key,
              region: region || 'Unknown Region',
              rawRegion: region,
              count: 0,
              driveMinutesTotal: 0,
              trailsWithDrive: 0,
              distanceMiles: null,
              driveTimeLabel: ''
            };
          }
          grouped[key].count += 1;
          var drive = Number((trail && trail.driveMinutes) || 0);
          if (drive > 0) {
            grouped[key].driveMinutesTotal += drive;
            grouped[key].trailsWithDrive += 1;
          }
        });

        return Object.keys(grouped).map(function (key) {
          var bucket = grouped[key];
          bucket.avgDriveMinutes = bucket.trailsWithDrive
            ? Math.round(bucket.driveMinutesTotal / bucket.trailsWithDrive)
            : 0;
          return bucket;
        });
      }

      function normalizeLocationText(value) {
        return String(value || '').trim().toLowerCase();
      }

      function parseGpsCoordinates(value) {
        var text = String(value || '').trim();
        if (!text) return null;
        var match = text.match(/^\s*(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)\s*$/);
        if (!match) return null;
        var lat = Number(match[1]);
        var lng = Number(match[2]);
        if (!isFinite(lat) || !isFinite(lng)) return null;
        return { lat: lat, lng: lng };
      }

      function haversineMiles(aLat, aLng, bLat, bLng) {
        var R = 3959;
        var dLat = (bLat - aLat) * Math.PI / 180;
        var dLng = (bLng - aLng) * Math.PI / 180;
        var x = Math.sin(dLat / 2) * Math.sin(dLat / 2)
          + Math.cos(aLat * Math.PI / 180) * Math.cos(bLat * Math.PI / 180)
          * Math.sin(dLng / 2) * Math.sin(dLng / 2);
        var c = 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
        return R * c;
      }

      function estimateDriveTimeText(distanceMiles) {
        var hours = distanceMiles / 60;
        var whole = Math.floor(hours);
        var mins = Math.round((hours - whole) * 60);
        if (whole <= 0) return mins + 'm (' + distanceMiles.toFixed(1) + ' mi)';
        return whole + 'h ' + mins + 'm (' + distanceMiles.toFixed(1) + ' mi)';
      }

      function applyCityDriveTimesFromUserLocation() {
        var userLoc = cityExplorerState.userLocation;
        if (!userLoc || !isFinite(userLoc.lat) || !isFinite(userLoc.lng)) return;

        cityExplorerState.cityBuckets.forEach(function (bucket) {
          var matches = cityExplorerState.allTrails.filter(function (trail) {
            return normalizeLocationText(trail.region) === normalizeLocationText(bucket.region);
          });
          var trailWithCoords = matches.find(function (trail) {
            return !!parseGpsCoordinates(trail.gpsCoordinates);
          });
          if (!trailWithCoords) {
            bucket.distanceMiles = null;
            bucket.driveTimeLabel = 'Drive time unavailable';
            return;
          }
          var point = parseGpsCoordinates(trailWithCoords.gpsCoordinates);
          if (!point) {
            bucket.distanceMiles = null;
            bucket.driveTimeLabel = 'Drive time unavailable';
            return;
          }
          var miles = haversineMiles(userLoc.lat, userLoc.lng, point.lat, point.lng);
          bucket.distanceMiles = miles;
          bucket.driveTimeLabel = estimateDriveTimeText(miles);
        });
      }

      function updateCityDriveButtonUi() {
        var btn = document.getElementById('trailCityDriveTimesBtn');
        if (!btn) return;
        if (cityExplorerState.hasDriveTimes) {
          btn.classList.add('active');
          btn.textContent = '✅ Drive times enabled';
        } else {
          btn.classList.remove('active');
          btn.textContent = '📍 Show my drive times';
        }
      }

      function renderCityCards() {
        var searchInput = document.getElementById('trailCitySearchInput');
        var sortSelect = document.getElementById('trailCitySortSelect');
        var search = String(searchInput ? searchInput.value : '').trim().toLowerCase();
        var sort = String(sortSelect ? sortSelect.value : 'count');
        var grid = document.getElementById('trailCityGrid');
        if (!grid) return;

        var cards = cityExplorerState.cityBuckets.slice();
        if (search) {
          cards = cards.filter(function (bucket) {
            return bucket.region.toLowerCase().includes(search);
          });
        }

        if (sort === 'name') {
          cards.sort(function (a, b) { return a.key.localeCompare(b.key); });
        } else if (sort === 'drive') {
          cards.sort(function (a, b) {
            var aMiles = isFinite(a.distanceMiles) ? a.distanceMiles : Number.POSITIVE_INFINITY;
            var bMiles = isFinite(b.distanceMiles) ? b.distanceMiles : Number.POSITIVE_INFINITY;
            if (aMiles !== bMiles) return aMiles - bMiles;
            return a.key.localeCompare(b.key);
          });
        } else {
          cards.sort(function (a, b) {
            if (b.count !== a.count) return b.count - a.count;
            return a.key.localeCompare(b.key);
          });
        }

        if (!cards.length) {
          grid.innerHTML = '<div class="trail-empty" style="grid-column:1/-1;">No regions match your search.</div>';
          return;
        }

        grid.innerHTML = cards.map(function (bucket) {
          var avgDrive = bucket.avgDriveMinutes > 0 ? (bucket.avgDriveMinutes + ' min avg') : 'Drive time unavailable';
          var driveChip = cityExplorerState.hasDriveTimes
            ? (bucket.driveTimeLabel || 'Drive time unavailable')
            : avgDrive;
          return '' +
            '<button type="button" class="trail-city-card" data-region="' + esc(bucket.rawRegion) + '">' +
              '<div class="trail-city-name">' + esc(bucket.region || 'Unknown Region') + '</div>' +
              '<div class="trail-city-meta">Region</div>' +
              '<div class="trail-city-stats">' +
                '<div class="trail-city-stat">' +
                  '<span class="trail-city-chip-label">📍 Locations</span>' +
                  '<span class="trail-city-chip-value">' + esc(String(bucket.count)) + '</span>' +
                '</div>' +
                (cityExplorerState.hasDriveTimes
                  ? ('<div class="trail-city-stat trail-city-stat-drive">' +
                      '<span class="trail-city-chip-label">🚗 Drive Time</span>' +
                      '<span class="trail-city-chip-value is-drive">' + esc(driveChip) + '</span>' +
                    '</div>')
                  : '') +
              '</div>' +
              '<div class="trail-city-cta">View Locations</div>' +
            '</button>';
        }).join('');
      }

      function clearBikeFiltersForCityResults() {
        [
          'bikeSearchName', 'bikeFilterRegion', 'bikeFilterDifficulty', 'bikeFilterSurface',
          'bikeFilterLengthBand', 'bikeFilterDriveTimeBand', 'bikeFilterTraffic', 'bikeFilterState',
          'bikeFilterCity', 'bikeFilterCost', 'bikeFilterHours', 'bikeFilterTag', 'bikeGroupBy'
        ].forEach(function (id) {
          var el = document.getElementById(id);
          if (!el) return;
          el.value = '';
        });
      }

      function getSelectedCityTrails() {
        var region = normalizeLocationText(cityExplorerState.selectedRegion);
        return cityExplorerState.allTrails.filter(function (trail) {
          return normalizeLocationText(trail.region) === region;
        });
      }

      function populateCityResultFilters() {
        var cityTrails = getSelectedCityTrails();
        var difficultyEl = document.getElementById('trailResultDifficultyFilter');
        var costEl = document.getElementById('trailResultCostFilter');
        var tagList = document.getElementById('trailResultTagList');
        if (!difficultyEl || !costEl || !tagList) return;

        var difficulties = {};
        var costs = {};
        var tags = {};

        cityTrails.forEach(function (trail) {
          var difficulty = String(trail.difficulty || '').trim();
          var cost = String(trail.cost || '').trim();
          if (difficulty) difficulties[difficulty.toLowerCase()] = difficulty;
          if (cost) costs[cost.toLowerCase()] = cost;

          [trail.surface, trail.moodTags, trail.vibes].forEach(function (value) {
            String(value || '').split(',').forEach(function (rawTag) {
              var clean = String(rawTag || '').trim();
              if (!clean) return;
              tags[clean.toLowerCase()] = clean;
            });
          });
        });

        var difficultyOptions = Object.keys(difficulties).sort().map(function (key) {
          var val = difficulties[key];
          return '<option value="' + esc(val) + '">' + esc(val) + '</option>';
        }).join('');

        var costOptions = Object.keys(costs).sort().map(function (key) {
          var val = costs[key];
          return '<option value="' + esc(val) + '">' + esc(val) + '</option>';
        }).join('');

        var tagOptions = Object.keys(tags).sort().slice(0, 100).map(function (key) {
          return '<option value="' + esc(tags[key]) + '"></option>';
        }).join('');

        difficultyEl.innerHTML = '<option value="">Any Difficulty</option>' + difficultyOptions;
        costEl.innerHTML = '<option value="">Any Cost</option>' + costOptions;
        tagList.innerHTML = tagOptions;

        difficultyEl.value = '';
        costEl.value = '';
        var tagInput = document.getElementById('trailResultTagFilter');
        if (tagInput) tagInput.value = '';
      }

      function applyCityResultFilters() {
        var difficulty = document.getElementById('trailResultDifficultyFilter');
        var cost = document.getElementById('trailResultCostFilter');
        var tag = document.getElementById('trailResultTagFilter');
        var cityInput = document.getElementById('bikeFilterCity');
        var stateInput = document.getElementById('bikeFilterState');
        var regionInput = document.getElementById('bikeFilterRegion');
        var diffInput = document.getElementById('bikeFilterDifficulty');
        var costInput = document.getElementById('bikeFilterCost');
        var tagInput = document.getElementById('bikeFilterTag');

        if (regionInput) regionInput.value = cityExplorerState.selectedRegion || '';
        if (cityInput) cityInput.value = '';
        if (stateInput) stateInput.value = '';
        if (diffInput) diffInput.value = difficulty ? String(difficulty.value || '').trim() : '';
        if (costInput) costInput.value = cost ? String(cost.value || '').trim() : '';
        if (tagInput) tagInput.value = tag ? String(tag.value || '').trim() : '';

        if (typeof window.applyBikeFilters === 'function') window.applyBikeFilters();
        updateResultsSubtitle();
      }

      function clearCityResultFilters() {
        var difficulty = document.getElementById('trailResultDifficultyFilter');
        var cost = document.getElementById('trailResultCostFilter');
        var tag = document.getElementById('trailResultTagFilter');
        if (difficulty) difficulty.value = '';
        if (cost) cost.value = '';
        if (tag) tag.value = '';
        applyCityResultFilters();
      }

      function updateResultsSubtitle() {
        var subtitle = document.getElementById('trailResultsSubtitle');
        if (!subtitle) return;
        var count = Array.isArray(window.bikeFilteredTrails) ? window.bikeFilteredTrails.length : 0;
        subtitle.textContent = count + (count === 1 ? ' location' : ' locations') + ' in this region';
      }

      function showCityResults(region) {
        cityExplorerState.selectedRegion = String(region || '').trim();

        var title = document.getElementById('trailResultsTitle');
        if (title) title.textContent = cityExplorerState.selectedRegion || 'Unknown Region';

        var citiesPage = document.getElementById('trailCitiesPage');
        var resultsPage = document.getElementById('trailCityResultsPage');
        if (citiesPage) citiesPage.classList.add('hidden');
        if (resultsPage) resultsPage.classList.remove('hidden');

        var tabRoot = document.getElementById('bikeTrailsTab');
        if (tabRoot) {
          tabRoot.classList.remove('hidden');
          tabRoot.classList.add('trail-city-results-mode');
        }

        clearBikeFiltersForCityResults();
        populateCityResultFilters();

        var regionInput = document.getElementById('bikeFilterRegion');
        if (regionInput) regionInput.value = cityExplorerState.selectedRegion;

        applyCityResultFilters();
        document.title = 'Trail Explorer - ' + (title ? title.textContent : cityExplorerState.selectedRegion);
      }

      function showCitiesPage() {
        var resultsPage = document.getElementById('trailCityResultsPage');
        var citiesPage = document.getElementById('trailCitiesPage');
        var tabRoot = document.getElementById('bikeTrailsTab');
        if (resultsPage) resultsPage.classList.add('hidden');
        if (citiesPage) citiesPage.classList.remove('hidden');
        if (tabRoot) {
          tabRoot.classList.add('hidden');
          tabRoot.classList.remove('trail-city-results-mode');
        }
        clearCityResultFilters();
        document.title = BASE_TITLE;
      }

      function bindCityExplorerEvents() {
        var search = document.getElementById('trailCitySearchInput');
        if (search && search.dataset.bound !== '1') {
          search.addEventListener('input', renderCityCards);
          search.dataset.bound = '1';
        }

        var sort = document.getElementById('trailCitySortSelect');
        if (sort && sort.dataset.bound !== '1') {
          sort.addEventListener('change', renderCityCards);
          sort.dataset.bound = '1';
        }

        var driveBtn = document.getElementById('trailCityDriveTimesBtn');
        if (driveBtn && driveBtn.dataset.bound !== '1') {
          driveBtn.addEventListener('click', function () {
            if (!navigator.geolocation) {
              window.alert('Geolocation is not supported by this browser.');
              return;
            }

            driveBtn.disabled = true;
            driveBtn.textContent = '📍 Getting location...';
            navigator.geolocation.getCurrentPosition(function (position) {
              cityExplorerState.userLocation = {
                lat: position.coords.latitude,
                lng: position.coords.longitude
              };
              cityExplorerState.hasDriveTimes = true;
              applyCityDriveTimesFromUserLocation();
              updateCityDriveButtonUi();
              renderCityCards();
              driveBtn.disabled = false;
            }, function () {
              driveBtn.disabled = false;
              cityExplorerState.hasDriveTimes = false;
              updateCityDriveButtonUi();
              window.alert('Could not get your location. Please check browser permissions.');
            });
          });
          driveBtn.dataset.bound = '1';
        }

        var grid = document.getElementById('trailCityGrid');
        if (grid && grid.dataset.bound !== '1') {
          grid.addEventListener('click', function (event) {
            var card = event.target && event.target.closest ? event.target.closest('.trail-city-card') : null;
            if (!card) return;
            showCityResults(card.getAttribute('data-region') || '');
          });
          grid.dataset.bound = '1';
        }

        var backBtn = document.getElementById('trailBackToCitiesBtn');
        if (backBtn && backBtn.dataset.bound !== '1') {
          backBtn.addEventListener('click', showCitiesPage);
          backBtn.dataset.bound = '1';
        }

        var difficultyFilter = document.getElementById('trailResultDifficultyFilter');
        if (difficultyFilter && difficultyFilter.dataset.bound !== '1') {
          difficultyFilter.addEventListener('change', applyCityResultFilters);
          difficultyFilter.dataset.bound = '1';
        }

        var costFilter = document.getElementById('trailResultCostFilter');
        if (costFilter && costFilter.dataset.bound !== '1') {
          costFilter.addEventListener('change', applyCityResultFilters);
          costFilter.dataset.bound = '1';
        }

        var tagFilter = document.getElementById('trailResultTagFilter');
        if (tagFilter && tagFilter.dataset.bound !== '1') {
          tagFilter.addEventListener('input', applyCityResultFilters);
          tagFilter.dataset.bound = '1';
        }

        var clearFiltersBtn = document.getElementById('trailResultClearFiltersBtn');
        if (clearFiltersBtn && clearFiltersBtn.dataset.bound !== '1') {
          clearFiltersBtn.addEventListener('click', clearCityResultFilters);
          clearFiltersBtn.dataset.bound = '1';
        }
      }

      function initCityExplorerUi() {
        var trails = getTrailModels();
        cityExplorerState.allTrails = trails;
        cityExplorerState.cityBuckets = buildCityBuckets(trails);
        bindCityExplorerEvents();
        updateCityDriveButtonUi();

        var bootstrap = document.getElementById('trailExplorerBootstrap');
        var citiesPage = document.getElementById('trailCitiesPage');
        if (bootstrap) bootstrap.classList.add('hidden');
        if (citiesPage) citiesPage.classList.remove('hidden');

        renderCityCards();

        if (!cityExplorerState.cityBuckets.length) {
          var grid = document.getElementById('trailCityGrid');
          if (grid) {
            grid.innerHTML = '<div class="trail-empty" style="grid-column:1/-1;">No bike trails are available yet. Sign in and refresh bike trail data in your planner tab.</div>';
          }
        }
      }

      function loadScript(src) {
        return new Promise(function (resolve, reject) {
          var script = document.createElement('script');
          script.src = src;
          script.onload = resolve;
          script.onerror = reject;
          document.body.appendChild(script);
        });
      }

      async function bootTrailExplorerWindow() {
        try {
          var tabHtmlUrl = 'tabs/bike-trails-tab.html';
          var response = await fetch(tabHtmlUrl, { cache: 'no-store' });
          if (!response.ok) {
            throw new Error('Failed to load bike tab markup: ' + response.status + ' ' + response.statusText);
          }

          var html = await response.text();
          var root = document.getElementById('bikeTrailsTab');
          if (!root) throw new Error('Trail Explorer root mount not found');

          // Keep bike tab shell mounted but hidden; city-first UI controls when results become visible.
          root.innerHTML = html;
          root.classList.add('hidden');
          root.classList.remove('trail-city-results-mode');

          var header = document.getElementById('trailExplorerHeader');
          if (header) header.classList.add('is-visible');

          var loading = document.getElementById('trailExplorerBootstrap');
          if (loading) loading.classList.add('hidden');

          // Provide the same resolver signature used by opener logic.
          window.resolvePlannerPageUrl = window.resolvePlannerPageUrl || function (relativePath) {
            return new URL(relativePath, window.location.href).toString();
          };

          bindHeaderActions();

          await loadScript('../JS Files/bike-trails-tab-system.js');
          await loadScript('../JS Files/button-handlers.js');

          await waitFor(function () {
            return (Array.isArray(window.bikeTrailsData) && window.bikeTrailsData.length > 0)
              || (Array.isArray(window.bikeTrailExplorerModelsCache) && window.bikeTrailExplorerModelsCache.length > 0);
          }, 10000);

          initCityExplorerUi();
        } catch (error) {
          console.error('Trail Explorer window bootstrap failed:', error);
          setStatus('Trail Explorer failed to load. ' + (error && error.message ? error.message : 'Unknown error'));
        }
      }

      bootTrailExplorerWindow();
    })();
  </script>
</body>
</html>
