<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trail Explorer - Kyle's Adventure Finder</title>
  <link rel="stylesheet" href="../CSS/design-tokens.css" />
  <link rel="stylesheet" href="../CSS/components.css" />
  <link rel="stylesheet" href="../CSS/utilities.css" />
  <link rel="stylesheet" href="../CSS/browse-page.css" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
      color: #1f2937;
      padding: 20px;
      margin: 0;
    }

    #trailExplorerHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
      padding: 24px;
      border-radius: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }

    .trail-header-main h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1;
      letter-spacing: -0.4px;
    }

    .trail-header-subtitle {
      margin-top: 8px;
      opacity: 0.92;
      font-size: 14px;
    }

    .trail-header-actions {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    #trailExplorerCloseBtn {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: #fff;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 34px;
      line-height: 1;
      transition: all 0.2s;
    }

    #trailExplorerCloseBtn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    #trailExplorerBootstrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #6b7280;
      margin-bottom: 16px;
    }

    .hidden {
      display: none !important;
    }

    .trail-cities-controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 24px;
    }

    .trail-cities-input,
    .trail-cities-select,
    .trail-cities-btn {
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      background: #fff;
      color: #1f2937;
      min-height: 48px;
    }

    .trail-cities-input {
      flex: 1;
      min-width: 240px;
    }

    .trail-cities-btn {
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      background: #fff;
    }

    .trail-cities-btn:hover {
      border-color: #667eea;
      color: #667eea;
    }

    .trail-cities-btn.active {
      border-color: #667eea;
      background: #667eea;
      color: #fff;
    }

    .trail-city-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 12px;
    }

    .trail-city-card {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
      background: #fff;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
      text-align: left;
    }

    .trail-city-card:hover {
      border-color: #667eea;
      box-shadow: 0 10px 25px rgba(102,126,234,0.15);
      transform: translateY(-4px);
    }

    .trail-city-name {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1f2937;
    }

    .trail-city-meta {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 12px;
    }

    .trail-city-stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }

    .trail-city-stat {
      background: #f3f4f6;
      border-radius: 8px;
      padding: 12px;
      min-height: 74px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .trail-city-chip-label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .trail-city-chip-value {
      display: block;
      font-size: 32px;
      line-height: 1;
      color: #667eea;
      font-weight: 700;
    }

    .trail-city-chip-value.is-drive {
      font-size: 15px;
      line-height: 1.2;
      color: #4b5563;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .trail-city-grid {
        gap: 14px;
      }

      .trail-city-card {
        padding: 16px;
      }

      .trail-city-name {
        font-size: 28px;
        margin-bottom: 6px;
      }

      .trail-city-meta {
        margin-bottom: 10px;
      }

      .trail-city-stats {
        gap: 10px;
      }

      .trail-city-stat {
        padding: 10px;
        min-height: 66px;
      }

      .trail-city-stat-drive {
        grid-column: 1 / -1;
      }

      .trail-city-chip-label {
        font-size: 12px;
        margin-bottom: 3px;
      }

      .trail-city-chip-value {
        font-size: 28px;
      }

      .trail-city-chip-value.is-drive {
        font-size: 14px;
      }
    }

    .trail-city-cta {
      width: 100%;
      border: none;
      border-radius: 8px;
      background: #667eea;
      color: #fff;
      padding: 12px 16px;
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      margin-top: auto;
    }

    .trail-results-hero {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 20px 24px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .trail-results-title {
      font-size: 30px;
      font-weight: 800;
      color: #fff;
    }

    .trail-results-subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.9);
      margin-top: 2px;
    }

    .trail-results-back {
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
    }

    .trail-results-back:hover {
      background: rgba(255,255,255,0.35);
    }

    .trail-results-filters {
      margin-bottom: 14px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px 20px;
    }

    .trail-presets-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid #f3f4f6;
    }

    .trail-preset-input,
    .trail-preset-select {
      padding: 7px 10px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 12px;
      min-width: 140px;
      background: #fff;
      color: #374151;
    }

    .trail-mini-btn {
      padding: 7px 10px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      background: #fff;
      color: #111827;
      cursor: pointer;
    }

    .trail-mini-btn:hover {
      border-color: #667eea;
      color: #667eea;
    }

    .trail-mini-btn.success {
      border-color: #86efac;
      color: #166534;
    }

    .trail-results-controls-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }

    .trail-results-filters label {
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
      display: block;
    }

    .trail-results-filter-input,
    .trail-results-filter-select {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      background: #fff;
      color: #111827;
    }

    .trail-results-clear-btn {
      border: 1px solid #fecaca;
      color: #b91c1c;
      background: #fff;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      align-self: end;
    }

    .trail-results-clear-btn:hover {
      background: #fef2f2;
    }

    .trail-quick-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      margin-bottom: 10px;
    }

    .trail-tag-btn {
      padding: 6px 14px;
      border-radius: 999px;
      border: 2px solid #e5e7eb;
      background: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: #374151;
    }

    .trail-tag-btn:hover {
      border-color: #667eea;
      color: #667eea;
    }

    .trail-tag-btn.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-color: transparent;
      color: #fff;
    }

    .trail-results-bottom-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      border-top: 1px solid #f3f4f6;
      padding-top: 10px;
    }

    .trail-empty {
      border: 1px dashed #d1d5db;
      border-radius: 12px;
      padding: 24px;
      color: #6b7280;
      background: #fff;
      text-align: center;
    }

    /* Standalone trail explorer keeps only cards + pagination when viewing a city. */
    #bikeTrailsTab.trail-city-results-mode > header,
    #bikeTrailsTab.trail-city-results-mode > #bikeControlPanelCard,
    #bikeTrailsTab.trail-city-results-mode > #bikeQuickFiltersCard,
    #bikeTrailsTab.trail-city-results-mode > #bikeBreadcrumbFilterMenu,
    #bikeTrailsTab.trail-city-results-mode > div[style*="padding: 8px 0"],
    #bikeTrailsTab.trail-city-results-mode #bikeTrailExplorerModal {
      display: none !important;
    }

    #bikeTrailsTab.trail-city-results-mode .table-card > .card-header {
      padding-top: 8px;
      padding-bottom: 8px;
    }

    #bikeTrailsTab.trail-city-results-mode .table-card .card-subtitle,
    #bikeTrailsTab.trail-city-results-mode #bikeMetadataDebugLine {
      display: none !important;
    }

    #bikeTrailsTab.trail-city-results-mode .table-card {
      background: transparent;
      border: none;
      box-shadow: none;
      padding: 0;
      margin: 0;
    }

    #bikeTrailsTab.trail-city-results-mode .table-card > .card-header {
      display: none;
    }

    #bikeTrailsTab.trail-city-results-mode .view-controls {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      margin-bottom: 16px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    #bikeTrailsTab.trail-city-results-mode .sort-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    #bikeTrailsTab.trail-city-results-mode .sort-label {
      font-size: 12px;
      color: #6b7280;
      font-weight: 600;
    }

    #bikeTrailsTab.trail-city-results-mode .sort-select,
    #bikeTrailsTab.trail-city-results-mode .sort-order-btn {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #fff;
    }

    #bikeTrailsTab.trail-city-results-mode .sort-order-btn {
      width: 34px;
      height: 34px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    #bikeTrailsTab.trail-city-results-mode .trail-sort-reset-btn {
      padding: 7px 14px;
      background: #fff;
      border: 1px solid #fca5a5;
      color: #dc2626;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      transition: all 0.2s;
    }

    #bikeTrailsTab.trail-city-results-mode .trail-sort-reset-btn:hover {
      background: #fef2f2;
    }

    #bikeTrailsTab.trail-city-results-mode .results-count {
      margin-left: auto;
      font-size: 13px;
      color: #6b7280;
      font-weight: 600;
    }

    #bikeTrailsTab.trail-city-results-mode .adventure-cards-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 0;
    }

    #bikeTrailsTab.trail-city-results-mode .loc-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 18px 20px;
      transition: all 0.2s;
      cursor: pointer;
      box-shadow: none;
      animation: none;
      transform: none;
    }

    #bikeTrailsTab.trail-city-results-mode .loc-card:hover {
      border-color: #667eea;
      box-shadow: 0 6px 20px rgba(102,126,234,0.15);
      transform: translateY(-2px);
    }

    #bikeTrailsTab.trail-city-results-mode .loc-card::before {
      display: none;
    }

    #bikeTrailsTab.trail-city-results-mode .loc-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    #bikeTrailsTab.trail-city-results-mode .loc-card-name {
      font-size: 16px;
      font-weight: 700;
      color: #1f2937;
      flex: 1;
    }

    #bikeTrailsTab.trail-city-results-mode .loc-card-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    #bikeTrailsTab.trail-city-results-mode .loc-meta-badge {
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      background: #f3f4f6;
      color: #374151;
    }

    #bikeTrailsTab.trail-city-results-mode .loc-meta-badge.cost {
      background: #ecfdf5;
      color: #065f46;
    }

    #bikeTrailsTab.trail-city-results-mode .loc-meta-badge.rating {
      background: #fffbeb;
      color: #92400e;
    }

    #bikeTrailsTab.trail-city-results-mode .loc-card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 10px;
      padding: 0;
      min-height: 0;
      background: transparent;
    }

    #bikeTrailsTab.trail-city-results-mode .loc-tag-pill {
      background: #dbeafe;
      color: #1e40af;
      padding: 3px 9px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }

    #bikeTrailsTab.trail-city-results-mode .loc-card-details {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 6px;
      font-size: 13px;
      color: #6b7280;
    }

    #bikeTrailsTab.trail-city-results-mode .loc-detail-row {
      display: flex;
      gap: 6px;
      align-items: baseline;
    }

    #bikeTrailsTab.trail-city-results-mode .loc-detail-icon {
      width: 16px;
      flex-shrink: 0;
    }

    #bikeTrailsTab.trail-city-results-mode .loc-detail-value {
      color: #374151;
    }

    #bikeTrailsTab.trail-city-results-mode .loc-card-description {
      font-size: 13px;
      color: #6b7280;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #f3f4f6;
      line-height: 1.5;
    }

    #bikeTrailsTab.trail-city-results-mode .loc-card-footer {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #f3f4f6;
      background: transparent;
      flex-direction: row;
    }

    #bikeTrailsTab.trail-city-results-mode .loc-action-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      background: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: #374151;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    #bikeTrailsTab.trail-city-results-mode .loc-action-btn:hover {
      border-color: #667eea;
      color: #667eea;
      background: #f0f4ff;
    }
  </style>
</head>
<body>
  <header id="trailExplorerHeader">
    <div class="trail-header-main">
      <h1>🗺️ Trail Explorer</h1>
      <div class="trail-header-subtitle">Explore bike trails grouped by city</div>
    </div>
    <div class="trail-header-actions">
      <button id="trailExplorerCloseBtn" type="button" title="Close this tab">×</button>
    </div>
  </header>

  <div id="trailExplorerBootstrap">
    <div class="spinner" aria-hidden="true"></div>
    Loading Trail Explorer...
  </div>

  <section id="trailCitiesPage" class="hidden">
    <div class="trail-cities-controls">
      <input id="trailCitySearchInput" class="trail-cities-input" type="text" placeholder="Search regions..." />
      <select id="trailCitySortSelect" class="trail-cities-select" aria-label="Sort regions">
        <option value="count">Sort by Region Count</option>
        <option value="name">Sort Regions A-Z</option>
        <option value="drive">Sort by Drive Time</option>
      </select>
      <button id="trailCityDriveTimesBtn" type="button" class="trail-cities-btn">📍 Show my drive times</button>
    </div>
    <div id="trailCityGrid" class="trail-city-grid"></div>
  </section>

  <section id="trailCityResultsPage" class="hidden">
    <div class="trail-results-hero">
      <button id="trailBackToCitiesBtn" class="trail-results-back" type="button">← Back</button>
      <div class="trail-results-hero-copy">
        <div id="trailResultsTitle" class="trail-results-title">City Trails</div>
        <div id="trailResultsSubtitle" class="trail-results-subtitle"></div>
      </div>
    </div>

    <div class="trail-results-filters">
      <div class="trail-presets-row">
        <input id="trailPresetName" class="trail-preset-input" type="text" placeholder="Preset name..." />
        <select id="trailPresetScope" class="trail-preset-select">
          <option value="city">Region Preset</option>
          <option value="global">Global Preset</option>
        </select>
        <button id="trailPresetSaveBtn" type="button" class="trail-mini-btn">Save Preset</button>
        <select id="trailPresetSelect" class="trail-preset-select">
          <option value="">Saved presets...</option>
        </select>
        <button id="trailPresetLoadBtn" type="button" class="trail-mini-btn">Load</button>
        <button id="trailPresetDeleteBtn" type="button" class="trail-mini-btn">Delete</button>
        <button id="trailCopyShareBtn" type="button" class="trail-mini-btn">Copy Share Link</button>
      </div>

      <div class="trail-results-controls-grid">
        <div>
          <label for="trailResultDifficultyFilter">Difficulty</label>
          <select id="trailResultDifficultyFilter" class="trail-results-filter-select">
            <option value="">Any Difficulty</option>
          </select>
        </div>
        <div>
          <label for="trailResultCostFilter">Cost</label>
          <select id="trailResultCostFilter" class="trail-results-filter-select">
            <option value="">Any Cost</option>
          </select>
        </div>
        <div>
          <label for="trailResultTagFilter">Filter by Tag</label>
          <input id="trailResultTagFilter" class="trail-results-filter-input" type="text" placeholder="e.g. scenic, gravel" list="trailResultTagList" />
          <datalist id="trailResultTagList"></datalist>
        </div>
      </div>

      <div id="trailResultQuickTags" class="trail-quick-tags"></div>

      <div class="trail-results-bottom-row">
        <button id="trailResultClearFiltersBtn" type="button" class="trail-results-clear-btn">Reset Filters</button>
      </div>
    </div>
  </section>

  <main id="bikeTrailsTab" class="hidden"></main>

  <script>
    (function () {
      var BASE_TITLE = 'Trail Explorer - Kyle\'s Adventure Finder';
      var COL = {
        name: 0,
        region: 1,
        driveTime: 2,
        lengthMiles: 3,
        surface: 4,
        difficulty: 6,
        vibes: 12,
        moodTags: 13,
        state: 66,
        city: 67,
        cost: 68,
        gpsCoordinates: 41
      };
      var TRAIL_CITY_PRESETS_KEY_PREFIX = 'trailExplorer:cityResultPresets:v1:';
      var TRAIL_GLOBAL_PRESETS_KEY = 'trailExplorer:cityResultPresets:global:v1';
      var cityExplorerState = {
        allTrails: [],
        cityBuckets: [],
        selectedRegion: null,
        userLocation: null,
        hasDriveTimes: false,
        activeResultQuickTag: null,
        pendingShareState: null
      };

      function setStatus(message) {
        var el = document.getElementById('trailExplorerBootstrap');
        if (el) el.textContent = message;
      }

      function bindHeaderActions() {
        var closeBtn = document.getElementById('trailExplorerCloseBtn');
        if (!closeBtn || closeBtn.dataset.bound === '1') return;
        closeBtn.addEventListener('click', function () {
          var fallback = typeof window.resolvePlannerPageUrl === 'function'
            ? window.resolvePlannerPageUrl('index.html')
            : '../index.html';
          window.close();
          setTimeout(function () {
            if (window.history.length > 1) {
              window.history.back();
            } else {
              window.location.href = fallback;
            }
          }, 120);
        });
        closeBtn.dataset.bound = '1';
      }

      function parseDriveMinutes(value) {
        var text = String(value || '').trim().toLowerCase();
        if (!text) return 0;
        if (/^\d+$/.test(text)) return Number(text);

        var hoursMatch = text.match(/(\d+(?:\.\d+)?)\s*h/);
        var minsMatch = text.match(/(\d+(?:\.\d+)?)\s*m/);
        if (hoursMatch || minsMatch) {
          var hours = hoursMatch ? Number(hoursMatch[1]) : 0;
          var mins = minsMatch ? Number(minsMatch[1]) : 0;
          return Math.round((hours * 60) + mins);
        }

        var colon = text.match(/^(\d{1,2}):(\d{2})$/);
        if (colon) return (Number(colon[1]) * 60) + Number(colon[2]);
        return 0;
      }

      function esc(value) {
        return String(value == null ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function normalizePresetName(value) {
        return String(value || '').trim();
      }

      function getRegionPresetStorageKey() {
        var key = normalizeLocationText(cityExplorerState.selectedRegion || 'unknown-region').replace(/[^a-z0-9_-]+/g, '-');
        return TRAIL_CITY_PRESETS_KEY_PREFIX + key;

      function readTrailPresets(storageKey) {
        try {
          var raw = window.localStorage.getItem(storageKey);
          var parsed = raw ? JSON.parse(raw) : {};
          if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) return parsed;
        } catch (_) {}
        return {};

      function writeTrailPresets(storageKey, presets) {

        var difficulty = document.getElementById('trailResultDifficultyFilter');

          options.push('</optgroup>');

        if (v.indexOf('global::') === 0) return { scope: 'global', name: v.slice(8) };
        return { scope: 'city', name: v };

      function collectTrailQuickTags(cityTrails) {
        var counts = {};
        (cityTrails || []).forEach(function (trail) {
          [trail.surface, trail.moodTags, trail.vibes].forEach(function (value) {
            String(value || '').split(',').forEach(function (rawTag) {
              var clean = String(rawTag || '').trim().toLowerCase();
              if (!clean) return;
              counts[clean] = (counts[clean] || 0) + 1;
            });
          });
        });
        return Object.keys(counts)
          .sort(function (a, b) {
            if (counts[b] !== counts[a]) return counts[b] - counts[a];
            return a.localeCompare(b);
          })
          .slice(0, 12);
      }

      function encodeShareState(stateObj) {
        try {
          return btoa(encodeURIComponent(JSON.stringify(stateObj || {})))
            .replace(/\+/g, '-')
            .replace(/\//g, '_')
            .replace(/=+$/g, '');
        } catch (_) {
          return '';
        }
      }

      function decodeShareState(raw) {
        try {
          if (!raw) return null;
          var normalized = String(raw).replace(/-/g, '+').replace(/_/g, '/');
          var json = decodeURIComponent(atob(normalized));
          return JSON.parse(json);
        } catch (_) {
          return null;
        }
      }

      function parseTrailShareStateFromUrl() {
        var params = new URLSearchParams(window.location.search || '');
        var raw = params.get('tes');
        return decodeShareState(raw);
      }

      function buildTrailShareLink() {
        var payload = {
          region: cityExplorerState.selectedRegion || '',
          filters: getTrailResultFilterState()
        };
        var encoded = encodeShareState(payload);
        var url = new URL(window.location.href);
        if (encoded) {
          url.searchParams.set('tes', encoded);
        }
        return url.toString();
      }

      function copyTrailShareLink() {
        var btn = document.getElementById('trailCopyShareBtn');
        var link = buildTrailShareLink();
        if (!link) return;

        Promise.resolve(
          navigator.clipboard && navigator.clipboard.writeText
            ? navigator.clipboard.writeText(link)
            : Promise.reject(new Error('Clipboard unavailable'))
        ).then(function () {
          if (!btn) return;
          btn.classList.add('success');
          btn.textContent = 'Copied!';
          setTimeout(function () {
            btn.classList.remove('success');
            btn.textContent = 'Copy Share Link';
          }, 1200);
        }).catch(function () {
          window.prompt('Copy this link:', link);
        });
      }

      function waitFor(checkFn, timeoutMs) {
        var started = Date.now();
        return new Promise(function (resolve) {
          (function poll() {
            if (checkFn()) {
              resolve(true);
              return;
            }
            if (Date.now() - started >= timeoutMs) {
              resolve(false);
              return;
            }
            setTimeout(poll, 120);
          })();
        });
      }

      function mapRowToTrail(row, idx) {
        var values = row && row.values && Array.isArray(row.values[0]) ? row.values[0] : [];
        return {
          id: 'fallback:' + idx,
          name: values[COL.name] || '',
          region: values[COL.region] || '',
          driveTime: values[COL.driveTime] || '',
          driveMinutes: parseDriveMinutes(values[COL.driveTime]),
          lengthMiles: Number(values[COL.lengthMiles] || 0),
          surface: values[COL.surface] || '',
          difficulty: values[COL.difficulty] || '',
          vibes: values[COL.vibes] || '',
          moodTags: values[COL.moodTags] || '',
          state: values[COL.state] || '',
          city: values[COL.city] || '',
          cost: values[COL.cost] || '',
          gpsCoordinates: values[COL.gpsCoordinates] || ''
        };
      }

      function getTrailModels() {
        if (typeof window.getAllBikeTrailModels === 'function') {
          var models = window.getAllBikeTrailModels() || [];
          if (Array.isArray(models) && models.length) {
            return models.map(function (trail) {
              var copy = Object.assign({}, trail || {});
              delete copy.row;
              return copy;
            });
          }
        }

        if (Array.isArray(window.bikeTrailExplorerModelsCache) && window.bikeTrailExplorerModelsCache.length) {
          return window.bikeTrailExplorerModelsCache.slice();
        }

        if (Array.isArray(window.bikeTrailsData) && window.bikeTrailsData.length) {
          return window.bikeTrailsData.map(mapRowToTrail);
        }

        return [];
      }

      function getRegionKey(region) {
        var value = String(region || '').trim();
        return value || 'Unknown Region';
      }

      function buildCityBuckets(trails) {
        var grouped = {};
        (trails || []).forEach(function (trail) {
          var region = String((trail && trail.region) || '').trim();
          var key = getRegionKey(region);
          if (!grouped[key]) {
            grouped[key] = {
              key: key,
              region: region || 'Unknown Region',
              rawRegion: region,
              count: 0,
              driveMinutesTotal: 0,
              trailsWithDrive: 0,
              distanceMiles: null,
              driveTimeLabel: ''
            };
          }
          grouped[key].count += 1;
          var drive = Number((trail && trail.driveMinutes) || 0);
          if (drive > 0) {
            grouped[key].driveMinutesTotal += drive;
            grouped[key].trailsWithDrive += 1;
          }
        });

        return Object.keys(grouped).map(function (key) {
          var bucket = grouped[key];
          bucket.avgDriveMinutes = bucket.trailsWithDrive
            ? Math.round(bucket.driveMinutesTotal / bucket.trailsWithDrive)
            : 0;
          return bucket;
        });
      }

      function normalizeLocationText(value) {
        return String(value || '').trim().toLowerCase();
      }

      function parseGpsCoordinates(value) {
        var text = String(value || '').trim();
        if (!text) return null;
        var match = text.match(/^\s*(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)\s*$/);
        if (!match) return null;
        var lat = Number(match[1]);
        var lng = Number(match[2]);
        if (!isFinite(lat) || !isFinite(lng)) return null;
        return { lat: lat, lng: lng };
      }

      function haversineMiles(aLat, aLng, bLat, bLng) {
        var R = 3959;
        var dLat = (bLat - aLat) * Math.PI / 180;
        var dLng = (bLng - aLng) * Math.PI / 180;
        var x = Math.sin(dLat / 2) * Math.sin(dLat / 2)
          + Math.cos(aLat * Math.PI / 180) * Math.cos(bLat * Math.PI / 180)
          * Math.sin(dLng / 2) * Math.sin(dLng / 2);
        var c = 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
        return R * c;
      }

      function estimateDriveTimeText(distanceMiles) {
        var hours = distanceMiles / 60;
        var whole = Math.floor(hours);
        var mins = Math.round((hours - whole) * 60);
        if (whole <= 0) return mins + 'm (' + distanceMiles.toFixed(1) + ' mi)';
        return whole + 'h ' + mins + 'm (' + distanceMiles.toFixed(1) + ' mi)';
      }

      function applyCityDriveTimesFromUserLocation() {
        var userLoc = cityExplorerState.userLocation;
        if (!userLoc || !isFinite(userLoc.lat) || !isFinite(userLoc.lng)) return;

        cityExplorerState.cityBuckets.forEach(function (bucket) {
          var matches = cityExplorerState.allTrails.filter(function (trail) {
            return normalizeLocationText(trail.region) === normalizeLocationText(bucket.region);
          });
          var trailWithCoords = matches.find(function (trail) {
            return !!parseGpsCoordinates(trail.gpsCoordinates);
          });
          if (!trailWithCoords) {
            bucket.distanceMiles = null;
            bucket.driveTimeLabel = 'Drive time unavailable';
            return;
          }
          var point = parseGpsCoordinates(trailWithCoords.gpsCoordinates);
          if (!point) {
            bucket.distanceMiles = null;
            bucket.driveTimeLabel = 'Drive time unavailable';
            return;
          }
          var miles = haversineMiles(userLoc.lat, userLoc.lng, point.lat, point.lng);
          bucket.distanceMiles = miles;
          bucket.driveTimeLabel = estimateDriveTimeText(miles);
        });
      }

      function updateCityDriveButtonUi() {
        var btn = document.getElementById('trailCityDriveTimesBtn');
        if (!btn) return;
        if (cityExplorerState.hasDriveTimes) {
          btn.classList.add('active');

        } else {

      function renderCityCards() {
        var searchInput = document.getElementById('trailCitySearchInput');
        var sortSelect = document.getElementById('trailCitySortSelect');
        var search = String(searchInput ? searchInput.value : '').trim().toLowerCase();
        var sort = String(sortSelect ? sortSelect.value : 'count');
        var grid = document.getElementById('trailCityGrid');
        if (!grid) return;

        var cards = cityExplorerState.cityBuckets.slice();
        if (search) {
          cards = cards.filter(function (bucket) {
            return bucket.region.toLowerCase().includes(search);
          });
        }

        if (sort === 'name') {
          cards.sort(function (a, b) { return a.key.localeCompare(b.key); });
        } else if (sort === 'drive') {
          cards.sort(function (a, b) {
            var aMiles = isFinite(a.distanceMiles) ? a.distanceMiles : Number.POSITIVE_INFINITY;
            var bMiles = isFinite(b.distanceMiles) ? b.distanceMiles : Number.POSITIVE_INFINITY;
            if (aMiles !== bMiles) return aMiles - bMiles;
            return a.key.localeCompare(b.key);
          });
        } else {
          cards.sort(function (a, b) {
            if (b.count !== a.count) return b.count - a.count;
            return a.key.localeCompare(b.key);
          });
        }

        if (!cards.length) {
          grid.innerHTML = '<div class="trail-empty" style="grid-column:1/-1;">No regions match your search.</div>';
          return;
        }

        grid.innerHTML = cards.map(function (bucket) {
          var avgDrive = bucket.avgDriveMinutes > 0 ? (bucket.avgDriveMinutes + ' min avg') : 'Drive time unavailable';
          var driveChip = cityExplorerState.hasDriveTimes
            ? (bucket.driveTimeLabel || 'Drive time unavailable')
            : avgDrive;
          return '' +
            '<button type="button" class="trail-city-card" data-region="' + esc(bucket.rawRegion) + '">' +
              '<div class="trail-city-name">' + esc(bucket.region || 'Unknown Region') + '</div>' +
              '<div class="trail-city-meta">Region</div>' +
              '<div class="trail-city-stats">' +
                '<div class="trail-city-stat">' +
                  '<span class="trail-city-chip-label">📍 Locations</span>' +
                  '<span class="trail-city-chip-value">' + esc(String(bucket.count)) + '</span>' +
                '</div>' +
                (cityExplorerState.hasDriveTimes
                  ? ('<div class="trail-city-stat trail-city-stat-drive">' +
                      '<span class="trail-city-chip-label">🚗 Drive Time</span>' +
                      '<span class="trail-city-chip-value is-drive">' + esc(driveChip) + '</span>' +
                    '</div>')
                  : '') +
              '</div>' +
              '<div class="trail-city-cta">View Locations</div>' +
            '</button>';
        }).join('');
      }

      function populateCityResultFilters() {
        var cityTrails = getSelectedCityTrails();
        var difficultyEl = document.getElementById('trailResultDifficultyFilter');
        var costEl = document.getElementById('trailResultCostFilter');
        var tagList = document.getElementById('trailResultTagList');

        var difficulties = {};
        var costs = {};
        var tags = {};

        cityTrails.forEach(function (trail) {
          var difficulty = String(trail.difficulty || '').trim();
          var cost = String(trail.cost || '').trim();
          if (difficulty) difficulties[difficulty.toLowerCase()] = difficulty;
          if (cost) costs[cost.toLowerCase()] = cost;

          [trail.surface, trail.moodTags, trail.vibes].forEach(function (value) {
            String(value || '').split(',').forEach(function (rawTag) {
              var clean = String(rawTag || '').trim();
              if (!clean) return;
              tags[clean.toLowerCase()] = clean;
            });
          });

        var difficultyOptions = Object.keys(difficulties).sort().map(function (key) {

          var val = costs[key];
          return '<option value="' + esc(val) + '">' + esc(val) + '</option>';
        }).join('');

        var tagOptions = Object.keys(tags).sort().slice(0, 100).map(function (key) {

        }).join('');

        difficultyEl.innerHTML = '<option value="">Any Difficulty</option>' + difficultyOptions;

        document.title = 'Trail Explorer - ' + (title ? title.textContent : cityExplorerState.selectedRegion);
      }

      function showCitiesPage() {
        var resultsPage = document.getElementById('trailCityResultsPage');
        var citiesPage = document.getElementById('trailCitiesPage');
        var tabRoot = document.getElementById('bikeTrailsTab');
        if (resultsPage) resultsPage.classList.add('hidden');
        if (citiesPage) citiesPage.classList.remove('hidden');
        if (tabRoot) {
          tabRoot.classList.add('hidden');
          tabRoot.classList.remove('trail-city-results-mode');
        }
        cityExplorerState.activeResultQuickTag = null;
        updateTrailQuickTagUi();
        clearCityResultFilters();
        document.title = BASE_TITLE;
      }

      function bindCityExplorerEvents() {
        var search = document.getElementById('trailCitySearchInput');
        if (search && search.dataset.bound !== '1') {
          search.addEventListener('input', renderCityCards);
          search.dataset.bound = '1';
        }

        var sort = document.getElementById('trailCitySortSelect');
        if (sort && sort.dataset.bound !== '1') {
          sort.addEventListener('change', renderCityCards);
          sort.dataset.bound = '1';
        }

        var driveBtn = document.getElementById('trailCityDriveTimesBtn');
        if (driveBtn && driveBtn.dataset.bound !== '1') {
          driveBtn.addEventListener('click', function () {
            if (!navigator.geolocation) {
              window.alert('Geolocation is not supported by this browser.');
              return;
            }

            driveBtn.disabled = true;
            driveBtn.textContent = '📍 Getting location...';
            navigator.geolocation.getCurrentPosition(function (position) {
              cityExplorerState.userLocation = {
                lat: position.coords.latitude,
                lng: position.coords.longitude
              };
              cityExplorerState.hasDriveTimes = true;
              applyCityDriveTimesFromUserLocation();
              updateCityDriveButtonUi();
              renderCityCards();
              driveBtn.disabled = false;
            }, function () {
              driveBtn.disabled = false;
              cityExplorerState.hasDriveTimes = false;
              updateCityDriveButtonUi();
              window.alert('Could not get your location. Please check browser permissions.');
            });
          });
          driveBtn.dataset.bound = '1';
        }

        var grid = document.getElementById('trailCityGrid');
        if (grid && grid.dataset.bound !== '1') {
          grid.addEventListener('click', function (event) {
            var card = event.target && event.target.closest ? event.target.closest('.trail-city-card') : null;
            if (!card) return;
            showCityResults(card.getAttribute('data-region') || '');
          });
          grid.dataset.bound = '1';
        }

        var backBtn = document.getElementById('trailBackToCitiesBtn');
        if (backBtn && backBtn.dataset.bound !== '1') {
          backBtn.addEventListener('click', showCitiesPage);
          backBtn.dataset.bound = '1';
        }

        var difficultyFilter = document.getElementById('trailResultDifficultyFilter');
        if (difficultyFilter && difficultyFilter.dataset.bound !== '1') {
          difficultyFilter.addEventListener('change', applyCityResultFilters);
          difficultyFilter.dataset.bound = '1';
        }

        var costFilter = document.getElementById('trailResultCostFilter');
        if (costFilter && costFilter.dataset.bound !== '1') {
          costFilter.addEventListener('change', applyCityResultFilters);
          costFilter.dataset.bound = '1';
        }

        var tagFilter = document.getElementById('trailResultTagFilter');
        if (tagFilter && tagFilter.dataset.bound !== '1') {
          tagFilter.addEventListener('input', function () {
            if (!String(tagFilter.value || '').trim()) {
              cityExplorerState.activeResultQuickTag = null;
              updateTrailQuickTagUi();
            }
            applyCityResultFilters();
          });
          tagFilter.dataset.bound = '1';
        }

        var quickTags = document.getElementById('trailResultQuickTags');
        if (quickTags && quickTags.dataset.bound !== '1') {
          quickTags.addEventListener('click', function (event) {
            var btn = event.target && event.target.closest ? event.target.closest('.trail-tag-btn') : null;
            if (!btn) return;
            toggleTrailQuickTag(btn.getAttribute('data-tag') || '');
          });
          quickTags.dataset.bound = '1';
        }

        var clearFiltersBtn = document.getElementById('trailResultClearFiltersBtn');
        if (clearFiltersBtn && clearFiltersBtn.dataset.bound !== '1') {
          clearFiltersBtn.addEventListener('click', clearCityResultFilters);
          clearFiltersBtn.dataset.bound = '1';
        }

        var savePresetBtn = document.getElementById('trailPresetSaveBtn');
        if (savePresetBtn && savePresetBtn.dataset.bound !== '1') {
          savePresetBtn.addEventListener('click', saveTrailResultPreset);
          savePresetBtn.dataset.bound = '1';
        }

        var loadPresetBtn = document.getElementById('trailPresetLoadBtn');
        if (loadPresetBtn && loadPresetBtn.dataset.bound !== '1') {
          loadPresetBtn.addEventListener('click', loadSelectedTrailResultPreset);
          loadPresetBtn.dataset.bound = '1';
        }

        var deletePresetBtn = document.getElementById('trailPresetDeleteBtn');
        if (deletePresetBtn && deletePresetBtn.dataset.bound !== '1') {
          deletePresetBtn.addEventListener('click', deleteSelectedTrailResultPreset);
          deletePresetBtn.dataset.bound = '1';
        }

        var copyShareBtn = document.getElementById('trailCopyShareBtn');
        if (copyShareBtn && copyShareBtn.dataset.bound !== '1') {
          copyShareBtn.addEventListener('click', copyTrailShareLink);
          copyShareBtn.dataset.bound = '1';
        }
      }

      function initCityExplorerUi() {
        var trails = getTrailModels();
        cityExplorerState.allTrails = trails;
        cityExplorerState.cityBuckets = buildCityBuckets(trails);
        bindCityExplorerEvents();
        updateCityDriveButtonUi();

        var bootstrap = document.getElementById('trailExplorerBootstrap');
        var citiesPage = document.getElementById('trailCitiesPage');
        if (bootstrap) bootstrap.classList.add('hidden');
        if (citiesPage) citiesPage.classList.remove('hidden');

        renderCityCards();

        if (cityExplorerState.pendingShareState && cityExplorerState.pendingShareState.region) {
          showCityResults(cityExplorerState.pendingShareState.region);
          return;
        }

        if (!cityExplorerState.cityBuckets.length) {
          var grid = document.getElementById('trailCityGrid');
          if (grid) {
            grid.innerHTML = '<div class="trail-empty" style="grid-column:1/-1;">No bike trails are available yet. Sign in and refresh bike trail data in your planner tab.</div>';
          }
        }
      }

      function loadScript(src) {
        return new Promise(function (resolve, reject) {
          var script = document.createElement('script');
          script.src = src;
          script.onload = resolve;
          script.onerror = reject;
          document.body.appendChild(script);
        });
      }

      async function bootTrailExplorerWindow() {
        try {
          var tabHtmlUrl = 'tabs/bike-trails-tab.html';
          var response = await fetch(tabHtmlUrl, { cache: 'no-store' });
          if (!response.ok) {
            throw new Error('Failed to load bike tab markup: ' + response.status + ' ' + response.statusText);
          }

          var html = await response.text();
          var root = document.getElementById('bikeTrailsTab');
          if (!root) throw new Error('Trail Explorer root mount not found');

          // Keep bike tab shell mounted but hidden; city-first UI controls when results become visible.
          root.innerHTML = html;
          root.classList.add('hidden');
          root.classList.remove('trail-city-results-mode');

          var header = document.getElementById('trailExplorerHeader');
          if (header) header.classList.add('is-visible');

          var loading = document.getElementById('trailExplorerBootstrap');
          if (loading) loading.classList.add('hidden');

          // Provide the same resolver signature used by opener logic.
          window.resolvePlannerPageUrl = window.resolvePlannerPageUrl || function (relativePath) {
            var rel = String(relativePath || '').replace(/^\/+/, '');
            var pathname = window.location.pathname || '/';
            var marker = '/kylesadventureplanner/';
            var markerIdx = pathname.toLowerCase().indexOf(marker);
            var basePath = '/';

            if (markerIdx >= 0) {
              basePath = pathname.slice(0, markerIdx + marker.length);
            } else {
              var slashIdx = pathname.lastIndexOf('/');
              basePath = slashIdx >= 0 ? pathname.slice(0, slashIdx + 1) : '/';
            }

            var origin = window.location.origin && window.location.origin !== 'null' ? window.location.origin : '';
            var baseUrl = origin ? (origin + basePath) : window.location.href;
            return new URL(encodeURI(rel), baseUrl).toString();
           };

          bindHeaderActions();
          cityExplorerState.pendingShareState = parseTrailShareStateFromUrl();

          await loadScript('../JS Files/bike-trails-tab-system.js');
          await loadScript('../JS Files/button-handlers.js');

          await waitFor(function () {
            return (Array.isArray(window.bikeTrailsData) && window.bikeTrailsData.length > 0)
              || (Array.isArray(window.bikeTrailExplorerModelsCache) && window.bikeTrailExplorerModelsCache.length > 0);
          }, 10000);

          initCityExplorerUi();
        } catch (error) {
          console.error('Trail Explorer window bootstrap failed:', error);
          setStatus('Trail Explorer failed to load. ' + (error && error.message ? error.message : 'Unknown error'));
        }
      }

      bootTrailExplorerWindow();
    })();
  </script>
  <script src="../JS Files/button-reliability-system.js"></script>
</body>
</html>
