<!-- ADVENTURE PLANNER TAB CONTENT -->
<!-- This file is loaded dynamically by tab-content-loader.js -->
<!-- All CSS, JS, and functions are available from the main index -->

<header>
  <h1>Adventure Planner</h1>
  <div style="display: flex; gap: 8px; align-items: center;">
    <button id="iphoneToggleBtn" class="iphone-toggle-btn" title="Switch to iPhone mobile view" data-tooltip="Switch to iPhone mobile view">
      📱 iPhone View
    </button>
  </div>
</header>

<!-- Filters Active Badge -->
<div style="padding: 8px 0; margin-bottom: 8px;">
  <span id="filtersActiveBadge" class="filters-active-badge">Filters Active</span>
</div>

<!-- Control Panel Card -->
<div id="controlPanelCard" class="card control-panel-card">
  <div class="card-header">
    <div class="card-title">
      🎛️ Control Panel
    </div>
    <div style="display: flex; gap: 8px; flex-wrap: wrap;">
      <button id="findNearMeBtn" class="find-near-me-btn" title="Find adventures near your current location" data-tooltip="Find adventures near your current location">
        📍 Find Near Me
      </button>
      <button id="resetAllFiltersTop" class="pill-button reset" title="Clear all applied filters" data-tooltip="Clear all applied filters">Reset All Filters</button>
    </div>
  </div>
  <div class="control-panel-grid">
    <div class="filter-item">
      <label for="searchName">Search by Name</label>
      <input id="searchName" class="filter-input" type="text" placeholder="Search adventures..." list="nameList" />
    </div>
    <div class="filter-item">
      <label for="filterDifficulty">Filter by Difficulty</label>
      <select id="filterDifficulty" class="filter-select">
        <option value="">Any</option>
        <option value="Easy">Easy</option>
        <option value="Moderate">Moderate</option>
        <option value="Hard">Hard</option>
      </select>
    </div>
    <div class="filter-item">
      <label for="filterState">Filter by State</label>
      <input id="filterState" class="filter-input" type="text" placeholder="SC, NC, GA..." list="stateList" />
    </div>
    <div class="filter-item">
      <label for="filterCity">Filter by City</label>
      <input id="filterCity" class="filter-input" type="text" placeholder="Columbia, Greenville..." list="cityList" />
    </div>
    <div class="filter-item">
      <label for="filterTags">Filter by Tags</label>
      <input id="filterTags" class="filter-input" type="text" placeholder="Restaurant, Animals, Nature..." list="tagsList" />
    </div>
    <div class="filter-item">
      <label for="filterCost">Filter by Cost</label>
      <input id="filterCost" class="filter-input" type="text" placeholder="Free, $, $$..." list="costList" />
    </div>
    <div class="filter-item">
      <label for="groupBy">Group By</label>
      <select id="groupBy" class="filter-select">
        <option value="">None</option>
        <option value="State">State</option>
        <option value="City">City</option>
        <option value="Cost">Cost</option>
        <option value="Tag">Tag</option>
      </select>
    </div>
    <div class="filter-item">
      <label for="groupBySecondary">Then Group By (Optional)</label>
      <select id="groupBySecondary" class="filter-select">
        <option value="">None</option>
        <option value="State">State</option>
        <option value="City">City</option>
        <option value="Cost">Cost</option>
        <option value="Tag">Tag</option>
      </select>
    </div>
  </div>
</div>

<!-- Common Filters -->
<div id="quickFiltersCard" class="card quick-filters-card">
  <div class="card-header">
    <div class="card-title">
      🎛️ Common Filters
    </div>
    <button id="resetAllFiltersBottom" class="pill-button reset" title="Clear all applied filters" data-tooltip="Clear all applied filters">Reset All Filters</button>
  </div>
  <div class="quick-filters-container">
    <button id="favoritesFilterBtn" class="quick-filter-btn favorites-filter-btn" data-filter="favorites" title="Show only your favorite locations" data-tooltip="Show only your favorite locations">
      💖 My Favorites
    </button>
    <button class="quick-filter-btn" data-tag="restaurant" title="Filter by Restaurant" data-tooltip="Filter by Restaurant">🍽️ Restaurant</button>
    <button class="quick-filter-btn" data-tag="animals" title="Filter by Animals" data-tooltip="Filter by Animals">🐾 Animals</button>
    <button class="quick-filter-btn" data-tag="hiking" title="Filter by Hiking" data-tooltip="Filter by Hiking">⛰️ Hiking</button>
    <button class="quick-filter-btn" data-tag="biking paved trail" title="Filter by Biking Paved Trail" data-tooltip="Filter by Biking Paved Trail">🚴 Biking Paved</button>
    <button class="quick-filter-btn" data-tag="biking dirt or gravel" title="Filter by Biking Dirt or Gravel" data-tooltip="Filter by Biking Dirt or Gravel">🚲 Biking Dirt</button>
    <button class="quick-filter-btn" data-tag="garden center" title="Filter by Garden Center" data-tooltip="Filter by Garden Center">🌸 Garden Center</button>
    <button class="quick-filter-btn" data-tag="orchards" title="Filter by Orchards" data-tooltip="Filter by Orchards">🍎 Orchards</button>
    <button class="quick-filter-btn" data-tag="ziplining" title="Filter by Ziplining" data-tooltip="Filter by Ziplining">🪂 Ziplining</button>
    <button class="quick-filter-btn" data-tag="market" title="Filter by Market" data-tooltip="Filter by Market">🛒 Market</button>
    <button class="quick-filter-btn" data-tag="scenic drive" title="Filter by Scenic Drive" data-tooltip="Filter by Scenic Drive">🛣️ Scenic Drive</button>
    <button class="quick-filter-btn" data-tag="nature" title="Filter by Nature" data-tooltip="Filter by Nature">🌳 Nature</button>
    <button class="quick-filter-btn" data-tag="attractions" title="Filter by Attractions" data-tooltip="Filter by Attractions">⭐ Attractions</button>
    <button class="quick-filter-btn" data-tag="used book store" title="Filter by Used Book Store" data-tooltip="Filter by Used Book Store">📚 Used Book Store</button>
  </div>
</div>

<!-- Autofill Datalists -->
<datalist id="nameList"></datalist>
<datalist id="stateList"></datalist>
<datalist id="cityList"></datalist>
<datalist id="tagsList"></datalist>
<datalist id="costList"></datalist>

<!-- Breadcrumb Filter Menu -->
<div id="breadcrumbFilterMenu" class="breadcrumb-filter-menu">
  <div id="breadcrumbContainer" class="breadcrumb-container"></div>
  <button id="breadcrumbResetBtn" class="breadcrumb-reset-btn">🔄 Clear Filters</button>
</div>

<!-- Adventure List -->
<div class="card table-card">
  <div class="card-header">
    <div>
      <div class="card-title">
        Adventure List
      </div>
      <div class="card-subtitle">
        Data source: Adventure_Finder_Excel_DB.xlsx (Table: MyList)
      </div>
    </div>
  </div>
  <div class="view-controls">
    <div class="sort-controls">
      <label for="sortBy" class="sort-label">Sort by:</label>
      <select id="sortBy" class="sort-select">
        <option value="name">Name</option>
        <option value="driveTime">Drive Time</option>
        <option value="state">State</option>
        <option value="city">City</option>
        <option value="tags">Tags</option>
      </select>
      <button id="sortOrderBtn" class="sort-order-btn" title="Toggle sort order">
        <span class="sort-icon">↑</span>
      </button>
    </div>
    <div class="results-count" id="resultsCount">0 adventures</div>
  </div>

  <!-- Pagination Controls (Top) -->
  <div id="paginationControlsTop" class="pagination-controls" style="display: none;">
    <button id="prevPageBtnTop" class="pagination-btn" onclick="changePage(-1)">
      ← Previous
    </button>
    <div class="pagination-info">
      Page <span id="currentPageNumTop">1</span> of <span id="totalPagesNumTop">1</span>
      <span class="pagination-separator">•</span>
      Showing <span id="showingRangeStartTop">1</span>-<span id="showingRangeEndTop">20</span> of <span id="totalResultsNumTop">0</span>
    </div>
    <button id="nextPageBtnTop" class="pagination-btn" onclick="changePage(1)">
      Next →
    </button>
  </div>

  <!-- Adventure Cards Grid -->
  <div id="adventureCardsGrid" class="adventure-cards-grid">
    <!-- Cards will be populated from Excel/Graph -->
  </div>

  <!-- Pagination Controls (Bottom) -->
  <div id="paginationControls" class="pagination-controls" style="display: none;">
    <button id="prevPageBtn" class="pagination-btn" onclick="changePage(-1)">
      ← Previous
    </button>
    <div class="pagination-info">
      Page <span id="currentPageNum">1</span> of <span id="totalPagesNum">1</span>
      <span class="pagination-separator">•</span>
      Showing <span id="showingRangeStart">1</span>-<span id="showingRangeEnd">20</span> of <span id="totalResultsNum">0</span>
    </div>
    <button id="nextPageBtn" class="pagination-btn" onclick="changePage(1)">
      Next →
    </button>
  </div>
</div>

<script>
  // Initialize Adventure Planner tab
  window.initAdventurePlanner = function() {
    console.log('✅ Adventure Planner tab initialized');
    // All JS functions are available from main index
  };
</script>
